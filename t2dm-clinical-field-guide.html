      for (const c of candidates) { if (reg && reg[c]) { entry = reg[c]; break; } }

      const node = entry && (entry.iconNode || entry);

          fill,
          stroke: stroke || color,
          strokeWidth,
          strokeLinecap: 'round', strokeLinejoin: 'round',

// ------------------------------------------------------------
// HELPERS
// ------------------------------------------------------------

function tierRank(t) { return { recommended: 0, moderate: 1, avoid: 2 }[t] ?? 3; }

function applyStateOverride(food, state) {
  const ov = STATE_OVERRIDES[food.id]?.[state];
  let effectiveTier = food.tier;
  if (ov && /^AVOID/i.test(ov.label) && food.tier !== "avoid") effectiveTier = "avoid";
  return { ...food, effectiveTier, stateOverride: ov };
}

function fuzzyMatch(food, query) {
  if (!query) return true;
  const q = query.toLowerCase().trim();
  const haystack = [
    food.name, food.subtitle, food.tagline, food.mechanism, food.category,
    ...(food.nutrients || []),
    ...Object.values(food.localNames || {}),
  ].join(" ").toLowerCase();
  // tokenise on spaces — every token must appear somewhere
  return q.split(/\s+/).every((tok) => haystack.includes(tok));
}

function computeMealStats(items) {
  // items: [{food, servings}]
  let totalGL = 0, intCount = 0, hypoStack = 0, fibreLoad = 0;
  let giSum = 0, giServings = 0;
  const tierMix = { recommended: 0, moderate: 0, avoid: 0 };
  items.forEach(({ food, servings }) => {
    totalGL += (food.glPerServing || 0) * servings;
    intCount += (food.interactions || []).length;
    tierMix[food.tier] = (tierMix[food.tier] || 0) + servings;
    // Soluble fibre signal — heuristic
    if (/fibre|psyllium|β-glucan|mucilage|resistant/i.test(food.nutrients?.join(" ") || "")) fibreLoad += servings;
    // Hypoglycaemic stacking signal
    if ((food.interactions || []).some((i) => /sulphonylurea|insulin|hypoglyc/i.test(i.note + " " + i.drugs))) hypoStack += servings;
    if (typeof food.giNum === "number") {
      giSum += food.giNum * servings;
      giServings += servings;
    }
  });
  const avgGI = giServings ? Math.round(giSum / giServings) : null;
  return {
    totalGL: Math.round(totalGL),
    avgGI,
    intCount,
    hypoStack,
    fibreLoad,
    tierMix,
    count: items.reduce((a, b) => a + b.servings, 0),
  };
}

function classifyMeal(stats) {
  if (stats.count === 0) {
    return { label: "Empty", color: "#6b6a62", bg: "rgba(0,0,0,0.04)", note: "Add a few foods to see the verdict." };
  }
  if (stats.tierMix.avoid > 0) {
    return {
      label: "Risky plate",
      color: "#8a2a36",
      bg: "#f1e4e4",
      note: "Contains items in the Avoid tier — substitute or reduce portion before this becomes a regular meal.",
    };
  }
  if (stats.totalGL > 30) {
    return {
      label: "High glycaemic load",
      color: "#9a5a2a",
      bg: "#f4ece2",
      note: "Total GL is above 30. Consider swapping a high-GI item for a legume or whole grain, or shrinking the carb portion by ⅓.",
    };
  }
  if (stats.totalGL > 15) {
    return {
      label: "Moderate load",
      color: "#9a5a2a",
      bg: "#f4ece2",
      note: "Defensible at one meal — but if this is the daily template, add fibre or trim the starch portion.",
    };
  }
  return {
    label: "Low glycaemic load",
    color: "#1f5640",
    bg: "#dde9d6",
    note: "A well-balanced plate. Pairing fibre, fat, and protein keeps the postprandial curve flat.",
  };
}

/**
 * Educational postprandial glucose response sketch.
 * NOT a clinical prediction — a didactic model to show how meal composition
 * changes curve shape. Numbers drawn from typical OGTT-style ranges.
 */
function glucoseCurvePoints(items, { baseline = 5.5 } = {}) {
  const stats = computeMealStats(items);
  const gl = stats.totalGL;
  // Fibre and fat both flatten and delay the peak
  const fibreFlatten = Math.min(stats.fibreLoad * 0.25, 1.2);          // flattens peak 0–1.2 mmol/L
  const avoidBoost   = stats.tierMix.avoid > 0 ? 1.2 : 0;               // avoid foods bump peak
  // Peak rise above baseline (mmol/L): modest default, scales with GL
  const rise = Math.max(0, gl * 0.095 - fibreFlatten) + avoidBoost;
  // Peak time (min) — high-GL meals peak earlier, fibre delays
  const tPeak = Math.max(40, 60 - Math.min(gl * 0.5, 15) + stats.fibreLoad * 8);
  // Return curve: 19 samples at 10-min intervals (0..180)
  const pts = [];
  for (let t = 0; t <= 180; t += 10) {
    // Asymmetric gaussian: fast rise, slower fall
    const sigmaRise = 18, sigmaFall = 34;
    const sigma = t < tPeak ? sigmaRise : sigmaFall;
    const v = baseline + rise * Math.exp(-((t - tPeak) ** 2) / (2 * sigma * sigma));
    pts.push({ t, v });
  }
  return { pts, peak: baseline + rise, tPeak, baseline, gl };
}

/**
 * Given a food that's moderate or avoid, find up to 3 foods in the same category
 * that are better-tier and lower-GL.
 */
function findSwaps(food, all, patientState = "all") {
  if (!food || food.effectiveTier === "recommended") return [];
  return all
    .filter((f) => f.id !== food.id)
    .filter((f) => f.category === food.category || sameNutrientFamily(f, food))
    .filter((f) => tierRank(f.effectiveTier) < tierRank(food.effectiveTier))
    .sort((a, b) => {
      const tr = tierRank(a.effectiveTier) - tierRank(b.effectiveTier);
      if (tr !== 0) return tr;
      return (a.glPerServing || 99) - (b.glPerServing || 99);
    })
    .slice(0, 3);
}

function sameNutrientFamily(a, b) {
  // A rough nutrient-overlap heuristic for cross-category swaps (e.g., white rice → lentils)
  const aN = new Set((a.nutrients || []).map((n) => n.toLowerCase()));
  const bN = new Set((b.nutrients || []).map((n) => n.toLowerCase()));
  let overlap = 0;
  aN.forEach((n) => { if (bN.has(n)) overlap++; });
  return overlap >= 2;
}

/* ─────────────────  GLUCOSE CURVE SVG  ───────────────── */

function GlucoseCurve({ items, palette, theme }) {
  const { pts, peak, tPeak, baseline } = useMemo(() => glucoseCurvePoints(items), [items]);
  // SVG viewport
  const W = 460, H = 110, padX = 28, padY = 14;
  const maxY = Math.max(peak + 0.5, 10);                // show at least to ~10
  const minY = 4.5;
  const yFor = (v) => H - padY - ((v - minY) / (maxY - minY)) * (H - padY * 2);
  const xFor = (t) => padX + (t / 180) * (W - padX * 2);
  const d = pts.map((p, i) => `${i === 0 ? "M" : "L"} ${xFor(p.t).toFixed(1)} ${yFor(p.v).toFixed(1)}`).join(" ");
  const dFill = `${d} L ${xFor(180)} ${H - padY} L ${xFor(0)} ${H - padY} Z`;
  // Zones — green below 7.8, amber 7.8–10, red above 10 (post-meal thresholds)
  const zones = [
    { top: 7.8, color: "#1d4d2e", bg: theme === "dark" ? "rgba(29,77,46,0.18)" : "rgba(29,77,46,0.08)" },
    { top: 10,  color: "#a8521f", bg: theme === "dark" ? "rgba(168,82,31,0.18)" : "rgba(168,82,31,0.07)" },
    { top: maxY,color: "#7a2030", bg: theme === "dark" ? "rgba(122,32,48,0.22)" : "rgba(122,32,48,0.08)" },
  ];
  const peakZone = zones.find((z) => peak <= z.top) || zones[zones.length - 1];

  return (
    <div className="rounded-sm border p-3" style={{ borderColor: palette.borderSoft, background: palette.surfaceAlt }}>
      <div className="flex items-start justify-between mb-2">
        <div>
          <div className="text-[10px] tracking-[0.15em] uppercase" style={{ color: palette.textMuted }}>
            Postprandial glucose · sketch
          </div>
          <div className="text-[11px] mt-0.5" style={{ color: palette.textSubtle }}>
            Illustrative — not a clinical prediction. Shape based on meal GL + fibre.
          </div>
        </div>
        <div className="text-right">
          <div className="text-[10px] tracking-[0.15em] uppercase" style={{ color: palette.textMuted }}>Peak</div>
          <div className="serif text-lg tabular-nums" style={{ color: peakZone.color, fontWeight: 600 }}>
            {peak.toFixed(1)}<span className="text-[10px] ml-0.5" style={{ color: palette.textMuted }}>mmol/L</span>
          </div>
          <div className="text-[10px]" style={{ color: palette.textMuted }}>@ ~{Math.round(tPeak)} min</div>
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} role="img" aria-label={`Estimated glucose peak ${peak.toFixed(1)} mmol/L at ${Math.round(tPeak)} minutes`}>
        {/* Zone bands */}
        {zones.map((z, i) => {
          const y1 = yFor(z.top);
          const y0 = i === 0 ? H - padY : yFor(zones[i - 1].top);
          return <rect key={i} x={padX} y={y1} width={W - padX * 2} height={Math.max(0, y0 - y1)} fill={z.bg} />;
        })}
        {/* Baseline ref line */}
        <line x1={padX} y1={yFor(baseline)} x2={W - padX} y2={yFor(baseline)} stroke={palette.border} strokeDasharray="2 3" />
        {/* Curve fill */}
        <path d={dFill} fill={peakZone.color} fillOpacity="0.14" />
        {/* Curve stroke */}
        <path d={d} fill="none" stroke={peakZone.color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
        {/* Peak marker */}
        <circle cx={xFor(tPeak)} cy={yFor(peak)} r="3.5" fill={peakZone.color} />
        {/* Axes labels */}
        {[0, 60, 120, 180].map((t) => (
          <g key={t}>
            <line x1={xFor(t)} y1={H - padY} x2={xFor(t)} y2={H - padY + 3} stroke={palette.textMuted} />
            <text x={xFor(t)} y={H - 2} textAnchor="middle" fontSize="8" fill={palette.textMuted}>{t}m</text>
          </g>
        ))}
        {[5.5, 7.8, 10].map((v) => (
          <g key={v}>
            <text x={padX - 4} y={yFor(v) + 3} textAnchor="end" fontSize="8" fill={palette.textMuted}>{v}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function PrintHandout({ patientState, foods }) {

  const recommended = foods.filter((f) => applyStateOverride(f, patientState).tier === "recommended");
  const moderate = foods.filter((f) => applyStateOverride(f, patientState).tier === "moderate");
  const avoid = foods.filter((f) => applyStateOverride(f, patientState).tier === "avoid");

  // State-specific safety notes
  const safetyByState = {
    insulin: [
      "If you take insulin or sulphonylureas (gliclazide, glimepiride, glibenclamide), eating fewer carbs without adjusting medication can cause LOW blood sugar (hypoglycaemia).",
      "Always check with your doctor or diabetes nurse before making big changes — your dose may need to come down.",
      "Carry glucose tablets, sweets, or fruit juice. Never skip a meal without speaking to your team first.",
    ],
    remission: [
      "Remission usually requires meaningful weight loss (10–15 kg in those with elevated body weight) — DiRECT trial achieved this with a structured low-energy diet.",
      "Continue all prescribed medication until your doctor advises otherwise. Hypoglycaemia risk if dose is not adjusted.",
      "Even in remission, type 2 diabetes can return — stay on annual HbA1c checks and the same eating pattern.",
    ],
    management: [
      "These foods support — they do not replace — your metformin, GLP-1 agonist, SGLT2 inhibitor or insulin.",
      "Watch for kidney function on SGLT2s — stay hydrated.",
      "Aim for 7–8% HbA1c reduction targets agreed with your team.",
    ],
    prevention: [
      "If you have prediabetes (HbA1c 42–47 mmol/mol / 6.0–6.4%), structured lifestyle change reduces progression to T2DM by ~58% (DPP trial).",
      "Aim for 5–7% body weight loss if BMI is elevated, plus 150 minutes of brisk walking weekly.",
      "Re-check HbA1c every 6–12 months.",
    ],
    all: [
      "This guide is an educational summary — it does not replace clinical advice from your doctor, nurse, or dietitian.",
      "Drug interactions matter: grapefruit, fenugreek, and high-fibre foods can change how some diabetes drugs work.",
      "When in doubt, ask before making big changes.",
    ],
  };
  const safety = safetyByState[patientState] || safetyByState.all;

  const PrintList = ({ title, color, foods, bullet }) => (
    <section style={{ marginBottom: "8mm", breakInside: "avoid" }}>
      <h2 style={{

              <div style={{ color: "#666", fontSize: "8.5pt", marginTop: "0.5mm" }}>
                Portion: {f.portion} · GI {f.gi} · GL {f.glPerServing ?? "—"}
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );

  return (
    <div className="print-only" aria-hidden="true">
      {/* Page 1: Header + safety + recommended */}

            }}>
              Food Guide

            <div style={{ fontSize: "10pt", color: "#444", marginTop: "1mm", fontStyle: "italic" }}>
              Tailored for: <strong style={{ fontStyle: "normal" }}>{stateMeta.label}</strong>
            </div>
          </div>
          <div style={{ textAlign: "right", fontSize: "8pt", color: "#666" }}>
            <div>{new Date().toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" })}</div>
            <div style={{ marginTop: "1mm" }}>African + global foods</div>
          </div>

      </header>

      <section style={{

function T2DMFoodGuideV3() {
  const [patientState, setPatientState] = useState("all");
  const [tier, setTier] = useState("all");
  const [origin, setOrigin] = useState("all");
  const [category, setCategory] = useState("all");
  const [query, setQuery] = useState("");
  const [selected, setSelected] = useState(null);
  const [favourites, setFavourites] = useState(() => new Set());
  const [compareIds, setCompareIds] = useState(() => new Set());
  const [mealItems, setMealItems] = useState([]); // [{ food, servings }]
  const [showCompare, setShowCompare] = useState(false);
  const [theme, setTheme] = useState("light");
  const [showHelp, setShowHelp] = useState(false);
  const [view, setView] = useState("foods"); // foods | principles | builder | saved
  const searchRef = useRef(null);
  const hydratedRef = useRef(false);

  const TABS = [
    { id: "foods",      label: "Foods",      sub: "Browse + filter",       num: "01" },
    { id: "principles", label: "Principles", sub: "Pillars + evidence",    num: "02" },
    { id: "builder",    label: "Builder",    sub: "Plate + glucose curve", num: "03" },
    { id: "saved",      label: "Saved",      sub: "Favourites + compare",  num: "04" },
  ];

  const palette = PALETTES[theme];
  const stateMeta = PATIENT_STATES.find((s) => s.id === patientState) || PATIENT_STATES[0];
  const stateLabel = stateMeta.label;
  const stateAccent = stateMeta.color || palette.accentLocal;

  // Apply patient-state overrides on top of food list
  const adjustedFoods = useMemo(
    () => FOODS.map((f) => applyStateOverride(f, patientState)),
    [patientState]
  );

  const categories = useMemo(() => {
    const set = new Set(FOODS.map((f) => f.category));
    return [...set].sort();
  }, []);

  const filteredFoods = useMemo(() => {
    return adjustedFoods
      .filter((f) => (tier === "all" ? true : f.effectiveTier === tier))
      .filter((f) => (origin === "all" ? true : f.origin === origin))
      .filter((f) => (category === "all" ? true : f.category === category))
      .filter((f) => fuzzyMatch(f, query))
      .sort((a, b) => {
        // Recommended first, then moderate, then avoid; favourites bubble up within tier
        const t = tierRank(a.effectiveTier) - tierRank(b.effectiveTier);
        if (t !== 0) return t;
        const af = favourites.has(a.id) ? 0 : 1;
        const bf = favourites.has(b.id) ? 0 : 1;
        if (af !== bf) return af - bf;
        return a.name.localeCompare(b.name);
      });
  }, [adjustedFoods, tier, origin, category, query, favourites]);

  const compareFoods = useMemo(
    () => adjustedFoods.filter((f) => compareIds.has(f.id)).slice(0, 3),
    [adjustedFoods, compareIds]
  );

  // Re-derive meal items from current adjustedFoods so state-overrides flow through
  const mealItemsResolved = useMemo(
    () => mealItems
      .map(({ food, servings }) => {
        const fresh = adjustedFoods.find((x) => x.id === food.id);
        return fresh ? { food: fresh, servings } : { food, servings };
      }),
    [mealItems, adjustedFoods]
  );

  // Handlers
  const toggleFavourite = useCallback((id) => {
    setFavourites((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  }, []);

  const toggleCompare = useCallback((id) => {
    setCompareIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else if (next.size < 3) next.add(id);
      return next;
    });
  }, []);

  const addToMeal = useCallback((food) => {
    setMealItems((prev) => {
      const found = prev.find((p) => p.food.id === food.id);
      if (found) return prev.map((p) => p.food.id === food.id ? { ...p, servings: p.servings + 1 } : p);
      return [...prev, { food, servings: 1 }];
    });
  }, []);

  const onMealQtyChange = useCallback((idx, newServings) => {
    setMealItems((prev) => {
      if (newServings <= 0) return prev.filter((_, i) => i !== idx);
      return prev.map((p, i) => i === idx ? { ...p, servings: newServings } : p);
    });
  }, []);

  const clearMeal = useCallback(() => setMealItems([]), []);

  const applyTemplate = useCallback((tpl) => {
    const items = (tpl.items || [])
      .map(({ id, servings }) => {
        const food = FOODS.find((f) => f.id === id);
        return food ? { food, servings: servings || 1 } : null;
      })
      .filter(Boolean);
    setMealItems(items);
    setTimeout(() => {
      const el = document.getElementById("meal-builder-anchor");
      el?.scrollIntoView({ behavior: "smooth", block: "end" });
    }, 60);
  }, []);

  const clearAllFilters = useCallback(() => {
    setQuery("");
    setTier("all");
    setOrigin("all");
    setCategory("all");
  }, []);

  const handlePrint = useCallback(() => {
    setTimeout(() => window.print(), 50);
  }, []);

  // ── Keyboard shortcuts ──
  useEffect(() => {
    const isTypingTarget = (el) => {
      if (!el) return false;
      const tag = el.tagName;
      return tag === "INPUT" || tag === "TEXTAREA" || el.isContentEditable;
    };
    const onKey = (e) => {
      // Esc always closes modals
      if (e.key === "Escape") {
        if (showHelp) { setShowHelp(false); return; }
        if (selected) { setSelected(null); return; }
        if (showCompare) { setShowCompare(false); return; }
        return;
      }
      if (isTypingTarget(e.target)) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      if (e.key === "/") {
        e.preventDefault();
        searchRef.current?.focus();
        searchRef.current?.select?.();
      } else if (e.key === "?") {
        e.preventDefault();
        setShowHelp((v) => !v);
      } else if (e.key.toLowerCase() === "f" && selected) {
        e.preventDefault();
        toggleFavourite(selected.id);
      } else if (e.key.toLowerCase() === "c" && selected) {
        e.preventDefault();
        toggleCompare(selected.id);
      } else if (e.key.toLowerCase() === "t") {
        e.preventDefault();
        setTheme((t) => (t === "light" ? "dark" : "light"));
      } else if (e.key.toLowerCase() === "p") {
        e.preventDefault();
        handlePrint();
      } else if (e.key >= "1" && e.key <= "4") {
        e.preventDefault();
        setView(TABS[parseInt(e.key, 10) - 1].id);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [selected, showCompare, showHelp, toggleFavourite, toggleCompare, handlePrint]);

  // ── URL hash sync (read once on mount, write on change) ──
  useEffect(() => {
    if (hydratedRef.current) return;
    hydratedRef.current = true;
    try {
      const hash = (typeof window !== "undefined" && window.location.hash) || "";
      if (!hash) return;
      const raw = hash.replace(/^#/, "");
      const params = new URLSearchParams(raw);
      const stateParam = params.get("state");
      if (stateParam && PATIENT_STATES.some((s) => s.id === stateParam)) {
        setPatientState(stateParam);
      }
      const mealParam = params.get("meal");
      if (mealParam) {
        const parts = mealParam.split(",").filter(Boolean);
        const items = parts
          .map((p) => {
            const [id, qty] = p.split(":");
            const food = FOODS.find((f) => f.id === id);
            if (!food) return null;
            const servings = Math.max(1, Math.min(6, parseInt(qty || "1", 10) || 1));
            return { food, servings };
          })
          .filter(Boolean);
        if (items.length) setMealItems(items);
      }
      const themeParam = params.get("theme");
      if (themeParam === "dark" || themeParam === "light") setTheme(themeParam);
      const viewParam = params.get("view");
      if (viewParam && ["foods","principles","builder","saved"].includes(viewParam)) setView(viewParam);
    } catch {}
  }, []);

  useEffect(() => {
    if (!hydratedRef.current) return;
    try {
      const parts = [];
      if (mealItems.length) {
        parts.push("meal=" + mealItems.map((m) => `${m.food.id}:${m.servings}`).join(","));
      }
      if (patientState !== "all") parts.push("state=" + patientState);
      if (theme !== "light") parts.push("theme=" + theme);
      if (view !== "foods") parts.push("view=" + view);
      const next = parts.length ? "#" + parts.join("&") : "";
      if (typeof window !== "undefined" && window.location.hash !== next) {
        const url = window.location.pathname + window.location.search + next;
        window.history.replaceState(null, "", url);
      }
    } catch {}
  }, [mealItems, patientState, theme, view]);

  // Group filtered foods by tier for visual sections
  const grouped = useMemo(() => {
    const groups = { recommended: [], moderate: [], avoid: [] };
    filteredFoods.forEach((f) => groups[f.effectiveTier]?.push(f));
    return groups;
  }, [filteredFoods]);

  return (
    <div
      className="min-h-screen paper"
      style={{
        background: palette.bg,
        color: palette.text,
        fontFamily: "'Inter', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial",
      }}
    >
      <style>{`
        /* ───── Typography ───── */
        .serif { font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif; font-feature-settings: 'liga', 'kern', 'dlig', 'onum'; }
        .display { font-family: 'Fraunces', 'Source Serif 4', Georgia, 'Times New Roman', serif; font-feature-settings: 'liga', 'kern', 'ss01'; }
        .num { font-variant-numeric: tabular-nums oldstyle-nums; }
        .eyebrow {
          font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
          font-size: 10px; font-weight: 600;
          text-transform: uppercase; letter-spacing: 0.22em;
        }
        .section-num {
          font-family: 'Fraunces', 'Source Serif 4', Georgia, serif;
          font-weight: 400; font-style: italic;
        }

        /* ───── Paper texture (subtle sage wash) ───── */
        .paper {
          background-image:
            radial-gradient(1200px 600px at 0% -10%, rgba(141, 159, 79, 0.07), transparent 60%),
            radial-gradient(900px 500px at 110% 10%, rgba(74, 116, 56, 0.05), transparent 60%),
            radial-gradient(1400px 700px at 50% 120%, rgba(36, 74, 32, 0.04), transparent 60%);
        }

        /* ───── Hairline / editorial rules ───── */
        .hairline {
          display: flex; align-items: center; gap: 12px;
        }
        .hairline::before, .hairline::after {
          content: ""; flex: 1; height: 1px;
          background: currentColor; opacity: 0.2;
        }

        /* ───── Motion ───── */
        .fade-in { animation: fadeIn 260ms ease-out both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
        .drawer { animation: slideUp 260ms cubic-bezier(0.22, 1, 0.36, 1) both; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
        .meal-drawer { animation: slideFromBottom 280ms cubic-bezier(0.22, 1, 0.36, 1) both; }
        @keyframes slideFromBottom { from { transform: translateY(100%); } to { transform: none; } }

        /* ───── Premium card feel ───── */
        .card-premium {
          transition: transform 240ms cubic-bezier(0.22,1,0.36,1),
                      box-shadow 240ms cubic-bezier(0.22,1,0.36,1),
                      border-color 240ms ease;
        }
        .card-premium:hover {
          transform: translateY(-2px);
          box-shadow: 0 14px 40px -24px rgba(26, 24, 20, 0.22), 0 2px 6px -3px rgba(26, 24, 20, 0.08);
        }

        /* Subtle pill underline treatment (for chips) */
        .chip-soft {
          transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
        }

        /* Hide print-only on screen */
        .print-only { display: none; }

        @media print {
          @page { size: A4; margin: 12mm 14mm 14mm 14mm; }
          html, body { background: white !important; color: #1a1a1a !important; }
          .screen-only { display: none !important; }
          .print-only { display: block !important; }
          * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
      `}</style>

      <div className="screen-only">
        <Header
          patientState={patientState}
          setPatientState={setPatientState}
          theme={theme}
          setTheme={setTheme}
          favouritesCount={favourites.size}
          compareCount={compareIds.size}
          mealCount={mealItems.length}
          onPrint={handlePrint}
          onShowCompare={() => setShowCompare(true)}
          onShowMeal={() => {
            setView("builder");
            setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 50);
          }}
          palette={palette}
        />

        <TabBar
          tabs={TABS}
          active={view}
          setActive={setView}
          palette={palette}
          theme={theme}
          counts={{
            foods: filteredFoods.length,
            builder: mealItems.length,
            saved: favourites.size + compareIds.size,
          }}
        />

        {view === "foods" && (<>
        {/* Hero */}
        <section className="max-w-7xl mx-auto px-4 md:px-10 pt-14 pb-10">
          <div className="flex items-baseline gap-4 mb-5">
            <span className="section-num text-sm" style={{ color: palette.accentGold }}>00</span>
            <span className="eyebrow" style={{ color: palette.textMuted }}>The Guide</span>
            <span className="flex-1 h-px" style={{ background: palette.border }} />
            <span className="eyebrow" style={{ color: palette.textSubtle }}>Evidence · Culture · Practice</span>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-10 items-start">
            <div className="md:col-span-8">
              <h1
                className="display leading-[0.95] mb-5"
                style={{
                  fontWeight: 340,
                  fontSize: "clamp(2.6rem, 6.5vw, 5.2rem)",
                  letterSpacing: "-0.022em",
                  color: palette.text,
                }}
              >
                What to eat{" "}
                <span
                  className="display"
                  style={{
                    fontStyle: "italic",
                    fontWeight: 320,
                    color: palette.accentDeep,
                  }}
                >
                  when sugar
                </span>{" "}
                <span
                  className="display"
                  style={{
                    fontStyle: "italic",
                    fontWeight: 320,
                    color: palette.accentDeep,
                  }}
                >
                  runs high.
                </span>
              </h1>
              <div className="flex items-center gap-3 mb-5" aria-hidden>
                <span className="block h-px w-10" style={{ background: palette.accentGold }} />
                <span className="eyebrow" style={{ color: palette.accentGold }}>A clinical field guide</span>
              </div>
              <p
                className="max-w-2xl leading-relaxed"
                style={{
                  color: palette.textMuted,
                  fontSize: "17px",
                  fontFamily: "'Source Serif 4', Georgia, serif",
                }}
              >
                A quiet, clinician-written guide to type&nbsp;2 diabetes — one that takes African
                staples (<em>egusi, ewedu, beans, garri</em>) as seriously as the evidence on olive
                oil, oats, and lentils. Filter by your situation, build a meal, print a handout a
                patient would actually read.
              </p>
            </div>

            <aside
              className="md:col-span-4 rounded-sm border p-5 fade-in"
              style={{ borderColor: palette.border, background: palette.surface }}
            >
              <div className="eyebrow mb-3" style={{ color: palette.textMuted }}>The evidence stack</div>
              <ul className="text-[13px] leading-snug space-y-2" style={{ color: palette.textMuted, fontFamily: "'Source Serif 4', Georgia, serif" }}>
                {[
                  ["PREDIMED", "Mediterranean diet · ~30% CV-event reduction"],
                  ["DiRECT", "Low-energy diet · 46% remission at 1y"],
                  ["DIRECT-PLUS", "Green-Med · hepatic fat reduction"],
                  ["EPIC-InterAct", "Legumes ↔ lower T2DM incidence"],
                  ["DPP", "Lifestyle change · ~58% ↓ progression"],
                ].map(([label, desc]) => (
                  <li key={label} className="flex gap-3">
                    <span className="serif" style={{ fontWeight: 600, color: palette.text, minWidth: 92 }}>{label}</span>
                    <span>{desc}</span>
                  </li>
                ))}
              </ul>
              <div className="mt-4 pt-3 border-t text-[11px] italic" style={{ borderColor: palette.borderSoft, color: palette.textSubtle, fontFamily: "'Source Serif 4', Georgia, serif" }}>
                Educational only. Discuss medication changes with your clinician.
              </div>
            </aside>
          </div>
        </section>

        <FilterBar
          query={query} setQuery={setQuery}
          tier={tier} setTier={setTier}
          origin={origin} setOrigin={setOrigin}
          category={category} setCategory={setCategory}
          categories={categories}
          totalCount={FOODS.length}
          shownCount={filteredFoods.length}
          onClearAll={clearAllFilters}
          palette={palette}
          searchRef={searchRef}
        />

        {/* Food grid */}
        <main className="max-w-7xl mx-auto px-4 md:px-10 py-8 pb-32">
          <div className="flex items-baseline gap-4 mb-8">
            <span className="section-num text-sm" style={{ color: palette.accentGold }}>02</span>
            <span className="eyebrow" style={{ color: palette.textMuted }}>The Foods</span>
            <span className="flex-1 h-px" style={{ background: palette.border }} />
            <span className="eyebrow num" style={{ color: palette.textSubtle }}>{filteredFoods.length} / {FOODS.length} shown</span>
          </div>

          {filteredFoods.length === 0 ? (
            <div className="py-16 text-center">
              <div className="display text-3xl mb-2" style={{ color: palette.text, fontWeight: 380, fontStyle: "italic" }}>No foods match.</div>
              <div className="text-sm" style={{ color: palette.textMuted }}>
                Try clearing filters or searching for something simpler like "beans" or "okra".
              </div>
              <button
                onClick={clearAllFilters}
                className="mt-4 px-4 py-2 rounded-sm text-[11px]"
                style={{ background: palette.text, color: palette.bg, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase" }}
              >
                Clear all filters
              </button>
            </div>
          ) : (
            <>
              {(["recommended", "moderate", "avoid"]).map((t, idx) => {
                const items = grouped[t];
                if (!items || items.length === 0) return null;
                const meta = TIER_META[t];
                const sectionLabel = { recommended: "Eat freely", moderate: "With intention", avoid: "Reconsider" }[t];
                const subcopy = { recommended: "Foods where the evidence leans consistently toward benefit at typical portions.", moderate: "Context matters — watch portion, preparation, and timing.", avoid: "Evidence suggests harm at habitual servings. Not a moral judgment — a clinical one." }[t];
                return (
                  <section key={t} className="mb-14">
                    <div className="flex items-end justify-between mb-6 pb-3 border-b" style={{ borderColor: palette.border }}>
                      <div className="flex items-end gap-5">
                        <div
                          className="w-1 self-stretch"
                          style={{ background: meta.color, minHeight: 56 }}
                          aria-hidden
                        />
                        <div>
                          <div className="eyebrow mb-1" style={{ color: meta.ink || meta.color }}>
                            Tier {["I", "II", "III"][idx]} · {meta.label}
                          </div>
                          <h2
                            className="display leading-none"
                            style={{ fontSize: "38px", fontWeight: 400, letterSpacing: "-0.02em", color: palette.text }}
                          >
                            {sectionLabel}
                          </h2>
                          <p
                            className="text-[13px] mt-2 max-w-xl italic"
                            style={{ color: palette.textMuted, fontFamily: "'Source Serif 4', Georgia, serif" }}
                          >{subcopy}</p>
                        </div>
                      </div>
                      <div className="text-right leading-tight">
                        <div className="display num" style={{ fontSize: "36px", fontWeight: 300, color: palette.text, letterSpacing: "-0.02em" }}>
                          {String(items.length).padStart(2, "0")}
                        </div>
                        <div className="eyebrow" style={{ color: palette.textSubtle }}>Items</div>
                      </div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                      {items.map((f) => (
                        <FoodCard
                          key={f.id}
                          food={f}
                          palette={palette}
                          stateAccent={stateAccent}
                          isFav={favourites.has(f.id)}
                          inCompare={compareIds.has(f.id)}
                          onOpen={() => setSelected(f)}
                          onToggleFav={() => toggleFavourite(f.id)}
                          onToggleCompare={() => toggleCompare(f.id)}
                          onAddToMeal={(food) => addToMeal(food)}
                        />
                      ))}
                    </div>
                  </section>
                );
              })}
            </>
          )}
        </main>

        {/* Footer — editorial colophon */}
        <footer className="border-t" style={{ borderColor: palette.border, background: palette.surface }}>
          <div className="max-w-7xl mx-auto px-4 md:px-10 py-12">
            <div className="flex items-baseline gap-4 mb-8">
              <span className="section-num text-sm" style={{ color: palette.accentGold }}>03</span>
              <span className="eyebrow" style={{ color: palette.textMuted }}>Colophon</span>
              <span className="flex-1 h-px" style={{ background: palette.border }} />
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
              <div className="md:col-span-2">
                <h3
                  className="display mb-4"
                  style={{ fontSize: "28px", fontWeight: 380, letterSpacing: "-0.015em", color: palette.text }}
                >
                  About <span style={{ fontStyle: "italic", color: palette.accentDeep }}>this guide.</span>
                </h3>
                <p
                  className="max-w-2xl text-[14.5px] leading-relaxed"
                  style={{ color: palette.textMuted, fontFamily: "'Source Serif 4', Georgia, serif" }}
                >
                  Distilled from landmark trials — <em>PREDIMED</em> on the Mediterranean diet
                  (<span className="num">~30%</span> CV-event reduction), <em>DiRECT</em> on low-energy diets
                  (<span className="num">46%</span> remission at one year), <em>DIRECT-PLUS</em> on the green-Med
                  protocol (hepatic fat reduction), <em>EPIC-InterAct</em> on legumes and diabetes incidence, and the
                  <em> DPP</em> on lifestyle change (<span className="num">~58%</span> reduction in progression
                  from prediabetes) — then translated for the West African kitchen.
                </p>
                <p
                  className="mt-4 max-w-2xl text-[13px] italic"
                  style={{ color: palette.textSubtle, fontFamily: "'Source Serif 4', Georgia, serif" }}
                >
                  Educational only. Please discuss any medication adjustments with your clinician —
                  particularly if you take insulin or sulphonylureas.
                </p>
              </div>
              <div>
                <div className="eyebrow mb-3" style={{ color: palette.textMuted }}>Typography</div>
                <p className="text-[13px] leading-relaxed" style={{ color: palette.textMuted, fontFamily: "'Source Serif 4', Georgia, serif" }}>
                  Set in <span className="display italic" style={{ color: palette.accentDeep }}>Fraunces</span> for
                  display, <span className="serif" style={{ color: palette.text }}>Source Serif&nbsp;4</span> for
                  running text, and <span style={{ fontFamily: "'Inter', sans-serif" }}>Inter</span> for interface.
                </p>
                <div className="eyebrow mt-6 mb-3" style={{ color: palette.textMuted }}>Version</div>
                <div className="num text-[13px]" style={{ color: palette.textMuted }}>v3.1 · April 2026</div>
              </div>
            </div>
          </div>
        </footer>
        </>)}

        {view === "principles" && (
          <PrinciplesView palette={palette} />
        )}

        {view === "builder" && (
          <BuilderView
            items={mealItemsResolved}
            onChange={onMealQtyChange}
            onClear={clearMeal}
            onApplyTemplate={applyTemplate}
            onOpen={(food) => setSelected(food)}
            palette={palette}
            theme={theme}
          />
        )}

        {view === "saved" && (
          <SavedView
            favouriteFoods={adjustedFoods.filter((f) => favourites.has(f.id))}
            compareFoods={compareFoods}
            palette={palette}
            stateAccent={stateAccent}
            onOpen={(food) => setSelected(food)}
            onToggleFav={(id) => toggleFavourite(id)}
            onToggleCompare={(id) => toggleCompare(id)}
            favourites={favourites}
            compareIds={compareIds}
            onShowCompare={() => setShowCompare(true)}
          />
        )}

        <DetailDrawer
          food={selected}
          palette={palette}
          stateLabel={stateLabel}
          stateAccent={stateAccent}
          onClose={() => setSelected(null)}
          onAddToMeal={(food) => addToMeal(food)}
          onToggleFav={(id) => toggleFavourite(id)}
          isFav={selected ? favourites.has(selected.id) : false}
          allFoods={adjustedFoods}
          onJumpTo={(f) => setSelected(f)}
        />
        {showCompare && (
          <CompareDrawer
            foods={compareFoods}
            palette={palette}
            onClose={() => setShowCompare(false)}
            onRemove={(id) => toggleCompare(id)}
          />
        )}

        {/* Anchor for the bottom-fixed MealBuilder so the header button can scroll to it */}
        <div id="meal-builder-anchor" />
        {view !== "builder" && (
          <MealBuilder
            items={mealItemsResolved}
            palette={palette}
            onChange={onMealQtyChange}
            onClear={clearMeal}
            onOpen={(food) => setSelected(food)}
            theme={theme}
            onApplyTemplate={applyTemplate}
          />
        )}

        {/* Floating help button — always available, screen only */}
        <button
          onClick={() => setShowHelp((v) => !v)}
          className="fixed bottom-28 right-5 z-40 w-9 h-9 rounded-full border shadow-sm flex items-center justify-center text-sm font-mono screen-only hover:scale-105 transition-transform"
          style={{ background: palette.surface, borderColor: palette.border, color: palette.textMuted }}
          aria-label="Keyboard shortcuts (press ?)"
          title="Keyboard shortcuts — press ?"
        >
          ?
        </button>

        {/* Keyboard shortcuts help overlay */}
        {showHelp && (
          <div
            className="fixed inset-0 z-[60] flex items-center justify-center screen-only"
            style={{ background: "rgba(15, 23, 42, 0.55)" }}
            onClick={() => setShowHelp(false)}
          >
            <div
              className="drawer w-full max-w-md rounded-md border p-5"
              style={{ background: palette.surface, borderColor: palette.border, color: palette.text }}
              onClick={(e) => e.stopPropagation()}
              role="dialog"
              aria-modal="true"
              aria-label="Keyboard shortcuts"
            >
              <div className="flex items-center justify-between mb-3">
                <div className="serif text-lg" style={{ fontWeight: 600 }}>Keyboard shortcuts</div>
                <button
                  onClick={() => setShowHelp(false)}
                  className="w-7 h-7 rounded-sm flex items-center justify-center hover:bg-black/10"
                  aria-label="Close shortcuts"
                >
                  <X size={14} />
                </button>
              </div>
              <ul className="text-sm space-y-2" style={{ color: palette.textMuted }}>
                {[
                  ["1", "Foods tab"],
                  ["2", "Principles tab"],
                  ["3", "Builder tab"],
                  ["4", "Saved tab"],
                  ["/", "Focus search"],
                  ["f", "Favourite selected food"],
                  ["c", "Add / remove from Compare"],
                  ["t", "Toggle dark mode"],
                  ["p", "Print handout"],
                  ["Esc", "Close drawer / overlay"],
                  ["?", "Show / hide this help"],
                ].map(([k, v]) => (
                  <li key={k} className="flex items-center justify-between">
                    <span>{v}</span>
                    <kbd
                      className="px-2 py-0.5 rounded-sm text-[11px] font-mono"
                      style={{ background: palette.surfaceAlt, border: `1px solid ${palette.border}`, color: palette.text }}
                    >{k}</kbd>
                  </li>
                ))}
              </ul>
              <div className="mt-4 pt-3 border-t text-[11px]" style={{ borderColor: palette.border, color: palette.textMuted }}>
                Tip: your current meal + patient state are saved to the URL — copy the address bar to share this exact setup.
              </div>
            </div>
          </div>
        )}
      </div>

      <PrintHandout patientState={patientState} foods={adjustedFoods} />
    </div>
  );
}


/* ===== COMPONENT END ===== */

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(T2DMFoodGuideV3));
    setTimeout(() => {
      const s = document.getElementById('boot-splash');
      if (s) { s.classList.add('gone'); setTimeout(() => s.remove(), 300); }
    }, 80);
  </script>
