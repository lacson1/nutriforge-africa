{id:246,name:"Resistant starch (green banana)",aka:"Musa acuminata — unripe",emoji:"🍌",cat:"fruit",catLabel:"Functional food/fruit",african:true,top3:false,kcal:89,carbs:22.8,protein:1.1,fat:0.3,fiber:2.6,gi:"Low",evidence:"High",micro:"Resistant starch (12–15g/100g — highest of any common food), Potassium (358mg), B6 (0.37mg), Vitamin C (8.7mg)",bio:"Type 2 resistant starch (RS2 — granular, resists amylase digestion), FOS, pectin, polyphenols",benefits:"RS2 resistant starch: RCT evidence for increased Bifidobacterium, Akkermansia, and butyrate production. Butyrate: colonocyte fuel, anti-tumour, anti-inflammatory. Postprandial glucose completely attenuated vs ripe banana. 2023 RCT: green banana flour reduced colorectal polyps. Native across tropical Africa.",use:"Gut microbiome (butyrate, Akkermansia), colorectal cancer risk, postprandial glucose, resistant starch",limits:"Very starchy texture — usually cooked or powdered. GI increases significantly when ripe. Underripe taste not universally appealing."},
{id:247,name:"Jerusalem artichoke flour",aka:"Helianthus tuberosus — dried",emoji:"🌻",cat:"other",catLabel:"Prebiotic functional food",african:false,top3:false,kcal:356,carbs:80,protein:8,fat:0.4,fiber:42,gi:"Low",evidence:"Moderate",micro:"Inulin (16–20g/100g fresh — 42g/100g flour), FOS, Iron (3.4mg), Thiamine (0.2mg), Potassium (429mg)",bio:"Inulin (long-chain — highest prebiotic potency), FOS, chlorogenic acid, polyphenols",benefits:"Highest dietary inulin source. Inulin specifically promotes Bifidobacterium and Faecalibacterium prausnitzii — key gut health bacteria. RCTs confirm insulin sensitivity improvement via gut microbiome modulation. Prebiotic effect strongest among all dietary fibres.",use:"Gut microbiome (most potent prebiotic), insulin sensitivity, Bifidobacterium, butyrate production",limits:"Extreme flatulence — start with tiny doses. IBS — contraindicated. Must slowly titrate dose."},
{id:248,name:"Polyphenol-rich extra dark berries",aka:"Chokeberry — Aronia melanocarpa",emoji:"🫐",cat:"fruit",catLabel:"Berry",african:false,top3:false,kcal:47,carbs:11,protein:1.4,fat:0.1,fiber:5.3,gi:"Low",evidence:"Moderate",micro:"Vitamin C (21mg), Vitamin K (19.8mcg), Anthocyanins (1,480mg/100g — highest of all berries), Quercetin, Chlorogenic acid",bio:"Cyanidin-3-galactoside (dominant anthocyanin), chlorogenic acid, neochlorogenic acid, quercetin glycosides",benefits:"Highest total anthocyanin content of any commonly studied berry — 3–4× higher than blueberries. Multiple RCTs: chokeberry reduces blood pressure, LDL, CRP, and oxidative stress markers. Anti-platelet activity. 2019 SR: significant improvement in metabolic syndrome markers.",use:"Highest anthocyanin source, cardiovascular, anti-inflammatory, metabolic syndrome, antioxidant",limits:"Very astringent taste — usually consumed as juice, supplement, or dried. Limited culinary use. Tannins may reduce iron and mineral absorption."},
{id:249,name:"Sea buckthorn",aka:"Hippophae rhamnoides",emoji:"🍊",cat:"fruit",catLabel:"Berry/shrub fruit",african:false,top3:false,kcal:82,carbs:10.1,protein:1.2,fat:5.4,fiber:3.6,gi:"Low",evidence:"Moderate",micro:"Vitamin C (695mg/100g — 12× more than oranges), Vitamin E (3.3mg), Beta-carotene (3mg), Omega-7 (palmitoleic acid), Vitamin K",bio:"Palmitoleic acid (omega-7 — highest berry source), tocopherols, tocotrienols, carotenoids, quercetin, isorhamnetin",benefits:"One of the richest known sources of vitamin C (695mg/100g). Palmitoleic acid (omega-7): improves insulin sensitivity and reduces cardiovascular risk markers. Multiple RCTs: sea buckthorn oil reduces vaginal atrophy, improves skin moisture, and reduces cardiovascular risk. Anti-inflammatory via multiple pathways.",use:"Vitamin C (highest dense source), omega-7 (cardiovascular, insulin), skin health, antioxidant",limits:"Very tart — usually as oil, juice or supplement. Palmitoleic acid effect is weaker than EPA/DHA for cardiovascular. Limited availability."},
{id:250,name:"Natto (Japanese fermented soy)",aka:"Bacillus subtilis var. natto",emoji:"🫘",cat:"fermented",catLabel:"Fermented soy",african:false,top3:false,kcal:212,carbs:14.4,protein:17.7,fat:11,fiber:5.4,gi:"Low",evidence:"High",micro:"Vitamin K2 MK-7 (1,103mcg/100g — highest food source), Nattokinase (fibrinolytic enzyme), Polyglutamic acid, B2 (0.56mg), Iron (8.6mg)",bio:"Nattokinase (serine protease — dissolves fibrin clots), MK-7 vitamin K2, dipicolinic acid, spermidine (polyamine — longevity)",benefits:"Highest dietary spermidine content — spermidine induces autophagy and is associated with longevity in multiple cohort studies. Nattokinase: RCT evidence for fibrinolytic activity (reduces clot risk). MK-7: superior to MK-4 for sustained K2 activity (72h half-life). Multiple studies link natto consumption to lower all-cause mortality in Japan (JPHC study).",use:"Longevity (spermidine/autophagy), cardiovascular (nattokinase/K2), bone health, all-cause mortality reduction",limits:"Very pungent flavour and texture — cultural barrier. Extremely high K2 — major warfarin interaction. Soy allergy. Must not be heated excessively (destroys nattokinase)."}
,
{id:251,name:"Wheat bran",aka:"Triticum aestivum — outer layer",emoji:"🌾",cat:"grain",catLabel:"Whole grain fibre",african:false,top3:false,kcal:216,carbs:65,protein:15.5,fat:4.3,fiber:42.8,gi:"Low",evidence:"High",micro:"Magnesium (611mg), Phosphorus (1013mg), Iron (10.6mg), Zinc (7.3mg), Niacin (13.6mg)",bio:"Arabinoxylan (prebiotic), ferulic acid, alkylresorcinols, phytic acid, lignans",benefits:"Highest fibre of any grain product (42.8g/100g). Arabinoxylan is a potent prebiotic for Bifidobacterium and Lactobacillus. Multiple large cohorts: wheat bran associated with 20–30% reduction in colorectal cancer risk. FDA-approved fibre health claim. Significant iron and magnesium per serving.",use:"Colorectal cancer risk reduction, gut microbiome, constipation, LDL reduction, iron/magnesium",limits:"Phytic acid significantly reduces mineral bioavailability — soak or ferment. Coeliac disease absolute contraindication (contains gluten). High FODMAP — IBS caution."},
{id:252,name:"Rye (whole grain)",aka:"Secale cereale",emoji:"🌾",cat:"grain",catLabel:"Whole grain",african:false,top3:false,kcal:335,carbs:69,protein:10.3,fat:1.6,fiber:15.1,gi:"Low",evidence:"High",micro:"Manganese (2.6mg), Phosphorus (374mg), Magnesium (121mg), Iron (2.7mg), B1/Thiamine (0.3mg)",bio:"Arabinoxylan (highest grain arabinoxylan), alkylresorcinols, lignans (enterolactone precursors), beta-glucan",benefits:"Highest arabinoxylan of all grains — strongest prebiotic effect. Multiple RCTs: rye bread significantly lower postprandial insulin response vs wheat (despite similar GI). Meta-analysis: whole grain rye reduces LDL and CRP. Lignan content supports oestrogen metabolism. Very high satiety index.",use:"Gut microbiome (arabinoxylan), insulin management, LDL reduction, satiety, hormonal balance",limits:"Contains gluten — coeliac contraindication. Ergot fungal contamination risk in poorly stored rye. High FODMAP."},
{id:253,name:"Buckwheat",aka:"Fagopyrum esculentum",emoji:"🌾",cat:"grain",catLabel:"Pseudocereal",african:false,top3:false,kcal:343,carbs:71,protein:13.3,fat:3.4,fiber:10,gi:"Low",evidence:"Moderate",micro:"Manganese (1.3mg), Magnesium (231mg), Phosphorus (347mg), Copper (1.1mg), Niacin (7mg)",bio:"Rutin (quercetin-3-rutinoside — highest grain source), D-chiro-inositol (insulin signalling), fagopyritols, resistant starch",benefits:"D-chiro-inositol: RCT evidence for improving insulin sensitivity in PCOS and T2D. Rutin: strengthens capillary walls (evidence for venous insufficiency), anti-inflammatory. Complete protein (all essential amino acids). Gluten-free. Low GI despite high carb density.",use:"Insulin sensitivity (PCOS, T2D), capillary health (venous insufficiency), gluten-free grain, complete protein",limits:"Fagopyrin (photo-sensitiser) — rare photosensitivity reaction in livestock, minimal in humans at dietary doses. Possible cross-reactivity with latex allergy."},
{id:254,name:"Wild rice",aka:"Zizania palustris",emoji:"🌾",cat:"grain",catLabel:"Whole grain",african:false,top3:false,kcal:357,carbs:74.9,protein:14.7,fat:1.1,fiber:6.2,gi:"Low",evidence:"Moderate",micro:"Manganese (1.3mg), Phosphorus (433mg), Zinc (5.9mg), Magnesium (177mg), Niacin (6.7mg)",bio:"Anthocyanins (black variety), ferulic acid, arabinoxylan, resistant starch, polyphenols",benefits:"Highest protein of any rice variety. Very high zinc (5.9mg/100g — remarkable for a grain). Anthocyanins in black/purple wild rice have antioxidant and anti-inflammatory properties. Low GI despite high starch. Technically a grass seed not true rice — gluten-free.",use:"High-protein grain, zinc, gluten-free, antioxidant (anthocyanins), low-GI grain option",limits:"Ergot contamination if improperly stored. Expensive. Not widely available. Arsenic content much lower than regular rice."},
{id:255,name:"Barley (hulled)",aka:"Hordeum vulgare",emoji:"🌾",cat:"grain",catLabel:"Whole grain",african:false,top3:false,kcal:354,carbs:73,protein:12.5,fat:2.3,fiber:17.3,gi:"Low",evidence:"High",micro:"Manganese (1.9mg), Selenium (37.7mcg), Phosphorus (264mg), B1/Thiamine (0.6mg), Magnesium (133mg)",bio:"Beta-glucan (5–11% — highest grain source), tocols (tocopherols + tocotrienols), lignans, ferulic acid, proanthocyanidins",benefits:"Highest beta-glucan content of any grain (5–11%). Meta-analysis: barley beta-glucan reduces LDL 5–10% (bile acid sequestration). EU-approved cardiovascular claim. Selenium content (37.7mg) highest of common grains. Very high satiety index — reduces postprandial glucose more than oats.",use:"LDL reduction (beta-glucan — first-line dietary), glycaemic control, selenium, satiety, gut microbiome",limits:"Gluten — coeliac contraindication. High FODMAP. Pearled barley (common form) has less fibre than hulled."},
{id:256,name:"Freekeh",aka:"Green durum wheat — roasted",emoji:"🌾",cat:"grain",catLabel:"Ancient grain",african:true,top3:false,kcal:346,carbs:65,protein:16.5,fat:2.7,fiber:12.9,gi:"Low",evidence:"Low",micro:"Iron (3.7mg), Zinc (2.4mg), Magnesium (178mg), Phosphorus (378mg), Lutein+zeaxanthin (high — green wheat)",bio:"Lutein and zeaxanthin (unique for a grain — retained from green wheat), resistant starch, phenolic acids, arabinoxylans",benefits:"Unique among grains: contains significant lutein and zeaxanthin from green wheat harvesting — supports eye health. Very high protein for a grain (16.5g/100g). Low GI due to resistant starch. Traditional food of N. Africa and Levant — smoked/roasted preparation gives distinctive flavour.",use:"Eye health (lutein/zeaxanthin — unique for grain), high protein grain, low-GI, N. African traditional food",limits:"Contains gluten. Limited availability outside Middle East and N. Africa. Not suitable in coeliac."},
{id:257,name:"Millet (finger/ragi)",aka:"Eleusine coracana — Ragi",emoji:"🌾",cat:"grain",catLabel:"African whole grain",african:true,top3:false,kcal:336,carbs:72,protein:7.7,fat:1.5,fiber:11.5,gi:"Low",evidence:"Moderate",micro:"Calcium (344mg — highest grain calcium), Iron (3.9mg), Phosphorus (283mg), Magnesium (137mg), Zinc (2.3mg)",bio:"Polyphenols (tannins, flavonoids), phytate, resistant starch, GABA",benefits:"Highest calcium of any grain (344mg/100g) — exceptional for bone health in populations without dairy access. Tannins and phytates reduced by fermentation/malting. Low GI — important for T2D management. Native to E. Africa (Ethiopia, Uganda) — one of Africa's most nutritious cereals. GABA content mild anxiolytic.",use:"Calcium intake (dairy-free, Africa), glycaemic management, gut health, bone health, traditional African cereal",limits:"Phytate reduces mineral bioavailability — germination/fermentation mitigates. Gluten-free. Tannins reduce protein digestibility."},

// ══ MORE OILS & FATS ══
{id:258,name:"Avocado oil",aka:"Persea americana — cold-pressed",emoji:"🥑",cat:"oil",catLabel:"Oil",african:false,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"Vitamin E (14.3mg), Vitamin K (24.1mcg), MUFA (oleic acid 70%), Lutein (0.8mg), Phytosterols (76mg)",bio:"Oleic acid (MUFA — 70%), lutein (fat-soluble — highest of any common oil), phytosterols, tocopherols, squalene",benefits:"Highest smoke point of any cold-pressed oil (270°C) — maintains polyphenol integrity at high heat. Only oil containing significant lutein. Oleic acid has same cardiovascular evidence base as EVOO. RCT: avocado oil reduces LDL and increases HDL. Phytosterols inhibit cholesterol absorption.",use:"High-heat cooking (superior stability), lutein, cardiovascular (MUFA), LDL reduction, fat-soluble vitamin absorption",limits:"Very calorie-dense. Quality varies — cold-pressed only for health benefits. Adulteration with cheaper oils common."},
{id:259,name:"Walnut oil",aka:"Juglans regia — cold-pressed",emoji:"🫙",cat:"oil",catLabel:"Oil",african:false,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"ALA omega-3 (10.4g/tbsp — highest cooking oil), Vitamin E (0.2mg), Phytosterols, Ellagitannins (trace)",bio:"ALA (alpha-linolenic acid — 10.4g/tbsp), linoleic acid (omega-6), tocopherols, polyphenols, phytosterols",benefits:"Highest ALA omega-3 of any common cooking oil. RCTs: walnut oil reduces LDL and improves endothelial function. PREDIMED cardiovascular data on nuts extends to oil. Best used cold/low heat to preserve ALA.",use:"Plant-based omega-3 (ALA), cardiovascular, endothelial function, salad dressings",limits:"Very unstable — oxidises rapidly at high heat (smoke point 160°C). Refrigerate after opening. Expensive. ALA→EPA/DHA conversion 5–10%."},
{id:260,name:"MCT oil",aka:"Medium-chain triglyceride oil",emoji:"🫙",cat:"oil",catLabel:"Functional oil",african:false,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"Caprylic acid C8 (55–65%), Capric acid C10 (35–45%), No long-chain fatty acids",bio:"C8 caprylic acid (fastest ketone conversion), C10 capric acid, no cholesterol, no phytochemicals",benefits:"C8 MCT: bypasses portal circulation — rapidly converted to ketones in liver (within 30 min). Multiple RCTs: MCT oil improves cognitive performance in Alzheimer's patients (alternative fuel to glucose). Reduces appetite and caloric intake in RCTs. Supports ketogenic protocol maintenance.",use:"Ketogenic diet, cognitive function (Alzheimer's adjunct), appetite management, rapid energy, IF support",limits:"Very high doses cause GI distress (diarrhoea, nausea) — titrate slowly. No cardiovascular polyphenol benefit. Expensive. Not suitable for cooking at high heat."},
{id:261,name:"Hemp seed oil",aka:"Cannabis sativa — cold-pressed",emoji:"🌱",cat:"oil",catLabel:"Oil",african:false,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"GLA (gamma-linolenic acid — 2.5g/tbsp), ALA (omega-3 2.7g/tbsp), Vitamin E (5.7mg), Phytosterols",bio:"GLA (omega-6 anti-inflammatory via DGLA), SDA (omega-3), optimal 3:1 omega-6:omega-3 ratio, tocopherols",benefits:"Only common oil with significant GLA content (2.5g/tbsp). GLA converts to DGLA — anti-inflammatory (competes with arachidonic acid). Optimal omega-6:omega-3 ratio (3:1). RCTs: hemp oil improves skin conditions (eczema, psoriasis) and reduces inflammation markers.",use:"GLA anti-inflammatory, optimal omega ratio, skin health (eczema), cardiovascular, plant-based omega-3",limits:"Very low smoke point — cold use only. Slight THC traces (minimal, legally negligible). Expensive. Oxidises quickly — refrigerate."},
{id:262,name:"Sesame oil (toasted)",aka:"Sesamum indicum — dark",emoji:"🫙",cat:"oil",catLabel:"Oil",african:true,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"Sesamol (0.5%), Sesamin (0.1%), Vitamin E (1.4mg), Phytosterols (400mg — highest of cooking oils), MUFA+PUFA",bio:"Sesamol (potent antioxidant), sesamin (lignan), sesaminol, phytosterols (400mg/100g — highest of all oils), oleic acid",benefits:"Highest phytosterol content of any common cooking oil — significant cholesterol absorption inhibition. Sesamol: anti-inflammatory, hepatoprotective, and anti-tumour (in vitro). Sesamin: lowers LDL and blood pressure in small RCTs. Good oxidative stability from sesamol antioxidants. Traditional in N./W. African and Asian cooking.",use:"Phytosterol-rich cooking oil, LDL reduction, antioxidant, flavour enhancer, anti-inflammatory",limits:"Strong flavour — used in small amounts. Sesame allergy — major declared allergen. Toasted oil low smoke point — best as condiment."},
{id:263,name:"Pumpkin seed oil",aka:"Cucurbita pepo — Styrian",emoji:"🌱",cat:"oil",catLabel:"Oil",african:false,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"Vitamin E (35mg — very high), Zinc (0.3mg), Phytosterols (360mg), Delta-7-sterols (unique), PUFA",bio:"Delta-7-sterols (unique anti-androgenic phytosterols), cucurbitin precursors, tocopherols, carotenoids",benefits:"Delta-7-sterols: RCT evidence for reducing benign prostatic hyperplasia (BPH) symptoms — approved in Germany as medical food for prostate. Multiple RCTs: pumpkin seed oil improves prostate and bladder function. Very high vitamin E. Anti-parasitic cucurbitin precursors.",use:"Prostate health (BPH — RCT evidence), bladder function, Vitamin E, phytosterols, anti-parasitic",limits:"Very expensive. Best cold — low smoke point. Turns dark green (Styrian variety) — unusual appearance."},
{id:264,name:"Black seed oil",aka:"Nigella sativa — black cumin",emoji:"🌿",cat:"oil",catLabel:"African/Middle Eastern oil",african:true,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"Thymoquinone (0.5–1.5%), Thymohydroquinone, Carvacrol, Dithymoquinone, Fixed oils (linoleic, oleic acid)",bio:"Thymoquinone (TQ — major bioactive), thymohydroquinone, carvacrol, beta-sitosterol, alpha-hederin",benefits:"Multiple RCTs: black seed oil reduces blood pressure, fasting glucose, HbA1c, LDL, and CRP. Thymoquinone: potent anti-inflammatory via NF-κB, anti-tumour in multiple cancer cell lines. Widely used in traditional African and Middle Eastern medicine — mentioned in Islamic medicine (Hadith). Largest body of evidence of any herbal oil.",use:"Hypertension, T2D glycaemic control, LDL reduction, anti-inflammatory, traditional African/ME medicine",limits:"Anticoagulant interaction (warfarin). May interact with CYP3A4 metabolised drugs. Hepatotoxicity at very high doses. Not suitable in pregnancy at medicinal doses."},

// ══ MORE VEGETABLES ══
{id:265,name:"Radish (daikon)",aka:"Raphanus sativus var. longipinnatus",emoji:"🥕",cat:"veg",catLabel:"Root vegetable",african:false,top3:false,kcal:18,carbs:4.1,protein:0.7,fat:0.1,fiber:1.6,gi:"Low",evidence:"Low",micro:"Vitamin C (22mg), Folate (28mcg), Potassium (233mg), B6 (0.1mg), Calcium (27mg)",bio:"Glucosinolates (glucoraphasatin, glucoraphenin), isothiocyanates, indoles, anthocyanins (red variety), peroxidases",benefits:"Cruciferous glucosinolates convert to isothiocyanates — same cancer-preventive mechanism as broccoli. Digestive enzymes (peroxidases, amylases) support digestion of cooked foods. Traditional use in Japan, Korea, and W. Africa for liver and digestive support. Very low calorie.",use:"Cruciferous phytochemicals, digestive enzyme support, liver health (traditional), low-calorie vegetable",limits:"Very limited clinical RCTs. Raw radish can cause flatulence. Thyroid goitrogenic effect at very high intake."},
{id:266,name:"Fennel",aka:"Foeniculum vulgare",emoji:"🌿",cat:"veg",catLabel:"Vegetable/Herb",african:false,top3:false,kcal:31,carbs:7.3,protein:1.2,fat:0.2,fiber:3.1,gi:"Low",evidence:"Low",micro:"Vitamin C (12mg), Potassium (414mg), Folate (27mcg), Calcium (49mg), Iron (0.7mg)",bio:"Anethole (major bioactive — anti-tumour, antimicrobial), fenchone, estragole, quercetin, rosmarinic acid",benefits:"Anethole: demonstrated anti-tumour, anti-inflammatory, and antimicrobial activity. Fennel seeds clinically equivalent to mefenamic acid for dysmenorrhoea (small RCTs). Carminative — reduces gas and bloating. Traditional digestive aid across Mediterranean and N. Africa.",use:"GI symptoms (gas, bloating), dysmenorrhoea (adjunct), anti-inflammatory, traditional digestive aid, N. African spice",limits:"Estragole: potential carcinogen at very high doses (relevant to extract, not culinary use). Photosensitivity (furocoumarins). Anticoagulant interaction at high doses."},
{id:267,name:"Jicama",aka:"Pachyrhizus erosus — Mexican turnip",emoji:"🥬",cat:"veg",catLabel:"Root vegetable",african:false,top3:false,kcal:38,carbs:8.8,protein:0.7,fat:0.1,fiber:4.9,gi:"Low",evidence:"Low",micro:"Vitamin C (20.2mg), Potassium (150mg), Folate (12mcg), Iron (0.6mg), Magnesium (12mg)",bio:"Inulin (high — excellent prebiotic), oligofructose, rotenone (root only, not tuber), vitamin C",benefits:"Exceptionally high inulin content — very effective prebiotic. Very low GI despite carbohydrate content. Crisp, sweet flavour eaten raw. Inulin promotes Bifidobacterium growth and butyrate production. Hydrating due to high water content.",use:"Gut microbiome (inulin prebiotic), weight management, blood glucose control, hydration",limits:"Seeds and leaves contain rotenone (toxic) — only edible tuber flesh. Very limited clinical trials. FODMAP — GI symptoms in sensitive individuals."},
{id:268,name:"Purple cabbage",aka:"Brassica oleracea var. capitata f. rubra",emoji:"🥬",cat:"veg",catLabel:"Cruciferous vegetable",african:false,top3:false,kcal:31,carbs:7.4,protein:1.4,fat:0.2,fiber:2.5,gi:"Low",evidence:"Moderate",micro:"Vitamin C (57mg — higher than green cabbage), Vitamin K (38.2mcg), Anthocyanins (215mg/100g), Folate (18mcg), Potassium (243mg)",bio:"Cyanidin-3-glucoside (anthocyanin), glucosinolates, sinigrin, I3C, sulforaphane, kaempferol",benefits:"Anthocyanin content 215mg/100g — among highest of any vegetable. Anthocyanins: RCT evidence for improved endothelial function and BP reduction. Cruciferous glucosinolates provide cancer-preventive isothiocyanates. Vitamin C (57mg) higher than green cabbage. Inexpensive and widely available globally.",use:"Anthocyanin antioxidant, cardiovascular, cruciferous cancer prevention, vitamin C, gut microbiome",limits:"Goitrogenic. FODMAP. Cooking reduces glucosinolate content — eat raw or lightly cooked."},
{id:269,name:"Celeriac",aka:"Apium graveolens var. rapaceum",emoji:"🥬",cat:"veg",catLabel:"Root vegetable",african:false,top3:false,kcal:42,carbs:9.2,protein:1.5,fat:0.3,fiber:1.8,gi:"Low",evidence:"Low",micro:"Vitamin K (41mcg), Vitamin C (12.5mg), Phosphorus (115mg), Potassium (300mg), B6 (0.15mg)",bio:"Phthalides (3-n-butylphthalide — antihypertensive), apigenin, flavonoids, polyacetylenes",benefits:"Phthalides (same as celery) — antihypertensive via smooth muscle relaxation. Apigenin: anxiolytic, anti-inflammatory, anti-tumour (in vitro). Low GI makes it a useful potato substitute in low-carb diets. Crisp raw texture or creamy when cooked.",use:"Low-carb potato substitute, antihypertensive (phthalides), anti-inflammatory, vitamin K",limits:"Vitamin K — warfarin interaction. Photosensitivity (furanocoumarins in leaves and skin). Very limited clinical evidence."},
{id:270,name:"Pak choi (Bok choy)",aka:"Brassica rapa subsp. chinensis",emoji:"🥬",cat:"leaf",catLabel:"Asian leafy green",african:false,top3:false,kcal:13,carbs:2.2,protein:1.5,fat:0.2,fiber:1,gi:"Low",evidence:"Moderate",micro:"Vitamin K (45.5mcg), Vitamin A (223mcg RAE), Vitamin C (45mg), Calcium (105mg), Folate (66mcg)",bio:"Glucosinolates (glucobrassicin, sinigrin), I3C, quercetin, kaempferol, beta-carotene, lutein",benefits:"Very high Vitamin A and C for a leafy green. Glucosinolates convert to isothiocyanates and I3C — cancer-preventive. Calcium (105mg) notable for a non-dairy food. Extremely low calorie. I3C modulates oestrogen metabolism — relevant in hormone-sensitive cancers.",use:"Vitamin A, cruciferous cancer prevention, calcium (dairy-free), oestrogen modulation (I3C), low-calorie",limits:"Goitrogenic. Warfarin interaction (Vit K). Oxalate content moderate. Pesticide residue — wash thoroughly."},

// ══ MORE LEGUMES ══
{id:271,name:"Green peas",aka:"Pisum sativum — fresh",emoji:"🫛",cat:"legume",catLabel:"Legume",african:false,top3:false,kcal:81,carbs:14.5,protein:5.4,fat:0.4,fiber:5.1,gi:"Low",evidence:"Moderate",micro:"Vitamin C (40mg), Vitamin K (24.8mcg), Thiamine (0.3mg), Folate (65mcg), Manganese (0.4mg)",bio:"Saponins, chlorophyll, carotenoids (lutein, zeaxanthin), coumestrol (phytoestrogen), resistant starch",benefits:"High vitamin C unusual for a legume — fresh peas one of the better plant vitamin C sources. Resistant starch prebiotic. Protein quality (PDCAAS 0.73) reasonable for a plant food. Coumestrol: phytoestrogenic activity. Widely consumed across Africa and globally.",use:"Plant protein, vitamin C, gut microbiome, folate, versatile vegetable-legume hybrid",limits:"FODMAP — flatulence common. Frozen peas lose some vitamin C. Coumestrol phytoestrogen — considerations in hormone-sensitive conditions."},
{id:272,name:"Black-eyed bean sprouts",aka:"Vigna unguiculata — germinated",emoji:"🌱",cat:"legume",catLabel:"African sprouted legume",african:true,top3:false,kcal:43,carbs:8,protein:3.9,fat:0.2,fiber:1.5,gi:"Low",evidence:"Low",micro:"Vitamin C (9mg — produced during germination), Iron (1.2mg), Folate (90mcg), Zinc (0.6mg), Enzymes (amylase, protease)",bio:"Germination-induced vitamin C synthesis, reduced phytate (60–80% reduction vs dry beans), increased bioavailable iron and zinc, GABA",benefits:"Germination dramatically reduces antinutritional factors — phytic acid drops 60–80%, trypsin inhibitors inactivated, mineral bioavailability doubles. Vitamin C synthesised during sprouting (absent in dry beans). Easier to digest. GABA increases. Traditional across W. Africa as part of various preparations.",use:"Improved mineral bioavailability (sprouted beans), vitamin C, digestibility, GABA, W. African traditional",limits:"Sprout food safety — Salmonella and E. coli risk if improperly grown. Very short shelf life. Limited availability commercially."},
{id:273,name:"Lupin beans",aka:"Lupinus albus / angustifolius",emoji:"🫘",cat:"legume",catLabel:"Legume",african:false,top3:false,kcal:371,carbs:40,protein:36.2,fat:9.7,fiber:18.9,gi:"Low",evidence:"Moderate",micro:"Iron (10.3mg), Calcium (176mg), Magnesium (198mg), Phosphorus (440mg), Zinc (4.1mg)",bio:"Prebiotic alkaloids (lupanine, sparteine), resistant starch, gamma-conglutin (insulin-mimicking protein), polyphenols",benefits:"Second-highest plant protein content after soy (36.2g/100g). Gamma-conglutin protein fraction: RCT evidence for blood glucose reduction in T2D — mimics insulin receptor activation. Very high fibre and iron. Emerging as sustainable protein source. Very low GI despite high carbohydrate.",use:"Highest plant protein (beans), T2D glycaemic control (gamma-conglutin), iron, fibre, sustainable protein",limits:"Lupin allergy increasingly recognised — cross-reactive with peanut allergy. Bitter lupin alkaloids if not properly prepared (sweet varieties preferred). Limited availability."},

// ══ MORE SPICES & HERBS ══
{id:274,name:"Rosemary",aka:"Salvia rosmarinus",emoji:"🌿",cat:"spice",catLabel:"Herb",african:false,top3:false,kcal:131,carbs:20.7,protein:3.3,fat:5.9,fiber:14.1,gi:"Low",evidence:"Low",micro:"Vitamin A (146mcg RAE), Calcium (317mg), Iron (6.65mg), Magnesium (91mg), B6 (0.34mg)",bio:"Carnosic acid (potent antioxidant), rosmarinic acid (anti-inflammatory), ursolic acid (anti-cancer, anti-obesity), camphor, 1,8-cineole",benefits:"Carnosic acid: neuroprotective via Nrf2 activation — animal models show Alzheimer's prevention. Ursolic acid: anti-adipogenic (inhibits adipogenesis), anti-cancer in vitro. Rosmarinic acid: inhibits COX-2. Small clinical trials: rosemary extract improves cognitive speed in healthy older adults. Traditional N. African spice.",use:"Cognitive function (emerging), anti-inflammatory, antioxidant, anti-obesity (ursolic acid), N. African culinary",limits:"Epilepsy — camphor may lower seizure threshold at high doses. Anticoagulant interaction. Photosensitivity (topical use). Culinary doses safe."},
{id:275,name:"Thyme",aka:"Thymus vulgaris",emoji:"🌿",cat:"spice",catLabel:"Herb",african:false,top3:false,kcal:101,carbs:24.4,protein:5.6,fat:1.7,fiber:14,gi:"Low",evidence:"Low",micro:"Vitamin C (160.1mg — very high), Vitamin A (238mcg RAE), Iron (17.45mg), Calcium (405mg), Manganese (1.7mg)",bio:"Thymol (major phenol — antimicrobial), carvacrol, rosmarinic acid, luteolin, apigenin, ursolic acid",benefits:"Thymol: one of the most potent natural antimicrobials (bactericidal vs MRSA, Candida, E. coli). Rosmarinic acid: anti-inflammatory. Luteolin: anti-inflammatory, anti-allergic. Traditional use for respiratory conditions — evidence supports thymol as mucolytic and bronchospasmolytic. Extraordinary vitamin C (160mg/100g fresh).",use:"Respiratory health (expectorant, antimicrobial), anti-inflammatory, antimicrobial, vitamin C, immune support",limits:"Mostly mechanistic evidence. Thymol may irritate GI mucosa. Anticoagulant interaction at medicinal doses. Culinary doses entirely safe."},
{id:276,name:"Sage",aka:"Salvia officinalis",emoji:"🌿",cat:"spice",catLabel:"Herb",african:false,top3:false,kcal:315,carbs:60.7,protein:10.6,fat:12.7,fiber:40.3,gi:"Low",evidence:"Moderate",micro:"Vitamin K (1714mcg — highest herb), Vitamin A (295mcg RAE), Iron (28.1mg), Calcium (1652mg), Magnesium (428mg)",bio:"Carnosic acid, carnosol (anti-tumour), rosmarinic acid, ursolic acid, thujone (toxic at high dose), polyphenols",benefits:"Multiple RCTs: sage extract significantly improves memory and cognitive speed in healthy adults and Alzheimer's patients. Inhibits acetylcholinesterase (same mechanism as donepezil). Antidiabetic in small RCTs (reduces fasting glucose). Anti-menopausal — reduces hot flushes (RCT). Extremely high Vit K.",use:"Cognitive function (memory — RCT evidence), Alzheimer's adjunct, diabetes (glycaemia), menopause (hot flushes), antimicrobial",limits:"Thujone — toxic at high medicinal doses (not culinary). Very high Vit K — major warfarin interaction. Hormonal activity — caution in hormone-sensitive conditions. Anticonvulsant interaction."},
{id:277,name:"Oregano",aka:"Origanum vulgare",emoji:"🌿",cat:"spice",catLabel:"Herb",african:false,top3:false,kcal:265,carbs:68.9,protein:9,fat:4.3,fiber:42.5,gi:"Low",evidence:"Low",micro:"Vitamin K (621.7mcg), Iron (36.8mg), Calcium (1597mg), Manganese (4.9mg), Vitamin E (18.3mg)",bio:"Carvacrol (major phenol — 70–80% of EO), thymol, rosmarinic acid, ursolic acid, luteolin, apigenin, quercetin",benefits:"Carvacrol: among the most potent natural antimicrobials known — active against MRSA, Candida, Norovirus, H. pylori. Rosmarinic acid: anti-inflammatory, antioxidant. Ursolic acid: anti-adipogenic. Very high Vitamin K and iron per gram. Mediterranean diet staple with strong culinary evidence base.",use:"Antimicrobial (MRSA, Candida, H. pylori), anti-inflammatory, antioxidant, vitamin K and iron (culinary use)",limits:"Essential oil form highly concentrated — GI irritant and hepatotoxic at high doses. Very high Vit K — warfarin interaction (culinary amounts minimal). Drug interactions at supplement doses."},
{id:278,name:"Nigella sativa seeds",aka:"Black cumin / Kalonji",emoji:"🌿",cat:"spice",catLabel:"African/ME spice",african:true,top3:false,kcal:375,carbs:44.2,protein:17.8,fat:22.3,fiber:10.5,gi:"Low",evidence:"Moderate",micro:"Iron (66.4mg), Calcium (931mg), Magnesium (366mg), Phosphorus (499mg), Thymoquinone",bio:"Thymoquinone (TQ — primary bioactive), thymohydroquinone, nigellimine, carvacrol, alpha-hederin, linoleic acid",benefits:"Thymoquinone: multiple RCTs confirm anti-inflammatory, antidiabetic, and antihypertensive effects. Extensive use across N. Africa, Middle East, and South Asia. Historical mention in Islamic medicine. TQ induces apoptosis in multiple cancer cell lines (in vitro). H. pylori eradication rate 67% in small RCT — comparable to triple therapy.",use:"Anti-inflammatory, T2D glycaemic control, hypertension, anti-cancer (mechanistic), H. pylori (adjunct), N. African spice",limits:"Anticoagulant interaction. CYP3A4 inhibitor. High doses hepatotoxic. Seeds vs oil have different potency. Avoid medicinal doses in pregnancy."},
{id:279,name:"Za'atar (blend)",aka:"Origanum syriacum + sumac + sesame",emoji:"🌿",cat:"spice",catLabel:"N. African/Levantine blend",african:true,top3:false,kcal:278,carbs:56,protein:9.8,fat:8.2,fiber:14.5,gi:"Low",evidence:"Low",micro:"Iron (15mg), Calcium (648mg), Vitamin C (23mg), Magnesium (256mg), Manganese (2.4mg)",bio:"Thymol, carvacrol, rosmarinic acid, sesamin (from sesame), sumac polyphenols (gallic acid, ellagic acid)",benefits:"Za'atar combines oregano/thyme antimicrobials, sumac polyphenols (ellagic acid, gallotannins), and sesame lignans. Sumac: anti-inflammatory, antidiabetic (small RCTs). Combined effect of multiple bioactives. Traditional medicinal blend across N. Africa and Middle East. High iron and calcium.",use:"N. African/Levantine culinary blend, combined antimicrobial + antioxidant + anti-inflammatory, iron and calcium",limits:"Variable composition — no standardised product. Most evidence on individual components. Sesame allergy applies."},
{id:280,name:"Sumac",aka:"Rhus coriaria",emoji:"🌿",cat:"spice",catLabel:"N. African/ME spice",african:true,top3:false,kcal:273,carbs:66,protein:3.5,fat:1.9,fiber:24.4,gi:"Low",evidence:"Moderate",micro:"Vitamin C (70mg), Iron (3.3mg), Potassium (1052mg), Calcium (278mg), Gallotannins (high)",bio:"Gallotannins (ellagitannins — hydrolysable), ellagic acid, gallic acid, malic acid, quercetin, kaempferol",benefits:"Multiple small RCTs: sumac supplementation reduces fasting blood glucose, HbA1c, LDL, and CRP in T2D patients. Gallic acid: potent antioxidant, anti-tumour, antibacterial. Ellagic acid: inhibits carcinogen activation. Traditional N. African/Middle Eastern souring spice — tangy flavour from malic and tartaric acid. Highest tannin density of cooking spices.",use:"T2D glycaemic control (RCT evidence), LDL reduction, anti-inflammatory, antioxidant, N. African/ME spice",limits:"Drug interactions (warfarin, antidiabetics — additive). High tannin — reduces iron absorption. Allergy to Anacardiaceae family (cross-reactive with mango, cashew, pistachio)."},

// ══ MORE FRUITS ══
{id:281,name:"Passion fruit",aka:"Passiflora edulis",emoji:"🌸",cat:"fruit",catLabel:"Tropical fruit",african:true,top3:false,kcal:97,carbs:23.4,protein:2.2,fat:0.7,fiber:10.4,gi:"Low",evidence:"Moderate",micro:"Vitamin C (30mg), Vitamin A (64mcg RAE), Iron (1.6mg), Potassium (348mg), Phosphorus (68mg)",bio:"Piceatannol (resveratrol analogue — more bioavailable), benzoflavonoids (sedative), beta-carotene, polyphenols, harman alkaloids",benefits:"Piceatannol: more bioavailable resveratrol analogue — same sirtuin-1 activation and longevity pathway. RCT: passion fruit peel extract reduced asthma symptoms significantly. Benzoflavonoids: mild sedative and anxiolytic in small clinical trials. Very high fibre (10.4g/100g). Cultivated across tropical Africa.",use:"Fibre, piceatannol (longevity), anti-anxiety (mild sedative), asthma (extract), vitamin C, antioxidant",limits:"Passion fruit allergy possible (latex-fruit syndrome). Sedative effect — driving caution at high doses. Harman alkaloids at very high doses may be psychoactive."},
{id:282,name:"Lychee",aka:"Litchi chinensis",emoji:"🍇",cat:"fruit",catLabel:"Tropical fruit",african:false,top3:false,kcal:66,carbs:16.5,protein:0.8,fat:0.4,fiber:1.3,gi:"Medium",evidence:"Low",micro:"Vitamin C (71.5mg — very high), B6 (0.1mg), Copper (0.1mg), Potassium (171mg), Folate (14mcg)",bio:"Oligonol (oligomeric proanthocyanidin — bioavailable), quercetin, kaempferol, epicatechin, litchitannin A2",benefits:"Very high vitamin C (71.5mg/100g). Oligonol: RCTs confirm reduced visceral fat, improved exercise recovery, and anti-fatigue effects at 100mg/day. Litchitannin A2: anti-viral activity against Coxsackievirus and Norovirus (in vitro). Antioxidant and anti-inflammatory.",use:"Vitamin C, oligonol (visceral fat, exercise recovery), anti-viral (in vitro), antioxidant",limits:"Hypoglycin A in unripe lychee — associated with fatal encephalopathy in malnourished children (not in healthy adults). Medium GI. High fructose."},
{id:283,name:"Dragonfruit (pitaya)",aka:"Hylocereus undatus / costaricensis",emoji:"🐉",cat:"fruit",catLabel:"Tropical fruit",african:false,top3:false,kcal:50,carbs:11,protein:1.1,fat:0.4,fiber:2.9,gi:"Low",evidence:"Low",micro:"Vitamin C (9mg), Iron (0.7mg), Magnesium (18mg), Calcium (18mg), B2/Riboflavin (0.045mg)",bio:"Betalains (red variety: betacyanins), polyphenols, lycopene (red flesh), prebiotic oligosaccharides, captin",benefits:"Red variety: betalains (same class as beets) — anti-inflammatory, antioxidant. Prebiotic oligosaccharides support Lactobacillus growth. Low calorie with good fibre. Lycopene in red variety. Visually striking — useful in NutriForge Africa as culturally engaging food.",use:"Gut microbiome (prebiotic), antioxidant (betalains), low-calorie, lycopene, colourful dietary variety",limits:"Very limited clinical RCTs. Low nutrient density vs other tropical fruits. Most benefits in vitro or animal models."},
{id:284,name:"Guava",aka:"Psidium guajava",emoji:"🍈",cat:"fruit",catLabel:"Tropical fruit",african:true,top3:false,kcal:68,carbs:14.3,protein:2.6,fat:1,fiber:5.4,gi:"Low",evidence:"Moderate",micro:"Vitamin C (228.3mg — highest tropical fruit), Vitamin A (31mcg RAE), Potassium (417mg), Folate (49mcg), Lycopene (5.2mg — pink variety)",bio:"Quercetin, guavarin (antimicrobial), lycopene (pink), tannins, beta-carotene, prebiotic fibre",benefits:"Highest vitamin C of any tropical fruit (228mg/100g — 4× more than oranges). Pink variety: high lycopene. RCTs: guava leaf extract reduces LDL and blood pressure. Guavarin: potent antimicrobial. High fibre supports gut microbiome. Widely cultivated across sub-Saharan Africa.",use:"Vitamin C (highest tropical source), lycopene (pink variety), gut microbiome, antimicrobial, cardiovascular",limits:"Tannins in leaves and skin. Seeds not digested — chew or strain. Glycaemic index variable by ripeness."},
{id:285,name:"Noni (Tahitian)",aka:"Morinda citrifolia — ripe fruit",emoji:"🍈",cat:"fruit",catLabel:"Tropical fruit",african:false,top3:false,kcal:47,carbs:11,protein:0.4,fat:0.2,fiber:0.3,gi:"Low",evidence:"Low",micro:"Vitamin C (33.6mg), Potassium (168mg), B3/Niacin (0.3mg), Scopoletin (BP modulator), Proxeronine",bio:"Proxeronine (xeronine precursor — postulated enzyme activator), scopoletin (antihypertensive), anthraquinones, polysaccharides",benefits:"Scopoletin: may modulate blood pressure. Polysaccharides: immunostimulatory in animal models. Very widely consumed traditional remedy across Pacific islands and W. Africa. Some clinical evidence for joint pain reduction (pilot RCT). Anti-inflammatory anthraquinones.",use:"Traditional immune support, anti-inflammatory (adjunct), joint pain (pilot evidence), W. African/Pacific traditional",limits:"Very limited human evidence. High potassium — caution in renal failure. Case reports of hepatotoxicity (possibly adulterated commercial products). Avoid in pregnancy."},
{id:286,name:"Sapodilla",aka:"Manilkara zapota — Chiku",emoji:"🍈",cat:"fruit",catLabel:"Tropical fruit",african:false,top3:false,kcal:83,carbs:19.9,protein:0.4,fat:1.1,fiber:5.3,gi:"Medium",evidence:"Low",micro:"Vitamin C (14.7mg), Iron (0.8mg), Potassium (193mg), Calcium (21mg), Folate (14mcg)",bio:"Tannins (high), polyphenols, saponins, phenolic acids, dietary fibre (pectin + cellulose)",benefits:"Very high tannin content — significant antimicrobial and anti-diarrhoeal properties (traditional). Tannins reduce intestinal permeability. High pectin fibre supports LDL reduction. Bark traditionally used as antifungal and antipyretic. Popular in Indian subcontinent and W. Africa.",use:"Anti-diarrhoeal (tannins), gut health (pectin), antimicrobial (traditional), energy-dense fruit",limits:"Very high tannins — reduce iron and mineral absorption significantly. Medium GI. Raw seeds toxic (contain saponins and cyanide compounds)."},

// ══ MORE FERMENTED ══
{id:287,name:"Fermented cassava (Fufu)",aka:"Manihot esculenta — wet fermented",emoji:"🍚",cat:"fermented",catLabel:"African fermented staple",african:true,top3:false,kcal:137,carbs:32,protein:1.3,fat:0.3,fiber:0.7,gi:"High",evidence:"Low",micro:"Potassium (271mg), Calcium (84mg), Iron (1.2mg), Phosphorus (27mg), Thiamine (trace)",bio:"Lactic acid bacteria (from fermentation), resistant starch (minor), B vitamins from fermentation",benefits:"Fermentation reduces cyanogenic glycosides (linamarin) to safe levels — essential food safety step. Provides probiotics from natural lactic acid fermentation. Major calorie staple across C./W. Africa. Traditional preparation maintains food safety when properly fermented 24–72hrs.",use:"Energy staple (C./W. Africa), food safety (cyanide reduction via fermentation), probiotics, traditional meal base",limits:"Very high GI (similar to white bread). Very low nutrient density per calorie. Requires thorough fermentation for cyanide safety. Not a health food — energy staple only."},
{id:288,name:"Injera (fermented teff bread)",aka:"Ethiopian/Eritrean sourdough",emoji:"🫓",cat:"fermented",catLabel:"African fermented bread",african:true,top3:false,kcal:162,carbs:31.7,protein:5.1,fat:1.8,fiber:4.1,gi:"Medium",evidence:"Moderate",micro:"Iron (3.7mg), Calcium (45mg), Magnesium (52mg), Zinc (1.1mg), B vitamins (from fermentation)",bio:"Lactic acid bacteria (L. plantarum, L. brevis), phytase activity (reduces phytate 60–80%), resistant starch, B vitamins",benefits:"Fermentation reduces teff phytate by 60–80% — significantly improves iron and zinc bioavailability vs plain teff. Sourdough fermentation lowers GI vs unfermented bread. Natural probiotics. Traditional staple of Ethiopia and Eritrea — primary vehicle for most nutritious grains in E. African diet.",use:"Improved iron and zinc bioavailability (fermented teff), probiotics, gut microbiome, E. African traditional",limits:"Contains gluten traces if mixed grain. Traditional 3-day fermentation needed for full phytate reduction. Variable nutrition depending on preparation."},
{id:289,name:"Cider vinegar (unfiltered)",aka:"Malus domestica — raw ACV with mother",emoji:"🍶",cat:"fermented",catLabel:"Fermented vinegar",african:false,top3:false,kcal:22,carbs:0.9,protein:0,fat:0,fiber:0,gi:"Low",evidence:"Moderate",micro:"Potassium (73mg), Acetic acid (5%), Mother of vinegar (live cultures), Polyphenols, Pectin",bio:"Acetic acid (primary bioactive), mother culture (Acetobacter, beneficial organisms), phloridzin, chlorogenic acid, quercetin",benefits:"Multiple small RCTs: 1–2 tbsp before carbohydrate meals attenuates postprandial glucose by 20–35% (acetic acid inhibits alpha-amylase and sucrase). 2009 Japanese RCT: daily ACV reduced visceral fat over 12 weeks. Mother culture: live Acetobacter provides additional probiotic effect.",use:"Postprandial glucose attenuation, weight management (modest), probiotic (with mother), digestive support",limits:"Tooth enamel erosion — always dilute 1:10 in water. Oesophageal irritation. Hypokalaemia with excessive use. Drug interaction (insulin, diuretics). Claims vastly exceed evidence."},

// ══ MORE OTHER / FUNCTIONAL ══
{id:290,name:"Medicinal mushroom blend",aka:"Reishi + Lion's mane + Turkey tail",emoji:"🍄",cat:"fungi",catLabel:"Medicinal mushroom blend",african:false,top3:false,kcal:30,carbs:6.5,protein:2.5,fat:0.3,fiber:5.5,gi:"Low",evidence:"Moderate",micro:"Beta-glucans (>25%), Ganoderic acids (reishi), Hericenones (lion's mane), PSK (turkey tail), Ergothioneine",bio:"Synergistic beta-glucans, ganoderic acids, hericenones/erinacines, PSK, cordycepin (if cordyceps added), ergothioneine",benefits:"Combining reishi (immunomodulation), lion's mane (NGF, cognition), and turkey tail (NK cells, gut microbiome) provides synergistic immune and cognitive support. Beta-glucan combination activates multiple immune pathways simultaneously. Increasing use in integrative oncology.",use:"Synergistic immune support, cognitive function (NGF), NK cell activity, anti-cancer adjunct, gut microbiome",limits:"Variable composition — requires third-party testing. Drug interactions of each component apply collectively. Most evidence on individual mushrooms — combination synergy not fully studied."},
{id:291,name:"Camu camu",aka:"Myrciaria dubia — Amazonian berry",emoji:"🫐",cat:"fruit",catLabel:"Superfruit",african:false,top3:false,kcal:17,carbs:3.9,protein:0.4,fat:0.1,fiber:1,gi:"Low",evidence:"Moderate",micro:"Vitamin C (2,145mg/100g — highest natural source on Earth), Beta-carotene (0.8mg), Potassium (83mg), Iron (0.5mg)",bio:"L-ascorbic acid (2,145mg — 40× higher than oranges), anthocyanins (cyanidin-3-glucoside), ellagic acid, leucoanthocyanidins",benefits:"Highest known natural vitamin C source (2,145mg/100g). RCT: camu camu reduces oxidative stress and inflammatory markers more than synthetic vitamin C at equivalent doses (suggest synergistic effect of natural matrix). Anthocyanins + vitamin C synergy. Important for immune function, collagen synthesis, iron absorption.",use:"Vitamin C (highest natural source), oxidative stress reduction, immune support, iron absorption enhancement, anti-inflammatory",limits:"Very sour — consumed as powder or supplement. Perishable. Expensive. Not widely available. Synthetic vitamin C is cheaper and equivalent for most purposes."},
{id:292,name:"Acerola cherry",aka:"Malpighia emarginata",emoji:"🍒",cat:"fruit",catLabel:"Superfruit",african:false,top3:false,kcal:32,carbs:7.7,protein:0.4,fat:0.3,fiber:1.1,gi:"Low",evidence:"Moderate",micro:"Vitamin C (1,677mg/100g — second highest natural source), Vitamin A (38mcg RAE), Thiamine (0.02mg), Riboflavin (0.06mg), Iron (0.2mg)",bio:"L-ascorbic acid (1,677mg), bioflavonoids (synergistic with Vit C), anthocyanins, rutin, beta-carotene",benefits:"Second highest natural vitamin C source. Bioflavonoids co-present with Vit C increase absorption and extend half-life. Rutin: capillary strengthening, anti-inflammatory. Anthocyanins: antioxidant. Several RCTs confirm Vit C bioavailability from acerola superior to synthetic ascorbic acid.",use:"Vitamin C (superior bioavailability vs synthetic), immune support, collagen synthesis, iron absorption, bioflavonoids",limits:"Very sour. Perishable — consumed as freeze-dried powder or supplement. Vitamin C content drops rapidly after harvest."},
{id:293,name:"Carrot (purple variety)",aka:"Daucus carota subsp. sativus — purple",emoji:"🟣",cat:"veg",catLabel:"Root vegetable",african:false,top3:false,kcal:41,carbs:10,protein:0.9,fat:0.2,fiber:2.8,gi:"Low",evidence:"Moderate",micro:"Anthocyanins (1,000mg/100g — very high), Beta-carotene (low vs orange), Potassium (320mg), B6 (0.1mg), Vitamin C (5mg)",bio:"Cyanidin-3-glucoside (anthocyanin — dominant), beta-carotene, alpha-carotene, chlorogenic acid, caffeic acid",benefits:"Purple carrots: anthocyanin content (1,000mg/100g) rivals blueberries. Multiple RCTs: anthocyanin-rich purple carrots improve endothelial function and reduce LDL. Cyanidin-3-glucoside: anti-adipogenic, anti-inflammatory. Combines orange carrot's beta-carotene and added anthocyanin benefit.",use:"Highest anthocyanin root vegetable, cardiovascular (endothelial function), anti-inflammatory, antioxidant, eye health",limits:"Less available than orange carrot. Anthocyanin content varies by variety and growing conditions. Cooking reduces anthocyanin by 40%."},
{id:294,name:"Watercress microgreens",aka:"Nasturtium officinale — young shoots",emoji:"🌱",cat:"leaf",catLabel:"Microgreen",african:false,top3:false,kcal:11,carbs:1.3,protein:2.3,fat:0.1,fiber:0.5,gi:"Low",evidence:"Moderate",micro:"Vitamin K (250mcg), Vitamin C (43mg), Glucosinolates (4× higher than mature watercress), PEITC (higher concentration)",bio:"PEITC (phenethyl isothiocyanate — anti-cancer — 4× higher in microgreens vs mature), gluconasturtiin, lutein, zeaxanthin",benefits:"Microgreens contain 4–40× higher nutrient concentrations than mature plants. PEITC: Phase II enzyme induction (anti-carcinogenic) — one of the strongest cancer-preventive phytochemicals. 2024 study: watercress microgreens reduce DNA damage in smokers. RCT: watercress supplementation reduced oxidative DNA damage.",use:"Cancer risk reduction (PEITC — highest concentration), DNA protection, antioxidant, concentrated nutrient delivery",limits:"Short shelf life (3–5 days). Expensive. Seed contamination risk if grown in unclean conditions. High Vit K — warfarin interaction."},
{id:295,name:"Sunflower seeds",aka:"Helianthus annuus",emoji:"🌻",cat:"nut",catLabel:"Seed",african:false,top3:false,kcal:584,carbs:20,protein:20.8,fat:51.5,fiber:8.6,gi:"Low",evidence:"Moderate",micro:"Vitamin E (35.17mg — highest food source), Selenium (53mcg), B1/Thiamine (1.48mg), Magnesium (325mg), Phosphorus (660mg)",bio:"Alpha-tocopherol (Vitamin E — 35mg/100g, highest), chlorogenic acid, phytosterols (534mg), lignans, selenium",benefits:"Highest vitamin E food source per 100g (35mg — almost 3× daily requirement). Vitamin E protects LDL from oxidation — key CVD prevention mechanism. Very high selenium. Phytosterol content (534mg) among highest foods — strong LDL-lowering. Linoleic acid (omega-6) — relevant balance consideration.",use:"Vitamin E (highest food source), LDL oxidation prevention, selenium, phytosterols (LDL), magnesium",limits:"Very high omega-6:omega-3 ratio (important to balance with omega-3 sources). Very calorie-dense. Seed allergy. High phytic acid reduces mineral bioavailability."},
{id:296,name:"Peanut butter (natural)",aka:"Arachis hypogaea — ground",emoji:"🥜",cat:"nut",catLabel:"Nut butter",african:true,top3:false,kcal:588,carbs:21.6,protein:24.1,fat:49.9,fiber:6,gi:"Low",evidence:"Moderate",micro:"Niacin (13.1mg), Magnesium (169mg), Vitamin E (9.1mg), Phosphorus (358mg), Zinc (2.9mg)",bio:"Resveratrol, p-coumaric acid, oleic acid (MUFA), phytosterols, niacin, biotin",benefits:"Same epidemiological CVD data as whole peanuts — nut consumption protective against heart disease. Protein and healthy fat combination for satiety and sustained energy. Resveratrol content significant. Major protein vehicle in African school nutrition programmes. Very affordable protein source.",use:"Affordable protein, cardiovascular, satiety, niacin, Vitamin E, African nutrition programmes",limits:"Aflatoxin risk from poorly stored peanuts (especially in tropical climates). Very calorie-dense. Hydrogenated versions contain trans fats — use natural only. Peanut allergy (IgE-mediated, anaphylaxis)."},
{id:297,name:"Tahini",aka:"Sesame seed paste — Sesame butter",emoji:"🫙",cat:"nut",catLabel:"Seed butter",african:true,top3:false,kcal:595,carbs:21.2,protein:17,fat:53.8,fiber:9.3,gi:"Low",evidence:"Moderate",micro:"Calcium (426mg), Iron (8.95mg), Magnesium (95mg), Zinc (4.6mg), Phosphorus (732mg)",bio:"Sesamin, sesamolin, sesamol (antioxidants), phytosterols, lignans, oleic acid",benefits:"Exceptionally bioavailable calcium (426mg/100g). Iron and zinc density. Sesamin and sesamol: potent antioxidants with LDL-lowering and antihypertensive activity (small RCTs). Staple of N. African (hummus, baba ganoush) and Middle Eastern cuisine. Provides complete meal nutrition when combined with legumes.",use:"Calcium (dairy-free — 43% RDA per 100g), iron, sesamin antioxidants, N. African staple, complete protein (with legumes)",limits:"Sesame allergy — major declared allergen. Very calorie-dense. High omega-6. Phytic acid."},
{id:298,name:"Macadamia butter",aka:"Macadamia integrifolia — ground",emoji:"🌰",cat:"nut",catLabel:"Nut butter",african:false,top3:false,kcal:718,carbs:13.8,protein:7.9,fat:75.8,fiber:8.6,gi:"Low",evidence:"Low",micro:"Manganese (4.1mg), Thiamine (1.2mg), MUFA palmitoleic acid (omega-7), Copper (0.8mg), Magnesium (130mg)",bio:"Palmitoleic acid (omega-7 — 17% of fat — highest nut), oleic acid (MUFA 60%), tocotrienols, squalene",benefits:"Palmitoleic acid (omega-7): emerging evidence for insulin sensitivity improvement and cardiovascular benefit. Highest fat content of any nut (good fat profile — mostly MUFA). Very low carbohydrate. Tocotrienols: more potent than tocopherols for lipid-lowering. Ketogenic/LCHF diet staple.",use:"MUFA density, omega-7 (insulin sensitivity), ketogenic diet, tocotrienols, magnesium",limits:"Highest calorie density of all nuts. Expensive. Very limited RCTs specific to macadamia butter. Toxic to dogs."},
{id:299,name:"Brazil nut butter",aka:"Bertholletia excelsa — ground",emoji:"🌰",cat:"nut",catLabel:"Nut butter",african:false,top3:false,kcal:656,carbs:12,protein:14,fat:66,fiber:7.5,gi:"Low",evidence:"Moderate",micro:"Selenium (2739mcg/100g — extraordinary), Magnesium (376mg), Phosphorus (725mg), Thiamine (0.6mg), Copper (1.7mg)",bio:"Selenomethionine (organic selenium — highest bioavailability), tocopherols, phytosterols, squalene",benefits:"Single teaspoon (5g) of Brazil nut butter provides 3–4 days selenium requirement. RCT: 2 nuts/day raised selenium status in deficient women and improved thyroid function. Selenium is GPx cofactor — critical antioxidant enzyme and thyroid function. Useful concentrated format for selenium supplementation via food.",use:"Selenium repletion (most convenient food source), thyroid function, GPx antioxidant, concentrated micronutrient delivery",limits:"Selenium toxicity — max 1 tsp/day. Very high saturated fat. Aflatoxin contamination risk from poor storage."},
{id:300,name:"Soursop leaf tea",aka:"Annona muricata — leaf infusion",emoji:"🍵",cat:"other",catLabel:"African/Caribbean herbal tea",african:true,top3:false,kcal:2,carbs:0.4,protein:0.1,fat:0,fiber:0,gi:"Low",evidence:"Low",micro:"Annonaceous acetogenins (trace), Polyphenols, Quercetin, Vitamin C (trace), Potassium (trace)",bio:"Annonacin and acetogenins (mitochondrial complex I inhibitors), alkaloids, phenols, terpenes",benefits:"Traditional W. African and Caribbean medicinal tea. In vitro evidence: acetogenins are among the most potent known cancer cell inhibitors (selectively toxic to cancer cells 10,000× potency of Adriamycin in some models). Antimicrobial and antihypertensive in traditional use.",use:"Traditional anti-cancer (empirical/in vitro), antimicrobial, antihypertensive (traditional), W. African/Caribbean herbal",limits:"CRITICAL: Annonacin accumulates in brain with chronic use — causally linked to atypical Parkinsonism (Guadeloupean Parkinson disease). AVOID chronic/regular consumption of leaf tea. Occasional traditional use only. Anti-cancer evidence entirely in vitro. Not a proven treatment."}

// ══════════ MEDITERRANEAN DIET STAPLES ══════════
{id:301,name:"Kalamata olives",aka:"Olea europaea var. — whole cured",emoji:"🫒",cat:"other",catLabel:"Mediterranean staple",african:false,top3:false,kcal:115,carbs:6.3,protein:0.8,fat:10.9,fiber:3.2,gi:"Low",evidence:"High",micro:"Vitamin E (3.8mg), Iron (3.3mg), Copper (0.25mg), Calcium (52mg), Sodium (1556mg cured)",bio:"Hydroxytyrosol (most potent olive polyphenol), oleocanthal, oleuropein, squalene, MUFA (oleic acid 75%)",benefits:"Hydroxytyrosol: highest antioxidant capacity of any olive compound. PREDIMED trial (7,447 participants): olive consumption contributed to 30% lower major CV events. Oleuropein: anti-inflammatory via COX-1/COX-2, antimicrobial (MRSA-active). Squalene: anti-tumour, skin-protective. Traditional Mediterranean longevity food.",use:"Cardiovascular (PREDIMED), anti-inflammatory, antioxidant (hydroxytyrosol), Mediterranean diet adherence",limits:"Very high sodium from curing (1,556mg/100g) — limit in hypertension. Rinse before eating. Calorie-dense per serving."},
{id:302,name:"Anchovy paste",aka:"Engraulis encrasicolus — fermented",emoji:"🐟",cat:"fish",catLabel:"Fermented fish condiment",african:false,top3:false,kcal:165,carbs:0,protein:28.9,fat:4.8,fiber:0,gi:"Low",evidence:"Moderate",micro:"Calcium (232mg), Selenium (68.1mcg), Iron (4.6mg), B12 (2.6mcg), Omega-3 (1,200mg/100g)",bio:"EPA+DHA (phospholipid-bound), inosinate (umami — IMP), glutamate, taurine, histidine dipeptides",benefits:"Concentrated omega-3 in phospholipid-bound form (superior bioavailability). IMP (inosinate) + glutamate synergy: 8× umami potency — enables reduction of sodium in dishes. Calcium from dissolved bones. Traditional Mediterranean condiment used in tiny amounts for massive flavour impact.",use:"Omega-3 (concentrated, high-bioavailability), umami enhancement (reduce sodium), calcium, Mediterranean cooking",limits:"Extremely high sodium — used as condiment only (1–2g per dish). Histamine — caution in HIT. Fish allergy."},
{id:303,name:"Sun-dried tomatoes",aka:"Lycopersicum esculentum — dried",emoji:"🍅",cat:"veg",catLabel:"Mediterranean ingredient",african:false,top3:false,kcal:258,carbs:55.8,protein:14.1,fat:3,fiber:12.3,gi:"Low",evidence:"Moderate",micro:"Lycopene (45.9mg — highest common food source), Potassium (3427mg), Iron (9.1mg), Vitamin C (39.2mg), Calcium (110mg)",bio:"Lycopene (all-trans and cis isomers), beta-carotene, chlorogenic acid, naringenin, lutein",benefits:"Highest lycopene density of any food (45.9mg/100g — 10× fresh tomatoes; drying concentrates and isomerises lycopene for superior bioavailability). Meta-analyses: lycopene → 30–40% lower prostate cancer risk. Very high potassium supports BP. Iron significant for a plant food.",use:"Lycopene (highest source — prostate cancer risk), potassium/BP, iron, cardiovascular, antioxidant",limits:"Very high sodium in oil-packed varieties. Calorie-dense (concentrated sugars). High FODMAP (fructose) in large quantities."},
{id:304,name:"Capers",aka:"Capparis spinosa — pickled buds",emoji:"🌿",cat:"spice",catLabel:"Mediterranean condiment",african:false,top3:false,kcal:23,carbs:4.9,protein:2.4,fat:0.9,fiber:3.2,gi:"Low",evidence:"Moderate",micro:"Vitamin K (24.6mcg), Quercetin (180mg/100g — highest food source by weight), Rutin (332mg/100g), Iron (1.7mg), Copper (0.37mg)",bio:"Quercetin (180mg/100g — extraordinary concentration), rutin (332mg/100g), kaempferol, epicatechin, glucosinolates",benefits:"Highest known dietary source of quercetin per gram — used in tiny quantities but extraordinarily concentrated. Quercetin: RCT evidence for BP reduction, anti-histamine (mast cell stabilisation), anti-inflammatory. Rutin: strongest capillary-strengthening flavonoid. Glucosinolates add cruciferous benefit. Mediterranean diet staple since antiquity.",use:"Quercetin (highest concentration), BP reduction, anti-inflammatory, anti-histamine, venous/capillary health (rutin)",limits:"Very high sodium from pickling brine — rinse thoroughly. Used in small amounts. Allergy possible."},
{id:305,name:"Artichoke hearts",aka:"Cynara scolymus — prepared",emoji:"🌿",cat:"veg",catLabel:"Mediterranean vegetable",african:false,top3:false,kcal:47,carbs:10.5,protein:3.3,fat:0.2,fiber:5.4,gi:"Low",evidence:"Moderate",micro:"Vitamin C (11.7mg), Vitamin K (14.8mcg), Folate (68mcg), Magnesium (60mg), Potassium (370mg), Cynarin (25mg)",bio:"Cynarin (unique to artichoke — choleretic), luteolin, chlorogenic acid, silymarin-related compounds, inulin (prebiotic)",benefits:"Cynarin: RCT evidence — artichoke leaf extract reduces LDL 18–22% and improves liver enzymes in NAFLD. Inulin is a potent prebiotic for Bifidobacterium. Luteolin: anti-inflammatory, anti-cancer (in vitro). Silymarin-related compounds: hepatoprotective. Traditional Mediterranean digestive remedy.",use:"LDL reduction (artichoke extract RCT), liver health (NAFLD), gut microbiome (inulin), bile secretion, digestive",limits:"Very high FODMAP (inulin) — significant GI symptoms in IBS. Artichoke/daisy allergy (Asteraceae). Bile duct obstruction — contraindication for cynarin."},
{id:306,name:"Roasted red peppers",aka:"Capsicum annuum — pimiento",emoji:"🫑",cat:"veg",catLabel:"Mediterranean ingredient",african:false,top3:false,kcal:27,carbs:6.3,protein:0.99,fat:0.3,fiber:2.1,gi:"Low",evidence:"Moderate",micro:"Vitamin C (190mg — very high, retained even roasted), Vitamin A (157mcg RAE), Vitamin B6 (0.3mg), Capsanthin (high), Folate (46mcg)",bio:"Capsanthin (unique antioxidant carotenoid), capsorubin, beta-carotene, quercetin, luteolin, vitamin C",benefits:"Capsanthin: unique anti-inflammatory carotenoid not found in other foods (except paprika). Remarkably high vitamin C (190mg) retained after roasting. High folate supports methylation. Carotenoid content increases with ripening — red > yellow > green peppers. PREDIMED staple.",use:"Vitamin C (190mg — higher than oranges), capsanthin antioxidant, cardiovascular, folate, anti-inflammatory",limits:"Nightshade — some inflammatory sensitivity. Jarred peppers high in sodium — drain and rinse."},
{id:307,name:"Anchovies in olive oil",aka:"Engraulis + Olea — traditional tin",emoji:"🐟",cat:"fish",catLabel:"Mediterranean preserved fish",african:false,top3:false,kcal:210,carbs:0,protein:28.9,fat:10.4,fiber:0,gi:"Low",evidence:"High",micro:"Calcium (232mg), Selenium (68mcg), Iron (4.6mg), B12 (2.6mcg), EPA+DHA (1,500mg/100g), Vitamin D (100 IU)",bio:"EPA+DHA (phospholipid-bound), oleic acid (from olive oil), hydroxytyrosol (from olive oil), taurine, CoQ10",benefits:"Dual delivery of omega-3 (fish) and polyphenols (EVOO) — the synergistic combination central to Mediterranean diet CVD benefit. EPA+DHA in phospholipid form superior bioavailability. Zero mercury (short food chain). Calcium from soft dissolved bones. Ready-to-eat format.",use:"Dual omega-3 + EVOO polyphenols (Mediterranean synergy), cardiovascular, calcium, selenium, vitamin D",limits:"High sodium. Histamine-rich. Fish allergy. Open tins deteriorate rapidly."},
{id:308,name:"Hummus",aka:"Chickpea + tahini + lemon + garlic",emoji:"🥙",cat:"legume",catLabel:"Mediterranean dish",african:true,top3:false,kcal:166,carbs:14.3,protein:7.9,fat:9.6,fiber:6,gi:"Low",evidence:"Moderate",micro:"Iron (2.4mg), Calcium (86mg), Folate (72mcg), Sesamin (from tahini), Allicin (from garlic), Vitamin C (from lemon)",bio:"Synergistic: chickpea isoflavones + tahini sesamin + garlic allicin + lemon vitamin C (iron absorption) + olive oil hydroxytyrosol",benefits:"Multi-ingredient synergy: chickpeas (LDL reduction) + tahini (sesamin antioxidant, calcium) + garlic (allicin, BP) + lemon (Vit C enhances non-haem iron absorption) + EVOO (polyphenols). Vitamin C from lemon more than doubles iron bioavailability from chickpeas. Staple across N. Africa, Middle East and Mediterranean.",use:"Complete plant protein, LDL reduction, multi-ingredient synergy, iron (with Vit C), calcium, gut microbiome",limits:"Commercial hummus often contains preservatives and excess oil. Calorie-dense. FODMAP — chickpeas cause flatulence."},
{id:309,name:"Tzatziki",aka:"Greek yogurt + cucumber + garlic + dill",emoji:"🥒",cat:"fermented",catLabel:"Mediterranean dish",african:false,top3:false,kcal:75,carbs:5.2,protein:4.8,fat:4,fiber:0.3,gi:"Low",evidence:"Moderate",micro:"Calcium (140mg), B12 (0.6mcg), Probiotics (L. bulgaricus, S. thermophilus), Allicin (garlic), Silica (cucumber)",bio:"Live probiotic cultures, bioactive peptides (from yogurt fermentation), allicin, cucurbitacins, dill flavonoids",benefits:"Probiotic yogurt base with garlic allicin antimicrobial + cucumber cucurbitacins (anti-inflammatory) + dill (carminative). Low calorie density with significant protein. Synergistic anti-inflammatory and probiotic effect. Mediterranean diet staple — cooling and digestive.",use:"Gut microbiome (probiotics), anti-inflammatory, protein, calcium, digestive support",limits:"Dairy allergy/lactose intolerance. Commercial versions often lose live cultures (pasteurised). Garlic — GERD exacerbation."},
{id:310,name:"Baba ganoush",aka:"Roasted aubergine + tahini + lemon",emoji:"🍆",cat:"veg",catLabel:"Mediterranean/Levantine dish",african:true,top3:false,kcal:91,carbs:8.6,protein:2.5,fat:5.6,fiber:3.7,gi:"Low",evidence:"Moderate",micro:"Nasunin (aubergine anthocyanin), Sesamin (tahini), Vitamin C (lemon), Calcium (tahini), Potassium (293mg)",bio:"Nasunin (aubergine skin anthocyanin — iron chelator), sesamin (lignan), chlorogenic acid, lemon polyphenols",benefits:"Nasunin: potent antioxidant chelating excess intracellular iron (prevents hydroxyl radical formation). Tahini provides calcium and sesamin. Roasting increases chlorogenic acid bioavailability. Lower calorie than hummus. Traditional across N. Africa, Levant and Mediterranean.",use:"Antioxidant (nasunin), calcium, low-calorie plant-based dip, N. African/Mediterranean traditional",limits:"Roasting aubergine retains some solanine. Tahini sesame allergy. Calorie-dense with added EVOO."},
{id:311,name:"Falafel (baked)",aka:"Chickpea or fava bean patties",emoji:"🧆",cat:"legume",catLabel:"Mediterranean/N. African dish",african:true,top3:false,kcal:333,carbs:31.8,protein:13.3,fat:17.8,fiber:5.4,gi:"Low",evidence:"Moderate",micro:"Iron (2.5mg), Folate (87mcg), Magnesium (53mg), Zinc (1.5mg), Potassium (585mg)",bio:"Isoflavones (chickpea), allicin (garlic), coriander/cumin volatile oils (antimicrobial), resistant starch",benefits:"Baked falafel: good plant protein with low GI. Chickpea isoflavones and resistant starch support gut microbiome. Garlic + coriander + cumin combination provides anti-inflammatory and antimicrobial bioactives. Traditional across N. Africa and Levant — cultural food security food.",use:"Plant protein, iron, folate, gut microbiome (resistant starch), N. African/ME traditional staple",limits:"Fried falafel: very high fat and calorie. FODMAP (chickpeas, onion, garlic). Baked preferred nutritionally."},
{id:312,name:"Tabbouleh",aka:"Bulgur + parsley + tomato + lemon",emoji:"🥗",cat:"grain",catLabel:"Mediterranean/Levantine dish",african:true,top3:false,kcal:100,carbs:18.5,protein:3.3,fat:2.5,fiber:2.7,gi:"Low",evidence:"Moderate",micro:"Vitamin K (390mcg — from large parsley quantity), Vitamin C (56mg), Iron (2.8mg), Folate (52mcg), Luteolin (from parsley)",bio:"Parsley apigenin+luteolin (anti-inflammatory), tomato lycopene, lemon vitamin C (iron absorption), bulgur beta-glucan, allicin",benefits:"Tabbouleh is nutritionally dense per calorie: very high Vit K and C from parsley, lycopene from tomato, iron enhanced by lemon vitamin C. Bulgur (cracked wheat) provides beta-glucan for LDL reduction. Anti-inflammatory multi-ingredient synergy. Traditional across N. Africa and Levant.",use:"Vitamin K (from parsley), vitamin C, iron (enhanced by lemon), lycopene, anti-inflammatory synergy",limits:"Very high Vitamin K — warfarin interaction (large parsley quantity). Contains gluten (bulgur wheat). High FODMAP."},
{id:313,name:"Pesto (Genovese)",aka:"Basil + pine nuts + Parmesan + EVOO",emoji:"🌿",cat:"other",catLabel:"Italian/Mediterranean condiment",african:false,top3:false,kcal:472,carbs:3.7,protein:11.9,fat:47.4,fiber:1.5,gi:"Low",evidence:"Moderate",micro:"Vitamin K (414mcg — from basil), Calcium (279mg — Parmesan), Manganese (7.9mg), Vitamin A (97mcg RAE), EVOO polyphenols",bio:"Basil eugenol + linalool (antimicrobial, anti-inflammatory), pine nut phytosterols, Parmesan MK-4/K2, EVOO hydroxytyrosol, Parmesan bioactive peptides",benefits:"Multi-ingredient synergy: basil eugenol (COX-2 inhibitor) + pine nut sterols (cholesterol absorption inhibition) + Parmesan MK-4 (bone health, cardiovascular) + EVOO polyphenols (endothelial protection). Very high Vit K from fresh basil. Traditional in Ligurian/Italian cuisine.",use:"Multi-ingredient antioxidant + anti-inflammatory (basil+EVOO), Vitamin K2 (Parmesan), calcium, cardiovascular",limits:"Very calorie-dense. Very high Vit K — warfarin interaction. Pine nut syndrome (rare taste distortion 1–3 days after eating). High sodium from Parmesan."},
{id:314,name:"Bouillabaisse (traditional)",aka:"Provençal fish stew",emoji:"🍲",cat:"fish",catLabel:"Mediterranean fish dish",african:false,top3:false,kcal:96,carbs:5.1,protein:11.3,fat:2.8,fiber:1,gi:"Low",evidence:"Moderate",micro:"Selenium (38mcg), Omega-3 (600mg/serving), Lycopene (tomato), Vitamin C (saffron + tomato), Iodine (seafood)",bio:"Multi-seafood omega-3 (EPA+DHA), saffron safranal + crocin (anti-depressant, anti-tumour), tomato lycopene, garlic allicin, EVOO polyphenols",benefits:"Traditional Marseille fish stew combining multiple omega-3 sources with saffron (crocin — RCT evidence for mild depression), tomato lycopene, garlic cardiovascular benefit, and EVOO polyphenols. Represents the multi-ingredient synergy principle central to Mediterranean diet longevity outcomes.",use:"Multi-ingredient omega-3 + saffron (mood) + lycopene + allicin synergy, cardiovascular, Mediterranean diet",limits:"Complex to prepare. Variable fish content. Saffron — expensive. Multiple allergens (seafood, fish)."},
{id:315,name:"Saffron",aka:"Crocus sativus — stigmas",emoji:"🌸",cat:"spice",catLabel:"Mediterranean/Persian spice",african:false,top3:false,kcal:310,carbs:65.4,protein:11.4,fat:5.9,fiber:3.9,gi:"Low",evidence:"Moderate",micro:"Manganese (28.4mg), Vitamin C (80.8mg), Iron (11.1mg), Crocin (3–10%), Picrocrocin (4%), Safranal (0.5%)",bio:"Crocin (anti-depressant carotenoid — unique to saffron), safranal (anxiolytic), picrocrocin (bitter — neuroprotective), kaempferol, quercetin",benefits:"Multiple RCTs: 30mg/day saffron comparable to fluoxetine/imipramine for mild-moderate depression. Crocin inhibits serotonin and dopamine reuptake. Safranal anxiolytic. Anti-cancer in vitro (crocin cytotoxic). Antioxidant. Used medicinally across N. Africa, Iran, and Mediterranean for millennia.",use:"Mild-moderate depression (RCT — 30mg/day), anxiety, antioxidant, anti-cancer (mechanistic), traditional N. African/Persian",limits:"Very expensive — most commercial saffron is adulterated. Doses >5g can be toxic/abortifacient. Anticoagulant interaction. Used in tiny culinary amounts."},
{id:316,name:"Za'atar flatbread (manaqeesh)",aka:"Thyme-sesame flatbread — N. African",emoji:"🫓",cat:"grain",catLabel:"N. African/Levantine bread",african:true,top3:false,kcal:310,carbs:52,protein:9.8,fat:8.4,fiber:3.2,gi:"Medium",evidence:"Low",micro:"Thymol (from thyme), Sesamin (from sesame), Calcium (from sesame — 120mg), Iron (3.8mg), Vitamin K (from thyme)",bio:"Thymol + carvacrol (antimicrobial), sesamin (antioxidant lignan), sumac polyphenols (when included), olive oil polyphenols",benefits:"Traditional breakfast bread across N. Africa and Levant. Combines whole grain base with za'atar antimicrobial/antioxidant compounds and sesame calcium. Provides sustained energy with anti-inflammatory spice layer. Cultural meal — food adherence important for sustained dietary pattern.",use:"N. African/Levantine traditional food, combined antimicrobial + antioxidant (za'atar), calcium, sustained energy",limits:"Medium GI (refined flour base common). High sodium. Calorie-dense. Variable preparation quality."},
{id:317,name:"Harissa",aka:"North African chilli paste",emoji:"🌶️",cat:"spice",catLabel:"N. African condiment",african:true,top3:false,kcal:116,carbs:13.6,protein:3.7,fat:5.9,fiber:5.1,gi:"Low",evidence:"Moderate",micro:"Vitamin C (183mg — from peppers), Capsaicin (high), Caraway (carvone), Coriander (linalool), Cumin (cuminaldehyde), Iron (2.1mg)",bio:"Capsaicin (TRPV1 agonist — thermogenic), carvone (digestive), linalool (anxiolytic), cumin cuminaldehyde (antidiabetic), tomato lycopene",benefits:"Multi-spice synergy: capsaicin thermogenic (4–5% energy expenditure increase, RCT) + caraway carminative + coriander/cumin antidiabetic properties. Very high Vit C from chilli base. Traditional condiment of Tunisia and N. Africa — key flavour base for many dishes.",use:"Thermogenic (weight management), vitamin C, multi-spice anti-inflammatory, N. African culinary staple",limits:"GI irritation (capsaicin — GERD, IBS). Very high sodium in commercial preparations. TRPV1 activation — pain in mucous membranes."},
{id:318,name:"Ras el hanout",aka:"Moroccan spice blend (30+ spices)",emoji:"🌿",cat:"spice",catLabel:"N. African spice blend",african:true,top3:false,kcal:265,carbs:48.4,protein:9.7,fat:7.1,fiber:14.2,gi:"Low",evidence:"Low",micro:"Curcumin (turmeric), Gingerols (ginger), Cinnamic aldehyde (cinnamon), Piperine (black pepper), Terpenes (cardamom, cloves)",bio:"Multi-bioactive: curcumin (NF-κB), gingerols (COX-2), cinnamaldehyde (glycaemia), piperine (bioavailability enhancer for all), thymol (antimicrobial), eugenol (COX), crocin (if saffron included)",benefits:"Piperine in blend enhances curcumin bioavailability 2000%. Multi-spice combination provides synergistic anti-inflammatory, antidiabetic, antimicrobial, and antioxidant effects across multiple pathways simultaneously. Represents the Moroccan culinary tradition of maximising therapeutic value of spice blends.",use:"Multi-pathway anti-inflammatory synergy, glycaemic control, antimicrobial, antioxidant, Moroccan traditional",limits:"Variable composition — no standardised product. Cumulative drug interactions of multiple spice components. Anticoagulant risk at medicinal doses."},
{id:319,name:"Greek salad (traditional)",aka:"Tomato + cucumber + olive + feta + oregano",emoji:"🥗",cat:"other",catLabel:"Mediterranean dish",african:false,top3:false,kcal:133,carbs:7.1,protein:4.2,fat:10.2,fiber:2.1,gi:"Low",evidence:"High",micro:"Lycopene (tomatoes), Hydroxytyrosol (olives+EVOO), Quercetin (oregano — highest herb source), Vit K2 (feta), Calcium (feta 200mg)",bio:"Tomato lycopene + EVOO hydroxytyrosol + olive quercetin + feta CLA + oregano carvacrol + cucumber cucurbitacins",benefits:"Epitomises PREDIMED multi-ingredient Mediterranean diet synergy: lycopene (prostate cancer risk), hydroxytyrosol (endothelial protection), quercetin (BP, anti-inflammatory), CLA (anti-adipogenic), carvacrol (antimicrobial). Multiple RCTs on Mediterranean diet components support each ingredient. Low-calorie, nutrient-dense.",use:"Cardiovascular (PREDIMED synergy), lycopene, calcium (feta), multi-ingredient anti-inflammatory, Mediterranean adherence",limits:"High sodium from olives and feta. Feta dairy allergy. Calorie-dense if generous EVOO."},
{id:320,name:"Paella (traditional Valenciana)",aka:"Saffron rice + seafood + chicken",emoji:"🥘",cat:"grain",catLabel:"Spanish/Mediterranean dish",african:false,top3:false,kcal:189,carbs:24.3,protein:14.1,fat:4.7,fiber:1.2,gi:"Medium",evidence:"Moderate",micro:"Selenium (seafood — 28mcg), Crocin (saffron), Lycopene (tomato), Iron (2.1mg), B12 (seafood — 1.8mcg), Omega-3 (seafood)",bio:"Saffron crocin + seafood omega-3 + tomato lycopene + rosemary rosmarinic acid + olive oil hydroxytyrosol + garlic allicin",benefits:"Multi-ingredient Mediterranean dish combining saffron (antidepressant crocin), seafood omega-3, tomato lycopene, and EVOO polyphenols. Traditional Valencia recipe uses socarrat (crispy bottom rice) which increases resistant starch. Saffron and seafood combination represents traditional Spanish longevity diet.",use:"Multi-ingredient Mediterranean synergy, omega-3, saffron (mood), lycopene, selenium, traditional Spanish",limits:"Highly variable nutrition by recipe. Medium GI (white rice base). Multiple allergens (shellfish, fish). High sodium."},
