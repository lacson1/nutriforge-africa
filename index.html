{id:75,name:"Eggs",aka:"Hen's egg",emoji:"🥚",cat:"dairy",catLabel:"Animal protein",african:false,top3:false,kcal:155,carbs:1.1,protein:13,fat:11,fiber:0,gi:"Low",evidence:"High",micro:"Choline (294mg — richest dietary source), B12 (1.1mcg), Selenium (30mcg), Vitamin D (87 IU), Riboflavin (0.5mg)",bio:"Lutein+zeaxanthin (0.33mg), phosphatidylcholine, betaine, leucine (highest bioavailable ratio)",benefits:"2025 SR: eggs have clinically insignificant impact on blood cholesterol in most individuals. Rush Memory and Aging Project: egg intake associated with reduced Alzheimer's risk. Choline: phosphatidylcholine synthesis, acetylcholine, methylation. Highest DIAAS of any whole food.",use:"Muscle protein synthesis, choline repletion, cognitive health, satiety",limits:"CVD debate in diabetics/APOE4 carriers. Egg allergy (IgE). Salmonella if undercooked."},
{id:76,name:"Kefir",aka:"Fermented milk drink",emoji:"🥛",cat:"fermented",catLabel:"Fermented dairy",african:false,top3:false,kcal:61,carbs:4.7,protein:3.4,fat:3.3,fiber:0,gi:"Low",evidence:"Moderate",micro:"Calcium (120mg), B12 (0.5mcg), Phosphorus (105mg), Riboflavin (0.17mg), Potassium (152mg)",bio:"Diverse probiotic consortium (>30 strains: Lactobacillus, Bifidobacterium, Saccharomyces), kefiran (polysaccharide), bioactive peptides",benefits:"RCTs: kefir improves lactose tolerance (lactase production), reduces IBS symptoms, lowers systolic BP. Kefiran polysaccharide demonstrates anti-tumour activity (animal models). More diverse probiotic profile than yogurt.",use:"Gut microbiome diversity, lactose intolerance, IBS, blood pressure",limits:"Alcohol trace (0.5–3%). Dairy allergy. Some strains may produce biogenic amines."},
{id:77,name:"Cottage cheese",aka:"Paneer chhana",emoji:"🥛",cat:"dairy",catLabel:"Dairy",african:false,top3:false,kcal:98,carbs:3.4,protein:11.1,fat:4.3,fiber:0,gi:"Low",evidence:"Moderate",micro:"Selenium (14.3mcg), Calcium (83mg), Phosphorus (134mg), B12 (0.43mcg), Riboflavin (0.16mg)",bio:"Casein protein (slow-release), CLA, lactoferrin, bioactive casein peptides",benefits:"Casein is slow-digesting — superior for overnight muscle protein synthesis (RCT vs whey at night). High satiety:calorie ratio. Selenium and B12 support antioxidant defence and methylation.",use:"Overnight protein, muscle maintenance, satiety, weight management",limits:"High sodium (250–400mg/100g). Moderate calcium only. Full-fat high in SFA."},
// ══════════ FUNGI ══════════
{id:78,name:"Shiitake mushrooms",aka:"Lentinula edodes",emoji:"🍄",cat:"fungi",catLabel:"Culinary mushroom",african:false,top3:false,kcal:34,carbs:6.8,protein:2.2,fat:0.5,fiber:2.5,gi:"Low",evidence:"Moderate",micro:"Copper (0.5mg), Selenium (5.7mcg), B5 (1.5mg), B6 (0.3mg), Ergosterol (provitamin D2)",bio:"Lentinan (beta-1,3-glucan), eritadenine (cholesterol-lowering), AHCC, ergothioneine",benefits:"Lentinan: approved immunomodulator (Japan). Human RCT: 4-week consumption proliferated γδ-T cells and sIgA. Eritadenine reduces serum cholesterol. One of few non-animal Vit D sources (UV-exposed).",use:"Immune function, LDL management, plant-based vitamin D",limits:"Raw → flagellate dermatitis. Purines moderate. Vit D varies with UV exposure."},
{id:79,name:"Reishi mushroom",aka:"Ganoderma lucidum — Ling Zhi",emoji:"🍄",cat:"fungi",catLabel:"Medicinal mushroom",african:false,top3:false,kcal:40,carbs:7,protein:4,fat:0.6,fiber:6,gi:"Low",evidence:"Moderate",micro:"Beta-glucans (>30%), Selenium (5mcg), Copper, Zinc, Polysaccharides",bio:"Ganoderic acids (triterpenoids), beta-1,3/1,6-glucans, ergosterol, polysaccharide-peptides",benefits:"Meta-analyses: reishi supplementation improves white blood cell count in cancer patients, reduces fatigue. Ganoderic acids inhibit histidine decarboxylase (anti-allergic). Immunomodulatory in clinical trials.",use:"Immune function, cancer adjunct therapy, adaptogenic stress response",limits:"Bitter — typically extract/supplement form. CYP3A4 inhibitor. Hepatotoxic at very high doses (case reports). Not a culinary mushroom."},
{id:80,name:"Maitake mushroom",aka:"Grifola frondosa — Hen of the woods",emoji:"🍄",cat:"fungi",catLabel:"Medicinal mushroom",african:false,top3:false,kcal:31,carbs:7,protein:1.9,fat:0.2,fiber:2.7,gi:"Low",evidence:"Moderate",micro:"Niacin (6.6mg), Potassium (204mg), Copper (0.3mg), Selenium (2.2mcg), Riboflavin (0.2mg)",bio:"D-fraction (beta-glucan complex), MX-fraction (blood glucose modulator), polysaccharide-protein complexes",benefits:"D-fraction: RCT evidence for immune activation (NK cell activity). MX-fraction: pilot RCT evidence for blood glucose reduction. Highest beta-glucan potency of culinary mushrooms.",use:"Immune function, blood glucose management (adjunct), anti-cancer adjunct",limits:"Limited large RCTs. Rare allergic reactions. Drug interaction with warfarin and diabetes medications."},
{id:81,name:"Oyster mushrooms",aka:"Pleurotus ostreatus",emoji:"🍄",cat:"fungi",catLabel:"Culinary mushroom",african:true,top3:false,kcal:33,carbs:6.1,protein:3.3,fat:0.4,fiber:2.3,gi:"Low",evidence:"Moderate",micro:"B3/Niacin (4.9mg), Potassium (420mg), Copper (0.3mg), Phosphorus (120mg), Iron (1.3mg)",bio:"Lovastatin (natural statin), pleuran (beta-glucan), ergothioneine, phenolic compounds",benefits:"Contains naturally occurring lovastatin (cholesterol-lowering statin). Pleuran beta-glucan RCT: improved respiratory immunity in athletes. Grown and consumed widely in Africa. Ergothioneine is a unique dietary antioxidant.",use:"Cholesterol management (natural statin), immune function, plant-based protein",limits:"Natural statin — theoretical interaction with pharmaceutical statins. Variable lovastatin content."},
// ══════════ SPICES & HERBS ══════════
{id:82,name:"Turmeric",aka:"Curcuma longa",emoji:"🌿",cat:"spice",catLabel:"Spice",african:false,top3:false,kcal:354,carbs:65,protein:8,fat:10,fiber:21,gi:"Low",evidence:"Moderate",micro:"Iron (41.4mg), Manganese (19.8mg), Potassium (2525mg), Vitamin C (25.9mg), Magnesium (193mg)",bio:"Curcumin (3–4% by weight), bisdemethoxycurcumin, ar-turmerone, piperine synergy",benefits:"Meta-analyses: curcumin reduces CRP, IL-6, TNF-alpha (anti-inflammatory). RCTs: joint pain reduction comparable to NSAIDs at 1g/day. Neuroprotective in animal models. Bioavailability critically low — requires piperine (black pepper) or lipid formulation.",use:"Anti-inflammatory, joint pain, metabolic syndrome, anti-cancer (adjunct)",limits:"Poor bioavailability without piperine/lipid. CYP3A4 inhibitor — drug interactions. GI upset at high doses. Turmeric supplements often adulterated."},
{id:83,name:"Ginger",aka:"Zingiber officinale",emoji:"🌿",cat:"spice",catLabel:"Spice/Root",african:false,top3:false,kcal:80,carbs:18,protein:1.8,fat:0.8,fiber:2,gi:"Low",evidence:"Moderate",micro:"Manganese (0.2mg), Magnesium (43mg), Potassium (415mg), Copper (0.2mg), Vitamin B6 (0.2mg)",bio:"Gingerols (6-gingerol), shogaols (from heat), paradols, zingerone, sesquiterpenes",benefits:"Multiple RCTs: ginger 1–1.5g/day reduces nausea (chemotherapy, pregnancy). Anti-inflammatory via COX-2 and LOX inhibition. Meta-analysis: reduces fasting blood glucose in T2D. Anti-platelet activity.",use:"Nausea/vomiting (pregnancy, chemo), glycaemic control, anti-inflammatory, gastric motility",limits:"Anti-platelet — caution with anticoagulants, pre-surgery. GI upset at high doses. Drug interaction (warfarin, NSAIDs)."},
{id:84,name:"Cinnamon",aka:"Cinnamomum verum / cassia",emoji:"🌿",cat:"spice",catLabel:"Spice",african:false,top3:false,kcal:247,carbs:81,protein:4,fat:1.2,fiber:53,gi:"Low",evidence:"Moderate",micro:"Manganese (17.5mg), Calcium (1002mg), Iron (8.3mg), Vitamin K (31.2mcg), Copper (0.3mg)",bio:"Cinnamaldehyde, coumarin (cassia only), cinnamate, procyanidins, catechins",benefits:"2024 RCT (prediabetes): cinnamon supplementation reduced postprandial blood glucose. Meta-analysis: reduces fasting glucose and HbA1c in T2D. Cinnamaldehyde: antimicrobial, anti-fungal. Insulin sensitiser.",use:"Glycaemic control, T2D adjunct, antimicrobial, anti-inflammatory",limits:"Cassia cinnamon contains coumarin — hepatotoxic at high doses. Use Ceylon cinnamon. Drug interactions with antidiabetics, anticoagulants."},
{id:85,name:"Hibiscus (Zobo/Bissap)",aka:"Hibiscus sabdariffa — Zobo / Karkadé",emoji:"🌺",cat:"spice",catLabel:"African botanical",african:true,top3:false,kcal:37,carbs:8,protein:0.7,fat:0.1,fiber:2.1,gi:"Low",evidence:"Moderate",micro:"Vitamin C (6.7mg), Iron (1.5mg), Calcium (215mg), Magnesium (41mg), Potassium (208mg)",bio:"Anthocyanins (delphinidin-3-sambubioside — red pigment), protocatechuic acid, hibiscus acid, quercetin, polysaccharides",benefits:"Multiple RCTs: hibiscus tea (2–3 cups/day) reduces SBP 6–10 mmHg and DBP 3–7 mmHg in prehypertensive adults. Hepatoprotective in animal models. National drink of Senegal (bissap) — rich cultural integration.",use:"Hypertension, antioxidant, liver health, cardiovascular, vitamin C",limits:"May lower BP too far in hypotensive individuals. Possible oestrogen-like effect — avoid in pregnancy (uterotonic). Potential interaction with chloroquine (antimalarial)."},
{id:86,name:"Fenugreek",aka:"Trigonella foenum-graecum",emoji:"🌿",cat:"spice",catLabel:"Spice/Seed",african:false,top3:false,kcal:323,carbs:58,protein:23,fat:6.4,fiber:24.6,gi:"Low",evidence:"Moderate",micro:"Iron (33.5mg), Manganese (1.2mg), Magnesium (191mg), Phosphorus (296mg), Vitamin B6 (0.6mg)",bio:"Saponins (diosgenin, trigonelline), galactomannan (soluble fibre), fenugreekine, 4-OH-isoleucine",benefits:"Meta-analysis: fenugreek reduces fasting blood glucose and HbA1c. 4-Hydroxyisoleucine mimics insulin action. Galactomannan gel reduces postprandial glucose spike. Traditionally used across N. Africa and Middle East.",use:"T2D glycaemic control, insulin sensitivity, LDL reduction, satiety",limits:"GI upset (gas, diarrhoea). Maple syrup odour from breath/urine. Anticoagulant interaction. May affect thyroid hormone absorption."},
{id:87,name:"Black pepper",aka:"Piper nigrum",emoji:"🌿",cat:"spice",catLabel:"Spice",african:false,top3:false,kcal:251,carbs:64,protein:10,fat:3.3,fiber:25,gi:"Low",evidence:"Moderate",micro:"Manganese (12.8mg), Vitamin K (163.7mcg), Iron (9.7mg), Copper (1.3mg), Magnesium (171mg)",bio:"Piperine (20% bioavailability enhancer), chavicine, piperlongumine, limonene, safrole",benefits:"Piperine increases bioavailability of curcumin (by 2000%), selenium, and other nutrients by inhibiting P-glycoprotein and CYP3A4. Anti-inflammatory and anti-cancer properties (in vitro). Thermogenic — minor metabolic boost.",use:"Nutrient bioavailability enhancement (curcumin), anti-inflammatory, culinary pairing",limits:"CYP3A4 inhibitor — drug interactions with many medications. Irritant to GI mucosa at high doses. Piperine sensitises certain cancer cells to chemotherapy — double-edged."},
{id:88,name:"Ogiri / Iru (Locust beans)",aka:"Parkia biglobosa — Dawadawa",emoji:"🌿",cat:"fermented",catLabel:"African fermented condiment",african:true,top3:false,kcal:390,carbs:46,protein:30,fat:15,fiber:8,gi:"Low",evidence:"Low",micro:"Iron (9.1mg), Calcium (124mg), Zinc (5.7mg), Potassium (1280mg), Magnesium (200mg)",bio:"Glutamic acid (umami), lysine, tryptophan, riboflavin from fermentation, bacillopeptidases (fibrinolytic enzymes)",benefits:"Fibrinolytic enzymes produced during fermentation may reduce blood clot formation (in vitro). Very high protein and iron. Traditional protein condiment in W. African cuisine (egusi soup, jollof). Fermentation improves bioavailability.",use:"Plant protein, iron, culinary flavour (umami), traditional W. African condiment",limits:"Very strong odour. High purine from fermentation. Limited clinical evidence. Aflatoxin risk if poorly processed."},
{id:89,name:"Uziza leaves",aka:"Piper guineense — W. African black pepper",emoji:"🌿",cat:"leaf",catLabel:"African herb/leaf",african:true,top3:false,kcal:38,carbs:5,protein:4.4,fat:0.6,fiber:3.1,gi:"Low",evidence:"Low",micro:"Iron (4.1mg), Calcium (92mg), Vitamin C (19mg), Vitamin A (120mcg RAE), Magnesium (65mg)",bio:"Piperine (same bioactive as black pepper), amides, flavonoids, alkaloids, essential oils",benefits:"Contains piperine — same nutrient bioavailability enhancing properties as black pepper. Traditional use for post-partum uterine involution and GI conditions. Iron content supports haematopoiesis.",use:"Culinary use (Nigerian peppersoup, ofe onugbu), iron intake, digestive support",limits:"Primarily traditional/empirical evidence. Piperine drug interactions (same as black pepper). Uterotonic — avoid in pregnancy at high doses."},
// ══════════ OILS & FATS ══════════
{id:90,name:"Extra virgin olive oil",aka:"EVOO — Olea europaea",emoji:"🫒",cat:"oil",catLabel:"Oil/Fat",african:false,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"High",micro:"Vitamin E (14.3mg), Vitamin K (60.2mcg), Phytosterols (221mg), Squalene, Polyphenols",bio:"Oleocanthal (natural ibuprofen-like), oleacein, oleuropein, squalene, hydroxytyrosol, MUFA (oleic acid 73%)",benefits:"PREDIMED trial: EVOO group had 30% lower major CV events vs low-fat diet. Oleocanthal inhibits COX-1/COX-2 (anti-inflammatory). Hydroxytyrosol: strongest antioxidant capacity of polyphenols per gram.",use:"Cardiovascular (first-line dietary fat), anti-inflammatory, Mediterranean diet adherence",limits:"High caloric density. Heat-sensitive polyphenols — moderate cooking temperature. Cold-press label fraud common."},
{id:91,name:"Palm oil (Red)",aka:"Elaeis guineensis — Ofe mmanu",emoji:"🌴",cat:"oil",catLabel:"African oil",african:true,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"Vitamin A/Beta-carotene (500mcg/tbsp — red palm, extremely high), Vitamin E (tocotrienols, 20mg), Vitamin K (8mcg), Coenzyme Q10",bio:"Tocotrienols (potent antioxidant — stronger than tocopherols), carotenoids (alpha, beta), squalene, phospholipids",benefits:"Red palm oil (unrefined): highest dietary source of provitamin A carotenoids — critical for vitamin A deficiency in Sub-Saharan Africa. Tocotrienols: RCT evidence for neuroprotection, LDL reduction. WHO recognises red palm oil in fighting vitamin A deficiency.",use:"Vitamin A deficiency (Africa), neuroprotection, tocotrienol supplementation",limits:"50% saturated fat (palmitic acid) — LDL-raising. Environmental: palm oil deforestation. Refined palm oil loses all antioxidant benefit. High calorie."},
{id:92,name:"Coconut oil",aka:"Cocos nucifera",emoji:"🥥",cat:"oil",catLabel:"Oil/Fat",african:false,top3:false,kcal:892,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Low",micro:"MCTs (medium-chain triglycerides 54%), Lauric acid, Vitamin E trace, Polyphenols (trace)",bio:"Lauric acid (C12 — antimicrobial, raises HDL), caprylic/capric acid (MCT), polyphenols (virgin only)",benefits:"Lauric acid raises HDL-C. MCTs metabolised rapidly to ketones — used in ketogenic diet. Some evidence for weight management. Lauric acid antimicrobial in vitro.",use:"Ketogenic diet, MCT fuel, cooking stability (high smoke point)",limits:"92% saturated fat — primarily raises LDL. AHA advises against as primary fat. High calorie. 'Superfood' marketing far exceeds clinical evidence."},
{id:93,name:"Flaxseed oil",aka:"Linseed oil",emoji:"🌱",cat:"oil",catLabel:"Oil/Fat",african:false,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"ALA (53.4g/100g — highest omega-3 oil), Vitamin E (2.1mg), Phytosterols",bio:"ALA (alpha-linolenic acid omega-3), lignans (trace), tocopherols",benefits:"Highest plant-based omega-3 concentration. ALA reduces systemic inflammation. Useful in diets where fish is excluded. Must be consumed cold/unheated — ALA oxidises rapidly.",use:"Plant-based omega-3, anti-inflammatory, complement to fish in omega-3 strategy",limits:"Very unstable — oxidises rapidly (refrigerate, use within 3 months). ALA→EPA/DHA conversion rate only 5–10%."},
// ══════════ LEAN MEATS ══════════
{id:94,name:"Chicken breast",aka:"Gallus gallus domesticus",emoji:"🍗",cat:"meat",catLabel:"Lean poultry",african:false,top3:false,kcal:165,carbs:0,protein:31,fat:3.6,fiber:0,gi:"Low",evidence:"Moderate",micro:"B3/Niacin (13.4mg), Selenium (27.6mcg), B6 (0.9mg), Phosphorus (220mg), B12 (0.3mcg)",bio:"Carnosine, anserine (dipeptides — anti-glycation), complete protein, leucine",benefits:"Highest protein:fat ratio of common meats. Carnosine and anserine have anti-glycation properties (reduce AGE formation). Lean protein supports satiety and muscle protein synthesis.",use:"Lean protein source, muscle maintenance, weight management",limits:"Antibiotic resistance concern with conventionally raised chicken. Very low iron and zinc vs red meat. Overcooking → heterocyclic amines (potential carcinogens)."},
{id:95,name:"Turkey breast",aka:"Meleagris gallopavo",emoji:"🦃",cat:"meat",catLabel:"Lean poultry",african:false,top3:false,kcal:135,carbs:0,protein:30,fat:1,fiber:0,gi:"Low",evidence:"Moderate",micro:"B3/Niacin (11.5mg), Selenium (29.1mcg), B6 (0.9mg), Phosphorus (214mg), Tryptophan (0.32g)",bio:"Tryptophan (serotonin/melatonin precursor), carnosine, complete protein, leucine",benefits:"Highest tryptophan density of common meats — supports serotonin synthesis. Lowest fat of any poultry. Selenium is critical for thyroid function and GPx antioxidant enzyme.",use:"Lean protein, serotonin precursor (mood, sleep), thyroid health",limits:"Processed turkey (deli slices) high in sodium. Very low iron."},
{id:96,name:"Beef liver",aka:"Bos taurus — offal",emoji:"🥩",cat:"meat",catLabel:"Organ meat",african:true,top3:false,kcal:175,carbs:3.9,protein:26.5,fat:5,fiber:0,gi:"Low",evidence:"High",micro:"Vitamin A (4,968mcg RAE — preformed retinol), B12 (70.6mcg — highest food source), Iron (6.2mg haem), Copper (12mg), Folate (290mcg)",bio:"CoQ10, carnitine, all-trans retinol, haem iron (bioavailable), phospholipids",benefits:"Most nutrient-dense food per calorie on Earth — bar none. B12 and folate support methylation. Preformed retinol (not provitamin A) is immediately bioavailable. Haem iron: 25% absorption rate vs 2–8% non-haem. Traditional across all African cultures.",use:"Nutritional deficiency treatment, B12 and iron repletion, energy, liver health",limits:"Very high retinol — Vitamin A toxicity risk if consumed daily (limit to 1× weekly). Copper toxicity at high intake. Purines for gout. Caution in pregnancy (hypervitaminosis A risk)."},
{id:97,name:"Lamb",aka:"Ovis aries",emoji:"🥩",cat:"meat",catLabel:"Red meat",african:true,top3:false,kcal:294,carbs:0,protein:24.5,fat:20.9,fiber:0,gi:"Low",evidence:"Moderate",micro:"B12 (2.7mcg), Zinc (4.5mg), Iron (1.8mg haem), Selenium (26.2mcg), Niacin (8.2mg)",bio:"CLA (higher than beef), carnosine, taurine, creatine, haem iron",benefits:"Higher CLA content than beef — anti-adipogenic and anti-inflammatory properties. Grass-fed lamb has better omega-3:omega-6 ratio. Zinc density important for immunity and testosterone.",use:"Zinc and B12 repletion, lean red meat, iron (haem), CLA",limits:"Higher SFA than chicken. Processed lamb products (sausages, kebabs) high in sodium and SFA. Overcooking → heterocyclic amines."},
{id:98,name:"Venison / Bush meat",aka:"Cervus elaphus (wild deer)",emoji:"🦌",cat:"meat",catLabel:"Lean red meat",african:true,top3:false,kcal:158,carbs:0,protein:30.2,fat:3.2,fiber:0,gi:"Low",evidence:"Low",micro:"B12 (7.6mcg), Zinc (4.5mg), Iron (4mg haem), Selenium (12.9mcg), Phosphorus (200mg)",bio:"Haem iron, carnosine, CLA, creatine, omega-3 (higher than grain-fed beef)",benefits:"Leanest red meat available. High haem iron and B12 — critical in African diets where anaemia is prevalent. Higher omega-3 than grain-fed beef (wild grazing). Traditional food source across Sub-Saharan Africa.",use:"Lean protein, haem iron, B12, sustainable protein source",limits:"Zoonotic disease risk (bush meat) — H5N1, monkeypox, Ebola (Africa). Requires thorough cooking. Limited data on specific nutritional profiles. Sustainability and legal concerns."},
// ══════════ FERMENTED FOODS ══════════
{id:99,name:"Kimchi",aka:"Korean fermented cabbage",emoji:"🥬",cat:"fermented",catLabel:"Fermented vegetable",african:false,top3:false,kcal:15,carbs:2.4,protein:1.1,fat:0.5,fiber:1.6,gi:"Low",evidence:"Moderate",micro:"Vitamin K (43mcg), Vitamin C (18mg), Iron (0.4mg), Folate (28mcg), Potassium (151mg)",bio:"Lactobacillus kimchii (unique species), glucosinolates (from cabbage), allicin (from garlic), capsaicin, GABA",benefits:"Korean cohort: kimchi consumption associated with lower metabolic syndrome risk. Lactobacillus plantarum in kimchi shown to reduce LDL and inflammation markers. GABA content contributes to relaxation.",use:"Gut microbiome, metabolic syndrome, anti-inflammatory, probiotic source",limits:"Very high sodium (2.3g/100g — main limitation). Some people find it GI-irritating due to capsaicin."},
{id:100,name:"Sauerkraut",aka:"Fermented cabbage",emoji:"🥬",cat:"fermented",catLabel:"Fermented vegetable",african:false,top3:false,kcal:19,carbs:4.3,protein:0.9,fat:0.1,fiber:2.9,gi:"Low",evidence:"Moderate",micro:"Vitamin K (13.3mcg), Vitamin C (14.7mg), Iron (1.5mg), Folate (24mcg), Sodium (661mg)",bio:"L. plantarum, L. mesenteroides, L. brevis, acetylcholine precursors, biogenic amines",benefits:"Unpasteurised sauerkraut: live Lactobacillus strains improve gut microbiome diversity. Glucosinolates (from cabbage) retained and bioconverted. Fermentation improves Vit C stability and bioavailability of minerals.",use:"Gut microbiome, vitamin C (stable), probiotic, microbiome diversity",limits:"High sodium. Histamine-rich — problematic in HIT. Tyramine content — caution with MAOIs. Must be raw/unpasteurised for live cultures."},
// ══════════ MORE AFRICAN FOODS ══════════
{id:101,name:"Okra",aka:"Abelmoschus esculentus — Okro / Lady's fingers",emoji:"🌿",cat:"veg",catLabel:"African vegetable",african:true,top3:false,kcal:33,carbs:7.5,protein:1.9,fat:0.2,fiber:3.2,gi:"Low",evidence:"Moderate",micro:"Vitamin K (31.3mcg), Vitamin C (23mg), Folate (88mcg), Magnesium (57mg), Potassium (299mg)",bio:"Okra mucilage (soluble fibre — myricetin-3-O-glucoside polymer), quercetin, rutin, lectins",benefits:"Okra mucilage: evidence for glucose absorption inhibition (attenuates postprandial hyperglycaemia). RCT (small): okra water reduced blood glucose in T2D. Quercetin and rutin: anti-inflammatory and antioxidant. Staple of W., C., and E. Africa.",use:"Glycaemic control, gut health (mucilage prebiotic), Vit K, folate",limits:"Mucilage texture aversion (sliminess). Moderate FODMAP. Oxalate content. Small RCT evidence — larger trials needed."},
{id:102,name:"Plantain",aka:"Musa paradisiaca — Unripe plantain",emoji:"🍌",cat:"fruit",catLabel:"African staple fruit",african:true,top3:false,kcal:122,carbs:32,protein:1.3,fat:0.4,fiber:2.3,gi:"Medium",evidence:"Moderate",micro:"Potassium (499mg), Vitamin A (56mcg RAE), Vitamin C (18.4mg), B6 (0.3mg), Magnesium (37mg)",bio:"Resistant starch (high when unripe), dopamine (0.05mg/g), serotonin, norepinephrine, polyphenols",benefits:"Unripe plantain (GI=Low): high resistant starch — prebiotic, attenuates glycaemia. Ripe/cooked plantain GI=Medium. Nigerian studies: unripe plantain flour reduced blood glucose in T2D. Dopamine and serotonin content is nutritionally relevant. Potassium density supports BP control.",use:"Glycaemic management (unripe), gut microbiome, potassium, vitamin A",limits:"GI increases significantly when ripe and cooked. Fried plantain (dodo) adds significant fat/calories. Medium GI when ripe."},
{id:103,name:"Cassava leaves",aka:"Manihot esculenta — Saka-saka",emoji:"🌿",cat:"leaf",catLabel:"African leafy green",african:true,top3:false,kcal:43,carbs:8,protein:3.7,fat:0.3,fiber:4.5,gi:"Low",evidence:"Low",micro:"Iron (2.6mg), Calcium (75mg), Vitamin C (34mg), Vitamin A (80mcg RAE), Zinc (0.7mg)",bio:"Linamarin (cyanogenic glycoside — MUST be detoxified), carotenoids, flavonoids, protein",benefits:"Leaves are more nutritious than the root. Iron and protein content support anaemia prevention in C./W. Africa. Fermentation and cooking detoxify cyanogenic glycosides. Traditional food in Democratic Republic of Congo (saka-saka).",use:"Iron, protein, vitamin A (C. Africa), maternal nutrition",limits:"Contains linamarin — cyanogenic glycoside causes cyanide poisoning if not properly processed (soaking, cooking, fermentation). Raw consumption is dangerous."},
{id:104,name:"African yam",aka:"Dioscorea rotundata — White yam",emoji:"🍠",cat:"veg",catLabel:"African root",african:true,top3:false,kcal:118,carbs:27.9,protein:1.5,fat:0.2,fiber:4.1,gi:"Medium",evidence:"Moderate",micro:"Potassium (816mg), Vitamin C (17.1mg), B6 (0.3mg), Manganese (0.4mg), Thiamine (0.1mg)",bio:"Diosgenin (steroidal saponin — precursor to sex hormones), dioscin, anthocyanins (purple yam)",benefits:"Diosgenin: steroid precursor with phytoestrogenic and anti-inflammatory properties. Dietary fibre supports gut health. High potassium supports BP. Cultural staple across W. Africa — superior nutritional profile to cassava.",use:"Potassium intake, gut health, phytoestrogens (menopause), W. African staple",limits:"Medium GI. Diosgenin: theoretical hormonal activity — caution in hormone-sensitive conditions. Not interchangeable with sweet potato nutritionally."},
{id:105,name:"Melon seeds (Egusi)",aka:"Citrullus colocynthis seeds",emoji:"🌱",cat:"nut",catLabel:"African seed",african:true,top3:false,kcal:557,carbs:10,protein:28,fat:46,fiber:3.8,gi:"Low",evidence:"Low",micro:"Iron (6.6mg), Magnesium (244mg), Zinc (8.7mg), Phosphorus (476mg), Calcium (61mg)",bio:"Cucurbitacins, linoleic acid, phytosterols, tocopherols",benefits:"High protein for a seed — important in W. African protein nutrition. Zinc density. Egusi soup is nutritionally significant in Nigeria/Ghana/Cameroon. Cucurbitacins anti-inflammatory in vitro.",use:"Protein (W. Africa), zinc, energy-dense cooking ingredient",limits:"High omega-6:omega-3 ratio. High caloric density. Mechanistic evidence only."},
{id:106,name:"Crayfish (Dried)",aka:"Dried freshwater crayfish — Efere",emoji:"🦐",cat:"seafood",catLabel:"African dried seafood condiment",african:true,top3:false,kcal:299,carbs:2.1,protein:57,fat:4.7,fiber:0,gi:"Low",evidence:"Low",micro:"Calcium (1,088mg), Phosphorus (1,185mg), Iron (7.1mg), Zinc (5.5mg), Selenium (42mcg)",bio:"Astaxanthin, chitin, taurine, trimethylamine (flavour), phospholipids",benefits:"Highest calcium per gram of any common West African food. Exceptional calcium: critically important condiment in Nigeria/Ghana/Senegal cuisine. Protein density (57g/100g) is remarkable. Major flavour base in W. African soups.",use:"Calcium (dairy-free W. Africa), protein condiment, iron and zinc",limits:"Very high sodium due to drying process. Strong odour. Limited human clinical evidence. Trimethylamine content (fishy odour)."},
{id:107,name:"Groundnuts (Peanuts)",aka:"Arachis hypogaea — Epa",emoji:"🥜",cat:"nut",catLabel:"Legume/Nut",african:true,top3:false,kcal:567,carbs:16,protein:26,fat:49,fiber:8.5,gi:"Low",evidence:"High",micro:"Niacin (12.1mg), Manganese (1.9mg), Vitamin E (8.3mg), Magnesium (168mg), Phosphorus (376mg)",bio:"Resveratrol (higher per gram than red wine), p-coumaric acid, phytosterols, MUFA (oleic acid)",benefits:"Epidemiological: nut consumption including peanuts (legumes) → CVD risk reduction equivalent to tree nuts. Resveratrol content is significant — sirtuin activator. High MUFA:SFA ratio. Major protein and fat source across Africa.",use:"Cardiovascular, protein, vitamin E, magnesium, anti-inflammatory",limits:"Aflatoxin contamination risk (critical in African storage contexts). Peanut allergy — potentially fatal (IgE-mediated). Calorie-dense. Roasting improves flavour but may reduce polyphenol content."},
{id:108,name:"Bissap / Sorrel drink",aka:"Hibiscus sabdariffa drink",emoji:"🌺",cat:"other",catLabel:"African functional beverage",african:true,top3:false,kcal:37,carbs:8,protein:0.7,fat:0.1,fiber:2.1,gi:"Low",evidence:"Moderate",micro:"Vitamin C (6.7mg), Iron (1.5mg), Calcium (215mg), Magnesium (41mg), Potassium (208mg)",bio:"Delphinidin-3-sambubioside (anthocyanin), hibiscus acid, protocatechuic acid, quercetin",benefits:"(Same evidence as hibiscus entry — multiple RCTs: 6–10 mmHg SBP reduction.) Consumed as bissap (Senegal), zobo (Nigeria), karkadé (Egypt). Most widely consumed traditional African health beverage.",use:"Hypertension management, antioxidant, cardiovascular, hydration",limits:"Same as hibiscus. Uterotonic — avoid in pregnancy."},
// ══════════ MORE GLOBAL FOODS ══════════
{id:109,name:"Dark chocolate (≥85%)",aka:"Theobroma cacao",emoji:"🍫",cat:"other",catLabel:"Other",african:false,top3:false,kcal:598,carbs:46,protein:8,fat:43,fiber:10.9,gi:"Low",evidence:"High",micro:"Iron (11.9mg), Magnesium (228mg), Zinc (3.3mg), Copper (1.8mg), Manganese (1.9mg)",bio:"Epicatechin, catechins, theobromine, phenylethylamine, procyanidins, resveratrol",benefits:"Multiple RCTs: dark chocolate improves FMD, reduces LDL, and lowers BP. Epicatechin activates NO pathway. Regular consumption (6g/day) associated with 57% lower CVD mortality in the Zutphen Elderly Study.",use:"Cardiovascular (endothelial function, BP, LDL), mood, antioxidant",limits:"High caloric density. Caffeine/theobromine — insomnia, palpitations. Heavy metal contamination (lead, cadmium) in some brands. Sugar in lower-% chocolate offsets benefits."},
{id:110,name:"Green tea",aka:"Camellia sinensis (unoxidised)",emoji:"🍵",cat:"other",catLabel:"Functional beverage",african:false,top3:false,kcal:1,carbs:0.2,protein:0.2,fat:0,fiber:0,gi:"Low",evidence:"High",micro:"Fluoride (0.37mg), Manganese (0.2mg), Vitamin C (trace), Catechins (150–400mg/cup), L-theanine (20mg/cup)",bio:"EGCG (epigallocatechin gallate), L-theanine, caffeine (25–50mg/cup), gallic acid, quercetin",benefits:"Large meta-analyses: green tea → 25–30% lower risk of GI cancers, 17% lower CVD mortality. EGCG inhibits VEGF and tumour angiogenesis. L-theanine + caffeine: RCT evidence for focused alertness without jitteriness.",use:"Cardiovascular, cancer risk reduction, cognitive focus, antioxidant",limits:"Fluoride accumulates in old tea leaves. EGCG inhibits iron absorption — don't take with meals. Green tea extract supplements: hepatotoxicity risk. Caffeine content."},
{id:111,name:"Coffee",aka:"Coffea arabica/robusta",emoji:"☕",cat:"other",catLabel:"Functional beverage",african:true,top3:false,kcal:2,carbs:0,protein:0.3,fat:0,fiber:0,gi:"Low",evidence:"High",micro:"Caffeine (80–100mg/cup), Chlorogenic acid (150–550mg/cup), Vitamin B3/Niacin (0.5mg), Magnesium (7mg), Potassium (116mg)",bio:"Chlorogenic acid (antioxidant, antidiabetic), cafestol and kahweol (diterpenes — raise LDL), trigonelline, melanoidins",benefits:"Large 2024 review: moderate coffee consumption associated with lower all-cause mortality. 3–4 cups/day → reduced CVD and total mortality vs no coffee. Chlorogenic acid improves insulin sensitivity. Coffee is native to Ethiopia.",use:"Longevity (moderate consumption), cardiovascular, T2D risk reduction, cognitive function",limits:"Cafestol/kahweol (unfiltered coffee) raises LDL — use paper filters. Caffeine: insomnia, anxiety, hypertension in sensitive individuals. Dental staining. Laxative effect."},
{id:112,name:"Bone broth",aka:"Collagen stock",emoji:"🍲",cat:"other",catLabel:"Other",african:false,top3:false,kcal:35,carbs:0,protein:5,fat:1.5,fiber:0,gi:"Low",evidence:"Low",micro:"Glycine (1.2g), Proline (0.6g), Hydroxyproline (0.5g), Calcium (trace), Phosphorus (trace)",bio:"Collagen hydrolysate, glycosaminoglycans, chondroitin sulphate, glucosamine",benefits:"Glycine: anti-inflammatory, sleep-improving (RCT evidence for 3g glycine before bed). Collagen peptides: RCT evidence for improved joint pain and skin elasticity. Gut-sealing properties largely extrapolated from in vitro data.",use:"Joint health, skin elasticity, glycine supplementation, gut permeability (weak evidence)",limits:"Nutritional content varies enormously with preparation. Heavy metal risk (lead from bones) if poorly sourced. Weak evidence for gut-sealing benefits claimed."},
{id:113,name:"Apple cider vinegar",aka:"Fermented apple juice",emoji:"🍶",cat:"fermented",catLabel:"Fermented",african:false,top3:false,kcal:22,carbs:0.9,protein:0,fat:0,fiber:0,gi:"Low",evidence:"Low",micro:"Potassium (73mg), Acetic acid (5–8%), Trace polyphenols from apple",bio:"Acetic acid (active compound), phloridzin (polyphenol), chlorogenic acid",benefits:"Small RCTs: 1–2 tbsp before meals attenuates postprandial glucose rise (acetic acid mechanism — inhibits alpha-amylase and sucrase). Weight loss RCT (Japan, 2009): modest effect over 12 weeks.",use:"Glycaemic management (adjunct), weight management (weak), digestive health",limits:"Tooth enamel erosion (always dilute 1:10). Oesophageal irritation. Potassium depletion with excessive use. Interacts with insulin and diuretics. Claims vastly outpace evidence."},
{id:114,name:"Spirulina",aka:"Arthrospira platensis",emoji:"🌿",cat:"other",catLabel:"Algae",african:false,top3:false,kcal:290,carbs:24,protein:57,fat:8,fiber:3.6,gi:"Low",evidence:"Moderate",micro:"Iron (28.5mg), B2/Riboflavin (3.7mg), B1/Thiamine (2.4mg), Copper (6.1mg), Magnesium (195mg)",bio:"Phycocyanin (blue-green antioxidant), beta-carotene, allophycocyanin, C-phycocyanin (anti-inflammatory)",benefits:"RCTs: spirulina reduces LDL, raises HDL, and lowers TG. Anti-inflammatory via phycocyanin (NF-κB inhibition). High iron but bioavailability variable. 4–8g/day: effective dose in trials.",use:"LDL/HDL management, anti-inflammatory, iron (vegan), antioxidant",limits:"Cyanotoxin contamination risk if poorly sourced. Vitamin B12 is pseudovitamin — not bioavailable for vegans. Possible heavy metal accumulation."},
{id:115,name:"Chlorella",aka:"Chlorella vulgaris",emoji:"🌿",cat:"other",catLabel:"Algae",african:false,top3:false,kcal:411,carbs:23,protein:58,fat:11,fiber:0.3,gi:"Low",evidence:"Moderate",micro:"Iron (130mg — extraordinary, but bioavailability debated), Vitamin B12 (385mcg — but bioavailability variable), Zinc (7.1mg), Magnesium (315mg), Vitamin A (51,000 IU)",bio:"Chlorophyll (highest of any food), CGF (Chlorella Growth Factor), phytoene, beta-carotene",benefits:"RCTs: chlorella supplementation reduces mercury and dioxin body burden. Improves peak aerobic performance. Immune modulation (NK cell activity). CGF stimulates cell repair and growth.",use:"Heavy metal detoxification, immune support, vegan protein, chlorophyll",limits:"Same contamination and B12 bioavailability issues as spirulina. Very expensive. Cell wall must be cracked for absorption."},
{id:116,name:"Seaweed (Nori)",aka:"Porphyra yezoensis",emoji:"🌊",cat:"other",catLabel:"Sea vegetable",african:false,top3:false,kcal:35,carbs:5,protein:5.8,fat:0.3,fiber:0.5,gi:"Low",evidence:"Moderate",micro:"Iodine (37mcg), B12 (57.6mcg — highest plant source), Vitamin C (39mg), Iron (1.8mg), Calcium (70mg)",bio:"Phycoerythrin, fucoidan, chlorophyll, R-phycocyanin, unique omega-3 (EPA)",benefits:"Bioavailable B12 — unique among plant foods. Iodine supports thyroid. Fucoidan: anti-coagulant, anti-tumour, antiviral properties (in vitro and small trials). EPA content in seaweed — vegan omega-3 source.",use:"Vegan B12, iodine, thyroid health, anti-inflammatory (fucoidan)",limits:"Iodine toxicity with excessive consumption. Arsenic contamination risk (brown seaweeds > red/green). Anticoagulant interaction (fucoidan)."},
{id:117,name:"Fermented soy (Natto)",aka:"Bacillus subtilis-fermented soybeans",emoji:"🫘",cat:"fermented",catLabel:"Fermented soy",african:false,top3:false,kcal:212,carbs:14,protein:18,fat:11,fiber:5.4,gi:"Low",evidence:"Moderate",micro:"Vitamin K2 (MK-7, 1,103mcg — highest food source), Iron (8.6mg), Manganese (1.3mg), Calcium (217mg), Folate (136mcg)",bio:"Nattokinase (fibrinolytic enzyme), MK-7 (Vitamin K2), isoflavones, dipicolinic acid, polyglutamic acid",benefits:"Highest dietary Vitamin K2 (MK-7) — superior to K1 for bone and cardiovascular health. Nattokinase: fibrinolytic activity (breaks down blood clots) — RCT evidence. MK-7 half-life 72h (vs K1's 6h) — superior for sustained activity.",use:"Vitamin K2, cardiovascular (clot prevention), bone health (osteocalcin activation), fermented probiotic",limits:"Very pungent flavour and texture — compliance issue. Extremely high Vit K2 — major warfarin interaction. Soy allergy."},
{id:118,name:"Tempeh",aka:"Rhizopus-fermented soy",emoji:"🫘",cat:"fermented",catLabel:"Fermented soy",african:false,top3:false,kcal:193,carbs:9.4,protein:20.3,fat:10.8,fiber:5.7,gi:"Low",evidence:"Moderate",micro:"Manganese (1.3mg), Iron (2.7mg), Calcium (111mg), Phosphorus (266mg), B2/Riboflavin (0.36mg)",bio:"Isoflavones (more bioavailable than unfermented soy), GABA, short-chain fatty acids from fermentation",benefits:"Fermentation reduces phytic acid by 30–40% (improves mineral bioavailability) and increases isoflavone bioavailability. Pre-digested proteins easier to absorb. Live mycelium has prebiotic effect.",use:"Complete plant protein, isoflavones, gut health, mineral bioavailability",limits:"Soy allergy. High calorie. Sodium in seasoned versions."},
{id:119,name:"Miso",aka:"Fermented soybean paste",emoji:"🍲",cat:"fermented",catLabel:"Fermented soy",african:false,top3:false,kcal:199,carbs:26,protein:12,fat:6,fiber:5.4,gi:"Low",evidence:"Moderate",micro:"Vitamin K (29.3mcg), Manganese (0.9mg), Copper (0.4mg), Zinc (2.6mg), B6 (0.1mg)",bio:"Live Aspergillus oryzae, isoflavones (genistein, daidzein), melanoidins, free amino acids, GABA",benefits:"Japanese cohort (large): miso soup consumption associated with lower gastric cancer risk (despite sodium — possible protective effect of isoflavones). Salt-paradox: miso's BP effect appears less harmful than equivalent NaCl.",use:"Gut microbiome, isoflavones, fermented probiotic, umami flavour",limits:"Extremely high sodium — not suitable for hypertensive patients. Must not be boiled (destroys live cultures). Soy allergy."},
{id:120,name:"Pineapple",aka:"Ananas comosus",emoji:"🍍",cat:"fruit",catLabel:"Tropical fruit",african:false,top3:false,kcal:50,carbs:13.1,protein:0.5,fat:0.1,fiber:1.4,gi:"Medium",evidence:"Moderate",micro:"Manganese (0.9mg), Vitamin C (47.8mg), B6 (0.1mg), Thiamine (0.1mg), Folate (18mcg)",bio:"Bromelain (proteolytic enzyme complex), quercetin, caffeic acid, ferulic acid, beta-carotene",benefits:"Bromelain: RCT evidence for reducing post-surgical inflammation and oedema. Anti-platelet activity. Improves protein digestion. Anti-inflammatory via modulation of kinin and complement pathways.",use:"Anti-inflammatory (post-operative), digestive aid, vitamin C, anti-platelet",limits:"Medium GI — caution in T2D. Bromelain anticoagulant interaction. Oral irritation (bromelain dissolves mucosal proteins)."},
{id:121,name:"Papaya",aka:"Carica papaya — Pawpaw",emoji:"🍈",cat:"fruit",catLabel:"Tropical fruit",african:true,top3:false,kcal:43,carbs:10.8,protein:0.5,fat:0.3,fiber:1.7,gi:"Medium",evidence:"Moderate",micro:"Vitamin C (61.8mg), Vitamin A (47mcg RAE), Folate (37mcg), Potassium (182mg), Lycopene (1.8mg)",bio:"Papain (proteolytic enzyme), carpaine, choline, lycopene, beta-cryptoxanthin, isothiocyanate",benefits:"Papain: commercial digestive enzyme supplement. Anti-parasitic properties (traditional African use, limited clinical evidence). Vitamin C and lycopene support immune function and antioxidant status. Common across tropical Africa.",use:"Digestive enzyme support, vitamin C and A, anti-parasitic (traditional), immune support",limits:"Unripe papaya: uterotonic — avoid in pregnancy (contains carpaine and papain). Medium GI. Latex allergy cross-reactivity."},
{id:122,name:"Mango",aka:"Mangifera indica",emoji:"🥭",cat:"fruit",catLabel:"Tropical fruit",african:true,top3:false,kcal:60,carbs:15,protein:0.8,fat:0.4,fiber:1.6,gi:"Medium",evidence:"Moderate",micro:"Vitamin C (36.4mg), Vitamin A (54mcg RAE), Folate (43mcg), B6 (0.1mg), Copper (0.1mg)",bio:"Mangiferin (C-glucoside xanthone), gallotannins, quercetin, kaempferol, beta-carotene",benefits:"Mangiferin: unique antioxidant with anti-diabetic (α-glucosidase inhibition), anti-inflammatory, and anti-viral properties. RCT: mango consumption reduced postprandial glucose in obese individuals. High vitamin C and folate.",use:"Vitamin C, folate, anti-inflammatory, glycaemic management (moderate)",limits:"Higher sugar content than lower-GI fruits. Medium GI. Mango skin: urushiol cross-reactivity (latex, cashew allergy)."},
{id:123,name:"Jackfruit",aka:"Artocarpus heterophyllus",emoji:"🍈",cat:"fruit",catLabel:"Tropical fruit",african:true,top3:false,kcal:95,carbs:23.2,protein:1.7,fat:0.6,fiber:1.5,gi:"Medium",evidence:"Low",micro:"Vitamin C (13.7mg), Potassium (448mg), Vitamin B6 (0.3mg), Magnesium (29mg), Riboflavin (0.1mg)",bio:"Artocarpin, morusin, cyclomorusin, isoflavones, carotenoids",benefits:"Popular meat substitute — texture mimics pulled pork. Isoflavone content. Traditional use in Africa and South Asia. Unripe jackfruit has lower glycaemic impact. Artocarpin has demonstrated anti-cancer activity in vitro.",use:"Plant-based meat alternative, vitamin C, potassium, versatile culinary use",limits:"Ripe: high sugar. Latex allergy cross-reactivity. Limited RCT evidence. Very sticky — processing difficult."},
{id:124,name:"Soursop (Graviola)",aka:"Annona muricata",emoji:"🍈",cat:"fruit",catLabel:"African/Caribbean fruit",african:true,top3:false,kcal:66,carbs:16.8,protein:1,fat:0.3,fiber:3.3,gi:"Medium",evidence:"Low",micro:"Vitamin C (20.6mg), B6 (0.1mg), Potassium (278mg), Magnesium (21mg), Folate (14mcg)",bio:"Annonacin and acetogenins (inhibit mitochondrial complex I), alkaloids, saponins, tannins",benefits:"Acetogenins have demonstrated remarkable cytotoxicity against cancer cell lines in vitro. Strong anti-tumour activity (in vitro). Vitamin C and antioxidants. Popular in W. African and Caribbean traditional medicine.",use:"Traditional anti-cancer (theoretical/folk), vitamin C, antioxidant",limits:"CRITICAL: annonacin is neurotoxic — linked to atypical Parkinsonism (Guadeloupean Parkinson's Disease) with chronic consumption. Anti-cancer evidence is entirely in vitro. Not recommended as supplement or chronic medicinal use."},
{id:125,name:"Garden egg (African eggplant)",aka:"Solanum melongena var. / Solanum aethiopicum",emoji:"🍆",cat:"veg",catLabel:"African vegetable",african:true,top3:false,kcal:25,carbs:5.9,protein:1,fat:0.2,fiber:3,gi:"Low",evidence:"Moderate",micro:"Folate (22mcg), Potassium (229mg), Manganese (0.2mg), Vitamin C (2.2mg), Copper (0.1mg)",bio:"Nasunin (anthocyanin — most potent in eggplant skin), chlorogenic acid, caffeic acid, solanine (trace)",benefits:"Nasunin: potent antioxidant chelating iron within cells (prevents hydroxyl radical formation). Chlorogenic acid: anti-diabetic, anti-viral. Widely consumed in West African stews. RCT: eggplant extract reduced LDL.",use:"Antioxidant (nasunin), LDL reduction, anti-inflammatory, W. African culinary staple",limits:"Solanine (trace, mostly in skin) — cooking mitigates. Nightshade family. Oxalate content moderate."},
{id:126,name:"Utazi leaves",aka:"Gongronema latifolium",emoji:"🌿",cat:"leaf",catLabel:"Nigerian medicinal leaf",african:true,top3:false,kcal:36,carbs:5.3,protein:4,fat:0.5,fiber:2.8,gi:"Low",evidence:"Low",micro:"Iron (3.2mg), Calcium (81mg), Vitamin C (22mg), Potassium (280mg), Magnesium (55mg)",bio:"Pregnane glycosides, saponins, alkaloids, tannins, flavonoids",benefits:"Traditional use in Nigeria for diabetes, malaria, and GI conditions. In vitro studies confirm significant antidiabetic activity (alpha-glucosidase inhibition). Antimicrobial against Staphylococcus and Salmonella. Used in Ofe Onugbu and nkwobi.",use:"Traditional diabetes management, antimicrobial, liver support, Nigerian culinary herb",limits:"Very bitter. Evidence almost entirely in vitro or animal studies. Human RCTs needed."},
{id:127,name:"Fermented locust beans (Dawadawa)",aka:"Parkia biglobosa fermented",emoji:"🌿",cat:"fermented",catLabel:"African fermented condiment",african:true,top3:false,kcal:390,carbs:46,protein:30,fat:15,fiber:8,gi:"Low",evidence:"Low",micro:"Potassium (1280mg), Iron (9.1mg), Zinc (5.7mg), Calcium (124mg), Magnesium (200mg)",bio:"Bacillopeptidase (fibrinolytic), nattokinase-like enzymes, riboflavin, lysine, tryptophan",benefits:"High protein and iron — critical condiment across Sahel and Savannah region. Fibrinolytic enzymes may reduce thrombosis risk (similar to nattokinase in natto). Widely used in Ghanaian, Malian, Senegalese cuisine.",use:"Protein, iron, cardiovascular (fibrinolytic enzymes), traditional W. African flavouring",limits:"Very strong odour. Limited human clinical trials. Purine content from fermentation."},
{id:128,name:"Bitter kola",aka:"Garcinia kola",emoji:"🌰",cat:"other",catLabel:"African botanical",african:true,top3:false,kcal:252,carbs:58,protein:4.3,fat:1.1,fiber:3.9,gi:"Low",evidence:"Low",micro:"Caffeine (trace), Iron (2.1mg), Calcium (80mg), Magnesium (50mg), Zinc (1mg)",bio:"Kolaviron (biflavonoid complex), kolaflavone, biflavanones, benzophenones, caffeine",benefits:"Kolaviron: potent hepatoprotective, anti-inflammatory, and antioxidant activity (animal models). Traditional use across W. Africa for coughs, chest colds, and liver conditions. Antimicrobial against E. coli, S. aureus.",use:"Traditional hepatoprotection, anti-inflammatory, antimicrobial, cultural ceremonial use",limits:"Most evidence from animal models. Caffeine content. Kolaviron: dose-dependent effects not established in humans."},
{id:129,name:"Moringa seeds",aka:"Moringa oleifera — seeds",emoji:"🌱",cat:"nut",catLabel:"African seed",african:true,top3:false,kcal:499,carbs:28,protein:31,fat:35,fiber:18,gi:"Low",evidence:"Low",micro:"Iron (3mg), Calcium (45mg), Phosphorus (350mg), Zinc (1.1mg), Selenium (8.4mcg)",bio:"Isothiocyanates (benzyl isothiocyanate), moringin, thiocarbamates, sterols",benefits:"Benzyl isothiocyanate: strong antimicrobial and anti-cancer activity (in vitro). Seeds used for water purification in Africa (flocculation — removes turbidity). Seed oil used in cosmetics (Ben oil).",use:"Protein, antimicrobial (traditional), water purification (traditional)",limits:"Thiocarbamate: toxic at high doses. Not commonly consumed directly as food — primarily oil and water purification. Abortifacient risk at high doses."},
{id:130,name:"Neem leaves",aka:"Azadirachta indica — Dogonyaro",emoji:"🌿",cat:"leaf",catLabel:"African medicinal herb",african:true,top3:false,kcal:35,carbs:4.8,protein:3.9,fat:0.5,fiber:2.1,gi:"Low",evidence:"Low",micro:"Calcium (82mg), Iron (3.1mg), Vitamin C (12mg), Zinc (0.7mg), Magnesium (48mg)",bio:"Azadirachtin, nimbolide, gedunin, quercetin, kaempferol, limonoids",benefits:"Nimbolide: strong anti-cancer activity in vitro (arrests cell cycle, induces apoptosis). Antidiabetic: reduces blood glucose in animal models. Traditional antimalarial across sub-Saharan Africa. Powerful antibacterial and antifungal.",use:"Traditional antimalarial, antidiabetic (adjunct), antibacterial, anti-cancer (mechanistic)",limits:"High doses hepatotoxic and nephrotoxic. Azadirachtin: insecticidal, not for chronic consumption. Not suitable for children or pregnant women. Evidence almost entirely traditional or in vitro."},

{id:131,name:"Grapefruit",aka:"Citrus paradisi",emoji:"🍊",cat:"fruit",catLabel:"Citrus fruit",african:false,top3:false,kcal:42,carbs:10.7,protein:0.8,fat:0.1,fiber:1.6,gi:"Low",evidence:"Moderate",micro:"Vitamin C (31.2mg), Vitamin A (46mcg RAE), Potassium (135mg), Folate (10mcg), Pectin (soluble fibre)",bio:"Naringenin, naringin (powerful CYP3A4 inhibitor), lycopene (pink variety), bergamottin, furanocoumarin",benefits:"Naringenin: anti-inflammatory, improves insulin sensitivity, lowers TG. Lycopene (pink/red variety). Weight management studies show modest effect. Alkaline ash — may support renal acid-base.",use:"Weight management, antioxidant, vitamin C, naringenin anti-inflammatory",limits:"CRITICAL drug interaction: bergamottin/naringin inhibit CYP3A4, P-glycoprotein — increases serum levels of statins, calcium channel blockers, immunosuppressants, ciclosporin, some antibiotics. Many patients must avoid entirely."},
{id:132,name:"Fermented ugba (Ukpaka)",aka:"Pentaclethra macrophylla — Oil bean seed",emoji:"🫘",cat:"fermented",catLabel:"Nigerian fermented seed",african:true,top3:false,kcal:469,carbs:14,protein:25,fat:36,fiber:4.1,gi:"Low",evidence:"Low",micro:"Iron (4.2mg), Calcium (90mg), Zinc (3.8mg), Phosphorus (320mg), Magnesium (140mg)",bio:"Tannins (reduced by fermentation), phenolic acids, lignans, protease inhibitors",benefits:"Traditional Igbo delicacy — used in African salad and ugba soup. Fermentation reduces anti-nutritional factors (tannins, phytic acid) and improves protein digestibility. High protein density for a plant food. Iron and zinc are significant.",use:"Plant protein (Igbo cuisine), iron and zinc, fermented food diversity",limits:"Limited clinical studies. Strong odour from fermentation. Calorie-dense."},
{id:133,name:"Ogbono (Wild African mango seeds)",aka:"Irvingia gabonensis seeds",emoji:"🌱",cat:"nut",catLabel:"African seed (culinary)",african:true,top3:false,kcal:667,carbs:27,protein:8.5,fat:58,fiber:11,gi:"Low",evidence:"Moderate",micro:"Iron (3.5mg), Calcium (120mg), Magnesium (80mg), Phosphorus (250mg), Potassium (310mg)",bio:"Irvingia seed fat (palmitic, lauric), ellagic acid, terpenes, tannins",benefits:"RCT evidence (Cameroon): Irvingia extract (IGOB131) reduced weight, waist circumference, LDL, and blood glucose. Used as thickener in ogbono soup — traditional Nigerian kitchen staple.",use:"Weight management, LDL reduction, glycaemic control, culinary thickener",limits:"High saturated fat in seeds. Evidence from small funded RCTs — independent replication needed. Calorie-dense."},
{id:134,name:"Uziza seeds (W. African black pepper)",aka:"Piper guineense seeds",emoji:"🌿",cat:"spice",catLabel:"African spice",african:true,top3:false,kcal:251,carbs:64,protein:10,fat:3.3,fiber:25,gi:"Low",evidence:"Low",micro:"Piperine (significant), Iron (6.2mg), Manganese (8mg), Calcium (195mg), Phosphorus (310mg)",bio:"Piperine, piperamides, limonene, beta-caryophyllene",benefits:"Contains piperine — same bioavailability enhancement as black pepper (increases curcumin, selenium, and drug absorption). Anti-inflammatory. Antimicrobial in vitro. Widely used in peppersoup and bitter leaf soup.",use:"Nutrient bioavailability enhancement, anti-inflammatory, culinary spice (Nigerian soups)",limits:"Piperine drug interactions. Uterotonic — avoid in pregnancy at high doses."},
{id:135,name:"Red palm nut (Ofe akwu soup)",aka:"Elaeis guineensis fruit",emoji:"🌴",cat:"oil",catLabel:"African fruit/oil",african:true,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"Beta-carotene (500mcg/tbsp unrefined), Tocotrienols (20mg/tbsp), Vitamin K (8mcg), CoQ10",bio:"Alpha/beta-carotene, tocotrienols (neuroprotective), squalene, phospholipids",benefits:"Unrefined red palm oil: richest dietary source of provitamin A carotenoids globally — critical for combating VAD in sub-Saharan Africa. WHO-endorsed. Tocotrienols: RCT neuroprotective and LDL-lowering evidence. Traditional W. African cooking fat.",use:"Vitamin A deficiency (Africa), tocotrienols, neuroprotection, traditional cooking",limits:"50% saturated fat (palmitic, SFA) — raises LDL. Refining destroys all carotenoid benefit. Environmental/deforestation concern."},
{id:136,name:"Borlotti / Cranberry beans",aka:"Phaseolus vulgaris",emoji:"🫘",cat:"legume",catLabel:"Legume",african:false,top3:false,kcal:122,carbs:22.5,protein:8.7,fat:0.5,fiber:8.3,gi:"Low",evidence:"Moderate",micro:"Folate (130mcg), Iron (2.6mg), Potassium (401mg), Magnesium (45mg), Zinc (1mg)",bio:"Flavonols, anthocyanins, tannins, phytic acid, resistant starch",benefits:"Standard legume evidence (LDL-lowering, gut microbiome, glycaemic management). Particularly common in Mediterranean and Latin diets. Fibre content (8.3g/100g) supports satiety and bowel regularity.",use:"Cardiovascular, plant protein, gut health, Mediterranean diet",limits:"FODMAP. Phytic acid. Flatulence."},
{id:137,name:"Mung beans",aka:"Vigna radiata",emoji:"🫘",cat:"legume",catLabel:"Legume",african:false,top3:false,kcal:347,carbs:63,protein:23.9,fat:1.2,fiber:16.3,gi:"Low",evidence:"Moderate",micro:"Folate (625mcg — extraordinary), Iron (6.7mg), Manganese (1mg), Potassium (1246mg), Magnesium (189mg)",bio:"Vitexin, isovitexin, coumestrol, resistant starch, phenolic acids",benefits:"Highest folate of any common legume (625mcg/100g dry). Sprouted mung beans increase vitamin C and GABA. Anti-hypertensive peptides (after protein hydrolysis). Low GI with high satiety.",use:"Folate (especially pre-conception), plant protein, glycaemic management, sprouting",limits:"Sprout food safety (bacterial contamination risk if not thoroughly washed). Phytic acid. FODMAP in sensitive individuals."},
{id:138,name:"Pigeon peas",aka:"Cajanus cajan — Cowpea / Fio fio",emoji:"🫘",cat:"legume",catLabel:"African legume",african:true,top3:false,kcal:343,carbs:63,protein:21.7,fat:1.5,fiber:15,gi:"Low",evidence:"Low",micro:"Folate (423mcg), Iron (5.2mg), Potassium (1392mg), Magnesium (183mg), Zinc (2.8mg)",bio:"Cajanin stilbene acid (anti-cancer, anti-fungal), cajanol, isoflavones, phenolic acids",benefits:"Major legume of sub-Saharan Africa and South Asia. Cajanus stilbene compounds: anti-cancer and anti-fungal activity in vitro. High folate and iron — critical in malnourished populations. Drought-tolerant crop.",use:"Protein and iron (Africa/Asia), folate, anti-cancer (mechanistic), food security",limits:"Most evidence mechanistic or animal. Anti-nutrients require soaking/cooking."},
{id:139,name:"Fermented milk (Nono/Fura)",aka:"West African fermented milk",emoji:"🥛",cat:"fermented",catLabel:"African fermented dairy",african:true,top3:false,kcal:61,carbs:4.5,protein:3.3,fat:3.3,fiber:0,gi:"Low",evidence:"Low",micro:"Calcium (120mg), B12 (0.5mcg), Phosphorus (105mg), Riboflavin (0.17mg), Potassium (152mg)",bio:"Lactobacillus bulgaricus, L. acidophilus, Streptococcus thermophilus, lactic acid, bacteriocins",benefits:"Traditional fermented milk of Fulani pastoralists across W. Africa. Similar probiotic diversity to kefir/yogurt. Lactic acid bacteria improve lactose tolerance. Traditional combination with millet (fura da nono) provides complementary protein.",use:"Gut microbiome, probiotic (W. Africa), calcium, traditional dairy",limits:"Limited clinical studies specific to this product. Variable quality. Cold chain requirements for live cultures."},
{id:140,name:"Tilapia",aka:"Oreochromis niloticus",emoji:"🐟",cat:"fish",catLabel:"African freshwater fish",african:true,top3:false,kcal:128,carbs:0,protein:26,fat:2.7,fiber:0,gi:"Low",evidence:"Moderate",micro:"Selenium (54.4mcg), Phosphorus (204mg), Potassium (302mg), B12 (1.6mcg), Niacin (4.5mg)",bio:"Omega-3 (300mg/100g — lower than marine fish), omega-6 (notable), complete protein, carnosine",benefits:"Most consumed fish in sub-Saharan Africa. High protein with good selenium. Lower omega-3 than marine fish but excellent accessible protein source where marine fish unavailable. Affordable and widely farmed.",use:"Lean protein, selenium, affordable aquaculture protein (Africa), B12",limits:"Higher omega-6:omega-3 ratio than marine fish. Farm-raised quality depends on feed. Lower omega-3 — not equivalent to salmon."},
{id:141,name:"Catfish",aka:"Clarias gariepinus — African catfish",emoji:"🐟",cat:"fish",catLabel:"African freshwater fish",african:true,top3:false,kcal:116,carbs:0,protein:18.7,fat:4.3,fiber:0,gi:"Low",evidence:"Low",micro:"Selenium (11.5mcg), Phosphorus (262mg), Potassium (348mg), B12 (1.8mcg), Calcium (14mg)",bio:"Omega-3 (400mg/100g), omega-6, phospholipids, carnosine, taurine",benefits:"Second most farmed fish in Africa. Good protein source with moderate omega-3. Traditional smoked catfish (eja osan in Yoruba) used widely in soups. Cultural staple for protein across W./C./E. Africa.",use:"Protein (Africa), B12, lean fish protein, culinary staple",limits:"Very limited human clinical studies. Smoked versions may contain polycyclic aromatic hydrocarbons (PAHs). Farm-raised quality depends on environment."},
{id:142,name:"Periwinkle",aka:"Tympanotonus fuscatus — Isam",emoji:"🐚",cat:"seafood",catLabel:"African shellfish",african:true,top3:false,kcal:89,carbs:5.1,protein:15.3,fat:1.3,fiber:0,gi:"Low",evidence:"Low",micro:"Iron (9.5mg), Zinc (2.5mg), Calcium (25mg), Selenium (20mcg), Copper (0.5mg)",bio:"Haem iron (highly bioavailable), zinc, taurine, chitin (shell)",benefits:"Major traditional protein and iron source in Rivers/Delta States of Nigeria. Haem iron: high bioavailability (25% absorption rate) — addresses anaemia. Zinc supports immunity and wound healing. Shell used in traditional medicine.",use:"Iron repletion (anaemia), zinc, accessible shellfish protein (S. Nigeria)",limits:"Water quality dependent — accumulates pollutants if harvested from contaminated water. Shell preparation time. Limited clinical evidence."},
{id:143,name:"Scent leaves (Basil variant)",aka:"Ocimum gratissimum",emoji:"🌿",cat:"leaf",catLabel:"Nigerian herb",african:true,top3:false,kcal:31,carbs:3.9,protein:3.3,fat:0.4,fiber:1.8,gi:"Low",evidence:"Low",micro:"Vitamin C (23mg), Iron (2.4mg), Calcium (76mg), Beta-carotene (125mcg RAE), Zinc (0.5mg)",bio:"Eugenol, thymol, rosmarinic acid, linalool, geraniol",benefits:"Eugenol: COX-2 inhibitor (anti-inflammatory), antimicrobial (S. aureus, E. coli, Candida). Rosmarinic acid: antioxidant, anti-inflammatory. Used in pepper soup, egusi soup, and ofe akwu.",use:"Anti-inflammatory, antimicrobial, culinary herb (Nigerian cuisine)",limits:"Mostly in vitro evidence. Eugenol hepatotoxic at high doses. Anticoagulant interaction."},
{id:144,name:"Calabash nutmeg",aka:"Monodora myristica — Ehuru",emoji:"🌿",cat:"spice",catLabel:"African spice",african:true,top3:false,kcal:525,carbs:28,protein:8,fat:40,fiber:5,gi:"Low",evidence:"Low",micro:"Iron (5mg), Calcium (90mg), Magnesium (110mg), Zinc (2.1mg), Phosphorus (240mg)",bio:"Myristicin (psychoactive at high dose), elemicin, terpenes, fixed oils",benefits:"Traditional spice in Igbo and Efik cuisine. Antimicrobial activity (in vitro). Anti-inflammatory properties. Myristicin at normal culinary doses is safe. Essential oils have demonstrated antifungal activity.",use:"Culinary spice (Nigerian soups), antimicrobial, traditional medicine",limits:"Myristicin: psychoactive and potentially toxic at high doses (>5g nutmeg equivalent). Limited human evidence."},
{id:145,name:"Alligator pepper (Atare)",aka:"Aframomum melegueta",emoji:"🌿",cat:"spice",catLabel:"African spice",african:true,top3:false,kcal:291,carbs:42,protein:10,fat:8.9,fiber:15,gi:"Low",evidence:"Low",micro:"Iron (6.9mg), Calcium (115mg), Phosphorus (275mg), Zinc (2.8mg), Magnesium (95mg)",bio:"6-paradol, 6-gingerol (same as ginger), 6-shogaol, 6-gingerdiol, tannins, saponins",benefits:"Contains same bioactives as ginger (gingerols, shogaols) — anti-inflammatory and antioxidant. 6-Paradol: anti-cancer activity (in vitro). Traditional ceremonial and medicinal use across W. Africa. Antimicrobial.",use:"Anti-inflammatory (gingerol compounds), antimicrobial, traditional W. African spice, antioxidant",limits:"Limited human clinical trials. Very high iron — interaction with iron-chelating medications. Uterotonic at high doses."},
{id:146,name:"Ogiri okpei (Castor bean ferment)",aka:"Ricinus communis (fermented seed)",emoji:"🌿",cat:"fermented",catLabel:"Nigerian fermented condiment",african:true,top3:false,kcal:376,carbs:35,protein:19,fat:19,fiber:7,gi:"Low",evidence:"Low",micro:"Iron (5.8mg), Calcium (110mg), Zinc (4.1mg), Potassium (900mg), Magnesium (170mg)",bio:"Ricinoleic acid, amino acids from fermentation, flavonoids, phenols",benefits:"Fermented condiment used in Igbo soups. Fermentation removes ricin toxin (unfermented castor beans contain this deadly toxin). High protein through fermentation. Traditional W. African umami base.",use:"Culinary condiment (Igbo cuisine), protein, iron",limits:"Ricin concern — only properly processed ogiri is safe. Do NOT confuse with unfermented castor beans (fatal). Limited clinical evidence."},
{id:147,name:"Balanites (Desert date)",aka:"Balanites aegyptiaca — Aduwa",emoji:"🌳",cat:"fruit",catLabel:"African botanical",african:true,top3:false,kcal:329,carbs:57,protein:7,fat:9,fiber:9,gi:"Low",evidence:"Low",micro:"Iron (2.3mg), Calcium (75mg), Phosphorus (200mg), Magnesium (80mg), Zinc (1.1mg)",bio:"Diosgenin, balanitin (steroidal saponins), tocopherols, MUFA",benefits:"Desert-adapted food tree of Sahel. Balanitin saponins: anti-parasitic (anti-schistosomiasis activity demonstrated). Traditional malaria management. Seeds used for oil and protein. Food and medicine across Sahel.",use:"Traditional anti-parasitic, food security (Sahel), protein, iron",limits:"Evidence almost entirely traditional or in vitro. Saponins bitter. Preparation required."},
{id:148,name:"Baobab leaf powder",aka:"Adansonia digitata — leaves",emoji:"🌿",cat:"leaf",catLabel:"African superfood",african:true,top3:false,kcal:275,carbs:47,protein:14,fat:2.3,fiber:17,gi:"Low",evidence:"Moderate",micro:"Calcium (307mg), Iron (17mg), Vitamin C (84mg), Magnesium (120mg), Potassium (1580mg)",bio:"Polyphenols (catechins, ferulic acid), beta-carotene, flavonoids, quercetin",benefits:"One of the most iron-rich green foods per gram. Very high calcium for a leaf. Vitamin C enhances iron bioavailability when co-consumed. Used across Sahel as sauce ingredient. WHO has documented nutritional benefit for combating malnutrition.",use:"Iron and calcium deficiency (Sahel), vitamin C, anti-malnutrition, maternal nutrition",limits:"Limited large RCTs. Drying method affects nutrient content. Tastes strongly of chlorophyll."},
{id:149,name:"Shea butter (Unrefined)",aka:"Vitellaria paradoxa — Ori",emoji:"🌰",cat:"oil",catLabel:"African fat",african:true,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Low",micro:"Vitamin E (15mg), Vitamin A (trace, through minor carotenoids), Triterpenes (lupeol, amyrin), Phytosterols",bio:"Stearic acid (SFA — neutral cardiac effect), oleic acid (MUFA), lupeol (anti-inflammatory), triterpenes",benefits:"Unusual lipid profile: ~50% stearic acid (which converts to oleic acid — neutral or beneficial cardiac effect, unlike palmitic acid). Lupeol: anti-inflammatory and anti-cancer in vitro. Traditional cooking fat and skin care across W. Africa.",use:"Traditional cooking fat (W. Africa), anti-inflammatory (lupeol), skin health, neutral SFA",limits:"High caloric density. Most clinical evidence for skin application, not oral. Limited dietary RCTs."},
{id:150,name:"Fura da nono (Millet-milk mix)",aka:"Traditional Fulani drink",emoji:"🥛",cat:"fermented",catLabel:"African traditional food",african:true,top3:false,kcal:105,carbs:18,protein:4.5,fat:2.2,fiber:2.1,gi:"Low",evidence:"Low",micro:"Calcium (95mg), Iron (2.1mg), Potassium (180mg), Phosphorus (88mg), B vitamins (from fermentation)",bio:"Lactic acid bacteria, GABA, beta-glucans (from millet), bioactive peptides",benefits:"Combination provides complementary protein (millet + milk), probiotic bacteria, and prebiotic fibres. Traditional meal across Sahel. Provides complete nutrition in a single preparation. Cultural food security crop.",use:"Traditional complete meal (Sahel), probiotic, complementary protein, calcium",limits:"Very limited clinical evidence. Cold chain needed for fermented milk component. Variable nutritional content."},

{id:151,name:"Black-eyed Susan (Agathi leaves)",aka:"Sesbania grandiflora",emoji:"🌿",cat:"leaf",catLabel:"African leaf",african:true,top3:false,kcal:37,carbs:3.8,protein:5.5,fat:0.4,fiber:2.7,gi:"Low",evidence:"Low",micro:"Calcium (1,130mg — extraordinary), Iron (3.9mg), Vitamin A (132mcg RAE), Vitamin C (169mg), Protein (5.5g/100g)",bio:"Kaempferol, quercetin, robinetinidol, gallic acid, erythritol",benefits:"Extraordinary calcium content (highest of any leaf at 1,130mg/100g). Very high vitamin C for a cooked leaf. Antimicrobial. Consumed in E. Africa and South Asia.",use:"Calcium (dairy-free), vitamin C, antimicrobial, iron",limits:"Strong flavour. Saponins bitter. Limited human evidence."},
{id:152,name:"Fluted pumpkin (Ugu) seeds",aka:"Telfairia occidentalis seeds",emoji:"🌱",cat:"nut",catLabel:"Nigerian seed",african:true,top3:false,kcal:472,carbs:13,protein:28,fat:35,fiber:4.6,gi:"Low",evidence:"Low",micro:"Iron (3.8mg), Zinc (4.3mg), Magnesium (170mg), Phosphorus (450mg), Calcium (55mg)",bio:"Linoleic acid (omega-6), oleic acid (MUFA), flavonoids, tocopherols",benefits:"High protein and healthy fats. Iron and zinc for immunity. Traditional cooking across W. Africa. Same plant as ugu leaves but seeds nutritionally distinct.",use:"Protein, zinc, iron, cooking oil, W. African seed use",limits:"High omega-6. Calorie-dense. Limited clinical evidence."},
{id:153,name:"Gongura (Sorrel leaves)",aka:"Hibiscus sabdariffa leaves — Mgbo",emoji:"🌿",cat:"leaf",catLabel:"African leaf",african:true,top3:false,kcal:30,carbs:4.2,protein:2.1,fat:0.4,fiber:3,gi:"Low",evidence:"Low",micro:"Iron (3.6mg), Calcium (98mg), Vitamin C (31mg), Vitamin A (110mcg RAE), Potassium (250mg)",bio:"Anthocyanins, quercetin, hibiscus acid, polysaccharides",benefits:"Related to hibiscus — shares antioxidant and BP-lowering bioactives. High iron for a leaf. Used across E. Africa, Nigeria, and South Asia. Folate and iron support maternal health.",use:"Iron, Vitamin C, antioxidant, traditional leafy vegetable",limits:"Sour taste from oxalic and hibiscus acids. Oxalate content. Uterotonic at high doses — caution in pregnancy."},
{id:154,name:"Velvet bean",aka:"Mucuna pruriens — Werepe / Agbara",emoji:"🫘",cat:"legume",catLabel:"African legume",african:true,top3:false,kcal:370,carbs:57,protein:23.7,fat:3.8,fiber:14,gi:"Low",evidence:"Moderate",micro:"Iron (7.5mg), Phosphorus (388mg), Magnesium (215mg), Zinc (3.5mg), Levodopa (L-DOPA) content varies",bio:"L-DOPA (dopamine precursor — 4–7% in seeds), serotonin, glutathione, trypsin inhibitors",benefits:"Natural L-DOPA source — RCTs show Mucuna extract reduces Parkinson's symptoms with fewer side effects than synthetic levodopa. Significant anti-Parkinson's evidence (RCTs). High protein and iron. Traditional across W./C. Africa.",use:"Parkinson's disease (adjunct), high protein, iron, L-DOPA supplementation",limits:"L-DOPA drug interaction — very dangerous with conventional levodopa/carbidopa without medical supervision. Variable L-DOPA content. Anti-nutritional factors require processing. Trypsin inhibitors."},
{id:155,name:"Cocoyam (Taro)",aka:"Colocasia esculenta",emoji:"🍠",cat:"veg",catLabel:"African root",african:true,top3:false,kcal:112,carbs:26.5,protein:1.5,fat:0.2,fiber:4.1,gi:"Medium",evidence:"Low",micro:"Potassium (591mg), Vitamin E (2.9mg), Vitamin B6 (0.3mg), Manganese (0.4mg), Copper (0.2mg)",bio:"Resistant starch, polyphenols, trypsin inhibitors, cryptoxanthin",benefits:"High potassium and vitamin E. Resistant starch supports gut microbiome. Common staple across W./C. Africa. Eaten as alternative to yam and cassava.",use:"Potassium, energy, resistant starch, gut microbiome, vitamin E",limits:"Contains calcium oxalate crystals — mouth itching if improperly cooked. Requires thorough cooking. Limited human RCTs."},
{id:156,name:"Groundnut soup (peanut soup)",aka:"Traditional West African peanut stew",emoji:"🥣",cat:"other",catLabel:"Traditional African dish",african:true,top3:false,kcal:178,carbs:8,protein:7,fat:14,fiber:2.5,gi:"Low",evidence:"Low",micro:"Niacin (3.5mg), Magnesium (50mg), Vitamin E (4mg), Folate (25mcg), Iron (1.5mg)",bio:"Resveratrol, p-coumaric acid, vitamin E, monounsaturated fats, polyphenols",benefits:"Nutritionally dense traditional meal — peanut + tomatoes + leafy greens combination provides protein, vitamin E, lycopene (cooked tomato), and carotenoids. Fat content enhances fat-soluble vitamin absorption from co-consumed greens.",use:"Complete nutrient meal, carotenoid absorption, protein, vitamin E",limits:"High calorie density. Variable nutritional content depending on preparation. Aflatoxin risk in poorly stored peanuts."},
{id:157,name:"Black-eyed beans (dried)",aka:"Vigna unguiculata — Ewa",emoji:"🫘",cat:"legume",catLabel:"African legume",african:true,top3:false,kcal:116,carbs:21,protein:7.7,fat:0.5,fiber:6.6,gi:"Low",evidence:"Moderate",micro:"Folate (208mcg), Iron (2.5mg), Potassium (278mg), Magnesium (53mg), Zinc (1.3mg)",bio:"Polyphenols, flavonoids, saponins, resistant starch, condensed tannins",benefits:"Primary protein crop across W. Africa. Folate critical for maternal health. Standard legume evidence: CVD, LDL, glycaemic management. Key ingredient in moi moi and akara.",use:"Plant protein (W. Africa), folate, cardiovascular, glycaemic control",limits:"Anti-nutrients require soaking. FODMAP. Flatulence. Moderate digestibility."},
{id:158,name:"Soybean oil",aka:"Glycine max — refined",emoji:"🫙",cat:"oil",catLabel:"Oil",african:false,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Moderate",micro:"Vitamin E (8.2mg), Vitamin K (183.9mcg), Phytosterols (370mg), PUFA (omega-6 dominant)",bio:"Linoleic acid (omega-6 dominant, 51%), alpha-linolenic acid (ALA, 7%), phytosterols, tocopherols",benefits:"Phytosterols reduce cholesterol absorption. ALA content notable. Vit K highest of vegetable oils. Used for lipid panel improvement when replacing SFA.",use:"Phytosterol intake, cholesterol reduction, cooking oil",limits:"High omega-6:omega-3 ratio (7:1) — pro-inflammatory at high intake. Hexane extraction. Hydrogenated soybean oil (partially hydrogenated) contains trans fats — avoid."},
{id:159,name:"Apple",aka:"Malus domestica",emoji:"🍎",cat:"fruit",catLabel:"Fruit",african:false,top3:false,kcal:52,carbs:13.8,protein:0.3,fat:0.2,fiber:2.4,gi:"Low",evidence:"Moderate",micro:"Vitamin C (4.6mg), Potassium (107mg), Quercetin (4.5mg), Pectin (soluble fibre), Catechins",bio:"Quercetin (highest fruit source per serving), chlorogenic acid, phloridzin, ursolic acid, pectin",benefits:"'An apple a day' — large cohort: apple consumers have lower all-cause mortality. Phloridzin: sodium-glucose transporter inhibitor (same mechanism as SGLT2 inhibitors — weak). Pectin is a prebiotic. Quercetin: anti-inflammatory and anti-histamine.",use:"Cardiovascular, gut microbiome (pectin), anti-inflammatory, glycaemic management",limits:"Pesticide residue (dirty dozen). Fructose content. Remove skin for low oxalate — but skin contains quercetin."},
{id:160,name:"Grapes",aka:"Vitis vinifera",emoji:"🍇",cat:"fruit",catLabel:"Fruit",african:false,top3:false,kcal:69,carbs:18,protein:0.7,fat:0.2,fiber:0.9,gi:"Medium",evidence:"Moderate",micro:"Vitamin C (10.8mg), Vitamin K (14.6mcg), Copper (0.1mg), B6 (0.1mg), Potassium (191mg)",bio:"Resveratrol (skin), pterostilbene (more bioavailable resveratrol analogue), quercetin, OPCs (oligomeric proanthocyanidins), anthocyanins (red/purple)",benefits:"Resveratrol: sirtuin-1 activator — longevity pathway activation (most evidence from animal models). OPCs: RCT evidence for improved blood viscosity and endothelial function. Seeds contain high OPCs. Grape seed extract: evidence for venous insufficiency.",use:"Cardiovascular, anti-ageing pathways, venous insufficiency, antioxidant",limits:"Higher sugar than berries. Pesticide residue (dirty dozen). Resveratrol human bioavailability is low."},
{id:161,name:"Pear",aka:"Pyrus communis",emoji:"🍐",cat:"fruit",catLabel:"Fruit",african:false,top3:false,kcal:57,carbs:15.2,protein:0.4,fat:0.1,fiber:3.1,gi:"Low",evidence:"Low",micro:"Vitamin C (4.3mg), Vitamin K (4.4mcg), Potassium (119mg), Copper (0.1mg), Folate (7mcg)",bio:"Hydroxycinnamic acids, quercetin, arbutin (skin), pectin, sorbitol",benefits:"One of lowest-GI fruits. Pectin prebiotic effect. Quercetin in skin. High water content aids satiety. Low allergen fruit — suitable in elimination diets.",use:"Weight management, gut health (pectin), low-allergen fruit, satiety",limits:"Sorbitol — GI symptoms (gas, diarrhoea) in sorbitol-sensitive individuals. Low in micronutrients."},
{id:162,name:"Cherries",aka:"Prunus avium/cerasus",emoji:"🍒",cat:"fruit",catLabel:"Berry",african:false,top3:false,kcal:63,carbs:16,protein:1.1,fat:0.2,fiber:2.1,gi:"Low",evidence:"Moderate",micro:"Vitamin C (7mg), Potassium (222mg), Melatonin (variable), Anthocyanins, Copper (0.06mg)",bio:"Anthocyanins (cyanidin — anti-inflammatory), melatonin, quercetin, hydroxycinnamates",benefits:"RCT: tart cherry juice reduced muscle soreness and improved recovery after exercise. Melatonin content supports sleep quality (small RCTs). Anthocyanins: COX-2 inhibition at high concentration — gout pain reduction evidence.",use:"Exercise recovery, sleep quality, anti-inflammatory, gout (tart cherry)",limits:"Tart cherry — juice high in sugar. Melatonin content varies enormously. Sweet cherries have lower bioactive content."},
{id:163,name:"Cranberries",aka:"Vaccinium macrocarpon",emoji:"🍇",cat:"fruit",catLabel:"Berry",african:false,top3:false,kcal:46,carbs:12.2,protein:0.4,fat:0.1,fiber:4.6,gi:"Low",evidence:"High",micro:"Vitamin C (13.3mg), Vitamin K (5.1mcg), Vitamin E (1.2mg), Manganese (0.4mg), Copper (0.06mg)",bio:"PAC-A (proanthocyanidin type A — unique anti-adhesion), quercetin, ursolic acid, citric acid",benefits:"Type-A PACs are unique to cranberries — RCT evidence for UTI prevention (anti-adhesion of E. coli to uroepithelium). 36mg PAC/day: established effective dose. Meta-analysis confirms UTI risk reduction.",use:"UTI prevention (recurrent), antioxidant, anti-adhesion, uroepithelial health",limits:"Cranberry juice high in sugar — use supplements or unsweetened juice. Drug interaction: warfarin (INR elevation). Does not treat active UTI."},
{id:164,name:"Elderberries",aka:"Sambucus nigra",emoji:"🫐",cat:"fruit",catLabel:"Berry",african:false,top3:false,kcal:73,carbs:18.4,protein:0.7,fat:0.5,fiber:7,gi:"Low",evidence:"Moderate",micro:"Vitamin C (36mg), Vitamin A (30mcg RAE), Iron (1.6mg), Vitamin B6 (0.2mg), Potassium (280mg)",bio:"Cyanidin-3-glucoside, cyanidin-3-sambubioside (anthocyanins), quercetin, sambucine, rutin",benefits:"Meta-analysis and RCTs: elderberry extract reduces cold/flu duration by 1–2 days and symptom severity. Anthocyanins inhibit viral haemagglutinin attachment. Immune modulation via cytokine induction.",use:"Immune support, viral illness (cold/flu duration reduction), antioxidant",limits:"Raw elderberries contain sambunigrin (cyanogenic glycoside) — cook before consumption. Cytokine-stimulating effect — theoretical concern in autoimmune disease. Not a flu treatment."},
{id:165,name:"Açaí",aka:"Euterpe oleracea",emoji:"🫐",cat:"fruit",catLabel:"Berry",african:false,top3:false,kcal:70,carbs:4,protein:1.5,fat:5,fiber:2,gi:"Low",evidence:"Moderate",micro:"Vitamin A (15mcg RAE), Calcium (35mg), Iron (0.8mg), Sodium (7mg), Anthocyanins (320mg/100g)",bio:"Cyanidin-3-glucoside, cyanidin-3-rutinoside (anthocyanins), ellagic acid, polyphenols, MUFA, PUFA",benefits:"Highest ORAC value of any fruit (97,000 units/100g). Multiple RCTs: açaí reduces LDL, TG, and systemic inflammation. Antioxidant capacity reduces postprandial oxidative stress. High healthy fat content.",use:"Antioxidant, cardiovascular, anti-inflammatory, highest dietary antioxidant density",limits:"Very expensive. Commercial açaí bowls high in added sugar and calories. Imported and not accessible in Africa."},
{id:166,name:"Apricots",aka:"Prunus armeniaca",emoji:"🍑",cat:"fruit",catLabel:"Fruit",african:true,top3:false,kcal:48,carbs:11.1,protein:1.4,fat:0.4,fiber:2,gi:"Low",evidence:"Low",micro:"Vitamin A (96mcg RAE), Vitamin C (10mg), Potassium (259mg), Copper (0.1mg), Iron (0.4mg)",bio:"Beta-carotene (1094mcg), lycopene (trace), catechins, chlorogenic acid",benefits:"High provitamin A — particularly significant for communities with vitamin A deficiency. Dried apricots: very concentrated micronutrients. Iron content (dried: 2.7mg/100g) supports haematopoiesis. Cultivated in N. Africa.",use:"Vitamin A, potassium, iron (dried), antioxidant",limits:"Dried apricots: very high sugar and calorie density. Medium-high GI when dried. Sulphite preservatives in bright orange varieties."},
{id:167,name:"Pomelo",aka:"Citrus maxima",emoji:"🍊",cat:"fruit",catLabel:"Citrus fruit",african:false,top3:false,kcal:38,carbs:9.6,protein:0.8,fat:0.1,fiber:1,gi:"Low",evidence:"Low",micro:"Vitamin C (61mg), Potassium (216mg), B6 (0.4mg), Folate (29mcg), Copper (0.1mg)",bio:"Naringenin, nootkatone, lycopene (pink variety), flavonoids, limonoids",benefits:"High vitamin C. Nootkatone — aromatic terpene. Limonoids have anti-cancer activity in vitro. Lower naringenin content than grapefruit — fewer drug interactions.",use:"Vitamin C, antioxidant, citrus fibre, Asian/African traditional fruit",limits:"Weaker drug interactions than grapefruit but still CYP3A4 concern. Low fibre per serving."},
{id:168,name:"Moringa powder",aka:"Moringa oleifera — leaf powder",emoji:"🌿",cat:"leaf",catLabel:"African supplement",african:true,top3:false,kcal:329,carbs:38,protein:27,fat:6.4,fiber:19.2,gi:"Low",evidence:"Moderate",micro:"Iron (28mg — among highest of any food powder), Calcium (2003mg), Vitamin C (17mg dried), Vitamin A (378mcg RAE), Potassium (1324mg)",bio:"Isothiocyanates (glucoraphanin, glucomoringin), quercetin, chlorogenic acid, moringin, niaziminin",benefits:"WHO/UNICEF-endorsed for combating malnutrition. Human RCTs: moringa powder improves glycaemia in T2D, reduces inflammatory markers, and improves nutritional status in deficient populations. Most concentrated nutrient source per gram of any African food.",use:"Malnutrition, iron and calcium deficiency (Africa), blood glucose, anti-inflammatory",limits:"Strong chlorophyll taste. Root bark/high extract doses toxic/abortifacient. Drying method affects nutrient retention. Evidence from small trials."},
{id:169,name:"Palm kernel oil",aka:"Elaeis guineensis — kernel",emoji:"🌴",cat:"oil",catLabel:"African oil",african:true,top3:false,kcal:884,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"Low",micro:"Vitamin E (0.3mg — much lower than palm fruit oil), Lauric acid (48%), Myristic acid (16%)",bio:"Lauric acid (C12 — antimicrobial, raises HDL), myristic acid, caprylic/capric acid (MCT-like)",benefits:"High in lauric acid — same as coconut oil. Raises HDL-C. MCT component metabolised rapidly. Traditional use in cooking across W./C. Africa.",use:"Traditional cooking fat (W. Africa), lauric acid, MCT energy",limits:"82% saturated fat — highly atherogenic (LDL-raising palmitic + myristic acids). Lower Vit E than red palm fruit oil. Environmental impact."},
{id:170,name:"Jollof rice (traditional)",aka:"One-pot rice dish — W. Africa",emoji:"🍚",cat:"other",catLabel:"Traditional African dish",african:true,top3:false,kcal:178,carbs:31,protein:4.8,fat:4.6,fiber:1.5,gi:"Medium",evidence:"Low",micro:"Lycopene (from tomatoes — cooked, 3–5mg/serving), Vitamin C (from peppers), Iron (1.5mg), Potassium (250mg)",bio:"Lycopene (cooked tomato), capsanthin, allicin (from onion/garlic), polyphenols (tomato, pepper)",benefits:"Traditional Nigerian/Ghanaian one-pot meal. When made with whole tomatoes, onions, garlic, and peppers: lycopene content is significant (cooking increases bioavailability 3–4×). Garlic and onion provide cardiovascular bioactives. Complete meal when served with protein.",use:"Cultural dietary staple, lycopene, cardiovascular bioactives",limits:"Glycaemic index medium-high when made with white rice. Fat content depends on oil quantity. Very variable nutritional content depending on recipe."},
