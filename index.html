<!DOCTYPE html>
<html lang="en">
<head>
<meta name="description" content="NutriForge Africa v6 — Evidence-Based Food Database. 365 foods, 154 African, 25 clinical conditions, drug interactions, AI nutrition assistant.">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriForge Africa · v6 · 365 Foods</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══ NUTRIFORGE v6 — MINIMAL REDESIGN ═══ */
*{box-sizing:border-box;margin:0;padding:0}

:root {
  --card-bg: #FAFAF8;
  --card-border: #E8E5DE;
  --card-border-hover: #C8C3B8;
  --card-shadow: 0 1px 3px rgba(0,0,0,.04);
  --card-shadow-hover: 0 6px 20px rgba(0,0,0,.08);
  --card-shadow-open: 0 10px 28px rgba(0,0,0,.1);
  --accent-green: #1D5C3A;
  --accent-green-light: #E8F2EC;
  --accent-amber: #B05E1A;
  --accent-amber-light: #FDF0E6;
  --text-primary: #1A1A17;
  --text-secondary: #6B6860;
  --text-tertiary: #A09B93;
  --surface: #F4F2EE;
  --surface-2: #ECEAE4;
  --red: #C0392B;
  --red-light: #FDECEA;
  --orange-light: #FFF4E6;
  --body-bg: #f5f4f0;
  --header-bg: #1a1a18;
  --header-fg: #f5f4f0;
}

body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--body-bg);color:var(--text-primary);min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:inherit}

/* ── HEADER — unified bar ── */
.header{background:var(--header-bg);color:var(--header-fg);padding:0 1.5rem;height:52px;position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:12px}
.header h1{font-size:16px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;flex-shrink:0}
.header .search-wrap{flex:1;max-width:420px;position:relative}
.header .search-wrap input{width:100%;font-size:13px;padding:7px 10px 7px 30px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.08);color:#f5f4f0;outline:none;transition:all .15s}
.header .search-wrap input::placeholder{color:rgba(255,255,255,.4)}
.header .search-wrap input:focus{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)}
.header .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.4;pointer-events:none}
.header-actions{display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0}
.ha-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);transition:all .12s}
.ha-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.ha-btn.active-drawer{background:rgba(255,255,255,.2);color:#fff}
.overflow-menu-wrap{position:relative}
.overflow-menu{display:none;position:absolute;top:42px;right:0;background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:200px;padding:4px 0;z-index:300}
.overflow-menu.open{display:block}
.overflow-menu button{display:block;width:100%;text-align:left;padding:8px 14px;font-size:12px;color:var(--text-primary);transition:background .1s}
.overflow-menu button:hover{background:var(--surface)}
.overflow-menu hr{border:none;border-top:1px solid var(--card-border);margin:4px 0}

/* ── FILTER ROW — scrolls with content ── */
.filter-row{display:flex;align-items:center;gap:6px;padding:10px 1.5rem;background:var(--card-bg);border-bottom:1px solid var(--card-border);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0}
.chip.active{background:var(--text-primary);color:var(--card-bg);border-color:var(--text-primary);font-weight:600}
.chip.african.active{background:#854F0B;color:#fff;border-color:#854F0B}
.filter-select{font-size:11px;padding:4px 8px;border:1px solid var(--card-border);border-radius:8px;background:var(--card-bg);color:var(--text-primary);cursor:pointer;outline:none;flex-shrink:0}
.filter-divider{width:1px;height:20px;background:var(--card-border);flex-shrink:0;margin:0 2px}
.filters-popover-wrap{position:relative;flex-shrink:0}
.filters-popover{display:none;position:absolute;top:36px;left:0;background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:14px 16px;z-index:250;min-width:220px}
.filters-popover.open{display:block}
.fp-group{margin-bottom:10px}
.fp-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);display:block;margin-bottom:4px}
.fp-select{width:100%;font-size:12px;padding:6px 8px;border:1px solid var(--card-border);border-radius:8px;background:var(--card-bg);color:var(--text-primary);cursor:pointer;outline:none}
.fp-reset{font-size:11px;padding:6px 14px;border-radius:8px;border:1px solid var(--red);color:var(--red);background:transparent;width:100%;margin-top:4px;cursor:pointer;transition:all .12s}
.fp-reset:hover{background:var(--red);color:#fff}
.filter-badge{font-size:9px;background:var(--accent-green);color:#fff;padding:1px 5px;border-radius:8px;margin-left:3px;font-weight:700}

/* ── CONDITION STRIP ── */
.cond-strip{display:flex;gap:5px;padding:8px 1.5rem;background:var(--card-bg);border-bottom:1px solid var(--card-border);overflow-x:auto;scrollbar-width:none;align-items:center}
.cond-strip::-webkit-scrollbar{display:none}
.cond-strip-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);white-space:nowrap;margin-right:4px;flex-shrink:0}
.cond-pill{font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0}
.cond-pill:hover{background:var(--surface-2);color:var(--text-primary)}
.cond-pill.active{background:var(--text-primary);color:var(--card-bg);border-color:var(--text-primary);font-weight:600}

/* ── CONTEXT BADGE ── */
.context-badge{font-size:12px;color:var(--text-secondary);padding:8px 1.5rem;display:flex;align-items:center;gap:8px}
.context-badge strong{color:var(--text-primary)}
.context-badge button{font-size:11px;padding:3px 10px;border-radius:15px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer}

/* ── MAIN ── */
.main{padding:1rem 1.5rem;position:relative}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:2rem}

/* ── CARD — minimal preview ── */
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;cursor:pointer;transition:box-shadow .2s,border-color .2s,transform .15s;overflow:hidden;position:relative;box-shadow:var(--card-shadow);font-family:'DM Sans',system-ui,sans-serif}
.card:hover{box-shadow:var(--card-shadow-hover);border-color:var(--card-border-hover);transform:translateY(-1px)}
.card.open{box-shadow:var(--card-shadow-open);border-color:var(--text-primary);transform:none}
.card.african-food{border-left:3px solid var(--accent-amber)}
.card.in-compare{outline:2px solid #2563EB;outline-offset:1px}
.card.in-plate{outline:2px solid var(--accent-green);outline-offset:1px}
.card-top{padding:12px 14px 0;display:flex;align-items:flex-start;gap:10px}
.card-emoji-wrap{width:40px;height:40px;border-radius:12px;background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;line-height:1}
.card-identity{flex:1;min-width:0;padding-top:1px}
.card-name{font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:700;color:var(--text-primary);line-height:1.25;margin-bottom:1px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-cat-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:2px}
.card-cat{font-size:8px;font-weight:600;padding:1px 6px;border-radius:20px;letter-spacing:.03em;text-transform:uppercase}
.card-african-tag{font-size:8px;color:var(--accent-amber);font-weight:600}

/* Macro bar */
.card-macros{display:grid;grid-template-columns:repeat(5,1fr);margin:8px 0 0;border-top:1px solid var(--card-border);border-bottom:1px solid var(--card-border)}
.mac-item{text-align:center;padding:6px 2px}
.mac-item:not(:last-child){border-right:1px solid var(--card-border)}
.mac-val{display:block;font-size:13px;font-weight:600;color:var(--text-primary);line-height:1;font-variant-numeric:tabular-nums}
.mac-lbl{display:block;font-size:7px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

/* Longevity bar — minimal */
.card-scores{display:flex;align-items:center;gap:6px;padding:6px 14px 4px}
.longevity-bar-wrap{flex:1;display:flex;align-items:center;gap:5px}
.longevity-bar-track{flex:1;height:3px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.longevity-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.ls-fill-5{background:linear-gradient(90deg,#1D5C3A,#34A865)}.ls-fill-4{background:linear-gradient(90deg,#2D7D46,#56C27A)}.ls-fill-3{background:linear-gradient(90deg,#6B7280,#9CA3AF)}.ls-fill-2{background:linear-gradient(90deg,#B45309,#D97706)}.ls-fill-1{background:linear-gradient(90deg,#7F1D1D,#B91C1C)}
.longevity-label{font-size:8px;color:var(--text-tertiary)}
.longevity-score{font-size:10px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums;min-width:20px}

/* Hover actions — appear on hover */
.card-hover-actions{display:flex;gap:3px;padding:0 12px 8px;justify-content:flex-end;opacity:0;transition:opacity .15s;height:0;overflow:hidden}
.card:hover .card-hover-actions,.card.open .card-hover-actions{opacity:1;height:auto;padding:4px 12px 10px}
.ca-btn{font-size:10px;font-weight:500;padding:4px 10px;border-radius:16px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;transition:all .1s;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.ca-btn:hover{background:var(--text-primary);color:var(--card-bg);border-color:var(--text-primary)}
.ca-btn.fav-active{color:#F59E0B;border-color:#FDE68A;background:#FFFBEB}
.ca-btn.compare-active{background:#DBEAFE;color:#1D4ED8;border-color:#93C5FD}
.ca-btn.plate-active{background:var(--accent-green-light);color:var(--accent-green);border-color:#86EFAC}
.stars-mini{font-size:8px;color:#F59E0B;letter-spacing:0;line-height:1}
.drug-pill{font-size:7px;font-weight:700;padding:1px 5px;border-radius:5px;white-space:nowrap}
.drug-pill.cr{background:var(--text-primary);color:#FEF2F2}
.drug-pill.mo{background:var(--red-light);color:#991B1B;border:1px solid #FECACA}
.drug-pill.mi{background:var(--orange-light);color:#92400E;border:1px solid #FDE68A}

/* ── EXPANDED STATE ── */
.expand{display:none;border-top:1px solid var(--card-border)}
.card.open .expand{display:block}
.exp-tabs{display:flex;border-bottom:1px solid var(--card-border);background:var(--surface)}
.exp-tab{flex:1;font-size:9px;font-weight:600;padding:9px 4px;text-align:center;cursor:pointer;color:var(--text-secondary);border:none;border-bottom:2px solid transparent;background:transparent;transition:all .12s;text-transform:uppercase;letter-spacing:.02em}
.exp-tab:hover{color:var(--text-primary)}
.exp-tab.active{color:var(--text-primary);border-bottom-color:var(--text-primary);background:var(--card-bg)}
.exp-pane{display:none;padding:14px 16px}
.exp-pane.active{display:block}
.exp-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-tertiary);margin-bottom:5px}
.exp-text{font-size:12px;color:var(--text-primary);line-height:1.7;margin-bottom:10px}
.exp-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.exp-box{background:var(--surface);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.exp-box .exp-text{font-size:11px}
.radar-center{text-align:center;margin-bottom:10px}
.exp-drug-box{border-radius:10px;padding:10px 12px;margin-bottom:8px}
.exp-drug-box.cr{background:var(--text-primary);color:#FEF2F2}
.exp-drug-box.cr .exp-section-label{color:#FCA5A5}
.exp-drug-box.mo{background:var(--red-light);border:1px solid #FECACA}
.exp-drug-box.mi{background:var(--orange-light);border:1px solid #FDE68A}
.exp-prep-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.exp-regions{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.exp-region-tag{font-size:9px;padding:2px 7px;border-radius:20px;background:var(--accent-amber-light);color:var(--accent-amber);border:1px solid #F0C070}
.portion-ctrl{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.portion-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--card-border);background:var(--surface);cursor:pointer;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .12s}
.portion-btn:hover{background:var(--text-primary);color:#fff}
.portion-label{font-size:10px;color:var(--text-secondary);font-weight:600;min-width:56px;text-align:center}
.ev-quality-bar{height:5px;border-radius:5px;background:var(--surface-2);overflow:hidden;margin:6px 0 10px}
.ev-quality-fill{height:100%;border-radius:5px;transition:width .4s}
.ev-quality-fill.high{background:linear-gradient(90deg,#1D5C3A,#4ADE80);width:100%}
.ev-quality-fill.moderate{background:linear-gradient(90deg,#6D28D9,#A78BFA);width:66%}
.ev-quality-fill.low{background:linear-gradient(90deg,#374151,#9CA3AF);width:33%}
.pubmed-link{font-size:9px;color:var(--accent-green);text-decoration:none;opacity:.7}
.pubmed-link:hover{opacity:1;text-decoration:underline}
.ev-hi{background:#DCFCE7;color:#166534;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700}
.ev-mo{background:#EDE9FE;color:#4C1D95;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700}
.ev-lo{background:#F1F5F9;color:#475569;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700}

/* Category colours */
.cf{background:#DBEAFE;color:#1E40AF}.cv{background:#DCFCE7;color:#166534}.cl{background:#FEF9C3;color:#854D0E}
.cn{background:#F3E8FF;color:#6B21A8}.cft{background:#FCE7F3;color:#9D174D}.cg{background:#F1F5F9;color:#475569}
.cd{background:#D1FAE5;color:#065F46}.cfu{background:#FFF7ED;color:#C2410C}.co{background:#FEF2F2;color:#991B1B}
.ca{background:#FEF9C3;color:#713F12}.cs{background:#E0F2FE;color:#0369A1}.ch{background:#EDE9FE;color:#4C1D95}
.coil{background:#FFF7ED;color:#9A3412}.cmeat{background:#FEE2E2;color:#991B1B}

/* ── VIEW SWITCHER ── */
.view-switcher{display:flex;gap:2px;border:1px solid var(--card-border);border-radius:8px;overflow:hidden;flex-shrink:0}
.vs-btn{width:30px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);background:transparent;border:none;cursor:pointer;transition:all .12s}
.vs-btn:hover{color:var(--text-primary);background:var(--surface)}
.vs-btn.active{color:var(--card-bg);background:var(--text-primary)}
.result-count{font-size:10px;color:var(--text-tertiary);white-space:nowrap;flex-shrink:0;margin-left:2px;font-variant-numeric:tabular-nums}

/* ── LIST VIEW ── */
.grid.view-list{display:flex;flex-direction:column;gap:0}
.grid.view-list .card{border-radius:0;border-left:none;border-right:none;border-bottom:none;box-shadow:none}
.grid.view-list .card:first-child{border-top:none;border-radius:10px 10px 0 0}
.grid.view-list .card:last-child{border-bottom:1px solid var(--card-border);border-radius:0 0 10px 10px}
.grid.view-list .card.african-food{border-left:none;border-left:3px solid var(--accent-amber)}
.grid.view-list .card:hover{transform:none;box-shadow:none;background:var(--surface)}
.grid.view-list .card-top{padding:8px 14px 8px;gap:8px;align-items:center}
.grid.view-list .card-emoji-wrap{width:30px;height:30px;border-radius:8px;font-size:16px}
.grid.view-list .card-name{font-size:13px;-webkit-line-clamp:1}
.grid.view-list .card-cat-row{display:none}
.grid.view-list .card-macros{display:flex;gap:0;border:none;margin:0;flex-shrink:0;width:auto}
.grid.view-list .mac-item{padding:2px 8px;border-right:none!important;min-width:42px}
.grid.view-list .mac-val{font-size:11px}
.grid.view-list .mac-lbl{font-size:6px}
.grid.view-list .card-scores{padding:0 8px;flex-shrink:0;gap:4px}
.grid.view-list .longevity-bar-wrap{min-width:80px}
.grid.view-list .card-hover-actions{display:none}
.grid.view-list .card.open .card-hover-actions{display:flex;opacity:1;height:auto;padding:4px 14px 8px}
/* List: horizontal layout */
.grid.view-list .card:not(.open){display:flex;flex-direction:row;align-items:center}
.grid.view-list .card:not(.open) .card-top{flex:1;min-width:0}
.grid.view-list .card:not(.open) .card-macros{border-top:none;border-bottom:none}
.grid.view-list .card:not(.open) .card-scores{border:none}
.grid.view-list .card:not(.open) .expand{display:none}

/* ── COMPACT VIEW ── */
.grid.view-compact{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.grid.view-compact .card{border-radius:10px}
.grid.view-compact .card-top{padding:8px 10px 4px;gap:6px}
.grid.view-compact .card-emoji-wrap{width:28px;height:28px;border-radius:8px;font-size:15px}
.grid.view-compact .card-name{font-size:11px;-webkit-line-clamp:1}
.grid.view-compact .card-cat-row{display:none}
.grid.view-compact .card-macros{margin:4px 0 0}
.grid.view-compact .mac-item{padding:3px 1px}
.grid.view-compact .mac-val{font-size:10px}
.grid.view-compact .mac-lbl{font-size:5px;margin-top:1px}
.grid.view-compact .card-scores{padding:3px 10px 2px;gap:4px}
.grid.view-compact .longevity-score{font-size:9px}
.grid.view-compact .longevity-label{display:none}
.grid.view-compact .stars-mini{font-size:6px}
.grid.view-compact .drug-pill{font-size:6px;padding:0 4px}
.grid.view-compact .card-hover-actions{display:none}
.grid.view-compact .card.open .card-hover-actions{display:flex;opacity:1;height:auto}

/* ── TABLE VIEW ── */
.table-wrap{overflow-x:auto;border:1px solid var(--card-border);border-radius:10px;background:var(--card-bg)}
.table-view{width:100%;border-collapse:collapse;font-size:11px;text-align:left}
.table-view thead{position:sticky;top:0;z-index:2}
.table-view th{background:var(--header-bg);color:var(--header-fg);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:2px solid var(--text-primary)}
.table-view th:hover{background:#333}
.table-view th .sort-arrow{margin-left:3px;opacity:.4;font-size:8px}
.table-view th.sorted .sort-arrow{opacity:1}
.table-view td{padding:6px 10px;border-bottom:1px solid var(--card-border);vertical-align:middle;white-space:nowrap}
.table-view tr:hover{background:var(--surface)}
.table-view tr.african-row{border-left:3px solid var(--accent-amber)}
.table-view .tv-name{display:flex;align-items:center;gap:6px;cursor:pointer;min-width:160px;white-space:normal}
.table-view .tv-name:hover{color:var(--accent-green);text-decoration:underline}
.table-view .tv-emoji{font-size:16px;flex-shrink:0}
.table-view .tv-foodname{font-weight:600;font-size:12px;line-height:1.25;max-width:200px}
.table-view .tv-num{font-variant-numeric:tabular-nums;text-align:right;font-weight:500}
.table-view .tv-ls{display:inline-flex;align-items:center;gap:3px}
.table-view .tv-ls-bar{width:40px;height:3px;background:var(--surface-2);border-radius:2px;overflow:hidden;display:inline-block}
.table-view .tv-ls-fill{height:100%;border-radius:2px}
.table-view .tv-action{opacity:0;transition:opacity .12s}
.table-view tr:hover .tv-action{opacity:1}

/* ── SLIDE-OVER DRAWER ── */
.drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:290;backdrop-filter:blur(2px)}
.drawer-backdrop.visible{display:block}
.drawer{position:fixed;top:0;right:-400px;width:380px;height:100vh;background:var(--card-bg);border-left:1px solid var(--card-border);box-shadow:-8px 0 24px rgba(0,0,0,.1);z-index:300;display:flex;flex-direction:column;transition:right .25s cubic-bezier(.4,0,.2,1)}
.drawer.open{right:0}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--card-border);flex-shrink:0}
.drawer-title{font-size:14px;font-weight:700;color:var(--text-primary)}
.drawer-close{font-size:16px;opacity:.4;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .12s;line-height:1}
.drawer-close:hover{opacity:.8;background:var(--surface)}
.drawer-body{flex:1;overflow-y:auto;padding:16px 18px}

/* ── AI CHAT ── */
.ai-messages{height:260px;overflow-y:auto;border:1px solid var(--card-border);border-radius:8px;padding:8px;margin-bottom:8px;background:var(--surface);scroll-behavior:smooth}
.ai-msg{margin-bottom:8px;display:flex;gap:6px;align-items:flex-start}
.ai-msg.user{flex-direction:row-reverse}
.ai-bubble{max-width:85%;font-size:12px;line-height:1.6;padding:7px 10px;border-radius:10px}
.ai-msg.user .ai-bubble{background:var(--text-primary);color:var(--card-bg);border-radius:10px 10px 2px 10px}
.ai-msg.bot .ai-bubble{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px 10px 10px 2px}
.ai-avatar{width:24px;height:24px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ai-msg.user .ai-avatar{background:var(--text-primary);color:var(--card-bg)}
.ai-msg.bot .ai-avatar{background:var(--accent-green-light);color:var(--accent-green)}
.ai-suggestions{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.ai-sug{font-size:10px;padding:3px 8px;border:1px solid var(--card-border);border-radius:12px;cursor:pointer;color:var(--text-secondary);background:var(--card-bg);transition:all .1s}
.ai-sug:hover{background:var(--surface);color:var(--text-primary)}
.ai-input-row{display:flex;gap:6px}
.ai-input{flex:1;font-size:12px;padding:6px 10px;border:1px solid var(--card-border);border-radius:7px;background:var(--card-bg);outline:none;resize:none;color:var(--text-primary)}
.ai-send{font-size:12px;padding:6px 14px;background:var(--text-primary);color:var(--card-bg);border-radius:7px;cursor:pointer;border:none;transition:background .12s}
.ai-send:hover{background:#333}

/* ── COMBOS ── */
.combo-search{width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--card-border);border-radius:8px;background:var(--card-bg);outline:none;margin-bottom:10px;color:var(--text-primary)}
.combo-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.combo-chip{font-size:10px;padding:3px 8px;border-radius:15px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;transition:all .1s;white-space:nowrap}
.combo-chip.active{background:var(--text-primary);color:var(--card-bg);border-color:var(--text-primary);font-weight:600}
.combos-grid{display:grid;grid-template-columns:1fr;gap:10px}
.combo-card{background:var(--surface);border:1px solid var(--card-border);border-radius:10px;padding:12px 14px}
.combo-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.combo-title{font-size:12px;font-weight:700;line-height:1.3;flex:1}
.combo-emoji{font-size:18px;margin-left:6px;flex-shrink:0}
.combo-foods{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.combo-food-tag{font-size:9px;padding:2px 7px;border-radius:12px;background:var(--card-bg);border:1px solid var(--card-border);color:var(--text-primary);cursor:pointer;transition:all .1s}
.combo-food-tag:hover{background:var(--text-primary);color:var(--card-bg)}
.combo-mechanism{font-size:10px;color:var(--text-secondary);line-height:1.6;margin:4px 0}
.combo-evidence{font-size:9px;margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.combo-ev-badge{font-size:8px;padding:1px 6px;border-radius:8px;font-weight:700}
.combo-ev-high{background:#DCFCE7;color:#166534}.combo-ev-mod{background:#EDE9FE;color:#4C1D95}.combo-ev-low{background:#F1F5F9;color:#475569}
.combo-boost{font-size:9px;font-weight:700;color:var(--accent-green);background:var(--accent-green-light);padding:1px 6px;border-radius:8px}
.combo-count{font-size:11px;color:var(--text-tertiary);margin-bottom:8px}

/* ── COMPARE ── */
.compare-grid{display:grid;grid-template-columns:1fr;gap:10px}
.compare-slot{border:2px dashed var(--card-border);border-radius:10px;padding:12px;min-height:100px;position:relative}
.compare-slot.filled{border-style:solid;border-color:var(--text-primary);background:var(--surface)}
.compare-slot-label{font-size:10px;color:var(--text-tertiary);text-align:center;padding-top:30px;display:block}

/* ── PLATE ── */
.plate-items{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;min-height:30px}
.plate-item{background:var(--surface);border:1px solid var(--card-border);border-radius:16px;font-size:11px;padding:3px 10px;display:flex;align-items:center;gap:5px}
.plate-item-remove{cursor:pointer;opacity:.5;font-size:12px;line-height:1}
.plate-item-remove:hover{opacity:1}
.plate-macros{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.pm-box{background:var(--surface);border-radius:8px;padding:6px 8px;text-align:center;border:1px solid var(--card-border)}
.pm-label{font-size:8px;color:var(--text-tertiary);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.pm-val{font-size:16px;font-weight:700;color:var(--text-primary);display:block}
.pm-unit{font-size:9px;color:var(--text-tertiary)}
.plate-bar-wrap{margin-top:6px}
.pb-label{font-size:10px;color:var(--text-secondary);margin-bottom:2px;display:flex;justify-content:space-between}
.pb-track{background:var(--surface-2);border-radius:3px;height:5px;overflow:hidden;margin-bottom:5px}
.pb-fill{height:100%;border-radius:3px;transition:width .3s}
.pb-ok{background:var(--accent-green)}
.plate-empty{color:var(--text-tertiary);font-size:12px;font-style:italic}
.ctrl-btn{font-size:11px;padding:5px 12px;border-radius:8px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-primary);cursor:pointer;transition:all .12s}
.ctrl-btn.danger{border-color:var(--red);color:var(--red)}
.ctrl-btn.danger:hover{background:var(--red);color:#fff}

/* ── MISC ── */
.no-results{text-align:center;padding:3rem;color:var(--text-tertiary);font-size:14px}
.tooltip{display:none}
.search-suggestions{position:absolute;top:100%;left:0;right:0;background:var(--card-bg);border:1px solid var(--card-border);border-top:none;border-radius:0 0 10px 10px;box-shadow:var(--card-shadow-hover);z-index:200;max-height:200px;overflow-y:auto}
.search-sug-item{padding:7px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text-primary)}
.search-sug-item:hover{background:var(--surface)}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:cardIn .25s ease both}

/* ── MOBILE BOTTOM NAV ── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card-bg);border-top:1px solid var(--card-border);z-index:250;padding:4px 0 env(safe-area-inset-bottom,4px)}
.mobile-nav-inner{display:flex;justify-content:space-around;align-items:center}
.mnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border-radius:8px;color:var(--text-tertiary);font-size:9px;transition:all .12s;background:none;border:none;cursor:pointer}
.mnav-btn.active{color:var(--accent-green)}
.mnav-btn svg{width:20px;height:20px}

/* ── DARK MODE ── */
body.dark-mode{background:#141412;color:#F0EFEB;--card-bg:#1C1C1A;--card-border:#2E2E2B;--card-border-hover:#484844;--card-shadow:0 1px 3px rgba(0,0,0,.3);--card-shadow-hover:0 6px 20px rgba(0,0,0,.4);--card-shadow-open:0 10px 28px rgba(0,0,0,.5);--accent-green:#4ADE80;--accent-green-light:#0D2B1A;--accent-amber:#FB923C;--accent-amber-light:#2B1500;--text-primary:#F0EFEB;--text-secondary:#A09B93;--text-tertiary:#6B6860;--surface:#252522;--surface-2:#2E2E2B;--red:#F87171;--red-light:#2D1515;--orange-light:#2D1A00;--body-bg:#141412;--header-bg:#1C1C1A;--header-fg:#F0EFEB}
body.dark-mode .overflow-menu{background:#1C1C1A;border-color:#2E2E2B}
body.dark-mode .overflow-menu button{color:#F0EFEB}
body.dark-mode .overflow-menu button:hover{background:#252522}
body.dark-mode .filter-row{background:#1C1C1A;border-color:#2E2E2B}
body.dark-mode .cond-strip{background:#1C1C1A;border-color:#2E2E2B}
body.dark-mode .filters-popover{background:#1C1C1A;border-color:#2E2E2B}
body.dark-mode .drawer{background:#1C1C1A;border-color:#2E2E2B}
body.dark-mode .card.african-food{background:linear-gradient(to right,#2B1500,#1C1C1A 50%)}
body.dark-mode .table-view th{background:#1C1C1A}
body.dark-mode .table-view tr:hover{background:#252522}
body.dark-mode .table-wrap{background:#1C1C1A;border-color:#2E2E2B}
body.dark-mode .vs-btn.active{background:var(--text-primary);color:#1C1C1A}
body.dark-mode footer{background:#0A0A09}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .grid{grid-template-columns:1fr;gap:8px}
  .grid.view-compact{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .exp-cols{grid-template-columns:1fr}
  .header h1{font-size:14px}
  .header .search-wrap{max-width:none}
  .header-actions .ha-btn:not(#overflowBtn){display:none}
  .mobile-nav{display:block}
  .main{padding-bottom:64px}
  .drawer{width:100%;right:-100%}
  .plate-macros{grid-template-columns:repeat(3,1fr)}
  .filter-row{padding:8px 12px}
  .table-view{font-size:10px}
  .table-view td,.table-view th{padding:4px 6px}
  .table-view .tv-foodname{max-width:120px}
  .grid.view-list .card-macros{display:none}
  .grid.view-list .card-scores{display:none}
  .view-switcher{margin-left:auto}
}
@media(max-width:400px){
  .header{padding:0 10px;gap:8px}
  .main{padding:8px 10px 64px}
}
@media print{
  .header,.filter-row,.cond-strip,.mobile-nav,.drawer,.drawer-backdrop,.card-hover-actions{display:none!important}
  .card{break-inside:avoid;border:1px solid #ccc;margin-bottom:6px}
  .card.open .expand{display:block!important}
  body{background:#fff}
  .grid{grid-template-columns:repeat(2,1fr)}
}

/* Patient mode */
body.patient-mode .card-hover-actions .ca-btn:last-child{display:none}
body.patient-mode .ev-hi::before{content:'Strong evidence · '}
body.patient-mode .ev-mo::before{content:'Good evidence · '}
body.patient-mode .ev-lo::before{content:'Traditional use · '}

/* Focus */
button:focus-visible,.ca-btn:focus-visible{outline:2px solid var(--accent-green);outline-offset:2px}

/* Back to top */
.btt{position:fixed;bottom:24px;right:24px;width:36px;height:36px;border-radius:50%;background:var(--text-primary);color:var(--card-bg);border:none;font-size:16px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:240;opacity:0;pointer-events:none;transition:all .2s;display:flex;align-items:center;justify-content:center}
.btt.visible{opacity:1;pointer-events:auto}
@media(max-width:700px){.btt{bottom:72px;right:16px}}

/* AI loading dots */
@keyframes aiDots{0%,80%,100%{opacity:.3}40%{opacity:1}}
.ai-loading span{animation:aiDots 1.4s infinite both}
.ai-loading span:nth-child(2){animation-delay:.2s}
.ai-loading span:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>

<div class="header">
  <h1>NutriForge <span style="font-weight:300;opacity:.6">Africa</span></h1>
  <div class="search-wrap">
    <span class="search-icon">&#x1F50D;</span>
    <input type="text" id="srch" placeholder="Search 365 foods, conditions, bioactives... (Ctrl+K)" aria-label="Search foods">
  </div>
  <div class="header-actions">
    <button class="ha-btn" id="btnAI" onclick="openDrawer('ai')" title="AI Assistant (Ctrl+Enter)" aria-label="Open AI nutrition assistant">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="3"/><path d="M8 7V5a4 4 0 018 0v2"/><circle cx="9" cy="13" r="1" fill="currentColor"/><circle cx="15" cy="13" r="1" fill="currentColor"/></svg>
    </button>
    <button class="ha-btn" id="btnPlate" onclick="openDrawer('plate')" title="My Plate">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="5"/></svg>
    </button>
    <div class="overflow-menu-wrap">
      <button class="ha-btn" onclick="toggleOverflow()" title="More">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
      </button>
      <div class="overflow-menu" id="overflowMenu">
        <button onclick="openDrawer('compare');toggleOverflow()">Compare foods</button>
        <button onclick="openDrawer('combos');toggleOverflow()">Food combinations</button>
        <button onclick="openDrawer('chart');toggleOverflow()">Nutrient chart</button>
        <hr>
        <button onclick="exportCSV();toggleOverflow()">Export CSV</button>
        <button onclick="printView();toggleOverflow()">Print</button>
        <hr>
        <button onclick="toggleDarkMode();toggleOverflow()" id="dmMenuBtn">Dark mode</button>
        <button onclick="toggleAppMode();toggleOverflow()" id="modeMenuBtn">Clinician mode</button>
      </div>
    </div>
  </div>
</div>

<div class="filter-row" id="filterRow">
  <button class="chip active" data-cat="all" id="totalChip" onclick="setFilter('all',this)">All</button>
  <button class="chip" data-cat="african" onclick="setFilter('african',this)">African</button>
  <button class="chip" data-cat="favourites" id="favChip" onclick="setFilter('favourites',this)">Saved <span id="favCount" style="opacity:.6"></span></button>
  <select id="catSelect" class="filter-select"></select>
  <div class="filters-popover-wrap">
    <button class="chip" id="filtersBtn" onclick="toggleFiltersPopover()">Filters <span id="filterBadge" class="filter-badge" style="display:none">0</span></button>
    <div class="filters-popover" id="filtersPopover">
      <div class="fp-group"><label class="fp-label">Sort by</label>
        <select id="sortSel" class="fp-select" onchange="sort=this.value;render();updateFilterBadge()">
          <option value="name">A–Z</option><option value="kcal_asc">Calories ↑</option><option value="kcal_desc">Calories ↓</option>
          <option value="protein">Protein ↓</option><option value="fiber">Fibre ↓</option><option value="gi">GI: Low first</option>
          <option value="longevity">Longevity Score ↓</option><option value="confidence">Evidence Stars ↓</option>
        </select></div>
      <div class="fp-group"><label class="fp-label">Evidence</label>
        <select id="evidence_filter" class="fp-select" onchange="evidenceFilter=this.value;render();updateFilterBadge()">
          <option value="all">All</option><option value="High">High only (RCT/Meta)</option><option value="Moderate">Moderate+</option>
        </select></div>
      <div class="fp-group"><label class="fp-label">Drug interactions</label>
        <select id="drug_filter" class="fp-select" onchange="drugFilter=this.value;render();updateFilterBadge()">
          <option value="all">All</option><option value="critical">Critical only</option><option value="moderate">Moderate+</option><option value="mild">Any flagged</option>
        </select></div>
      <div class="fp-group"><label class="fp-label">Region</label>
        <select id="region_filter" class="fp-select" onchange="regionFilter=this.value;render();updateFilterBadge()">
          <option value="all">All regions</option><option value="West Africa">West Africa</option><option value="East Africa">East Africa</option>
          <option value="North Africa">North Africa</option><option value="Central Africa">Central Africa</option>
          <option value="Southern Africa">Southern Africa</option><option value="Sahel">Sahel</option>
        </select></div>
      <button class="fp-reset" onclick="clearAll();toggleFiltersPopover()">Reset all</button>
    </div>
  </div>
  <span class="filter-divider"></span>
  <div class="view-switcher" id="viewSwitcher">
    <button class="vs-btn active" data-view="grid" onclick="setView('grid',this)" title="Grid view">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="7" height="7" rx="1.5"/><rect x="9" y="0" width="7" height="7" rx="1.5"/><rect x="0" y="9" width="7" height="7" rx="1.5"/><rect x="9" y="9" width="7" height="7" rx="1.5"/></svg>
    </button>
    <button class="vs-btn" data-view="list" onclick="setView('list',this)" title="List view">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="1" width="16" height="2.5" rx="1"/><rect x="0" y="6.5" width="16" height="2.5" rx="1"/><rect x="0" y="12" width="16" height="2.5" rx="1"/></svg>
    </button>
    <button class="vs-btn" data-view="compact" onclick="setView('compact',this)" title="Compact view">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="4.5" height="4.5" rx="1"/><rect x="5.75" y="0" width="4.5" height="4.5" rx="1"/><rect x="11.5" y="0" width="4.5" height="4.5" rx="1"/><rect x="0" y="5.75" width="4.5" height="4.5" rx="1"/><rect x="5.75" y="5.75" width="4.5" height="4.5" rx="1"/><rect x="11.5" y="5.75" width="4.5" height="4.5" rx="1"/><rect x="0" y="11.5" width="4.5" height="4.5" rx="1"/><rect x="5.75" y="11.5" width="4.5" height="4.5" rx="1"/><rect x="11.5" y="11.5" width="4.5" height="4.5" rx="1"/></svg>
    </button>
    <button class="vs-btn" data-view="table" onclick="setView('table',this)" title="Table view">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="16" height="3" rx="0.5"/><rect x="0" y="4.5" width="5" height="2" rx="0.5" opacity=".5"/><rect x="6" y="4.5" width="4" height="2" rx="0.5" opacity=".5"/><rect x="11" y="4.5" width="5" height="2" rx="0.5" opacity=".5"/><rect x="0" y="8" width="5" height="2" rx="0.5" opacity=".5"/><rect x="6" y="8" width="4" height="2" rx="0.5" opacity=".5"/><rect x="11" y="8" width="5" height="2" rx="0.5" opacity=".5"/><rect x="0" y="11.5" width="5" height="2" rx="0.5" opacity=".5"/><rect x="6" y="11.5" width="4" height="2" rx="0.5" opacity=".5"/><rect x="11" y="11.5" width="5" height="2" rx="0.5" opacity=".5"/></svg>
    </button>
  </div>
  <span class="result-count" id="resultCount"></span>
</div>

<div class="cond-strip" id="condStrip">
  <span class="cond-strip-label">Condition</span>
  <button class="cond-pill active" data-cond="" onclick="selectConditionPill(this,'')">All</button>
  <button class="cond-pill" data-cond="t2d" onclick="selectConditionPill(this,'t2d')">Diabetes</button>
  <button class="cond-pill" data-cond="htn" onclick="selectConditionPill(this,'htn')">Hypertension</button>
  <button class="cond-pill" data-cond="dyslip" onclick="selectConditionPill(this,'dyslip')">Cholesterol</button>
  <button class="cond-pill" data-cond="cvd" onclick="selectConditionPill(this,'cvd')">Heart</button>
  <button class="cond-pill" data-cond="inflam" onclick="selectConditionPill(this,'inflam')">Inflammation</button>
  <button class="cond-pill" data-cond="obesity" onclick="selectConditionPill(this,'obesity')">Weight</button>
  <button class="cond-pill" data-cond="gut" onclick="selectConditionPill(this,'gut')">Gut</button>
  <button class="cond-pill" data-cond="brain" onclick="selectConditionPill(this,'brain')">Brain</button>
  <button class="cond-pill" data-cond="longevity" onclick="selectConditionPill(this,'longevity')">Longevity</button>
  <button class="cond-pill" data-cond="cancer" onclick="selectConditionPill(this,'cancer')">Cancer</button>
  <button class="cond-pill" data-cond="anaemia" onclick="selectConditionPill(this,'anaemia')">Anaemia</button>
  <button class="cond-pill" data-cond="bone" onclick="selectConditionPill(this,'bone')">Bone</button>
  <button class="cond-pill" data-cond="liver" onclick="selectConditionPill(this,'liver')">Liver</button>
  <button class="cond-pill" data-cond="thyroid" onclick="selectConditionPill(this,'thyroid')">Thyroid</button>
  <button class="cond-pill" data-cond="immune" onclick="selectConditionPill(this,'immune')">Immune</button>
  <button class="cond-pill" data-cond="menopause" onclick="selectConditionPill(this,'menopause')">Menopause</button>
  <button class="cond-pill" data-cond="anxiety" onclick="selectConditionPill(this,'anxiety')">Anxiety</button>
  <button class="cond-pill" data-cond="skin" onclick="selectConditionPill(this,'skin')">Skin</button>
  <button class="cond-pill" data-cond="fertility" onclick="selectConditionPill(this,'fertility')">Fertility</button>

{id:27,name:"Kale",aka:"Brassica oleracea var. sabellica",emoji:"🥬",cat:"leaf",catLabel:"Leafy green",african:false,top3:false,kcal:49,carbs:9,protein:4.3,fat:0.9,fiber:3.6,gi:"Low",evidence:"Moderate",micro:"Vitamin K (817mcg — highest plant source), Vitamin A (241mcg RAE), Vitamin C (120mg), Calcium (150mg), Manganese (0.7mg)",bio:"Lutein+zeaxanthin (2.1mg), glucosinolates, kaempferol, quercetin, sulforaphane",benefits:"MIND diet: high leafy green intake → slower cognitive decline. AREDS2: lutein/zeaxanthin reduce AMD risk. Vitamin K activates osteocalcin — bone health.",use:"Eye health (AMD), bone health, cognitive preservation, cancer risk",limits:"Highest Vit K among foods — significant warfarin interaction. Oxalates reduce calcium bioavailability."},
{id:28,name:"Swiss chard",aka:"Beta vulgaris subsp. cicla",emoji:"🥬",cat:"leaf",catLabel:"Leafy green",african:false,top3:false,kcal:19,carbs:3.7,protein:1.8,fat:0.2,fiber:1.6,gi:"Low",evidence:"Moderate",micro:"Vitamin K (830mcg — highest of all foods), Vitamin A (306mcg RAE), Vitamin C (18mg), Iron (1.8mg), Magnesium (81mg)",bio:"Betalains (syringeic acid), kaempferol, vitexin, rutin, acetylenic compounds",benefits:"Highest Vit K food source. Betalains from colourful stems have antioxidant and anti-inflammatory properties. Magnesium supports insulin sensitivity.",use:"Bone health, antioxidant status, magnesium repletion",limits:"Extreme Vit K — warfarin interaction. Oxalate and purine content. Cooking reduces anti-nutrients."},
{id:29,name:"Moringa",aka:"Moringa oleifera — Drumstick tree",emoji:"🌿",cat:"leaf",catLabel:"African superfood",african:true,top3:false,kcal:64,carbs:8.3,protein:9.4,fat:1.4,fiber:2,gi:"Low",evidence:"Moderate",micro:"Vitamin C (51mg), Vitamin A (378mcg RAE), Iron (4mg — 25× more than spinach by weight claims), Calcium (185mg), Potassium (337mg)",bio:"Isothiocyanates (glucoraphanin, glucomoringin), quercetin, chlorogenic acid, niaziminin, moringin",benefits:"Human trials: moringa supplementation improved glycaemia in T2D. Anti-inflammatory via NF-κB suppression. Recommended by WHO/UNICEF for combating malnutrition in Sub-Saharan Africa. Complete amino acid profile.",use:"Protein supplementation (plant-based), anti-inflammatory, blood sugar management, malnutrition",limits:"Evidence mostly small trials in low-income settings. Root bark and high-dose extracts may be toxic/abortifacient. Taste challenging — powder form preferred."},
{id:30,name:"Amaranth leaves",aka:"Amaranthus spp. — Efo tete / Callaloo",emoji:"🥬",cat:"leaf",catLabel:"African leafy green",african:true,top3:false,kcal:23,carbs:4,protein:2.5,fat:0.3,fiber:2.2,gi:"Low",evidence:"Moderate",micro:"Vitamin A (146mcg RAE), Vitamin C (43mg), Calcium (215mg), Iron (2.3mg), Folate (85mcg)",bio:"Rutin, quercetin, kaempferol, betacyanins, tocopherols",benefits:"High calcium for a green — important in populations with low dairy intake. Vitamin C co-presence enhances iron bioavailability. Studies in West Africa show improved nutritional status in children.",use:"Calcium and iron intake, vitamin A, maternal nutrition",limits:"Oxalates may reduce mineral bioavailability. Anti-nutrients reduced by boiling. Common across W. Africa as staple vegetable."},
{id:31,name:"Bitter leaf",aka:"Vernonia amygdalina — Ewuro / Onugbu",emoji:"🌿",cat:"leaf",catLabel:"African medicinal green",african:true,top3:false,kcal:35,carbs:5.4,protein:4.1,fat:0.3,fiber:2.1,gi:"Low",evidence:"Moderate",micro:"Iron (3.9mg), Calcium (82mg), Vitamin C (28mg), Zinc (0.8mg), Folate (72mcg)",bio:"Vernonioside, vernodalin, sesquiterpene lactones, saponins, alkaloids (vernoniamide)",benefits:"Clinical studies (Nigeria): bitter leaf extract lowers blood glucose in T2D. Anti-plasmodial activity against malaria (in vitro + limited clinical). Anti-inflammatory via COX inhibition. Common in Igbo and Efik Nigerian cuisine.",use:"Blood glucose management, anti-inflammatory, antimalarial adjunct, liver support",limits:"Bitter taste reduces compliance — washing/squeezing removes bitterness + some bioactives. Evidence limited to small studies. High-dose extracts potentially hepatotoxic."},
{id:32,name:"African basil (Scent leaf)",aka:"Ocimum gratissimum — Efirin / Nchanwu",emoji:"🌿",cat:"leaf",catLabel:"African herb",african:true,top3:false,kcal:31,carbs:3.9,protein:3.3,fat:0.4,fiber:1.8,gi:"Low",evidence:"Low",micro:"Vitamin C (23mg), Iron (2.4mg), Calcium (76mg), Beta-carotene (125mcg RAE), Zinc (0.5mg)",bio:"Eugenol (antimicrobial), thymol, rosmarinic acid, linalool, camphor",benefits:"Eugenol has demonstrated antimicrobial, antifungal, and COX-2 inhibitory activity. Used in traditional medicine for GI disorders, fever, and respiratory infections. Rosmarinic acid is anti-inflammatory.",use:"Culinary herb, antimicrobial, traditional GI and fever management",limits:"Mostly mechanistic evidence. Eugenol in high doses hepatotoxic. Anticoagulant interaction."},
{id:33,name:"Watercress",aka:"Nasturtium officinale",emoji:"🌿",cat:"leaf",catLabel:"Leafy green",african:false,top3:false,kcal:11,carbs:1.3,protein:2.3,fat:0.1,fiber:0.5,gi:"Low",evidence:"Moderate",micro:"Vitamin K (250mcg), Vitamin C (43mg), Vitamin A (160mcg RAE), Calcium (120mg), Iodine (9mcg)",bio:"Phenethyl isothiocyanate (PEITC — potent anti-cancer agent), gluconasturtiin, lutein",benefits:"PEITC from watercress has some of the strongest clinical evidence for anti-carcinogenic activity in cruciferous vegetables — Phase II enzyme induction. RCT: watercress supplementation reduced oxidative DNA damage.",use:"Cancer risk reduction, Vitamin K, antioxidant, DNA protection",limits:"High Vit K — warfarin. Iodine content relevant in thyroid disease. Waterborne pathogen risk if consumed raw from unclean sources."},
// ══════════ LEGUMES ══════════
{id:34,name:"Lentils",aka:"Lens culinaris",emoji:"🫘",cat:"legume",catLabel:"Legume",african:false,top3:true,kcal:116,carbs:20,protein:9,fat:0.4,fiber:7.9,gi:"Low",evidence:"High",micro:"Folate (181mcg), Iron (3.3mg), Manganese (0.5mg), Potassium (369mg), Phosphorus (180mg)",bio:"Resistant starch, phenolic acids, isoflavones, saponins, prebiotic oligosaccharides",benefits:"2024 RCT: 980g/week lentils significantly lowered LDL-C. 2021 SR: legumes → reduced BP and improved lipid profile. Prebiotic fibre: Akkermansia + Bifidobacterium.",use:"Cardiovascular, gut microbiome, glycaemic control, weight management",limits:"Phytic acid reduces mineral bioavailability. FODMAP — IBS caution. Lower DIAAS than animal protein."},
{id:35,name:"Chickpeas",aka:"Garbanzo beans — Cicer arietinum",emoji:"🫘",cat:"legume",catLabel:"Legume",african:false,top3:false,kcal:164,carbs:27,protein:8.9,fat:2.6,fiber:7.6,gi:"Low",evidence:"High",micro:"Folate (172mcg), Iron (2.9mg), Phosphorus (168mg), Manganese (1mg), Copper (0.4mg)",bio:"Isoflavones (biochanin A), saponins, resistant starch, kaempferol, quercetin",benefits:"Systematic review: chickpea-rich diet reduces LDL-C and improves satiety hormones (CCK, GLP-1). High satiety index. Resistant starch supports gut microbiome diversity.",use:"LDL reduction, satiety, plant protein, gut health, Mediterranean diet staple",limits:"FODMAP content. Flatulence common. Phytic acid (soak/sprout to reduce)."},
{id:36,name:"Black beans",aka:"Phaseolus vulgaris",emoji:"🫘",cat:"legume",catLabel:"Legume",african:false,top3:false,kcal:132,carbs:24,protein:8.9,fat:0.5,fiber:8.7,gi:"Low",evidence:"High",micro:"Folate (149mcg), Iron (2.1mg), Magnesium (70mg), Phosphorus (140mg), Zinc (1mg)",bio:"Anthocyanins (black skin), saponins, tannins, resistant starch, kaempferol",benefits:"Highest anthocyanin content of beans — combine antioxidant + prebiotic effects. RCTs show LDL reduction comparable to other legumes. Resistant starch feeds Faecalibacterium prausnitzii.",use:"Cardiovascular, gut microbiome, plant protein, glycaemic control",limits:"FODMAP. Phytic acid. Requires soaking and cooking."},
{id:37,name:"Cowpeas (Black-eyed peas)",aka:"Vigna unguiculata — Akara bean",emoji:"🫘",cat:"legume",catLabel:"African legume",african:true,top3:false,kcal:116,carbs:21,protein:7.7,fat:0.5,fiber:6.6,gi:"Low",evidence:"Moderate",micro:"Folate (208mcg — excellent source), Iron (2.5mg), Potassium (278mg), Magnesium (53mg), Zinc (1.3mg)",bio:"Polyphenols, flavonoids, saponins, resistant starch, protease inhibitors",benefits:"Primary protein and folate source across Sub-Saharan Africa. Cohort data link legume consumption to CVD risk reduction. Folate content critical for maternal health and neural tube defect prevention.",use:"Plant protein (W. Africa), folate status, maternal nutrition, cardiovascular",limits:"Anti-nutritional factors (phytates, tannins) — reduce with soaking. FODMAP. Flatulence. Moderate digestibility."},
{id:38,name:"Bambara groundnut",aka:"Vigna subterranea — Okpa",emoji:"🫘",cat:"legume",catLabel:"African legume",african:true,top3:false,kcal:367,carbs:57,protein:19,fat:6.1,fiber:4.3,gi:"Low",evidence:"Low",micro:"Iron (3mg), Calcium (83mg), Phosphorus (303mg), Zinc (3.3mg), Magnesium (130mg)",bio:"Isoflavones, tannins, phenolic acids, resistant starch",benefits:"One of most nutritionally complete African legumes — adequate protein, fat, and carbohydrates. Drought-resistant — food security crop. Limited clinical studies but strong traditional use across W/C Africa.",use:"Plant protein, food security (Africa), iron and zinc intake",limits:"Limited clinical evidence. Anti-nutritional factors (phytic acid, oxalates). Processing required."},
{id:39,name:"Kidney beans",aka:"Phaseolus vulgaris",emoji:"🫘",cat:"legume",catLabel:"Legume",african:false,top3:false,kcal:127,carbs:23,protein:8.7,fat:0.5,fiber:7.4,gi:"Low",evidence:"High",micro:"Folate (130mcg), Iron (2.9mg), Potassium (405mg), Phosphorus (142mg), Copper (0.4mg)",bio:"Lectin (PHA — must be cooked), saponins, anthocyanins, resistant starch, phytosterols",benefits:"Strong legume evidence applies. High potassium:sodium ratio supports BP. Phytosterols competitively inhibit cholesterol absorption. Regular legume consumption → diabetes risk reduction (multiple cohorts).",use:"Cardiovascular, diabetes prevention, plant protein, blood pressure",limits:"Raw/undercooked kidney beans contain toxic PHA lectin — always boil vigorously for 10+ min. FODMAP."},
{id:40,name:"Soybeans",aka:"Glycine max",emoji:"🫘",cat:"legume",catLabel:"Legume",african:false,top3:false,kcal:446,carbs:30,protein:36,fat:20,fiber:9.3,gi:"Low",evidence:"High",micro:"Iron (15.7mg), Calcium (277mg), Magnesium (280mg), Phosphorus (704mg), Zinc (4.9mg)",bio:"Isoflavones (genistein, daidzein, glycitein), saponins, phytosterols, complete protein (PDCAAS 1.0)",benefits:"FDA-approved claim: 25g/day soy protein may reduce CVD risk. Genistein inhibits tyrosine kinase (anti-tumour activity). Isoflavones: weak oestrogenic activity — beneficial in menopause, potentially relevant in ER+ breast cancer.",use:"Cardiovascular, menopause symptoms, plant protein, LDL reduction",limits:"Phytoestrogen effect — debate in hormone-sensitive cancers. Goitrogenic (iodine-deficient individuals). Anti-nutrients in raw form."},
{id:41,name:"Edamame",aka:"Young soybeans",emoji:"🫘",cat:"legume",catLabel:"Legume",african:false,top3:false,kcal:121,carbs:8.9,protein:11.9,fat:5.2,fiber:5.2,gi:"Low",evidence:"Moderate",micro:"Folate (311mcg), Vitamin K (26.7mcg), Iron (2.3mg), Magnesium (64mg), Manganese (1mg)",bio:"Isoflavones, GABA (relaxant), lunasin (epigenetic peptide), folate, complete protein",benefits:"Highest folate of any common legume. Complete protein with excellent amino acid profile. GABA content — sedative/anxiolytic properties (weak clinical evidence). Lunasin: epigenetic cancer-preventive peptide.",use:"Folate, complete plant protein, relaxation (GABA), methylation support",limits:"Soy allergy. Phytoestrogen considerations. Pesticide residue if non-organic."},
// ══════════ NUTS & SEEDS ══════════
{id:42,name:"Walnuts",aka:"Juglans regia",emoji:"🫑",cat:"nut",catLabel:"Tree nut",african:false,top3:false,kcal:654,carbs:14,protein:15,fat:65,fiber:6.7,gi:"Low",evidence:"High",micro:"Manganese (3.4mg), Copper (1.6mg), Magnesium (158mg), Phosphorus (346mg), B6 (0.5mg)",bio:"ALA (9g/100g), ellagitannins (→urolithins), juglone, polyphenols, melatonin",benefits:"PREDIMED (7,447 participants): nuts reduce CVD events 28–30%. Walnuts: cognitive maintenance in aging cohorts. Urolithins from ellagitannins are anti-inflammatory mitophagy inducers.",use:"Cardiovascular, cognitive function, anti-inflammatory, longevity",limits:"High caloric density. Tree nut allergy. High oxalate. ALA→EPA/DHA conversion only 5–10%."},
{id:43,name:"Almonds",aka:"Prunus dulcis",emoji:"🌰",cat:"nut",catLabel:"Tree nut",african:false,top3:false,kcal:579,carbs:22,protein:21,fat:50,fiber:12.5,gi:"Low",evidence:"High",micro:"Vitamin E (25.6mg — highest nut), Magnesium (270mg), Calcium (264mg), Riboflavin (1mg), Phosphorus (484mg)",bio:"Tocopherols (gamma and alpha), flavonoids, phenolic acids, phytosterols, MUFA (oleic acid)",benefits:"Large RCT review: almonds lower LDL-C. 2024–2025 SRs: almonds reduce body weight, hunger, and CRP (inflammation marker). Vitamin E protects LDL from oxidation.",use:"LDL reduction, weight management, anti-inflammatory, vitamin E status",limits:"High caloric density. Low carb but calorie-dense. Cross-reactive with peach/cherry (Rosaceae allergy)."},
{id:44,name:"Flaxseeds",aka:"Linum usitatissimum",emoji:"🌱",cat:"nut",catLabel:"Seed",african:false,top3:false,kcal:534,carbs:29,protein:18,fat:42,fiber:27.3,gi:"Low",evidence:"Moderate",micro:"Manganese (2.5mg), Thiamine (1.6mg), Magnesium (392mg), Phosphorus (642mg), Selenium (25mcg)",bio:"SDG lignans (294mg/100g — highest food source), ALA (22.8g/100g), mucilaginous fibre, phytoestrogens",benefits:"SRs: ground flaxseed lowers LDL, reduces BP, improves insulin sensitivity in T2D. Lignans → enterolactone (anti-tumour in vitro). Highest plant lignan source.",use:"LDL reduction, glycaemic control, hormonal balance, constipation",limits:"Must be ground for bioavailability. High ALA but poor EPA/DHA conversion. Phytoestrogen — caution in hormone-sensitive cancers."},
{id:45,name:"Chia seeds",aka:"Salvia hispanica",emoji:"🌱",cat:"nut",catLabel:"Seed",african:false,top3:false,kcal:486,carbs:42,protein:17,fat:31,fiber:34.4,gi:"Low",evidence:"Moderate",micro:"Calcium (631mg), Manganese (2.7mg), Phosphorus (860mg), Zinc (4.6mg), B1/Thiamine (0.6mg)",bio:"ALA (17.8g/100g), quercetin, kaempferol, myricetin, mucilaginous polysaccharide (gel-forming)",benefits:"Gel-forming fibre slows gastric emptying and attenuates postprandial glycaemia (RCT evidence). Calcium content comparable to dairy. Mucilage improves gut motility.",use:"Glycaemic control, calcium (dairy-free), fibre intake, gut motility",limits:"Must consume with adequate water — dry chia can swell and obstruct oesophagus. High ALA. Phytic acid."},
{id:46,name:"Pumpkin seeds",aka:"Pepitas — Cucurbita pepo",emoji:"🌱",cat:"nut",catLabel:"Seed",african:true,top3:false,kcal:559,carbs:11,protein:30,fat:49,fiber:6,gi:"Low",evidence:"Moderate",micro:"Zinc (7.8mg), Magnesium (592mg — highest common food), Iron (8.8mg), Manganese (4.5mg), Phosphorus (1233mg)",bio:"Cucurbitin (anti-parasitic), phytosterols, tocopherols, cucurbitacins, lignans",benefits:"Highest magnesium food source — critical for 300+ enzyme reactions. Zinc for immunity and testosterone. Cucurbitin: anti-helminthic activity (traditional use in Africa). Phytosterols inhibit cholesterol absorption.",use:"Magnesium repletion, zinc status, prostate health, anti-parasitic (traditional)",limits:"High in phytic acid. Very calorie-dense. Cucurbitin: anti-parasitic not established in RCTs."},
{id:47,name:"Tiger nuts (Chufa)",aka:"Cyperus esculentus — Ofio / Hausa groundnut",emoji:"🌰",cat:"nut",catLabel:"African tuber/seed",african:true,top3:false,kcal:398,carbs:55,protein:5,fat:23,fiber:33,gi:"Low",evidence:"Moderate",micro:"Potassium (600mg), Iron (7mg), Phosphorus (180mg), Magnesium (55mg), Vitamin C (6mg)",bio:"Oleic acid (MUFA), insoluble and soluble fibre, enzyme-resistant starch, flavonoids (C-glycosyl)",benefits:"Highest dietary fibre of any nut/tuber. Small RCTs: tiger nut milk reduces LDL and TG. Traditionally used for 4,000 years in Egypt and West Africa (Horchata in Spain). High prebiotic potential.",use:"Gut microbiome, LDL reduction, glycaemic control, dairy-free milk alternative",limits:"Very high calorie density. Phytic acid. Commercial tiger nut milk often sweetened. Digestibility variable."},
{id:48,name:"Sesame seeds",aka:"Sesamum indicum",emoji:"🌱",cat:"nut",catLabel:"Seed",african:true,top3:false,kcal:573,carbs:23,protein:18,fat:50,fiber:11.8,gi:"Low",evidence:"Moderate",micro:"Calcium (975mg — exceptional plant source), Iron (14.6mg), Magnesium (351mg), Zinc (7.8mg), Phosphorus (629mg)",bio:"Sesamin, sesamolin, sesaminol, lignans (sesamol), tocopherols, phytosterols",benefits:"Sesamin and sesamol: potent antioxidants with lipid-lowering properties (RCT evidence for blood pressure and cholesterol reduction). Exceptional calcium density — 100g provides ~100% RDA. Tahini is common in N. African diet.",use:"Calcium (dairy-free), blood pressure, lipid-lowering, plant protein",limits:"Sesame allergy — increasingly declared major allergen. Very calorie-dense. Phytic acid reduces mineral bioavailability."},
{id:49,name:"Egusi seeds",aka:"Citrullus lanatus var. — Melon seeds",emoji:"🌱",cat:"nut",catLabel:"African seed",african:true,top3:false,kcal:557,carbs:10,protein:28,fat:46,fiber:3.8,gi:"Low",evidence:"Low",micro:"Iron (6.6mg), Magnesium (244mg), Zinc (8.7mg), Phosphorus (476mg), Calcium (61mg)",bio:"Cucurbitacins, linoleic acid (omega-6), phytosterols, tocopherols",benefits:"One of the highest-protein Nigerian foods per 100g. Zinc density important for immune function. Cucurbitacins demonstrate anti-inflammatory properties in vitro. Staple in W. African soups (egusi soup).",use:"Protein intake (W. Africa), zinc repletion, energy density, cooking fat",limits:"High omega-6 fatty acids — ratio to omega-3 should be monitored. High calorie density. Most evidence mechanistic only."},
{id:50,name:"Brazil nuts",aka:"Bertholletia excelsa",emoji:"🌰",cat:"nut",catLabel:"Tree nut",african:false,top3:false,kcal:656,carbs:12,protein:14,fat:66,fiber:7.5,gi:"Low",evidence:"Moderate",micro:"Selenium (1917mcg — one nut = 100%+ RDA), Magnesium (376mg), Phosphorus (725mg), Thiamine (0.6mg), Copper (1.7mg)",bio:"Selenomethionine (organic, highly bioavailable), tocopherols, phytosterols, squalene",benefits:"Single highest dietary selenium source — critical for GPx antioxidant enzyme synthesis and thyroid function. 2015 RCT: 2 nuts/day restored selenium status and improved thyroid function markers in selenium-deficient women.",use:"Selenium repletion, thyroid health, antioxidant defence (GPx)",limits:"Selenium toxicity risk if >4 nuts/day (chronic). Very high in saturated fat. Aflatoxin contamination risk from poor storage."},
{id:51,name:"Cashews",aka:"Anacardium occidentale",emoji:"🌰",cat:"nut",catLabel:"Tree nut",african:false,top3:false,kcal:553,carbs:30,protein:18,fat:44,fiber:3.3,gi:"Low",evidence:"Moderate",micro:"Copper (2.2mg — highest nut), Magnesium (292mg), Iron (6.7mg), Zinc (5.8mg), B6 (0.4mg)",bio:"Anacardic acid (anti-bacterial, anti-tumour), cardanol, tocopherols, MUFA (oleic acid)",benefits:"Copper supports ceruloplasmin (iron transport) and lysyl oxidase (collagen/elastin cross-linking). Anacardic acid inhibits histone acetyltransferase (epigenetic anti-cancer — mechanistic). RCT evidence for LDL-C reduction.",use:"Copper status, iron transport, LDL reduction, magnesium",limits:"Lower fibre than other nuts. Cashew allergy. 'Raw' cashews are steam-processed — truly raw contain urushiol."},
{id:52,name:"Macadamia nuts",aka:"Macadamia integrifolia",emoji:"🌰",cat:"nut",catLabel:"Tree nut",african:false,top3:false,kcal:718,carbs:14,protein:7.9,fat:76,fiber:8.6,gi:"Low",evidence:"Moderate",micro:"Manganese (4.1mg), Thiamine (1.2mg), Copper (0.8mg), Magnesium (130mg), Iron (3.7mg)",bio:"Palmitoleic acid (omega-7 MUFA — unique), tocotrienols, squalene, phytosterols",benefits:"Palmitoleic acid reduces LDL particle size and improves insulin sensitivity (emerging evidence). Highest fat of any nut — extremely calorie-dense but predominantly MUFA. RCT: macadamia diet reduced LDL, TG.",use:"Lipid profile, ketogenic/LCHF diet, MUFA enrichment",limits:"Highest calorie density of all nuts. Toxic to dogs. Expensive."},
{id:53,name:"Hemp seeds",aka:"Cannabis sativa var. (non-psychoactive)",emoji:"🌱",cat:"nut",catLabel:"Seed",african:false,top3:false,kcal:553,carbs:8.7,protein:31.6,fat:48.7,fiber:4,gi:"Low",evidence:"Moderate",micro:"Manganese (7mg), Phosphorus (1650mg), Magnesium (700mg), Iron (7.95mg), Zinc (9.9mg)",bio:"GLA (gamma-linolenic acid — omega-6), SDA (omega-3), edestin protein (highly bioavailable), phytosterols",benefits:"Complete protein with PDCAAS comparable to egg. GLA has anti-inflammatory properties via DGLA pathway. Optimal 3:1 omega-6:omega-3 ratio. Edestin is the most digestible plant protein.",use:"Complete plant protein, anti-inflammatory omega-6 (GLA), mineral density",limits:"Contamination with THC traces — unreliable in drug testing. Expensive. Omega-6 still high overall."},
// ══════════ FRUITS & BERRIES ══════════
{id:54,name:"Blueberries",aka:"Vaccinium corymbosum",emoji:"🫐",cat:"fruit",catLabel:"Berry",african:false,top3:false,kcal:57,carbs:14,protein:0.7,fat:0.3,fiber:2.4,gi:"Low",evidence:"High",micro:"Vitamin C (9.7mg), Vitamin K (19mcg), Manganese (0.3mg), Copper (0.06mg), Folate (6mcg)",bio:"Anthocyanins (cyanidin-3-glucoside, delphinidin), pterostilbene, resveratrol, chlorogenic acid",benefits:"SR: blueberries significantly improved flow-mediated dilation and lowered diastolic BP. 2015 RCT: 22g freeze-dried/day reduced BP in hypertension. Anthocyanins cross BBB — cognitive benefit in aging cohorts.",use:"Endothelial function, hypertension, cognitive protection, anti-ageing",limits:"Higher fructose vs other berries. Oxalate content. High pesticide residue risk — organic preferred."},
{id:55,name:"Baobab fruit",aka:"Adansonia digitata — Monkey bread tree",emoji:"🌳",cat:"fruit",catLabel:"African superfruit",african:true,top3:false,kcal:227,carbs:52,protein:2.3,fat:0.3,fiber:44.5,gi:"Low",evidence:"Moderate",micro:"Vitamin C (280mg — 6× more than oranges), Calcium (293mg — 2× milk by weight), Potassium (1240mg), Iron (2.3mg), Magnesium (90mg)",bio:"Polyphenols (35× antioxidant level of grapes), proanthocyanidins, tartrate esters, mucilage, pectin",benefits:"Highest fibre of any fruit (44.5g/100g dry). Vitamin C content facilitates non-haem iron absorption. RCT (2013): baobab-enriched bread reduced GI by 30%. Prebiotic potential via mucilaginous polysaccharides.",use:"Vitamin C (Africa, scurvy prevention), prebiotic, glycaemic control, mineral absorption",limits:"Primarily consumed as powder (dry form) — calorie dense. Limited large RCTs. Not widely available outside Africa."},
{id:56,name:"Avocado",aka:"Persea americana",emoji:"🥑",cat:"fruit",catLabel:"Fruit",african:false,top3:false,kcal:160,carbs:9,protein:2,fat:15,fiber:6.7,gi:"Low",evidence:"Moderate",micro:"Potassium (485mg), Folate (81mcg), Vitamin K (21mcg), Vitamin E (2.1mg), Vitamin C (10mg)",bio:"Oleic acid (MUFA), beta-sitosterol, lutein, persenone A/B (anti-inflammatory), glutathione",benefits:"2018 meta-analysis: avocado raised HDL-C. MUFA reduces LDL oxidation. High potassium:sodium supports BP. Fat content increases carotenoid absorption from co-consumed foods 3–5×.",use:"Cardiovascular lipid profile, fat-soluble vitamin absorption, anti-inflammatory",limits:"High caloric density. Latex-fruit syndrome cross-reactivity. Water-intensive crop."},
{id:57,name:"Tamarind",aka:"Tamarindus indica",emoji:"🌳",cat:"fruit",catLabel:"African/Asian fruit",african:true,top3:false,kcal:239,carbs:63,protein:2.8,fat:0.6,fiber:5.1,gi:"Medium",evidence:"Moderate",micro:"Iron (2.8mg), Thiamine (0.43mg), Magnesium (92mg), Potassium (628mg), Niacin (1.9mg)",bio:"Tartaric acid, epicatechin, procyanidins, luteolin, apigenin, hydroxycitric acid",benefits:"Strong antioxidant profile. Traditional use for electrolyte restoration. Luteolin and apigenin have demonstrated anti-inflammatory and anti-cancer properties (in vitro). Tartaric acid is a unique antioxidant organic acid.",use:"Antioxidant, electrolyte balance, culinary acid, anti-inflammatory",limits:"High in simple sugars when consumed as paste/candy. Medium GI. May interact with aspirin (antiplatelet)."},
{id:58,name:"Strawberries",aka:"Fragaria × ananassa",emoji:"🍓",cat:"fruit",catLabel:"Berry",african:false,top3:false,kcal:32,carbs:7.7,protein:0.7,fat:0.3,fiber:2,gi:"Low",evidence:"High",micro:"Vitamin C (58.8mg), Folate (24mcg), Manganese (0.4mg), Potassium (153mg), Vitamin K (2.2mcg)",bio:"Fisetin, pelargonidin-3-glucoside (anthocyanin), ellagic acid, quercetin, kaempferol",benefits:"Fisetin: emerging senolytic evidence (clears senescent cells) — animal models promising. Ellagic acid inhibits carcinogen activation. RCTs: strawberry consumption improves lipid profiles and reduces inflammation markers.",use:"Cardiovascular, anti-ageing (fisetin), cancer risk, anti-inflammatory",limits:"Pesticide residue (dirty dozen). Cross-reactive with birch pollen (OAS)."},
{id:59,name:"Raspberries",aka:"Rubus idaeus",emoji:"🫐",cat:"fruit",catLabel:"Berry",african:false,top3:false,kcal:52,carbs:11.9,protein:1.2,fat:0.7,fiber:6.5,gi:"Low",evidence:"Moderate",micro:"Vitamin C (26.2mg), Manganese (0.7mg), Vitamin K (7.8mcg), Folate (21mcg), Copper (0.1mg)",bio:"Ellagitannins (→urolithins), quercetin, kaempferol, anthocyanins, raspberry ketones",benefits:"Highest fibre of any common berry (6.5g/100g). Ellagitannins convert to urolithins in gut — anti-inflammatory mitophagy inducers. Raspberry ketones: limited human evidence for metabolic effects (mostly in vitro).",use:"Gut health, antioxidant, anti-inflammatory, weight management (caloric efficiency)",limits:"Raspberry ketones hyped but weak human evidence. Pesticide residue concern."},
{id:60,name:"Pomegranate",aka:"Punica granatum",emoji:"🍎",cat:"fruit",catLabel:"Fruit",african:false,top3:false,kcal:83,carbs:18.7,protein:1.7,fat:1.2,fiber:4,gi:"Low",evidence:"Moderate",micro:"Vitamin C (10.2mg), Folate (38mcg), Potassium (236mg), Vitamin K (16.4mcg), Copper (0.2mg)",bio:"Punicalagins (strongest known antioxidant tannin), ellagic acid, anthocyanins, ursolic acid",benefits:"Punicalagins among highest antioxidant activity per gram of any food. RCTs: pomegranate juice reduces carotid IMT, lowers BP, and attenuates LDL oxidation. Anti-inflammatory via NF-κB inhibition.",use:"Cardiovascular (carotid IMT, BP), anti-inflammatory, prostate health",limits:"Juice high in sugar. CYP3A4 inhibitor — warfarin, statins, cyclosporine interactions. Expensive."},
{id:61,name:"Kiwi",aka:"Actinidia deliciosa",emoji:"🥝",cat:"fruit",catLabel:"Fruit",african:false,top3:false,kcal:61,carbs:14.7,protein:1.1,fat:0.5,fiber:3,gi:"Low",evidence:"High",micro:"Vitamin C (92.7mg — very high), Vitamin K (40.3mcg), Folate (25mcg), Potassium (312mg), Copper (0.1mg)",bio:"Actinidain (proteolytic enzyme), quercetin, luteolin, caffeic acid, zeaxanthin",benefits:"Multiple RCTs: kiwi significantly reduces platelet aggregation and improves fibrinolysis without bleeding risk. Actinidain improves protein digestion. High Vit C enhances non-haem iron absorption.",use:"Cardiovascular (platelet function), Vitamin C, digestion, iron absorption",limits:"Kiwi allergy (OAS with birch pollen, latex). Actinidain may tenderize gelatin-based foods."},
{id:62,name:"Figs",aka:"Ficus carica",emoji:"🍈",cat:"fruit",catLabel:"Fruit",african:true,top3:false,kcal:74,carbs:19.2,protein:0.8,fat:0.3,fiber:2.9,gi:"Medium",evidence:"Low",micro:"Calcium (35mg), Potassium (232mg), Magnesium (17mg), Iron (0.4mg), Vitamin B6 (0.1mg)",bio:"Ficus enzyme (ficain), psoralen, bergapten, quercetin, rutin",benefits:"Calcium content notable (dried figs: 162mg/100g — significant plant source). Ficain is a proteolytic enzyme. Traditional use in N. Africa and Middle East for GI conditions. Antifungal and antimicrobial properties (in vitro).",use:"Calcium (dairy-free), constipation, traditional GI support",limits:"High in simple sugars (dried figs especially). Medium GI. Photosensitisation (psoralen, bergapten) — skin contact with fresh fig latex + sun."},
{id:63,name:"Dates",aka:"Phoenix dactylifera",emoji:"🌴",cat:"fruit",catLabel:"North African fruit",african:true,top3:false,kcal:282,carbs:75,protein:2.5,fat:0.4,fiber:8,gi:"Low-Medium",evidence:"Moderate",micro:"Potassium (696mg), Magnesium (54mg), Copper (0.4mg), Manganese (0.3mg), Iron (1mg)",bio:"Flavonoids (luteolin, quercetin, apigenin), tannins, sterols, carotenoids, polyphenols",benefits:"Despite high sugar content, dates have low GI (around 42–62 depending on variety) due to fibre and polyphenols. RCT: dates improved labour outcomes (cervical ripening). Iron content supports haematopoiesis in arid-region diets.",use:"Energy density, iron and potassium, traditional N. African medicine, pre-partum nutrition",limits:"High in simple sugars (75g carbs/100g). Calorie dense — portion control. Dried dates very high sugar. Contraindicated in high GI diets."},
{id:64,name:"Watermelon",aka:"Citrullus lanatus",emoji:"🍉",cat:"fruit",catLabel:"Fruit",african:true,top3:false,kcal:30,carbs:7.6,protein:0.6,fat:0.2,fiber:0.4,gi:"High",evidence:"Moderate",micro:"Lycopene (4.5mg — higher than tomatoes when red-fleshed), Vitamin C (8.1mg), Potassium (112mg), Citrulline (0.7–1.5g), Vitamin A (28mcg RAE)",bio:"Lycopene (bioavailable — red variety), citrulline (nitric oxide precursor), cucurbitacins",benefits:"Citrulline → arginine → nitric oxide pathway: RCT evidence for BP reduction and exercise recovery. Lycopene: prostate cancer risk reduction (same evidence as tomatoes). Native to Africa — Kalahari Desert.",use:"Hypertension, exercise recovery, prostate cancer risk, hydration",limits:"High GI (72) despite low calories. Low fibre. Cross-reactive with ragweed pollen (OAS)."},
{id:65,name:"African mango (Ogbono)",aka:"Irvingia gabonensis",emoji:"🥭",cat:"fruit",catLabel:"African superfruit",african:true,top3:false,kcal:667,carbs:27,protein:8.5,fat:58,fiber:11,gi:"Low",evidence:"Moderate",micro:"Iron (3.5mg), Calcium (120mg), Magnesium (80mg), Phosphorus (250mg), Potassium (310mg)",bio:"Irvingia seed fat (unusual fatty acid profile), ellagic acid, terpenes, condensed tannins",benefits:"RCTs (Cameroon): Irvingia seed extract significantly reduced body weight, waist circumference, blood glucose, and LDL. Seeds used in W. African ogbono soup. IGOB131 extract has strongest human evidence.",use:"Weight management, LDL reduction, glycaemic control (seeds/extract)",limits:"Evidence concentrated in funded RCTs — independent replication needed. Seed fat is primarily lauric/myristic acid (saturated). Fruit pulp nutritional profile differs from seed."},
// ══════════ WHOLE GRAINS ══════════
{id:66,name:"Oats",aka:"Avena sativa",emoji:"🌾",cat:"grain",catLabel:"Whole grain",african:false,top3:false,kcal:389,carbs:66,protein:17,fat:7,fiber:10.6,gi:"Low",evidence:"High",micro:"Manganese (4.9mg), Phosphorus (523mg), Magnesium (177mg), Zinc (4mg), Iron (5mg)",bio:"Beta-glucan (3–8g/serving), avenanthramides (unique oat polyphenols), phytic acid, tocotrienols",benefits:"FDA-approved cardiovascular claim. Beta-glucan RCTs: ≥3g/day reduces LDL 5–10% (bile acid sequestration). 2023 SR (1.6M participants): 30g/day whole grains → 8% lower CVD risk, 6% lower all-cause mortality.",use:"LDL reduction (first-line dietary), glycaemic control, satiety, gut microbiome",limits:"Gluten cross-contamination (coeliac). Phytic acid reduces zinc/iron bioavailability. High carbohydrate."},
{id:67,name:"Teff",aka:"Eragrostis tef — Ethiopian grain",emoji:"🌾",cat:"grain",catLabel:"African whole grain",african:true,top3:false,kcal:367,carbs:73,protein:13.3,fat:2.4,fiber:8,gi:"Low",evidence:"Moderate",micro:"Iron (7.6mg — highest grain iron), Calcium (180mg — exceptional for grain), Zinc (3.6mg), Magnesium (184mg), Phosphorus (429mg)",bio:"Resistant starch, phytate (iron absorption modulator), polyphenols, GABA",benefits:"Staple of Ethiopia — injera flatbread. Highest iron content of any grain. Naturally gluten-free. Resistant starch content supports gut microbiome. Calcium density unusual for a grain — important in populations with low dairy access.",use:"Iron and calcium intake, gluten-free grain, gut health (resistant starch), Ethiopian diet adherence",limits:"Phytate reduces iron and zinc bioavailability — traditional fermentation (injera) partially mitigates this. Limited large RCTs. Moderate GI when ground."},
{id:68,name:"Fonio",aka:"Digitaria exilis — Acha / Iburu (W. Africa)",emoji:"🌾",cat:"grain",catLabel:"African whole grain",african:true,top3:false,kcal:360,carbs:73,protein:8,fat:1,fiber:4.3,gi:"Low",evidence:"Low",micro:"Iron (8.5mg), Zinc (2.3mg), Magnesium (123mg), Calcium (16mg), Methionine+Cysteine (high)",bio:"Methionine and cysteine (sulphur amino acids — rare in grains), B vitamins, resistant starch",benefits:"One of Africa's oldest cultivated grains. Naturally gluten-free with very low GI — suitable for diabetes management. High in sulphur amino acids (methionine, cysteine) — rare in plant proteins. Quick-cooking grain.",use:"Gluten-free grain, diabetes-friendly, sulphur amino acid source (complementing legumes)",limits:"Limited clinical human studies. Processing and milling affect nutrient retention. Not widely available internationally."},
{id:69,name:"Amaranth grain",aka:"Amaranthus cruentus/hypochondriacus",emoji:"🌾",cat:"grain",catLabel:"Pseudocereal",african:true,top3:false,kcal:371,carbs:65,protein:14,fat:7,fiber:6.7,gi:"Low",evidence:"Moderate",micro:"Manganese (3.3mg), Magnesium (248mg), Iron (7.6mg), Phosphorus (557mg), Lysine (0.75g — unique for grain)",bio:"Amaranthine, squalene, phytosterols, rutin, tocopherols",benefits:"30% more protein than cereals. Rich in lysine — the limiting amino acid in most grains. Squalene has anti-inflammatory and cholesterol-modulating properties. Gluten-free — usable in coeliac. RCT (small): amaranth reduced CVD risk markers.",use:"Plant protein, lysine intake, cardiovascular, gluten-free cereal",limits:"Oxalates and saponins (rinse before cooking). Not widely available. High oxalate in leaves."},
{id:70,name:"Sorghum",aka:"Sorghum bicolor — Jero / Guinea corn",emoji:"🌾",cat:"grain",catLabel:"African whole grain",african:true,top3:false,kcal:339,carbs:74,protein:11,fat:3.3,fiber:6.3,gi:"Low",evidence:"Moderate",micro:"Iron (4.4mg), Phosphorus (287mg), Zinc (1.7mg), Magnesium (165mg), Niacin (2.9mg)",bio:"Tannins (condensed), 3-Deoxyanthocyanins (unique to sorghum), ferulic acid, policosanol",benefits:"Second-most consumed grain in sub-Saharan Africa. Naturally gluten-free. 3-Deoxyanthocyanins are unique heat-stable antioxidants. Policosanol has cholesterol-lowering properties. Low GI — important for diabetic populations.",use:"Staple grain (Africa), gluten-free, diabetic diet, cholesterol management",limits:"Tannins (anti-nutrients) in some varieties — reduce mineral bioavailability and digestibility. Protein digestibility lower than wheat or maize."},
{id:71,name:"Millet",aka:"Pennisetum glaucum / Pearl millet — Gero",emoji:"🌾",cat:"grain",catLabel:"African whole grain",african:true,top3:false,kcal:378,carbs:73,protein:11,fat:4.2,fiber:8.5,gi:"Low",evidence:"Moderate",micro:"Iron (3mg), Magnesium (114mg), Phosphorus (285mg), Zinc (1.7mg), Niacin (4.7mg)",bio:"Polyphenols (ferulic acid, p-coumaric acid), phytate, resistant starch",benefits:"Drought-resistant staple of Sahel and W. Africa. High fibre and magnesium content. Gluten-free. Cohort data: millet consumption associated with lower T2D risk in African populations. Relatively low GI despite high starch content.",use:"Staple grain (W./E. Africa), glycaemic management, magnesium intake, gluten-free",limits:"Goitrogenic (contains goitrin) — high intake in iodine-deficient populations linked to thyroid enlargement. Phytate reduces mineral bioavailability."},
{id:72,name:"Brown rice",aka:"Oryza sativa (whole grain)",emoji:"🍚",cat:"grain",catLabel:"Whole grain",african:false,top3:false,kcal:216,carbs:45,protein:5,fat:1.8,fiber:3.5,gi:"Medium",evidence:"High",micro:"Manganese (1.8mg), Magnesium (43mg), Phosphorus (150mg), B3/Niacin (3mg), Selenium (14mcg)",bio:"Gamma-oryzanol, phytic acid, arabinoxylan, ferulic acid, lignans",benefits:"Replacing white rice with brown: 16% lower T2D risk (cohort). Gamma-oryzanol reduces cholesterol and LDL oxidation. Epidemiological: whole grain rice associated with CVD risk reduction.",use:"T2D prevention, cardiovascular, glycaemic management vs white rice",limits:"Medium GI. Arsenic content (inorganic) higher than white rice — relevant with daily high intake. Phytic acid."},
{id:73,name:"Quinoa",aka:"Chenopodium quinoa",emoji:"🌾",cat:"grain",catLabel:"Pseudocereal",african:false,top3:false,kcal:368,carbs:64,protein:14,fat:6,fiber:7,gi:"Low",evidence:"Moderate",micro:"Manganese (2mg), Magnesium (197mg), Phosphorus (457mg), Iron (4.6mg), Zinc (3.1mg)",bio:"Complete protein (PDCAAS 0.76), saponins, quercetin, kaempferol, ecdysteroids",benefits:"One of few plant foods with complete protein (all essential amino acids). Gluten-free with lower GI than most grains. Ecdysteroids: emerging anabolic evidence (animal models). Replaces meat protein in plant-based diets.",use:"Complete plant protein, gluten-free, sports nutrition, plant-based diets",limits:"Saponins bitter — rinse thoroughly. Expensive. Ecdysteroid human evidence emerging only."},
// ══════════ DAIRY & EGGS ══════════
{id:74,name:"Greek yogurt",aka:"Strained yogurt",emoji:"🥛",cat:"dairy",catLabel:"Fermented dairy",african:false,top3:false,kcal:97,carbs:3.6,protein:9,fat:5,fiber:0,gi:"Low",evidence:"High",micro:"Calcium (110mg), B12 (0.75mcg), Phosphorus (135mg), Riboflavin (0.27mg), Potassium (240mg)",bio:"Live cultures (L. bulgaricus, S. thermophilus), CLA, lactoferrin, bioactive peptides",benefits:"2022 SR (896k participants): high yogurt → 7% lower all-cause mortality, 11% lower CVD mortality. Fermentation improves protein bioavailability, reduces lactose. CLA: anti-adipogenic properties.",use:"Gut microbiome, protein, bone health, weight management",limits:"Full-fat: high SFA. Flavoured: added sugars. Dairy allergy. Heat-treated loses live culture."},
