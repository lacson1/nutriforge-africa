{id:321,name:"Sauerkraut (German style)",aka:"Fermented white cabbage — Sauerkraut",emoji:"🥬",cat:"fermented",catLabel:"European fermented vegetable",african:false,top3:false,kcal:19,carbs:4.3,protein:0.9,fat:0.1,fiber:2.9,gi:"Low",evidence:"Moderate",micro:"Vitamin C (14.7mg — stable in fermentation), Vitamin K (13.3mcg), Folate (24mcg), Lactobacillus (10^7–10^9 CFU/g), Sodium (661mg)",bio:"L. plantarum, L. mesenteroides, L. brevis (dominant fermenters), glucosinolates (from cabbage — anti-cancer), acetylcholine precursors, short-chain organic acids",benefits:"Traditional European fermented food with established probiotic benefit. L. plantarum shown to reduce LDL and CRP in RCTs. Glucosinolates from cabbage retained through fermentation. Vitamin C stable (acid environment). European Biome studies link raw sauerkraut consumption with microbiome diversity. Traditional in German, Polish, French Alsatian cuisine.",use:"Gut microbiome diversity (European traditional probiotic), Vitamin C, glucosinolates, anti-inflammatory",limits:"Very high sodium — rinse before eating for hypertension. Must be unpasteurised for live cultures. Histamine and biogenic amines — caution in HIT. Tyramine — MAOI interaction."},
{id:322,name:"Rye sourdough bread",aka:"Roggenbrot — German/Scandinavian",emoji:"🍞",cat:"grain",catLabel:"European whole grain bread",african:false,top3:false,kcal:259,carbs:48.3,protein:8.5,fat:3.3,fiber:6.2,gi:"Low",evidence:"High",micro:"Selenium (30mcg), Manganese (1.9mg), Phosphorus (215mg), B1/Thiamine (0.4mg), Iron (2.3mg), Arabinoxylan (high)",bio:"Arabinoxylan (prebiotic — highest of all breads), lactic acid (from sourdough fermentation), phytase (reduces phytate 60%), alkylresorcinols, lignans",benefits:"Multiple RCTs: rye sourdough produces significantly lower postprandial insulin response than white or even whole wheat bread. Sourdough fermentation: phytase reduces phytate 60% (improves mineral bioavailability), lowers GI, produces prebiotics. Traditional German/Nordic bread associated with lower T2D incidence in cohorts. Arabinoxylan highest of any common bread.",use:"T2D prevention (insulin response RCT), gut microbiome (arabinoxylan), mineral bioavailability (phytase), satiety",limits:"Contains gluten — coeliac contraindication. Sourdough must be genuine long-ferment (not commercial 'sourdough' flavoured bread). High sodium in commercial versions."},
{id:323,name:"Cultured butter",aka:"European-style fermented butter",emoji:"🧈",cat:"dairy",catLabel:"European fermented dairy",african:false,top3:false,kcal:717,carbs:0.6,protein:0.9,fat:81,fiber:0,gi:"Low",evidence:"Low",micro:"Vitamin A (684mcg RAE), Vitamin D (60 IU), Vitamin K2 MK-4 (15mcg), CLA (2.6g/100g — grass-fed), Butyric acid (3.2g)",bio:"Butyric acid (C4 — colonocyte fuel, anti-tumour, anti-inflammatory), CLA, MK-4 (Vitamin K2), fat-soluble vitamins (A, D, E, K), diacetyl (from fermentation)",benefits:"Butyric acid: colonocyte primary fuel, inhibits colon cancer cell proliferation, anti-inflammatory via HDAC inhibition (epigenetic). CLA: anti-adipogenic. MK-4 Vit K2: bone and cardiovascular health. Grass-fed cultured butter has superior CLA and MK-4. Diacetyl: antimicrobial. Traditional European dairy.",use:"Butyric acid (colonocyte health, anti-cancer), CLA, Vitamin K2 (MK-4), grass-fed dairy fat, cooking fat",limits:"Very high saturated fat and calories. Lactose allergy (trace amounts). Grass-fed only for full benefit — grain-fed has negligible CLA. Large amounts increase LDL."},
{id:324,name:"Smoked mackerel",aka:"Scomber scombrus — cold-smoked",emoji:"🐟",cat:"fish",catLabel:"European smoked oily fish",african:false,top3:false,kcal:232,carbs:0,protein:21.1,fat:15.8,fiber:0,gi:"Low",evidence:"High",micro:"B12 (19mcg — highest smoked fish), Selenium (51.3mcg), Vitamin D (360 IU), EPA+DHA (2,600mg/100g), Phosphorus (278mg)",bio:"EPA+DHA (2,600mg — among highest), astaxanthin, CoQ10, taurine, phospholipid-bound omega-3, carnosine",benefits:"Highest B12 of any smoked fish. Excellent EPA+DHA (2,600mg — higher than fresh mackerel due to concentration during smoking). Very high selenium and Vit D. Ready-to-eat format — high compliance. Traditional in UK, Scandinavia, Germany. Associated with Nordic diet longevity outcomes.",use:"Omega-3 (very high), B12, Vitamin D, selenium, ready-to-eat convenience, Northern European traditional",limits:"High sodium from smoking. PAH content — cold-smoked lower risk than hot-smoked. Histamine — some individuals react to smoked fish."},
{id:325,name:"Lutefisk alternative: Pickled herring",aka:"Clupea harengus — Bismarck/Rollmops",emoji:"🐟",cat:"fish",catLabel:"European pickled fish",african:false,top3:false,kcal:185,carbs:8.7,protein:18.4,fat:8.2,fiber:0,gi:"Low",evidence:"High",micro:"Vitamin D (227 IU), B12 (13mcg), Selenium (52mcg), EPA+DHA (1,200mg), Iodine (52mcg), Calcium (33mg)",bio:"EPA+DHA, lactic acid (from pickling — preservative), dill flavonoids, mustard isothiocyanates (when spiced), acetic acid",benefits:"Traditional Scandinavian and German preserved fish — very high omega-3, B12, and iodine. Pickling with vinegar and spices adds antimicrobial acetic acid and spice bioactives. Iodine supports thyroid function. Multiple large Nordic cohorts show oily fish consumption → lower CVD mortality and better cognitive ageing.",use:"Omega-3, iodine (thyroid), B12, Vitamin D, Nordic traditional preserved fish, cardiovascular",limits:"Very high sodium from brine. Histamine (fermented/pickled fish). Fish allergy. Parasites (anisakis) — commercially pickled products safe (acid kills parasites)."},
{id:326,name:"Gravlax (cured salmon)",aka:"Scandinavian salt-cured salmon",emoji:"🐟",cat:"fish",catLabel:"Scandinavian cured fish",african:false,top3:false,kcal:180,carbs:0,protein:20.3,fat:10.6,fiber:0,gi:"Low",evidence:"High",micro:"B12 (3.1mcg), Vitamin D (485 IU — highest cured fish), EPA+DHA (1,800mg/100g), Selenium (34mcg), Astaxanthin (2.5mg)",bio:"Astaxanthin, EPA+DHA, phospholipid-bound omega-3, CoQ10, dill flavonoids (dill curing), lemon polyphenols",benefits:"Very high Vit D (485 IU — 60% RDA per serving). Dill curing adds flavonoids (quercetin, isorhamnetin). Astaxanthin: 500× stronger antioxidant than Vit E. Omega-3 in phospholipid form superior bioavailability. Cold-cured (not heated) preserves heat-labile nutrients. Traditional Nordic food associated with longevity outcomes.",use:"Vitamin D (highest cured fish), omega-3, astaxanthin, dill flavonoids, Nordic diet adherence, B12",limits:"High sodium. Listeria risk — avoid in pregnancy/immunocompromised. Raw cure: avoid in high-risk individuals."},
{id:327,name:"Kefir (European style)",aka:"Fermented kefir grains milk",emoji:"🥛",cat:"fermented",catLabel:"Eastern European fermented dairy",african:false,top3:false,kcal:61,carbs:4.7,protein:3.4,fat:3.3,fiber:0,gi:"Low",evidence:"Moderate",micro:"Calcium (120mg), Tryptophan (0.06g), B12 (0.5mcg), B2/Riboflavin (0.17mg), Phosphorus (105mg), >30 probiotic strains",bio:"Lactobacillus kefiri (unique species), Leuconostoc, Acetobacter, Saccharomyces cerevisiae var. kefyr (yeast), kefiran polysaccharide",benefits:"Most diverse probiotic profile of any fermented food — >30 strains. Kefiran: anti-tumour and immunomodulatory polysaccharide (animal models). RCTs: kefir reduces IBS symptoms, improves lactose tolerance, lowers BP. Traditional Eastern European (Caucasus origin) — longest-lived populations globally had high kefir intake.",use:"Gut microbiome diversity (most strains of any fermented food), IBS, lactose tolerance, immunity, BP",limits:"Trace alcohol (0.5–3%). Dairy allergy. Some individuals react to yeast component. Must be genuine grain-fermented kefir for full diversity."},
{id:328,name:"Aged Gruyère",aka:"Swiss mountain hard cheese",emoji:"🧀",cat:"dairy",catLabel:"European aged cheese",african:false,top3:false,kcal:413,carbs:0.4,protein:29.8,fat:32.3,fiber:0,gi:"Low",evidence:"Moderate",micro:"Calcium (1011mg — very high), Phosphorus (605mg), B12 (3.3mcg), Vitamin K2 MK-9 (64mcg — highest aged cheese), Zinc (3.9mg)",bio:"MK-9 (Vitamin K2 — most bioavailable K2 form, 72hr half-life), MK-4, bioactive ACE-inhibitory peptides, CLA, tyrosine (from aging)",benefits:"Highest MK-9 (Vitamin K2) of aged cheeses — MK-9 half-life 72hrs (vs K1 6hrs) making it far more effective at activating osteocalcin (bone) and matrix Gla protein (prevents arterial calcification). ACE-inhibitory peptides from aging: antihypertensive without medication. Very high calcium. Zero lactose (aging).",use:"Vitamin K2 MK-9 (bone health, cardiovascular calcification prevention), calcium, antihypertensive peptides (ACE), lactose-free",limits:"Very high saturated fat. High sodium. Expensive. High caloric density."},
{id:329,name:"Miso (European barley)",aka:"Mugi miso — adapted European style",emoji:"🍲",cat:"fermented",catLabel:"Fermented grain paste",african:false,top3:false,kcal:199,carbs:26,protein:12.4,fat:6.2,fiber:5.4,gi:"Low",evidence:"Moderate",micro:"Vitamin K (29.3mcg), Manganese (0.9mg), Copper (0.4mg), Zinc (2.6mg), B6 (0.15mg), Live Aspergillus oryzae",bio:"Aspergillus oryzae enzymes, isoflavones (from soy), melanoidins (antioxidant), free amino acids (umami), GABA, short-chain organic acids",benefits:"Barley miso fermentation produces broader enzyme diversity than rice miso. Japanese cohort (JPHC study): miso consumption associated with reduced gastric cancer risk and lower all-cause mortality. Melanoidins: strong antioxidant activity. GABA: relaxant/anxiolytic. Umami intensity allows significant sodium reduction in cooking.",use:"Gut microbiome, cancer risk (cohort data), antioxidant (melanoidins), sodium reduction (umami), European traditional ferment",limits:"Very high sodium — do not boil (destroys enzymes). Soy allergy. Must not be pasteurised. Pregnancy soy caution."},
{id:330,name:"Sourdough bread (wheat)",aka:"Long-ferment lactic acid bread",emoji:"🍞",cat:"grain",catLabel:"European fermented bread",african:false,top3:false,kcal:274,carbs:52.8,protein:9.4,fat:1.5,fiber:2.7,gi:"Low",evidence:"High",micro:"Selenium (28.5mcg), Manganese (1.2mg), B1/Thiamine (0.34mg), Folate (97mcg), Iron (3.2mg), Phytase (reduces phytate 60%)",bio:"Lactic acid (L. sanfranciscensis, L. plantarum — dominant), acetic acid, phytase (mineral bioavailability), resistant starch, melanoidins",benefits:"Multiple RCTs: genuine long-ferment sourdough produces 30–50% lower postprandial glucose and insulin than commercial bread (same GI flour). Phytase reduces phytate 60% — mineral bioavailability significantly improved. Lactic acid delays gastric emptying. L. plantarum survives GI transit. Colonic fermentation by resistant starch produces butyrate.",use:"Glycaemic management (vs conventional bread), mineral bioavailability (phytase), gut microbiome, butyrate production",limits:"Contains gluten — must use genuine sourdough (20+ hour ferment). Commercial labelled sourdough often not genuine. High FODMAP — fructans remain despite fermentation."},
{id:331,name:"Camembert (raw milk)",aka:"Penicillium camemberti — French AOC",emoji:"🧀",cat:"dairy",catLabel:"French soft cheese",african:false,top3:false,kcal:300,carbs:0.5,protein:19.8,fat:24.3,fiber:0,gi:"Low",evidence:"Moderate",micro:"Calcium (388mg), B12 (1.3mcg), Vitamin K2 MK-4 (11mcg), Riboflavin (0.52mg), Phosphorus (347mg)",bio:"Penicillium camemberti enzymes (proteases, lipases), MK-4 Vitamin K2, CLA, bioactive peptides, sphingomyelin",benefits:"Sphingomyelin: unique phospholipid shown to reduce cholesterol absorption and inhibit colon cancer cell proliferation (in vitro). Penicillium enzymes break down casein to highly bioavailable peptides. CLA: anti-adipogenic. MK-4 K2 supports bone and cardiovascular health. Raw milk variety has superior probiotic profile.",use:"Sphingomyelin (cholesterol absorption inhibition), Vitamin K2, calcium, bioavailable protein, French traditional",limits:"Listeria risk in raw milk version — avoid in pregnancy/immunocompromised. High saturated fat. Lactose (trace). Very high caloric density."},
{id:332,name:"Olive tapenade",aka:"Ground olives + capers + anchovies + EVOO",emoji:"🫒",cat:"other",catLabel:"Mediterranean condiment",african:false,top3:false,kcal:275,carbs:6.3,protein:5,fat:26.4,fiber:5.8,gi:"Low",evidence:"Moderate",micro:"Hydroxytyrosol (olives+EVOO), Quercetin (capers — 180mg/100g), Omega-3 (anchovies), Calcium (anchovies), Selenium (anchovies — 40mcg)",bio:"Hydroxytyrosol (anti-oxidant, endothelial protection), quercetin (anti-inflammatory, BP), EPA+DHA (anchovies), IMP umami synergy",benefits:"Concentrated synergy of three Mediterranean foods: olive polyphenols + caper quercetin (highest food source) + anchovy omega-3. Combined PREDIMED-relevant bioactives in one condiment. Very high antioxidant capacity per gram. Traditional Provençal/Mediterranean condiment used in small amounts.",use:"Concentrated Mediterranean polyphenols, quercetin, omega-3, cardiovascular, anti-inflammatory — condiment use",limits:"Very high sodium (olives + capers + anchovies). Very calorie-dense. Used as condiment (1–2 tbsp). Fish and shellfish allergy."},
{id:333,name:"Borek (spinach and feta)",aka:"Turkish/Balkan/N. African filo pastry",emoji:"🥙",cat:"other",catLabel:"Mediterranean/Balkan dish",african:true,top3:false,kcal:272,carbs:22.4,protein:9.1,fat:16.7,fiber:1.7,gi:"Medium",evidence:"Low",micro:"Vitamin K (spinach — 200mcg), Calcium (feta — 180mg), Iron (2.8mg), Folate (spinach — 120mcg), Vitamin A (190mcg RAE)",bio:"Spinach lutein + nitrates, feta CLA + MK-4, dill flavonoids, filo grain resistant starch (when baked)",benefits:"Combines nutritional density of spinach (lutein, nitrate, iron, folate) with feta (CLA, calcium, K2) in a culturally significant format. Very high Vit K and folate. Traditional across Turkey, Balkans, and N. Africa (börek, burek, brik). Cultural food vehicle for nutrient-dense ingredients.",use:"Vitamin K, folate, iron, calcium, spinach lutein + nitrate, traditional N. African/Balkan/Turkish",limits:"Very high calorie density. High sodium (feta + pastry). Medium GI (filo pastry). Very high Vit K — warfarin interaction."},
{id:334,name:"Manchego cheese",aka:"Spanish sheep milk cheese — DOP",emoji:"🧀",cat:"dairy",catLabel:"Spanish aged cheese",african:false,top3:false,kcal:395,carbs:0,protein:31.5,fat:31.7,fiber:0,gi:"Low",evidence:"Moderate",micro:"Calcium (731mg), Phosphorus (606mg), B12 (2.2mcg), Zinc (3.7mg), Vitamin K2 MK-4+MK-9 (combined high)",bio:"Sheep milk CLA (3.5g/100g — higher than cow milk), rumenic acid (dominant CLA isomer), Vit K2, bioactive peptides (ACE-inhibitory), Vit A",benefits:"Sheep milk provides 3× higher CLA than cow milk — predominantly c9,t11 rumenic acid (most anti-carcinogenic CLA isomer). ACE-inhibitory peptides from aging: antihypertensive activity. Very high calcium. Traditional Spanish sheep milk cheese — key Mediterranean diet component. Zero lactose (aged 60+ days).",use:"Sheep milk CLA (superior to cow CLA), antihypertensive peptides, calcium, Vitamin K2, lactose-free traditional",limits:"Very high saturated fat. High calorie density. Expensive. High sodium."},
{id:335,name:"Ibérico ham (Jamón)",aka:"Pata Negra — acorn-fed Iberian pork",emoji:"🥩",cat:"meat",catLabel:"Spanish cured meat",african:false,top3:false,kcal:380,carbs:0,protein:43.3,fat:24.5,fiber:0,gi:"Low",evidence:"Moderate",micro:"B1/Thiamine (0.87mg — highest pork), Zinc (4.4mg), Selenium (27.5mcg), B12 (1.2mcg), Oleic acid (MUFA — 55% of fat)",bio:"Oleic acid (MUFA — same as EVOO, 55%), CLA, carnosine, carnitine, antioxidant peptides (from 24–48 month curing), natural nitrates",benefits:"Unique: acorn-fed Ibérico pigs produce pork with same oleic acid profile as EVOO (55% MUFA vs 11% standard pork). Clinical studies: Ibérico consumption does not raise LDL (unlike standard pork). Antioxidant peptides from long aging (24–48 months) reduce LDL oxidation. Part of Spanish Mediterranean longevity diet.",use:"MUFA-rich red meat (unique profile), anti-oxidant aged peptides, high protein, B1, traditional Spanish longevity diet",limits:"Very high sodium from curing. Very expensive. High caloric density. Contains nitrates/nitrites."},
{id:336,name:"Canned sardines in tomato sauce",aka:"Sardina pilchardus — tinned, EU",emoji:"🐡",cat:"fish",catLabel:"European canned oily fish",african:false,top3:false,kcal:175,carbs:4.8,protein:20.8,fat:8.1,fiber:0.8,gi:"Low",evidence:"High",micro:"Calcium (382mg — from bones), B12 (8.9mcg), Selenium (52.7mcg), EPA+DHA (1,480mg), Vitamin D (193 IU), Lycopene (from tomato sauce — 4mg)",bio:"EPA+DHA (phospholipid+triglyceride), lycopene (tomato sauce), calcium (dissolved bones), CoQ10, taurine, astaxanthin",benefits:"Dual omega-3 + lycopene delivery. Calcium from soft dissolved bones (382mg — same as dairy). Very high selenium. Tomato sauce lycopene: bioavailability enhanced by fish oil fat. Affordable, sustainable, shelf-stable. European staple associated with Mediterranean diet CVD benefit. Low mercury (short food chain).",use:"Dual omega-3 + lycopene, calcium (bone-in), selenium, cardiovascular, affordable omega-3, shelf-stable",limits:"High sodium (tomato sauce adds). Histamine in canned fish — some react. Purines — gout caution."},
{id:337,name:"Polenta (traditional)",aka:"Ground maize — Italian/European",emoji:"🌽",cat:"grain",catLabel:"European/Mediterranean grain dish",african:true,top3:false,kcal:362,carbs:76.9,protein:8.7,fat:3.6,fiber:7.3,gi:"Medium",evidence:"Low",micro:"Vitamin A (9mcg RAE), Phosphorus (241mg), Magnesium (93mg), Iron (2.7mg), Thiamine (0.4mg), Lutein+zeaxanthin (high — yellow maize)",bio:"Lutein + zeaxanthin (yellow maize — significant), ferulic acid, resistant starch, beta-cryptoxanthin, anthocyanins (blue/purple variety)",benefits:"Yellow maize polenta provides significant lutein + zeaxanthin for eye health (AMD prevention). Ferulic acid: potent antioxidant, bound to cell wall — cooked/ground polenta has superior bioavailability vs whole kernel. Traditional Italian/N. African food. Blue/purple polenta varieties have anthocyanin content.",use:"Lutein + zeaxanthin (eye health — yellow variety), ferulic acid antioxidant, gut microbiome (resistant starch), European/African staple",limits:"Medium GI when finely ground. Very low protein:carb ratio. Maize allergies possible. Aflatoxin contamination if poorly stored."},
{id:338,name:"Gazpacho (traditional)",aka:"Andalusian cold tomato soup",emoji:"🍅",cat:"veg",catLabel:"Spanish/Mediterranean dish",african:false,top3:false,kcal:35,carbs:5.1,protein:1.5,fat:1.5,fiber:1.4,gi:"Low",evidence:"Moderate",micro:"Lycopene (5.4mg — high — cooked tomato base), Vitamin C (18mg), Vitamin A (48mcg RAE), Quercetin (cucumber + garlic), Potassium (285mg)",bio:"Lycopene (blended tomato — enhanced bioavailability), quercetin (from cucumber, garlic, onion), allicin (garlic), EVOO hydroxytyrosol, capsanthin (red pepper)",benefits:"Blending and EVOO addition increases lycopene bioavailability 3–4× vs raw tomato. Low calorie (35 kcal/100g) with high nutrient density. Large Spanish cohort study: daily gazpacho consumption associated with significantly lower blood pressure and CV mortality. Multi-ingredient Mediterranean synergy in single dish.",use:"Lycopene (enhanced bioavailability), cardiovascular (Spanish cohort data), low-calorie anti-inflammatory, hydrating Mediterranean dish",limits:"Very high FODMAP (tomato, garlic, onion). Can trigger IBS. Allergy to nightshades or cucurbit family."},
{id:339,name:"Boiled new potatoes",aka:"Solanum tuberosum — waxy variety",emoji:"🥔",cat:"veg",catLabel:"European staple",african:false,top3:false,kcal:77,carbs:17.5,protein:2,fat:0.1,fiber:1.8,gi:"Low-Medium",evidence:"Moderate",micro:"Vitamin C (19.7mg), Potassium (421mg — higher than banana), B6 (0.3mg), Folate (16mcg), Chlorogenic acid (high)",bio:"Chlorogenic acid (anti-inflammatory, antidiabetic), patatin (bioactive potato protein — hypotensive peptides), protease inhibitors, resistant starch (when cooled)",benefits:"Cooling cooked potatoes converts starch to resistant starch (RS3) — dramatically increases prebiotic value. Patatin protein generates ACE-inhibitory peptides — antihypertensive. Highest potassium of common European vegetables (421mg). Chlorogenic acid inhibits glucose absorption. Potato Satiety Index: highest of any food tested (323 vs white bread 100).",use:"Resistant starch (eat cold/cooled), potassium (hypertension), satiety (highest food satiety index), ACE-inhibitory peptides",limits:"GI increases significantly when hot and mashed. Solanine in green/sprouted potatoes — toxic. Medium GI when hot."},
{id:340,name:"Beetroot (roasted)",aka:"Beta vulgaris — oven roasted",emoji:"🫀",cat:"veg",catLabel:"European vegetable",african:false,top3:false,kcal:44,carbs:10,protein:1.7,fat:0.2,fiber:2,gi:"Medium",evidence:"High",micro:"Dietary nitrate (280mg/100g — highest common vegetable), Folate (109mcg), Manganese (0.3mg), Betaine (114mg), Potassium (305mg)",bio:"Inorganic nitrate → NO via eNOS pathway, betacyanins (betalains), betaine (methylation), rutin (capillary health), glycine betaine",benefits:"Multiple RCTs: dietary nitrate from beetroot juice lowers BP 3–10 mmHg via eNOS/NO pathway. Exercise performance RCTs: beetroot nitrate improves VO2 efficiency by 3–5%. Betaine: reduces homocysteine (cardiovascular risk factor). Folate: methylation cycle. Traditional European root vegetable with strongest clinical evidence of any vegetable for BP.",use:"Hypertension (NO pathway — RCT), exercise performance (VO2), homocysteine reduction (betaine), folate, methylation",limits:"Beeturia (red/pink urine) — harmless but alarms patients. Medium GI. Oxalate content. High roasting temperature reduces nitrate 25%."},
{id:341,name:"Celeriac remoulade",aka:"Celery root + Dijon mustard + herbs",emoji:"🥗",cat:"veg",catLabel:"French/European dish",african:false,top3:false,kcal:186,carbs:8,protein:1.6,fat:16.1,fiber:1.8,gi:"Low",evidence:"Low",micro:"Phthalides (antihypertensive), Allyl isothiocyanate (Dijon mustard — anti-cancer), Vitamin K (41mcg), B6 (0.15mg), Potassium (300mg)",bio:"3-n-Butylphthalide (antihypertensive — from celeriac), allyl isothiocyanate (AITC — anti-tumour from mustard), EVOO polyphenols (if dressed), herbs flavonoids",benefits:"Traditional French brasserie dish combining celeriac phthalides (BP reduction) with Dijon mustard allyl isothiocyanate (potent Phase II enzyme inducer — anti-carcinogenic, same mechanism as cruciferous vegetables). Mayonnaise base adds MUFA/PUFA. Vitamin K from celeriac.",use:"Antihypertensive (phthalides), anti-cancer (allyl isothiocyanate from Dijon mustard), vitamin K, French traditional",limits:"High fat and calorie from mayonnaise. Vitamin K warfarin interaction. Traditional version uses commercial mayo — choose EVOO mayo for polyphenol benefit."},
{id:342,name:"Ribollita (Tuscan bean stew)",aka:"Tuscan bread + white beans + vegetables",emoji:"🫘",cat:"legume",catLabel:"Italian/Mediterranean dish",african:false,top3:false,kcal:96,carbs:16.1,protein:5.2,fat:2.1,fiber:5.9,gi:"Low",evidence:"Moderate",micro:"Iron (2.4mg), Folate (72mcg), Potassium (490mg), Calcium (87mg), Vitamin K (from kale — 150mcg)",bio:"Cannellini bean resistant starch + isoflavones, kale glucosinolates + lutein, EVOO polyphenols, rosemary rosmarinic acid, bread resistant starch (day-old bread increases RS)",benefits:"Traditional Tuscan dish specifically designed for day-old bread — increases resistant starch content significantly. Bean isoflavones + resistant starch support gut microbiome. Kale glucosinolates provide cruciferous anti-cancer benefit. EVOO polyphenols. Low calorie density with high satiety. Represents peasant longevity cuisine.",use:"Gut microbiome (resistant starch), cruciferous benefit (kale), cardiovascular (beans), EVOO polyphenols, Mediterranean traditional",limits:"Very high Vit K (from kale) — warfarin. Gluten from bread. FODMAP (beans). High sodium in commercial versions."},
{id:343,name:"Gazpacho andaluz variation — green",aka:"Ajo blanco — white garlic almond gazpacho",emoji:"🥛",cat:"other",catLabel:"Spanish/Mediterranean dish",african:false,top3:false,kcal:156,carbs:11.4,protein:4.5,fat:11.2,fiber:2.1,gi:"Low",evidence:"Moderate",micro:"Vitamin E (almonds — 7.3mg), Allicin (garlic — high), Oleic acid (EVOO), Tocopherols, Quercetin (grapes/cucumber garnish)",bio:"Allicin (garlic — antimicrobial, antihypertensive), almond tocopherols + phytosterols, EVOO hydroxytyrosol, grape resveratrol (garnish)",benefits:"Traditional Andalusian white gazpacho: high allicin from raw garlic (BP reduction, antimicrobial) + almond polyphenols + EVOO. Unlike red gazpacho — provides entirely different bioactive profile. RCT evidence for individual components (garlic BP, almond LDL). Almonds in PREDIMED-PLUS study contributed to CVD risk reduction.",use:"Allicin (BP, antimicrobial), almond LDL reduction + Vit E, EVOO polyphenols, Spanish traditional cold soup",limits:"Very high FODMAP (garlic, bread). High calorie from almonds and EVOO. Raw garlic — GERD, IBS exacerbation."},
{id:344,name:"Chimichurri sauce",aka:"Argentine herb sauce — parsley + garlic + EVOO",emoji:"🌿",cat:"other",catLabel:"South American/Mediterranean-style condiment",african:false,top3:false,kcal:262,carbs:4.8,protein:1.7,fat:27.4,fiber:2.6,gi:"Low",evidence:"Low",micro:"Vitamin K (from parsley — 800mcg/tbsp), Vitamin C (133mg/100g parsley), Allicin (garlic), EVOO hydroxytyrosol, Iron (parsley — 6.2mg)",bio:"Parsley apigenin + luteolin (anti-inflammatory, anti-cancer), allicin (garlic — antimicrobial, antihypertensive), EVOO hydroxytyrosol, oregano carvacrol, red wine vinegar polyphenols",benefits:"Extraordinarily high Vit K from concentrated parsley. Allicin from raw garlic (cardiovascular). EVOO polyphenols. Red wine vinegar adds anti-glycaemic acetic acid. Parsley apigenin: inhibits acetylcholinesterase (memory support, like sage but milder). Traditional Argentine condiment — now Mediterranean crossover staple.",use:"Vitamin K (concentrated parsley — bone health), allicin, EVOO polyphenols, anti-inflammatory, condiment use",limits:"Extremely high Vit K — major warfarin interaction. Very high FODMAP (raw garlic). Calorie-dense from EVOO."},
{id:345,name:"Lavender honey",aka:"Lavandula angustifolia — varietal honey",emoji:"🍯",cat:"other",catLabel:"European functional food",african:false,top3:false,kcal:304,carbs:82.4,protein:0.3,fat:0,fiber:0,gi:"High",evidence:"Low",micro:"Linalool (0.2%), Linalyl acetate (0.1%), Luteolin, Quercetin, Apigenin (from lavender nectar), Hydrogen peroxide, Pinocembrin",bio:"Linalool (anxiolytic — same as lavender essential oil but in lower concentration), lavender flavonoids (luteolin, apigenin), hydrogen peroxide (antimicrobial), pinocembrin",benefits:"Linalool: anxiolytic activity — clinical evidence from lavender aromatherapy extends to oral lavender preparations (Silexan RCTs for anxiety). Luteolin and apigenin: anti-inflammatory, GABA-ergic. Antimicrobial like all honeys (H2O2). Prebiotic effect. French and Provençal culinary tradition.",use:"Mild anxiolytic (linalool), antimicrobial, prebiotic, European traditional sweetener",limits:"Very high GI (82). High sugar content. Infant botulism under 12 months. Not suitable for diabetics. Adulteration common."},
{id:346,name:"Aioli (traditional Provençal)",aka:"Garlic + olive oil emulsion",emoji:"🧄",cat:"other",catLabel:"Mediterranean condiment/sauce",african:true,top3:false,kcal:422,carbs:2.8,protein:1.2,fat:45.3,fiber:0.2,gi:"Low",evidence:"Moderate",micro:"Allicin (raw garlic — very high), EVOO hydroxytyrosol, Oleic acid (MUFA 73%), Vitamin E (14mg), Phytosterols",bio:"Allicin (S-allyl cysteine — antihypertensive, antimicrobial, anti-platelet), hydroxytyrosol (endothelial), oleocanthal (COX-1/2 inhibitor), oleic acid, squalene",benefits:"Raw garlic allicin fully preserved (not heated). EVOO polyphenols intact (cold emulsion). Combined garlic + EVOO synergy provides maximum allicin + hydroxytyrosol antioxidant activity. Traditional in S. France, Spain, and N. Africa (Tunisia/Algeria). Used as condiment — small amounts deliver significant bioactives.",use:"Maximum allicin (raw garlic — BP, antimicrobial), EVOO polyphenols, anti-platelet, Mediterranean condiment",limits:"Very high caloric density. High FODMAP (garlic). Raw egg risk (Salmonella — traditional recipe). GERD, IBS exacerbation."},
{id:347,name:"Comte cheese",aka:"French Gruyère-style — AOC",emoji:"🧀",cat:"dairy",catLabel:"French aged cheese",african:false,top3:false,kcal:415,carbs:0.3,protein:27.7,fat:33.9,fiber:0,gi:"Low",evidence:"Moderate",micro:"Calcium (1000mg), B12 (3.6mcg — highest of French cheeses), Zinc (4.9mg), Phosphorus (615mg), Vitamin K2 (MK-4+MK-9)",bio:"MK-4 and MK-9 Vitamin K2, bioactive peptides (ACE-inhibitory), CLA, tyrosine crystals (tyrosinase products), complete protein, sphingomyelin",benefits:"Highest B12 of all common French cheeses (3.6mcg/100g). Vitamin K2 activates osteocalcin (bone mineralisation) and matrix Gla protein (prevents arterial calcification). ACE-inhibitory peptides from 18-month aging. Zero lactose. Traditional Comté region — raw milk from Montbéliarde cows grazing on mountain flowers.",use:"Vitamin K2, B12, calcium, antihypertensive peptides, lactose-free, French traditional",limits:"Very high saturated fat. High sodium. High calorie density. Expensive."},
{id:348,name:"Nordic berry mix",aka:"Lingonberry + cloudberry + bilberry",emoji:"🫐",cat:"fruit",catLabel:"Nordic berries",african:false,top3:false,kcal:52,carbs:13.1,protein:0.7,fat:0.4,fiber:4.2,gi:"Low",evidence:"Moderate",micro:"Anthocyanins (300–600mg/100g bilberry), Vitamin C (lingonberry — 14mg), Manganese (0.7mg), Lutein (bilberry — high), Resveratrol (lingonberry — trace)",bio:"Cyanidin-3-glucoside (bilberry — highest anthocyanin of Nordic berries), pterostilbene (lingonberry), benzoic acid (lingonberry — natural preservative), ellagitannins (cloudberry)",benefits:"Bilberry (wild European blueberry): RCT evidence for improved night vision, reduced retinal vascular permeability. Lingonberry: pterostilbene (more bioavailable than resveratrol — sirtuin activator), benzoic acid (antimicrobial, traditional preservative without refrigeration). Cloudberry: very high ellagitannins → urolithins. Nordic diet longevity staple.",use:"Vision health (bilberry RCT), longevity (pterostilbene — sirtuin), antimicrobial (lingonberry), antioxidant, Nordic diet adherence",limits:"Very seasonal and regional. Expensive outside Nordic countries. Bilberry may affect blood glucose (antidiabetic activity — monitor with meds)."},
{id:349,name:"Nettle tea / Stinging nettle",aka:"Urtica dioica — leaves",emoji:"🌿",cat:"leaf",catLabel:"European wild herb",african:false,top3:false,kcal:42,carbs:7.5,protein:2.7,fat:0.1,fiber:6.9,gi:"Low",evidence:"Moderate",micro:"Iron (1.6mg), Calcium (481mg — very high for a leaf), Vitamin K (498.6mcg — extremely high), Vitamin A (101mcg RAE), Silicon (bone-supportive mineral)",bio:"Scopoletin (anti-inflammatory), beta-sitosterol (BPH support), formic acid, polysaccharides (immunomodulatory), lectin (UDA — anti-viral, anti-fungal), quercetin",benefits:"Extraordinary calcium (481mg/100g) — comparable to dairy. RCT evidence: stinging nettle extract reduces symptoms of BPH (benign prostatic hyperplasia) and seasonal allergic rhinitis (anti-histamine activity). Beta-sitosterol: anti-androgenic. Traditional European wild food across UK, Germany, Scandinavia.",use:"Calcium (extraordinary plant source), BPH (prostate — RCT), anti-allergic/anti-histamine, iron, traditional European wild food",limits:"Extremely high Vit K — major warfarin interaction. Raw nettles cause skin irritation (heat/cooking deactivates). Diuretic effect. Fresh nettles only safe cooked or dried."},

function classifyDrug(limits) {
  var l = (limits || '').toLowerCase();
  if (l.indexOf('critical') > -1 || l.indexOf('ricin') > -1 || l.indexOf('fatal') > -1 ||
      l.indexOf('cyanide') > -1 || l.indexOf('annonacin') > -1 ||
      (l.indexOf('cyp3a4') > -1 && l.indexOf('statin') > -1)) return 'critical';
  if (l.indexOf('warfarin') > -1 || l.indexOf('anticoagulant') > -1 ||
      l.indexOf('cyp3a4') > -1 || l.indexOf('uterotonic') > -1 ||
      l.indexOf('g6pd') > -1 || l.indexOf('l-dopa interaction') > -1) return 'moderate';
  if (l.indexOf('interaction') > -1 || l.indexOf('allergy') > -1 ||
      l.indexOf('caution') > -1 || l.indexOf('avoid') > -1 ||
      l.indexOf('purine') > -1 || l.indexOf('oxalate') > -1 ||
      l.indexOf('fodmap') > -1 || l.indexOf('goitrogenic') > -1) return 'mild';
  return 'none';
}

function calcLongevity(f) {
  var score = f.evidence === 'High' ? 35 : f.evidence === 'Moderate' ? 20 : 5;
  score += Math.min(15, f.fiber * 1.5);
  score += Math.min(10, f.protein * 0.3);
  var bio = ((f.bio || '') + ' ' + (f.benefits || '')).toLowerCase();
  if (bio.indexOf('nrf2') > -1 || bio.indexOf('nf-kb') > -1 || bio.indexOf('inflammation') > -1) score += 8;
  if (bio.indexOf('rct') > -1 || bio.indexOf('randomis') > -1) score += 8;
  if (bio.indexOf('cancer') > -1 || bio.indexOf('cardiovascular') > -1 || bio.indexOf('mortality') > -1) score += 8;
  if (bio.indexOf('all-cause mortality') > -1 || bio.indexOf('longevity') > -1 || bio.indexOf('ageing') > -1) score += 6;
  if (bio.indexOf('microbiome') > -1 || bio.indexOf('akkermansia') > -1 || bio.indexOf('bifidobacterium') > -1) score += 5;
  if (f.gi === 'Low') score += 5;
  if (f.top3) score += 8;
  return Math.min(100, Math.round(score));
}

function confStars(ev) { return ev === 'High' ? 5 : ev === 'Moderate' ? 3 : 1; }


// ── RADAR SVG ────────────────────────────────────────────────
function radarSVG(axes, color, size) {
  color = color || 'var(--accent-green)';
  size  = size  || 90;
  if (!axes || axes.length < 5) return '';
  var cx = size/2, cy = size/2, r = size * 0.36;
  var labels = ['Protein','Fibre','Antioxid','Evidence','GI Safe'];
  var pts = axes.map(function(v, i) {
    var angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
    var rv = r * Math.min(1, (v || 0) / 100);
    return [(cx + rv * Math.cos(angle)).toFixed(1),
            (cy + rv * Math.sin(angle)).toFixed(1)];
  });
  var bg = axes.map(function(_, i) {
    var angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
    return [(cx + r * Math.cos(angle)).toFixed(1),
            (cy + r * Math.sin(angle)).toFixed(1)];
  });
  var poly  = pts.map(function(p){ return p.join(','); }).join(' ');
  var bgPts = bg.map(function(p){ return p.join(','); }).join(' ');
  return '<svg width="' + size + '" height="' + size +
    '" viewBox="0 0 ' + size + ' ' + size + '" style="overflow:visible">' +
    '<polygon points="' + bgPts + '" fill="var(--surface-2)" stroke="var(--card-border)" stroke-width="1"/>' +
    '<polygon points="' + poly + '" fill="' + color + '" fill-opacity="0.25" stroke="' + color + '" stroke-width="1.5"/>' +
    labels.map(function(lb, i) {
      var angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
      var lx = cx + (r + 10) * Math.cos(angle);
      var ly = cy + (r + 10) * Math.sin(angle);
      return '<text x="' + lx.toFixed(1) + '" y="' + ly.toFixed(1) +
        '" text-anchor="middle" dominant-baseline="middle" fill="var(--text-tertiary)" font-size="7">' + lb + '</text>';
    }).join('') +
    '</svg>';
}
function radarAxes(f) {
  var bio = ((f.bio || '') + ' ' + (f.benefits || '')).toLowerCase();
  var antioxidant = (bio.indexOf('antioxidant') > -1 || bio.indexOf('polyphenol') > -1 || bio.indexOf('flavonoid') > -1) ? 80 : 40;
  return [
    Math.min(100, f.protein * 3.5),
    Math.min(100, f.fiber * 6),
    antioxidant,
    f.evidence === 'High' ? 95 : f.evidence === 'Moderate' ? 60 : 25,
    f.gi === 'Low' ? 95 : (f.gi === 'Medium' || f.gi === 'Low-Medium') ? 60 : 25
  ];
}

function africanRegions(f) {
  if (!f.african) return [];
  var n = ((f.name || '') + ' ' + (f.aka || '') + ' ' + (f.benefits || '') + ' ' + (f.use || '')).toLowerCase();
  var regions = [];
  if (n.indexOf('nigeria') > -1 || n.indexOf('west africa') > -1 || n.indexOf('ghana') > -1 ||
      n.indexOf('senegal') > -1 || n.indexOf('yoruba') > -1 || n.indexOf('igbo') > -1 ||
      n.indexOf('mali') > -1 || n.indexOf('liberia') > -1 || n.indexOf('guinea') > -1) regions.push('West Africa');
  if (n.indexOf('ethiopia') > -1 || n.indexOf('east africa') > -1 || n.indexOf('kenya') > -1 ||
      n.indexOf('eritrea') > -1 || n.indexOf('tanzania') > -1 || n.indexOf('uganda') > -1) regions.push('East Africa');
  if (n.indexOf('north africa') > -1 || n.indexOf('egypt') > -1 || n.indexOf('morocco') > -1 ||
      n.indexOf('maghreb') > -1 || n.indexOf('sudan') > -1 || n.indexOf('tunisia') > -1) regions.push('North Africa');
  if (n.indexOf('central africa') > -1 || n.indexOf('cameroon') > -1 || n.indexOf('congo') > -1) regions.push('Central Africa');
  if (n.indexOf('southern africa') > -1 || n.indexOf('south africa') > -1 || n.indexOf('mozambique') > -1 ||
      n.indexOf('zimbabwe') > -1 || n.indexOf('zambia') > -1 || n.indexOf('malawi') > -1 ||
      n.indexOf('botswana') > -1 || n.indexOf('namibia') > -1 || n.indexOf('eswatini') > -1 ||
      n.indexOf('lesotho') > -1 || n.indexOf('rooibos') > -1 || n.indexOf('biltong') > -1 ||
      n.indexOf('zulu') > -1 || n.indexOf('xhosa') > -1) regions.push('Southern Africa');
  if (n.indexOf('sahel') > -1 || n.indexOf('fulani') > -1 || n.indexOf('borno') > -1 || n.indexOf('chad') > -1) regions.push('Sahel');
  if (regions.length === 0) regions.push('West Africa');
  var unique = [];
  regions.forEach(function(r) { if (unique.indexOf(r) === -1) unique.push(r); });
  return unique;
}

function prepNote(f) {
  if (!f.african) return '';
  var name = (f.name || '').toLowerCase();
  for (var key in PREP_NOTES) {

  }
  return '';
}

function openDrawer(name){
  closeDrawer();
  activeDrawer = name;
  var drawer = document.getElementById('drawer');
  var backdrop = document.getElementById('drawerBackdrop');
  var title = document.getElementById('drawerTitle');
  var body = document.getElementById('drawerBody');
  var titles = {ai:'AI Nutrition Assistant',plate:'My Plate',compare:'Compare Foods',combos:'Food Combinations',chart:'Nutrient Chart'};
  title.textContent = titles[name] || name;
  body.innerHTML = '';
  if(name==='ai') body.innerHTML = buildAIDrawer();
  else if(name==='plate') body.innerHTML = buildPlateDrawer();
  else if(name==='compare'){body.innerHTML = buildCompareDrawer();updateComparePanel();}
  else if(name==='combos'){body.innerHTML = buildCombosDrawer();renderCombos();wireCombosEvents();}
  else if(name==='chart'){body.innerHTML = '<div id="densityChart"></div>';setTimeout(buildDensityChart,50);}
  drawer.classList.add('open');
  backdrop.classList.add('visible');
  document.querySelectorAll('.ha-btn').forEach(function(b){b.classList.remove('active-drawer')});
  var btn = document.getElementById('btn'+name.charAt(0).toUpperCase()+name.slice(1));
  if(btn) btn.classList.add('active-drawer');
  // Wire up AI input
  if(name==='ai'){
    var inp = document.getElementById('aiInput');
    if(inp){inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAI();}});inp.focus();}
    loadAIChatHistory();
  }
  if(name==='plate') updatePlatePanel();
}
function closeDrawer(){
  var drawer = document.getElementById('drawer');

  backdrop.classList.remove('visible');
  document.querySelectorAll('.ha-btn').forEach(function(b){b.classList.remove('active-drawer')});
  activeDrawer = null;

  var browseBtn = document.querySelector('.mnav-btn');
  if(browseBtn){document.querySelectorAll('.mnav-btn').forEach(function(b){b.classList.remove('active')});browseBtn.classList.add('active')}
}

  if(activeCondition || filter !== 'all' || term){
    var parts = [];
    if(activeCondition){
      var c = CONDITIONS.filter(function(x){return x.id===activeCondition})[0];
      if(c) parts.push(appMode==='patient'?c.patient:c.pro);
    }

function checkDrugInteractions(med) {
  var resultEl = document.getElementById('drugCheckerResults');
  if (!resultEl) return;
  if (!med || med.length < 3) { resultEl.innerHTML = ''; return; }

  var medLower = med.toLowerCase();
  var matchedKeywords = null;
  Object.keys(DRUG_KEYWORDS).forEach(function(drug) {
    if (medLower.indexOf(drug) > -1) matchedKeywords = DRUG_KEYWORDS[drug];
  });

  if (!matchedKeywords) {
    // Generic: just show critical and moderate foods
    var critical = foods.filter(function(f){ return f.drugSev === 'critical'; });
    var moderate = foods.filter(function(f){ return f.drugSev === 'moderate'; });
    resultEl.innerHTML =
      '<div style="color:var(--text-tertiary);margin-bottom:6px">No specific interaction data for this medication. Showing all flagged foods:</div>' +
      (critical.length ? '<div><strong style="color:#C0392B">☠️ Critical (' + critical.length + '):</strong> ' + critical.slice(0,6).map(function(f){ return f.emoji + ' ' + f.name; }).join(', ') + '</div>' : '') +
      (moderate.length ? '<div style="margin-top:4px"><strong style="color:#E67E22">🔴 Moderate (' + moderate.length + '):</strong> ' + moderate.slice(0,6).map(function(f){ return f.emoji + ' ' + f.name; }).join(', ') + '</div>' : '');
    return;
  }

  // Find foods whose limits field contains any matched keyword
  var risky = foods.filter(function(f) {
    if (f.drugSev === 'none') return false;
    var limitsLower = (f.limits || '').toLowerCase();
    return matchedKeywords.some(function(kw){ return limitsLower.indexOf(kw) > -1; });
  });

  var critical = risky.filter(function(f){ return f.drugSev === 'critical'; });
  var moderate = risky.filter(function(f){ return f.drugSev === 'moderate'; });
  var mild     = risky.filter(function(f){ return f.drugSev === 'mild'; });

  if (!risky.length) {
    resultEl.innerHTML = '<div style="color:var(--accent-green)">✅ No specific interactions found for this medication in our database.</div>';
    return;
  }

  var html = '<div style="font-weight:600;margin-bottom:5px">⚠️ ' + risky.length + ' potential interaction(s) with <em>' + safeHtml(med) + '</em>:</div>';
  if (critical.length) {
    html += '<div style="margin-bottom:4px"><span style="background:#1a1a18;color:#fef2f2;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700">☠️ AVOID</span> ' +
      critical.map(function(f){ return '<span style="cursor:pointer;text-decoration:underline" onclick="jumpToFood(\'' + f.name.replace(/'/g,"\'") + '\')">' + f.emoji + ' ' + safeHtml(f.name) + '</span>'; }).join(' · ') + '</div>';
  }
  if (moderate.length) {
    html += '<div style="margin-bottom:4px"><span style="background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700">🔴 CAUTION</span> ' +
      moderate.map(function(f){ return '<span style="cursor:pointer;text-decoration:underline" onclick="jumpToFood(\'' + f.name.replace(/'/g,"\'") + '\')">' + f.emoji + ' ' + safeHtml(f.name) + '</span>'; }).join(' · ') + '</div>';
  }
  if (mild.length) {
    html += '<div><span style="background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700">⚠️ MONITOR</span> ' +
      mild.map(function(f){ return f.emoji + ' ' + safeHtml(f.name); }).join(' · ') + '</div>';
  }
  html += '<div style="font-size:10px;color:var(--text-tertiary);margin-top:6px">⚕️ Always verify with prescribing physician. This is a screening tool only.</div>';
  resultEl.innerHTML = html;
}

// ── DENSITY CHART ──
function buildDensityChart(){
  var wrap=document.getElementById('densityChart');if(!wrap)return;
  var W=340,H=260,pad=35;
  var data=foods.filter(function(f){return f.kcal>0&&f.protein>0});
  var maxX=Math.max.apply(null,data.map(function(f){return f.kcal}));
  var maxY=Math.max.apply(null,data.map(function(f){return f.protein}));
  var scaleX=function(v){return pad+(v/maxX)*(W-2*pad)};
  var scaleY=function(v){return H-pad-(v/maxY)*(H-2*pad)};
  var catColor={fish:'#2563eb',veg:'#16a34a',leaf:'#15803d',legume:'#ca8a04',nut:'#7c3aed',fruit:'#dc2626',grain:'#d97706',dairy:'#0891b2',meat:'#b91c1c',fermented:'#db2777',oil:'#f59e0b',fungi:'#6b7280',seafood:'#0369a1',other:'#6b7280',spice:'#c2410c'};
  var dots=data.map(function(f){return'<circle data-id="'+f.id+'" cx="'+scaleX(f.kcal).toFixed(1)+'" cy="'+scaleY(f.protein).toFixed(1)+'" r="3" fill="'+(catColor[f.cat]||'#888')+'" fill-opacity="0.7" style="cursor:pointer"><title>'+f.name+' | '+f.kcal+'kcal | '+f.protein+'g protein</title></circle>'}).join('');
  wrap.innerHTML='<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="font-size:9px;font-family:inherit"><line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="var(--card-border)"/><line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(H-pad)+'" stroke="var(--card-border)"/><text x="'+W/2+'" y="'+(H-2)+'" text-anchor="middle" fill="var(--text-tertiary)">Calories (kcal)</text><text x="6" y="'+H/2+'" text-anchor="middle" fill="var(--text-tertiary)" transform="rotate(-90,6,'+H/2+')">Protein (g)</text>'+dots+'</svg>';
  wrap.addEventListener('click',function(e){var circle=e.target.closest('circle');if(circle&&circle.dataset.id){closeDrawer();setTimeout(function(){var el=document.getElementById('c'+circle.dataset.id);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});if(!el.classList.contains('open'))el.click()}},200)}});
}

// ── EXPORT / PRINT ──
function exportCSV(){
  var list=foods.slice();
  if(activeCondition)list=list.filter(function(f){return f.conditions&&f.conditions.indexOf(activeCondition)>-1});
  if(filter==='african')list=list.filter(function(f){return f.african});
  else if(filter!=='all')list=list.filter(function(f){return f.cat===filter});
  if(term)list=list.filter(function(f){return(f.name+' '+(f.aka||'')+' '+(f.benefits||'')).toLowerCase().indexOf(term)>-1});
  var headers=['Name','Latin/Aka','Category','African','Kcal','Protein(g)','Carbs(g)','Fat(g)','Fibre(g)','GI','Evidence','Longevity','Drug','Micronutrients','Use'];
  var rows=[headers];
  list.forEach(function(f){rows.push([f.name,f.aka||'',f.catLabel,f.african?'Yes':'No',f.kcal,f.protein,f.carbs,f.fat,f.fiber,f.gi,f.evidence,f.longevity,f.drugSev,(f.micro||'').replace(/,/g,';'),(f.use||'').replace(/,/g,';')].map(function(v){return'"'+String(v).replace(/"/g,'""')+'"'}))});
  var csv=rows.map(function(r){return r.join(',')}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='nutriforge-'+(activeCondition||filter||'all')+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

var render = (function(){
  return function(){
    var list = foods.slice();
    if(filter==='favourites')list=list.filter(function(f){return!!favourites[f.id]});
    else if(filter==='african')list=list.filter(function(f){return f.african});
    else if(filter!=='all')list=list.filter(function(f){return f.cat===filter});
    if(term)list=list.filter(function(f){return([f.name,f.aka||'',f.benefits||'',f.bio||'',f.use||'',f.catLabel||'',f.micro||'',f.limits||'']).join(' ').toLowerCase().indexOf(term)>-1});
    if(evidenceFilter==='High')list=list.filter(function(f){return f.evidence==='High'});
    else if(evidenceFilter==='Moderate')list=list.filter(function(f){return f.evidence==='High'||f.evidence==='Moderate'});
    if(drugFilter==='critical')list=list.filter(function(f){return f.drugSev==='critical'});
    else if(drugFilter==='moderate')list=list.filter(function(f){return f.drugSev==='critical'||f.drugSev==='moderate'});
    else if(drugFilter==='mild')list=list.filter(function(f){return f.drugSev!=='none'});
    if(regionFilter!=='all')list=list.filter(function(f){return f.regions&&f.regions.indexOf(regionFilter)>-1});
    if(activeCondition)list=list.filter(function(f){return f.conditions&&f.conditions.indexOf(activeCondition)>-1});

    list.sort(function(a,b){
      if(activeCondition){var eo={High:0,Moderate:1,Low:2};var d=(eo[a.evidence]||2)-(eo[b.evidence]||2);if(d!==0)return d;return b.longevity-a.longevity}
      if(sort==='name')return a.name.localeCompare(b.name);
      if(sort==='kcal_asc')return a.kcal-b.kcal;if(sort==='kcal_desc')return b.kcal-a.kcal;
      if(sort==='protein')return b.protein-a.protein;if(sort==='fiber')return b.fiber-a.fiber;
      if(sort==='longevity')return b.longevity-a.longevity;if(sort==='confidence')return b.stars-a.stars;
      if(sort==='gi'){var o={Low:0,'Low-Medium':1,Medium:2,High:3};return(o[a.gi]||2)-(o[b.gi]||2)}
      return 0;
    });

    var favCountEl=document.getElementById('favCount');
    if(favCountEl){var fc=Object.keys(favourites).length;favCountEl.textContent=fc?'('+fc+')':''}

    var grid=document.getElementById('grid');if(!grid)return;

    // Update result count
    var rcEl=document.getElementById('resultCount');
    if(rcEl) rcEl.textContent=list.length+' of '+foods.length;

    var totalEl=document.getElementById('totalChip');
    if(totalEl && filter==='all' && !activeCondition) totalEl.textContent='All '+foods.length;

    // Apply view class
    grid.className='grid';

    else if(currentView==='table') grid.className='grid';

        (filter==='favourites'?'No saved foods yet.':'No foods match your filters.') +
        '<br><button onclick="clearAll()" style="margin-top:8px;padding:6px 16px;background:var(--surface-2);color:var(--text-primary);border:none;border-radius:20px;cursor:pointer;font-size:12px">Clear all filters</button></div>';

    }

    // ── TABLE VIEW ──
    if(currentView==='table'){
      var thtml='<div class="table-wrap"><table class="table-view"><thead><tr>';
      thtml+='<th onclick="sort=\'name\';render()">Food <span class="sort-arrow">↕</span></th>';
      thtml+='<th onclick="sort=\'kcal_asc\';render()">Kcal <span class="sort-arrow">↕</span></th>';
      thtml+='<th onclick="sort=\'protein\';render()">Protein <span class="sort-arrow">↕</span></th>';
      thtml+='<th>Carbs</th><th>Fat</th>';
      thtml+='<th onclick="sort=\'fiber\';render()">Fibre <span class="sort-arrow">↕</span></th>';
      thtml+='<th onclick="sort=\'gi\';render()">GI <span class="sort-arrow">↕</span></th>';
      thtml+='<th onclick="sort=\'longevity\';render()">LS <span class="sort-arrow">↕</span></th>';
      thtml+='<th onclick="sort=\'confidence\';render()">Evidence <span class="sort-arrow">↕</span></th>';
      thtml+='<th>Drug</th>';
      thtml+='<th>Actions</th>';
      thtml+='</tr></thead><tbody>';
      for(var ti=0;ti<list.length;ti++){
        var tf=list[ti];
        var tds=tf.drugSev;
        var tlsFill=tf.longevity>=90?'ls-fill-5':tf.longevity>=75?'ls-fill-4':tf.longevity>=55?'ls-fill-3':tf.longevity>=35?'ls-fill-2':'ls-fill-1';
        var tdpill=tds!=='none'?'<span class="drug-pill '+(tds==='critical'?'cr':tds==='moderate'?'mo':'mi')+'">'+(tds==='critical'?'CRIT':tds==='moderate'?'MOD':'MILD')+'</span>':'-';
        var tevBadge=tf.evidence==='High'?'<span class="ev-hi">High</span>':tf.evidence==='Moderate'?'<span class="ev-mo">Mod</span>':'<span class="ev-lo">Low</span>';
        var tInPlate=!!plateMap[tf.id];var tInComp=compareSet.indexOf(tf.id)>-1;var tIsFav=!!favourites[tf.id];
        thtml+='<tr class="'+(tf.african?'african-row':'')+'">'+

          '<td class="tv-num">'+tf.kcal+'</td>'+
          '<td class="tv-num" style="font-weight:700">'+tf.protein+'g</td>'+
          '<td class="tv-num">'+tf.carbs+'g</td>'+
          '<td class="tv-num">'+tf.fat+'g</td>'+
          '<td class="tv-num">'+tf.fiber+'g</td>'+
          '<td><span class="'+(tf.gi==='Low'?'ev-hi':tf.gi==='High'?'ev-lo':'ev-mo')+'" style="font-size:8px">'+tf.gi+'</span></td>'+
          '<td class="tv-num"><span class="tv-ls"><span class="tv-ls-bar"><span class="tv-ls-fill '+tlsFill+'" style="width:'+tf.longevity+'%"></span></span> '+tf.longevity+'</span></td>'+

          '<td class="tv-action">'+
            '<button class="ca-btn'+(tIsFav?' fav-active':'')+'" onclick="toggleFavourite('+tf.id+');event.stopPropagation()" style="padding:2px 6px;font-size:9px">'+(tIsFav?'★':'☆')+'</button> '+
            '<button class="ca-btn'+(tInPlate?' plate-active':'')+'" onclick="togglePlate('+tf.id+');event.stopPropagation()" style="padding:2px 6px;font-size:9px">'+(tInPlate?'✓':'+')+'</button>'+
          '</td>'+
        '</tr>';
      }
      thtml+='</tbody></table></div>';
      grid.innerHTML=thtml;
      return;
    }
    function closeTableExpand(){currentView='grid';var btn=document.querySelector('.vs-btn[data-view="grid"]');if(btn){document.querySelectorAll('.vs-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active')}render()}

    var html='';
    for(var i=0;i<list.length;i++){
      var f=list[i];
      var inCompare=compareSet.indexOf(f.id)>-1;
      var inPlate=!!plateMap[f.id];
      var ds=f.drugSev;

      var lsFill=f.longevity>=90?'ls-fill-5':f.longevity>=75?'ls-fill-4':f.longevity>=55?'ls-fill-3':f.longevity>=35?'ls-fill-2':'ls-fill-1';
      var drugPillHtml=ds!=='none'?'<span class="drug-pill '+(ds==='critical'?'cr':ds==='moderate'?'mo':'mi')+'">'+(ds==='critical'?'Critical':ds==='moderate'?'Caution':'Mild')+'</span>':'';

      var tid='tab'+f.id;

      // Condition tags for expanded view
      var condTagsHtml='';
      if(f.conditions&&f.conditions.length){
        condTagsHtml='<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:6px">';
        f.conditions.slice(0,6).forEach(function(cid){
          var c=CONDITIONS.filter(function(x){return x.id===cid})[0];if(!c)return;
          var lbl=appMode==='patient'?c.patient:c.pro;
          condTagsHtml+='<span style="font-size:8px;padding:2px 6px;border-radius:12px;background:var(--surface);color:var(--text-secondary);border:1px solid var(--card-border);cursor:pointer" onclick="selectCondition(\''+cid+'\');event.stopPropagation()">'+c.emoji+' '+safeHtml(lbl)+'</span>';

      }
      var regionExpandHtml='';
      if(f.regions&&f.regions.length){regionExpandHtml='<div class="exp-section-label" style="margin-top:6px">Origin</div><div class="exp-regions">'+f.regions.map(function(r){return'<span class="exp-region-tag">'+r+'</span>'}).join('')+'</div>'}
      var drugExpandHtml='';
      if(ds!=='none'){var dc=ds==='critical'?'cr':ds==='moderate'?'mo':'mi';var dt=ds==='critical'?'Critical Interaction':ds==='moderate'?'Moderate Interaction':'Mild Interaction';drugExpandHtml='<div class="exp-drug-box '+dc+'"><div class="exp-section-label">'+dt+'</div><div class="exp-text">'+safeHtml(f.limits)+'</div></div>'}
      var prepHtml=f.prep?'<div class="exp-prep-box"><div class="exp-section-label">Preparation</div><div class="exp-text">'+safeHtml(f.prep)+'</div></div>':'';
      var evSpan=appMode==='patient'?(f.evidence==='High'?'<span class="ev-hi">Strong</span>':f.evidence==='Moderate'?'<span class="ev-mo">Good</span>':'<span class="ev-lo">Traditional</span>'):'<span class="ev-'+f.evidence.toLowerCase().substring(0,2)+'">'+f.evidence+'</span>';

      html+=
      '<div class="card'+(f.african?' african-food':'')+(inCompare?' in-compare':'')+(inPlate?' in-plate':'')+'" id="c'+f.id+'" onclick="tog('+f.id+')" style="animation-delay:'+Math.min(i*0.02,0.2)+'s">'+
      '<div class="card-top">'+

          '<div class="card-name">'+safeHtml(f.name)+'</div>'+

        '</div>'+
        drugPillHtml+
      '</div>'+
      '<div class="card-macros">'+
        '<div class="mac-item"><span class="mac-val">'+f.kcal+'</span><span class="mac-lbl">kcal</span></div>'+
        '<div class="mac-item"><span class="mac-val">'+f.protein+'<span style="font-size:6px;font-weight:400;opacity:.5">g</span></span><span class="mac-lbl">protein</span></div>'+

        '<div class="mac-item"><span class="mac-val">'+f.fat+'<span style="font-size:6px;font-weight:400;opacity:.5">g</span></span><span class="mac-lbl">fat</span></div>'+

// ── SEARCH AUTOCOMPLETE ──
(function(){
  var srch=document.getElementById('srch');if(!srch)return;
  var wrap=srch.parentNode;wrap.style.position='relative';
  var sugBox=document.createElement('div');sugBox.className='search-suggestions';sugBox.style.display='none';wrap.appendChild(sugBox);
  function show(val){
    if(!val||val.length<2){sugBox.style.display='none';return}
    var t=val.toLowerCase();
    var m=foods.filter(function(f){return f.name.toLowerCase().indexOf(t)>-1||(f.aka||'').toLowerCase().indexOf(t)>-1}).slice(0,6);
    if(!m.length){sugBox.style.display='none';return}
    sugBox.innerHTML=m.map(function(f){return'<div class="search-sug-item" data-id="'+f.id+'"><span style="font-size:15px">'+f.emoji+'</span><span>'+safeHtml(f.name)+'</span><span style="font-size:10px;color:var(--text-tertiary);margin-left:auto">'+safeHtml(f.catLabel)+'</span></div>'}).join('');
    sugBox.style.display='block';
  }
  srch.addEventListener('input',function(e){show(e.target.value)});
  sugBox.addEventListener('click',function(e){
    var item=e.target.closest('.search-sug-item');if(!item)return;
    var id=parseInt(item.dataset.id);sugBox.style.display='none';srch.value='';term='';render();
    setTimeout(function(){var el=document.getElementById('c'+id);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});if(!el.classList.contains('open'))el.click()}},100);
  });
  srch.addEventListener('keydown',function(e){if(e.key==='Escape'){sugBox.style.display='none';srch.blur()}});
  document.addEventListener('click',function(e){if(!wrap.contains(e.target))sugBox.style.display='none'});
})();
