{id:171,name:"Egusi soup",aka:"West African melon seed soup",emoji:"🥣",cat:"other",catLabel:"Traditional African dish",african:true,top3:false,kcal:257,carbs:9.3,protein:12,fat:19,fiber:3.2,gi:"Low",evidence:"Low",micro:"Iron (4.5mg), Zinc (4.2mg), Magnesium (95mg), Calcium (70mg), Vitamin A (from vegetables)",bio:"Cucurbitacins (egusi), quercetin/rutin (bitter leaf), allicin (crayfish), iron (crayfish, egusi)",benefits:"One of the most nutritionally complete W. African dishes: egusi seeds (protein, zinc), leafy greens (iron, folate, Vit A), crayfish (calcium), palm oil (Vit A, tocotrienols). Multi-ingredient synergy.",use:"Complete nutrient meal (W. Africa), protein, iron, zinc, fat-soluble vitamin delivery",limits:"High calorie density. Palm oil content raises SFA intake. Variable nutritional profile."},
{id:172,name:"Ofe onugbu / Bitter leaf soup",aka:"Igbo bitter leaf soup",emoji:"🥣",cat:"other",catLabel:"Traditional African dish",african:true,top3:false,kcal:220,carbs:8,protein:14,fat:15,fiber:4,gi:"Low",evidence:"Low",micro:"Iron (4.1mg), Calcium (80mg), Vitamin A (150mcg RAE), Zinc (3.2mg), Folate (90mcg)",bio:"Vernoniamide (bitter leaf), cocoyam starch (thickener), uziza piperine, crayfish calcium",benefits:"Bitter leaf: blood glucose and anti-inflammatory activity (clinical data). Uziza (piperine): nutrient bioavailability enhancement. Crayfish: calcium. Cocoyam (thickener): resistant starch. Traditionally consumed for diabetes and liver health.",use:"Glycaemic management, anti-inflammatory, iron and calcium, traditional medicinal value",limits:"Variable composition. Bitter taste reduces adherence. Palm oil SFA content. Variable evidence quality."},
{id:173,name:"Okafor seeds",aka:"Beilschmiedia mannii",emoji:"🌰",cat:"nut",catLabel:"African seed",african:true,top3:false,kcal:398,carbs:35,protein:17,fat:24,fiber:7,gi:"Low",evidence:"Low",micro:"Iron (4.1mg), Calcium (68mg), Phosphorus (310mg), Zinc (2.9mg), Magnesium (120mg)",bio:"Sterols, alkaloids, tannins, saponins",benefits:"Traditional spice of S.E. Nigeria and Cameroon. Used in soups and pottage. Seeds provide protein and healthy fats. Traditional use for stomach disorders and anti-infective.",use:"Culinary spice (SE Nigeria), protein, traditional digestive aid",limits:"Very limited clinical evidence. Processing required."},
// Final group of 27 more foods
{id:174,name:"Oyster (African giant)",aka:"Egeria radiata — Isam",emoji:"🦪",cat:"seafood",catLabel:"African shellfish",african:true,top3:false,kcal:68,carbs:3.9,protein:7,fat:2.5,fiber:0,gi:"Low",evidence:"Low",micro:"Zinc (78mg), B12 (16mcg), Iron (6mg), Selenium (63mcg), Copper (4.5mg)",bio:"Taurine, DHMBA antioxidant, zinc-binding proteins",benefits:"Same exceptional zinc and B12 content as regular oysters. Traditional shellfish across riverine W. African communities (Niger Delta). Major zinc source in communities with minimal red meat intake.",use:"Zinc repletion, B12, protein, iron, traditional W. African shellfish",limits:"Pollution risk from harvesting in contaminated water. Shellfish allergy."},
{id:175,name:"Carob",aka:"Ceratonia siliqua",emoji:"🍫",cat:"other",catLabel:"Other",african:true,top3:false,kcal:222,carbs:49.1,protein:4.6,fat:0.6,fiber:39.8,gi:"Low",evidence:"Moderate",micro:"Calcium (348mg), Iron (2.9mg), Potassium (827mg), Magnesium (42mg), Phosphorus (79mg)",bio:"Gallic acid, epicatechin, quercetin, pinitol, inositol, polyphenols (higher than cocoa)",benefits:"Higher total polyphenol content than dark chocolate. Very high fibre (insoluble + soluble). Pinitol improves insulin sensitivity (animal models). Calcium content notable. Traditional carob syrup used in N. Africa/Middle East.",use:"High-fibre chocolate alternative, antioxidant, calcium, insulin sensitivity (weak evidence)",limits:"Less evidence than dark chocolate for cardiovascular benefits. High natural sugars. Limited RCT data."},
{id:176,name:"Bitter melon",aka:"Momordica charantia — Ejinrin",emoji:"🥒",cat:"veg",catLabel:"African/Asian vegetable",african:true,top3:false,kcal:17,carbs:3.7,protein:1,fat:0.2,fiber:2.8,gi:"Low",evidence:"Moderate",micro:"Vitamin C (84mg — very high), Folate (72mcg), Potassium (296mg), Vitamin A (24mcg RAE), Iron (0.4mg)",bio:"Charantin (hypoglycaemic compound), polypeptide-p (plant insulin analogue), momordicin, vicine, lectin",benefits:"Multiple small RCTs: bitter melon reduces fasting and postprandial blood glucose in T2D. Charantin activates AMPK pathway (like metformin, mechanistically). Polypeptide-p mimics insulin action. Used in traditional African, Indian, and Caribbean medicine.",use:"T2D glycaemic management, anti-diabetic (adjunct), vitamin C, anti-inflammatory",limits:"Vicine: haemolytic in G6PD deficiency. Uterotonic — avoid in pregnancy. Can cause hypoglycaemia with diabetes medications. Small RCTs only — not a replacement for medication."},
{id:177,name:"Noni fruit",aka:"Morinda citrifolia",emoji:"🍈",cat:"fruit",catLabel:"African/Pacific fruit",african:true,top3:false,kcal:47,carbs:11.3,protein:0.4,fat:0.1,fiber:0.3,gi:"Low",evidence:"Low",micro:"Vitamin C (33.6mg), Potassium (168mg), Calcium (17mg), Iron (0.1mg), Vitamin B3 (0.3mg)",bio:"Proxeronine, deacetylasperulosidic acid, scopoletin, rutin, morindin",benefits:"Traditionally used across W. Africa and Pacific for immune support, pain management, and anti-cancer. In vitro evidence for immune stimulation and anti-tumour activity. Scopoletin may reduce BP.",use:"Traditional immune support, antioxidant, anti-inflammatory (traditional)",limits:"Evidence primarily traditional and in vitro. Noni juice products vary enormously in quality. High potassium — caution in renal failure. Hepatotoxic in case reports (likely adulterated products)."},
{id:178,name:"Zucchini / Courgette",aka:"Cucurbita pepo",emoji:"🥒",cat:"veg",catLabel:"Vegetable",african:false,top3:false,kcal:17,carbs:3.1,protein:1.2,fat:0.3,fiber:1,gi:"Low",evidence:"Low",micro:"Vitamin C (17.9mg), Vitamin B6 (0.2mg), Potassium (261mg), Folate (24mcg), Manganese (0.2mg)",bio:"Lutein+zeaxanthin (2.1mg), cucurbitacins, beta-carotene",benefits:"Very low calorie density — excellent for caloric restriction. Lutein and zeaxanthin support macular health. Cucurbitacins anti-inflammatory. Highly versatile culinary vegetable.",use:"Weight management, eye health, caloric restriction, gut health",limits:"Very low nutrient density vs more colourful vegetables. Minimal clinical evidence."},
{id:179,name:"Artichoke",aka:"Cynara scolymus",emoji:"🌿",cat:"veg",catLabel:"Vegetable",african:false,top3:false,kcal:47,carbs:10.5,protein:3.3,fat:0.2,fiber:5.4,gi:"Low",evidence:"Moderate",micro:"Vitamin C (11.7mg), Vitamin K (14.8mcg), Folate (68mcg), Magnesium (60mg), Potassium (370mg)",bio:"Cynarin, silymarin-related compounds, luteolin, chlorogenic acid, inulin (prebiotic)",benefits:"Cynarin: promotes bile acid secretion (choleretic) → improves fat digestion and LDL clearance. RCTs: artichoke leaf extract reduces LDL by 18–22% and improves liver enzymes in NAFLD. Inulin: prebiotic for Bifidobacterium.",use:"LDL reduction, liver health (NAFLD), bile secretion, gut microbiome (inulin)",limits:"FODMAP — high inulin content causes GI symptoms in IBS. Artichoke allergy (Asteraceae family). Bile duct obstruction — contraindication for cynarin."},
{id:180,name:"Leeks",aka:"Allium porrum",emoji:"🌿",cat:"veg",catLabel:"Allium vegetable",african:false,top3:false,kcal:61,carbs:14.2,protein:1.5,fat:0.3,fiber:1.8,gi:"Low",evidence:"Low",micro:"Vitamin K (47mcg), Vitamin C (12mg), Folate (64mcg), Manganese (0.5mg), Vitamin B6 (0.2mg)",bio:"Allicin precursors, kaempferol, quercetin, FOS (prebiotic), polyphenols",benefits:"Allium family compounds (cardiovascular) present though weaker than garlic/onion. FOS: prebiotic supporting Bifidobacterium. Kaempferol has anti-cancer activity in vitro. Folate supports methylation.",use:"Gut microbiome, folate, allium cardiovascular benefits, methylation",limits:"Lower bioactive content than garlic/onion. FODMAP. Vitamin K warfarin interaction."},
{id:181,name:"Jerusalem artichoke (Sunchoke)",aka:"Helianthus tuberosus",emoji:"🥔",cat:"veg",catLabel:"Root vegetable",african:false,top3:false,kcal:73,carbs:17.4,protein:2,fat:0,fiber:1.6,gi:"Low",evidence:"Low",micro:"Iron (3.4mg), Thiamine (0.2mg), Potassium (429mg), Phosphorus (78mg), Copper (0.1mg)",bio:"Inulin (16–20g/100g — highest common food source), FOS, chlorogenic acid",benefits:"Highest dietary inulin source — potent prebiotic for Bifidobacterium and Lactobacillus. Iron content notable. Low GI despite carbohydrate content (inulin is non-digestible).",use:"Gut microbiome (strongest prebiotic food), iron, glycaemic management, weight management",limits:"'Jerusalem artichoke effect' — extreme flatulence and GI distress. FODMAP extreme. Start with very small portions. Not suitable for IBS-D patients."},
{id:182,name:"Kohlrabi",aka:"Brassica oleracea var. gongylodes",emoji:"🥦",cat:"veg",catLabel:"Cruciferous vegetable",african:false,top3:false,kcal:27,carbs:6.2,protein:1.7,fat:0.1,fiber:3.6,gi:"Low",evidence:"Low",micro:"Vitamin C (62mg), Vitamin B6 (0.2mg), Potassium (350mg), Copper (0.1mg), Manganese (0.1mg)",bio:"Glucosinolates, indole-3-carbinol, isothiocyanates, anthocyanins (purple variety)",benefits:"Cruciferous family benefits (glucosinolates, I3C). High vitamin C. Good fibre:calorie ratio. Purple kohlrabi has anthocyanin content. Versatile raw vegetable.",use:"Cruciferous benefits, vitamin C, raw vegetable variety, low-calorie",limits:"Very limited clinical evidence. Goitrogenic."},
{id:183,name:"Turnip",aka:"Brassica rapa subsp. rapa",emoji:"🥦",cat:"veg",catLabel:"Cruciferous vegetable",african:false,top3:false,kcal:28,carbs:6.4,protein:0.9,fat:0.1,fiber:1.8,gi:"Low",evidence:"Low",micro:"Vitamin C (21mg), Folate (15mcg), Potassium (233mg), Calcium (30mg), Vitamin K (0.1mcg)",bio:"Glucosinolates (gluconapin, progoitrin), glucobrassicin, indoles",benefits:"Cruciferous family phytochemicals. Folate supports methylation. Leaves (turnip greens) more nutritious than root — high in Vit K, C, and calcium.",use:"Cruciferous variety, folate, weight management (low calorie)",limits:"Goitrogenic. Low nutritional density vs other brassicas."},
{id:184,name:"Parsley",aka:"Petroselinum crispum",emoji:"🌿",cat:"spice",catLabel:"Herb",african:false,top3:false,kcal:36,carbs:6.3,protein:3,fat:0.8,fiber:3.3,gi:"Low",evidence:"Low",micro:"Vitamin K (1640mcg — highest of any herb), Vitamin C (133mg), Folate (152mcg), Iron (6.2mg), Vitamin A (421mcg RAE)",bio:"Apigenin, luteolin, myristicin, apiol, flavonoids",benefits:"Extraordinary Vit K content. Extremely high Vit C and folate for a herb. Apigenin: anti-cancer and anxiolytic properties (in vitro, animal models). Apiol: uterotonic (traditional) but hepatotoxic at high doses. Good garlic-detoxification (breath).",use:"Vitamin K, vitamin C, folate, culinary herb, antioxidant",limits:"Extremely high Vit K — significant warfarin interaction. Apiol uterotonic — avoid high doses in pregnancy. Mostly a garnish — small amounts consumed."},
{id:185,name:"Coriander / Cilantro",aka:"Coriandrum sativum",emoji:"🌿",cat:"spice",catLabel:"Herb",african:true,top3:false,kcal:23,carbs:3.7,protein:2.1,fat:0.5,fiber:2.8,gi:"Low",evidence:"Low",micro:"Vitamin K (310mcg), Vitamin A (337mcg RAE), Vitamin C (27mg), Folate (62mcg), Potassium (521mg)",bio:"Linalool, alpha-pinene, quercetin, kaempferol, coriandrin",benefits:"High Vit K and A for a herb. Linalool: anxiolytic properties (animal models). Anti-hyperglycaemic activity in animal studies. Heavy metal chelation — clinical evidence for mercury, lead, and cadmium reduction (preliminary). Widely used in N. and W. African cuisine.",use:"Heavy metal chelation (preliminary), anti-anxiety (linalool), Vitamin K, culinary herb",limits:"Soapy taste perception in genetic variant (SNP in OR6A2 — prevalence ~10–20%). Warfarin interaction (Vit K). Evidence primarily animal/mechanistic."},
{id:186,name:"Cumin",aka:"Cuminum cyminum",emoji:"🌿",cat:"spice",catLabel:"Spice",african:true,top3:false,kcal:375,carbs:44,protein:18,fat:22,fiber:10.5,gi:"Low",evidence:"Moderate",micro:"Iron (66.4mg — highest spice), Manganese (3.3mg), Calcium (931mg), Magnesium (366mg), Phosphorus (499mg)",bio:"Cuminaldehyde, thymol, carvacrol, limonene, apigenin",benefits:"Extraordinary iron density (though bioavailability from spice quantities is modest). RCT: cumin supplementation for 3 months significantly reduced HbA1c and fasting glucose in T2D. Anti-inflammatory and antimicrobial. N. African and Middle Eastern staple spice.",use:"Glycaemic control (T2D adjunct), iron (at spice doses), antimicrobial, anti-inflammatory",limits:"Very high in small spice quantities — caloric contribution minimal. Carvacrol interaction with certain medications."},
{id:187,name:"Cloves",aka:"Syzygium aromaticum",emoji:"🌿",cat:"spice",catLabel:"Spice",african:false,top3:false,kcal:274,carbs:65,protein:6,fat:13,fiber:33.9,gi:"Low",evidence:"Low",micro:"Manganese (60mg — extraordinary, highest food), Vitamin K (141.8mcg), Vitamin C (11.7mg), Calcium (632mg), Magnesium (260mg)",bio:"Eugenol (85% of essential oil — COX inhibitor), eugenic acid, beta-caryophyllene, oleanolic acid",benefits:"Highest manganese content of any food (manganese is SOD cofactor — antioxidant). Eugenol: potent COX-1/COX-2 inhibitor (comparable to aspirin at high doses). Anti-fungal and antimicrobial. Anti-ulcer activity (in vitro).",use:"Antioxidant (manganese/SOD), anti-inflammatory, antimicrobial, anti-fungal, digestive",limits:"Eugenol hepatotoxic at high supplemental doses. Anticoagulant interaction. Dental/mouth irritant. Use in culinary quantities only."},
{id:188,name:"Cardamom",aka:"Elettaria cardamomum — Atare ooru",emoji:"🌿",cat:"spice",catLabel:"Spice",african:true,top3:false,kcal:311,carbs:68,protein:11,fat:6.7,fiber:28,gi:"Low",evidence:"Moderate",micro:"Iron (13.97mg), Manganese (28mg), Zinc (7.5mg), Calcium (383mg), Magnesium (229mg)",bio:"1,8-Cineole (respiratory), alpha-terpinyl acetate, linalool, terpinen-4-ol, indane derivatives",benefits:"RCT: cardamom supplementation reduced BP and improved antioxidant status. Anti-inflammatory and antioxidant. Traditional use for respiratory conditions (1,8-cineole). Used in N. and E. African spice blends.",use:"Blood pressure (adjunct), antioxidant, respiratory health, anti-inflammatory",limits:"Very limited large RCTs. High manganese content — Mn toxicity at very high supplemental doses."},
{id:189,name:"Paprika",aka:"Capsicum annuum (dried, sweet)",emoji:"🌿",cat:"spice",catLabel:"Spice",african:true,top3:false,kcal:282,carbs:54,protein:14,fat:13,fiber:34,gi:"Low",evidence:"Low",micro:"Vitamin A (3691mcg RAE — extraordinary), Vitamin C (0.9mg dried), Iron (21.1mg), Vitamin E (29.1mg), Potassium (2280mg)",bio:"Capsanthin, capsorubin (unique carotenoids), beta-carotene, zeaxanthin, tocopherols",benefits:"Highest vitamin A food source (as provitamin A). Capsanthin and capsorubin are unique anti-inflammatory and antioxidant carotenoids. Vitamin E density. Used across N. Africa and Maghreb cuisine.",use:"Vitamin A, unique carotenoids, antioxidant, vitamin E",limits:"Used in small quantities — absolute micronutrient contribution per serving is moderate. Nightshade sensitivity."},
{id:190,name:"Cacao (Raw)",aka:"Theobroma cacao — unprocessed",emoji:"🍫",cat:"other",catLabel:"Other",african:true,top3:false,kcal:530,carbs:57,protein:20,fat:14,fiber:33,gi:"Low",evidence:"High",micro:"Iron (13.9mg), Magnesium (499mg — highest common food), Zinc (6.3mg), Copper (3.8mg), Manganese (3.8mg)",bio:"Epicatechin, catechins, procyanidins, theobromine, phenylethylamine, anandamide (endocannabinoid)",benefits:"Same flavanol evidence base as dark chocolate (FMD improvement, LDL reduction, BP reduction). Raw cacao retains more epicatechin than processed cocoa. Highest magnesium of any common food (499mg/100g). Theobroma cacao is native to Africa (Ghana/Côte d'Ivoire produce ~60% global supply). Anandamide and PEA contribute to mood elevation.",use:"Cardiovascular, magnesium repletion, antioxidant, mood, anti-inflammatory",limits:"High calorie. Caffeine and theobromine — caution in sensitive individuals and children. Heavy metal contamination (lead, cadmium) — source matters. Raw cacao may contain more mycotoxins."},
{id:191,name:"Peppers (scotch bonnet / habanero)",aka:"Capsicum chinense — Ata rodo / Nsukka pepper",emoji:"🌶️",cat:"veg",catLabel:"Chilli pepper",african:true,top3:false,kcal:40,carbs:8.8,protein:1.9,fat:0.5,fiber:1.5,gi:"Low",evidence:"Moderate",micro:"Vitamin C (183.5mg — highest vegetable), Vitamin A (214mcg RAE), B6 (0.3mg), Potassium (322mg), Folate (23mcg)",bio:"Capsaicin (very high — ~350,000 Scoville), quercetin, flavonoids, beta-carotene",benefits:"Capsaicin: TRPV1 receptor activation — thermogenic (increases energy expenditure by 4–5% acutely). RCT: capsaicin reduces appetite and increases satiety. Anti-platelet activity. Very high Vit C. Widely used in W. African cuisine.",use:"Weight management (thermogenic), vitamin C, cardiovascular, appetite reduction",limits:"GI irritation — GERD, IBS, gastritis exacerbation. TRPV1-mediated pain. Capsaicin hand irritation. Extreme heat levels."},
{id:192,name:"Ogiri Igbo (Castor oil seed ferment)",aka:"Ricinus communis — fermented",emoji:"🌿",cat:"fermented",catLabel:"Nigerian fermented condiment",african:true,top3:false,kcal:376,carbs:35,protein:19,fat:19,fiber:7,gi:"Low",evidence:"Low",micro:"Iron (5.8mg), Calcium (110mg), Zinc (4.1mg), Potassium (900mg), Magnesium (170mg)",bio:"Fermentation-derived amino acids, flavonoids, ricinoleic acid (detoxified)",benefits:"Traditional Igbo condiment for soups. Fermentation removes ricin toxin and converts nutrients to more bioavailable forms. High protein and iron. Umami flavour comparable to miso.",use:"Culinary use (Igbo soups), protein, iron, traditional fermented food",limits:"Must be properly fermented — unprocessed castor beans are fatally toxic. Limited clinical studies."},
{id:193,name:"Baobab yogurt / fermented baobab",aka:"Adansonia digitata fermented",emoji:"🥛",cat:"fermented",catLabel:"African fermented food",african:true,top3:false,kcal:90,carbs:15,protein:4,fat:2,fiber:6,gi:"Low",evidence:"Low",micro:"Vitamin C (80mg), Calcium (250mg), Iron (2mg), Potassium (800mg), Magnesium (70mg)",bio:"Probiotics (from fermentation), baobab polyphenols, tartrate, vitamin C (heat-stable in fermented form)",benefits:"Emerging traditional food preparation combining baobab's nutritional density with probiotic fermentation. Vitamin C more stable in fermented than fresh form. Calcium content high. Traditional preparation in Central/West Africa.",use:"Probiotic, vitamin C, calcium, combined baobab + gut microbiome benefits",limits:"Preparation quality varies. Limited clinical evidence. Not widely available outside Africa."},
{id:194,name:"Locust bean cake (Okpehie)",aka:"Prosopis africana — seeds",emoji:"🌰",cat:"nut",catLabel:"African seed",african:true,top3:false,kcal:340,carbs:42,protein:22,fat:9,fiber:12,gi:"Low",evidence:"Low",micro:"Iron (5.5mg), Calcium (95mg), Zinc (4.1mg), Magnesium (160mg), Phosphorus (340mg)",bio:"Tannins (reduced by processing), saponins, alkaloids, phenolic acids",benefits:"Traditional W. African seed used in Borno/North Nigeria soups. Good protein and iron profile. High fibre supports gut health. Alternative protein when animal protein unavailable.",use:"Plant protein, iron, gut health (fibre), traditional cooking (northern Nigeria)",limits:"Very limited clinical evidence. Anti-nutrients require soaking/roasting."},
{id:195,name:"Snail (Helix spp.)",aka:"Helix pomatia — Congo meat / Escargot",emoji:"🐌",cat:"meat",catLabel:"Traditional protein (Africa)",african:true,top3:false,kcal:90,carbs:2,protein:16.1,fat:1.4,fiber:0,gi:"Low",evidence:"Low",micro:"Iron (3.5mg), Magnesium (250mg — extremely high), Selenium (27.4mcg), Calcium (10mg), Zinc (1mg)",bio:"Taurine, complete protein, magnesium-binding proteins",benefits:"Extraordinary magnesium density (250mg/100g) — highest animal protein source. Iron and selenium support immune function. Traditional food across W./C./E. Africa. Low fat, high protein — excellent macronutrient profile.",use:"Protein, magnesium, iron, selenium, traditional African protein source",limits:"Snail-borne parasites (Angiostrongylus cantonensis, rat lungworm) if raw or undercooked — thorough cooking essential. Variable nutritional content depending on species and environment."},
{id:196,name:"Bush mango (Agbono) leaves",aka:"Irvingia gabonensis leaves",emoji:"🌿",cat:"leaf",catLabel:"African leaf",african:true,top3:false,kcal:40,carbs:6,protein:3.5,fat:0.6,fiber:3.2,gi:"Low",evidence:"Low",micro:"Iron (3.8mg), Calcium (78mg), Vitamin C (20mg), Vitamin A (95mcg RAE), Zinc (0.8mg)",bio:"Flavonoids, tannins, alkaloids, saponins",benefits:"Leaves used in traditional medicine across W. Africa. Iron and calcium supportive. Antimicrobial activity in vitro. Used in cooking across Cameroon and Nigeria.",use:"Iron and vitamin A, traditional medicine, culinary use",limits:"Very limited clinical evidence."},
{id:197,name:"Groundnut soup base",aka:"West African peanut paste",emoji:"🥜",cat:"other",catLabel:"African culinary base",african:true,top3:false,kcal:588,carbs:12,protein:28,fat:49,fiber:9,gi:"Low",evidence:"Low",micro:"Niacin (13.5mg), Magnesium (178mg), Vitamin E (8.5mg), Phosphorus (380mg), Potassium (660mg)",bio:"Resveratrol, p-coumaric acid, monounsaturated fats, phytosterols, vitamin E",benefits:"Traditional Nigerian/Ghanaian cooking base. High protein and healthy fats when made from pure groundnuts. Resveratrol and Vit E content. Fat enhances fat-soluble vitamin absorption from co-consumed greens.",use:"Protein base, vitamin E, resveratrol, cooking fat, absorption enhancer",limits:"Aflatoxin risk from stored groundnuts. Calorie-dense. Allergy risk."},
{id:198,name:"Coconut (fresh meat)",aka:"Cocos nucifera — fresh endosperm",emoji:"🥥",cat:"other",catLabel:"Tropical fruit/nut",african:true,top3:false,kcal:354,carbs:15.2,protein:3.3,fat:33.5,fiber:9,gi:"Low",evidence:"Low",micro:"Manganese (1.5mg), Copper (0.4mg), Selenium (10.1mcg), Iron (2.4mg), Phosphorus (113mg)",bio:"Lauric acid (MCT), caprylic acid (MCT), polyphenols, gallic acid, catechins",benefits:"Fresh coconut meat: fibre content higher than dried. Lauric acid raises HDL. Manganese supports bone enzymes. Traditional food across coastal W./E./C. Africa. Coconut water (liquid endosperm) is electrolyte-rich.",use:"MCT energy, fibre, coconut water electrolytes, manganese",limits:"High saturated fat (lauric + myristic). Very calorie-dense. Raised LDL in some individuals."},
{id:199,name:"Gari / Cassava granules",aka:"Manihot esculenta — processed",emoji:"🍚",cat:"grain",catLabel:"African processed staple",african:true,top3:false,kcal:357,carbs:85,protein:1.3,fat:0.3,fiber:1.3,gi:"High",evidence:"Low",micro:"Iron (1.5mg), Calcium (84mg), Potassium (271mg), Phosphorus (27mg), Thiamine (0.04mg)",bio:"Resistant starch (minor), linamarin (processed/neutralised), B vitamins (trace from fermentation)",benefits:"Staple energy food across W. Africa (Nigeria, Ghana, Liberia). Fermentation during processing partially reduces cyanogenic glycosides. Economical and widely available. Fermented form (wet gari) has probiotic activity.",use:"Energy staple (W. Africa), affordable carbohydrate source, food security",limits:"High GI — poor glycaemic management. Very low nutrient density per calorie. Cyanide risk if inadequately processed (particularly dry varieties). Not a health food — energy staple only."},
{id:200,name:"Kunu (Spiced grain drink)",aka:"Traditional W. African grain beverage",emoji:"🥛",cat:"fermented",catLabel:"African traditional beverage",african:true,top3:false,kcal:45,carbs:9.8,protein:0.9,fat:0.3,fiber:0.8,gi:"Medium",evidence:"Low",micro:"B vitamins (from millet fermentation), Iron (0.8mg), Calcium (25mg), Potassium (80mg), Magnesium (20mg)",bio:"Lactic acid bacteria, B vitamins, ginger/clove bioactives (from spicing), amylolytic enzymes",benefits:"Traditional fermented millet/sorghum drink of northern Nigeria. Spiced with ginger, cloves, and pepper — adds gingerols and eugenol bioactives. Probiotic bacteria from fermentation. Hydrating and energy-providing.",use:"Hydration, B vitamins, probiotics, ginger anti-inflammatory (adjunct), W. African cultural beverage",limits:"Variable sugar content. Quality and microbial safety varies enormously. Not standardised. Limited clinical evidence."},
// ══════════ ADDITIONAL FATTY FISH ══════════
{id:201,name:"Anchovies",aka:"Engraulis encrasicolus",emoji:"🐟",cat:"fish",catLabel:"Oily fish",african:false,top3:false,kcal:131,carbs:0,protein:20.4,fat:4.8,fiber:0,gi:"Low",evidence:"High",micro:"Calcium (147mg — high for fish), B12 (1.7mcg), Selenium (36.5mcg), Iron (3.2mg), Niacin (14mg)",bio:"EPA+DHA (1,478mg/100g), CoQ10, taurine, carnosine, phospholipid-bound omega-3",benefits:"Phospholipid-bound omega-3 shows superior bioavailability vs triglyceride form. High calcium (bones eaten whole). Same CVD mortality reduction as other oily fish. Lowest mercury of all oily fish (short food chain). Anchovy paste widely used in N. African/Mediterranean cuisine.",use:"Omega-3 (superior bioavailability), calcium, cardiovascular, mercury-safe oily fish",limits:"Very high sodium (especially canned/salted). Histamine-rich — problematic in HIT. Strong flavour."},
{id:202,name:"Smoked salmon",aka:"Cold-smoked Salmo salar",emoji:"🐟",cat:"fish",catLabel:"Processed oily fish",african:false,top3:false,kcal:117,carbs:0,protein:18.3,fat:4.3,fiber:0,gi:"Low",evidence:"Moderate",micro:"B12 (3.2mcg), Selenium (30mcg), Vitamin D (337 IU), Sodium (672mg), Phosphorus (200mg)",bio:"EPA+DHA (1,100mg/100g), astaxanthin, polycyclic aromatic hydrocarbons (PAH — cold-smoked minimal)",benefits:"Retains most omega-3 profile of fresh salmon. Lower PAH than hot-smoked (cold-smoked at <28°C). High protein and vitamin D. Convenient ready-to-eat format. Common in Scandinavian and N. European diets.",use:"Omega-3 convenience, Vitamin D, B12, lean protein",limits:"Very high sodium — not suitable for hypertension without moderation. Listeria risk in pregnancy/immunocompromised. PAH trace in smoked products."},
{id:203,name:"Cod liver oil",aka:"Gadus morhua — oil",emoji:"🐟",cat:"fish",catLabel:"Fish supplement/oil",african:false,top3:false,kcal:902,carbs:0,protein:0,fat:100,fiber:0,gi:"Low",evidence:"High",micro:"Vitamin D (10,000 IU/100ml — extremely high), Vitamin A (30,000 mcg RAE/100ml), EPA+DHA (18%+12%), Vitamin E (20mg)",bio:"Preformed retinol (very high), EPA, DHA, vitamin D3, vitamin K2 (trace)",benefits:"Norwegian HUNT study: cod liver oil use associated with lower depression risk. Omega-3 Index improvement confirmed in multiple RCTs. Vitamin D3 bioavailability superior to D2. Historically used to prevent rickets. Single teaspoon provides full vitamin D and omega-3 RDA.",use:"Vitamin D deficiency, omega-3, depression (adjunct), rickets prevention",limits:"Extreme Vit A — toxicity risk if overdosed (max 1 tsp/day). Not suitable in pregnancy at high doses (teratogenic Vit A). Fishy taste — compliance."},
{id:204,name:"Swordfish",aka:"Xiphias gladius",emoji:"🐟",cat:"fish",catLabel:"Large predatory fish",african:false,top3:false,kcal:121,carbs:0,protein:19.8,fat:4.4,fiber:0,gi:"Low",evidence:"Moderate",micro:"Selenium (52.5mcg — very high), B12 (2mcg), Niacin (10.5mg), Phosphorus (239mg), Potassium (314mg)",bio:"EPA+DHA (600mg/100g), carnosine, selenium-binding proteins, complete protein",benefits:"Very high selenium — supports GPx antioxidant enzyme and thyroid function. Good protein source. However, high mercury limits frequency of consumption.",use:"Selenium status, lean protein (occasional), B12, niacin",limits:"HIGH MERCURY — one of the highest-mercury fish. Limit to once monthly maximum. Avoid entirely in pregnancy, nursing, and children under 12."},

// ══════════ MORE SEAFOOD ══════════
{id:205,name:"Clams",aka:"Mercenaria mercenaria",emoji:"🦑",cat:"seafood",catLabel:"Shellfish",african:false,top3:false,kcal:74,carbs:2.6,protein:12.8,fat:1,fiber:0,gi:"Low",evidence:"Moderate",micro:"B12 (98.9mcg — highest food source by far), Iron (13.98mg), Selenium (24mcg), Zinc (1.4mg), Potassium (314mg)",bio:"Haem iron (highly bioavailable), taurine, phospholipids, complete protein, choline",benefits:"Single serving (85g) provides ~2,400% daily B12 — the richest B12 food on Earth. Critical for vegans/vegetarians with deficiency if shellfish are acceptable. Iron content combats anaemia. Taurine cardioprotective.",use:"B12 repletion (deficiency), haem iron, anaemia, cardiovascular (taurine)",limits:"Shellfish allergy. Filter feeder — accumulate pollutants and bacteria in contaminated water. Vibrio risk if raw. Moderate purine content."},
{id:206,name:"Scallops",aka:"Pecten maximus",emoji:"🦑",cat:"seafood",catLabel:"Shellfish",african:false,top3:false,kcal:88,carbs:3.2,protein:16.8,fat:0.8,fiber:0,gi:"Low",evidence:"Moderate",micro:"B12 (2.5mcg), Selenium (22.2mcg), Phosphorus (334mg), Zinc (1.3mg), Magnesium (22mg)",bio:"Taurine (high — cardiovascular), glycine-rich protein, phospholipid-bound omega-3, betaine",benefits:"Very high protein:calorie ratio. Taurine: evidence for reducing blood pressure and improving insulin sensitivity. Low fat makes scallops one of the leanest shellfish. Betaine supports methylation and liver health.",use:"Lean protein, taurine, cardiovascular, methylation support",limits:"Shellfish allergy. Often served with butter — adds SFA. Expensive. Low mercury."},
{id:207,name:"Lobster",aka:"Homarus americanus",emoji:"🦞",cat:"seafood",catLabel:"Crustacean",african:false,top3:false,kcal:89,carbs:0,protein:18.8,fat:0.9,fiber:0,gi:"Low",evidence:"Low",micro:"Copper (1.9mg — very high), Selenium (59.6mcg), Zinc (3.4mg), B12 (1.4mcg), Phosphorus (157mg)",bio:"Astaxanthin (shell pigment), chitin (shell), phospholipid-bound protein, taurine",benefits:"Extraordinary copper content (supports ceruloplasmin, iron transport, lysyl oxidase for collagen). High selenium. Very lean protein. Astaxanthin antioxidant in shell pigment. Low mercury.",use:"Copper status, selenium, lean protein, collagen synthesis support",limits:"Very expensive. Shellfish allergy. High cholesterol (70mg/100g) — debated in CV risk. Often served with butter — adds SFA."},

// ══════════ MORE DAIRY & EGGS ══════════
{id:208,name:"Goat milk",aka:"Capra aegagrus hircus",emoji:"🥛",cat:"dairy",catLabel:"Dairy",african:true,top3:false,kcal:69,carbs:4.5,protein:3.6,fat:4.1,fiber:0,gi:"Low",evidence:"Moderate",micro:"Calcium (134mg), B2/Riboflavin (0.21mg), Phosphorus (111mg), Potassium (204mg), Vitamin A (57mcg RAE)",bio:"Short-chain fatty acids (SCFA), A2 beta-casein (easier digestion), MCT (caprylic/capric acid), CLA",benefits:"A2 beta-casein protein is more digestible than A1 (cows milk) for many individuals. MCT content metabolised rapidly. Naturally homogenised — smaller fat globules easier to digest. Traditional dairy across Africa and Middle East. RCT: goat milk improved iron, calcium and phosphorus absorption vs cow milk.",use:"Dairy alternative (cow milk intolerance), iron absorption, digestibility, African traditional dairy",limits:"Still contains lactose — not suitable for lactose intolerance. Goat milk allergy cross-reactive with cow milk in some. Strong flavour."},
{id:209,name:"Parmesan cheese",aka:"Parmigiano-Reggiano",emoji:"🧀",cat:"dairy",catLabel:"Aged hard cheese",african:false,top3:false,kcal:392,carbs:3.2,protein:35.8,fat:25.8,fiber:0,gi:"Low",evidence:"Moderate",micro:"Calcium (1,184mg — highest dairy source), Phosphorus (694mg), Zinc (2.8mg), B12 (1.2mcg), Vitamin A (207mcg RAE)",bio:"Glutamate (umami — from aging), CLA, bioactive peptides (ACE-inhibitory), Vit K2 (MK-4 and MK-9)",benefits:"Highest calcium:calorie ratio of any cheese. Aging produces Vit K2 (MK-4/MK-9) — superior to K1 for bone and cardiovascular calcification prevention. Very low lactose (aging degrades it completely — safe in lactose intolerance). Bioactive peptides: ACE-inhibitory (antihypertensive effect).",use:"Calcium density, Vit K2, lactose-free dairy, bioactive peptides (BP), umami",limits:"High sodium (1,529mg/100g). Very high caloric density. Saturated fat. Expensive — real parmigiano only."},
{id:210,name:"Feta cheese",aka:"Feta PDO — Greece",emoji:"🧀",cat:"dairy",catLabel:"Soft cheese",african:false,top3:false,kcal:264,carbs:4,protein:14.2,fat:21.3,fiber:0,gi:"Low",evidence:"Moderate",micro:"Calcium (493mg), Phosphorus (337mg), B12 (0.69mcg), Zinc (2.9mg), Riboflavin (0.84mg)",bio:"CLA (conjugated linoleic acid), phospholipids, bioactive peptides, Vit K2 (MK-4), tryptophan",benefits:"CLA: anti-adipogenic and anti-inflammatory in RCTs. Low in carbohydrates. Probiotic potential if made from raw milk. Moderate calorie density vs other cheeses. Mediterranean diet staple with CVD outcome data (PREDIMED).",use:"Mediterranean diet, CLA, calcium, moderate-calorie cheese option",limits:"High sodium. Pasteurised feta has no live cultures. Listeria risk in raw-milk feta (pregnancy). Saturated fat."},
{id:211,name:"Quail eggs",aka:"Coturnix coturnix japonica",emoji:"🥚",cat:"dairy",catLabel:"Eggs",african:true,top3:false,kcal:158,carbs:0.4,protein:13.1,fat:11.1,fiber:0,gi:"Low",evidence:"Low",micro:"B12 (1.58mcg), Selenium (32mcg), Choline (263mg), Riboflavin (0.79mg), Vitamin A (156mcg RAE)",bio:"Ovomucoid (anti-allergenic), phosphatidylcholine, lutein, zeaxanthin, complete protein",benefits:"Higher protein density than hen eggs. Choline and phosphatidylcholine support cognitive function. Ovomucoid may have anti-allergenic properties (paradox: quail eggs sometimes tolerated in hen egg allergy — weak evidence). Traditional food in W./E. Africa.",use:"Nutrient-dense eggs, choline, Vitamin A, selenium, African traditional food",limits:"Same dietary cholesterol concerns as hen eggs (debated). Quail allergy possible. Small size — compliance/portion awkward."},
{id:212,name:"Whey protein (concentrate)",aka:"Bovine whey protein",emoji:"🥛",cat:"dairy",catLabel:"Protein supplement",african:false,top3:false,kcal:352,carbs:6.2,protein:79.8,fat:3.7,fiber:0,gi:"Low",evidence:"High",micro:"BCAA (leucine 10.4g/100g), Calcium (600mg), Phosphorus (820mg), B2 (0.52mg), Potassium (573mg)",bio:"Leucine (mTOR activator), beta-lactoglobulin, alpha-lactalbumin, lactoferrin, immunoglobulins",benefits:"Highest leucine:calorie ratio of any protein — strongest mTOR activation for muscle protein synthesis. Multiple RCTs confirm superior post-exercise MPS vs casein and plant protein. Lactoferrin: anti-inflammatory, antiviral. Alpha-lactalbumin: highest tryptophan of any protein.",use:"Muscle protein synthesis (post-exercise), leucine maximisation, sarcopenia prevention, recovery",limits:"Dairy allergy (whey is a milk protein). Lactose in concentrate — use isolate for intolerance. Kidney stress at very high intake in existing renal disease."},
{id:213,name:"Colostrum (bovine)",aka:"First milk — Bos taurus",emoji:"🥛",cat:"dairy",catLabel:"Functional dairy",african:false,top3:false,kcal:150,carbs:12,protein:15,fat:5,fiber:0,gi:"Low",evidence:"Moderate",micro:"Immunoglobulins IgG (20–25%), Lactoferrin (1.5g/100ml), IGF-1, Growth factors, Vitamin A",bio:"IgG, IgA, IgM immunoglobulins, lactoferrin, lysozyme, growth factors (IGF-1, TGF-beta), proline-rich polypeptides (PRPs)",benefits:"RCTs: bovine colostrum reduces GI permeability (leaky gut), improves athletic performance, and reduces upper respiratory infection frequency. IgG supports mucosal immunity. Lactoferrin antimicrobial. Gut lining regeneration.",use:"Gut permeability, immune function, upper respiratory infection prevention, sports performance",limits:"Very expensive. Ethical concerns (taken from newborn calves). Dairy allergy. IGF-1 content — theoretical cancer promotion concern at very high doses."},

// ══════════ MORE FUNGI ══════════
{id:214,name:"Lion's mane mushroom",aka:"Hericium erinaceus",emoji:"🍄",cat:"fungi",catLabel:"Medicinal mushroom",african:false,top3:false,kcal:35,carbs:7,protein:2.5,fat:0.3,fiber:2.8,gi:"Low",evidence:"Moderate",micro:"Potassium (280mg), Phosphorus (86mg), Zinc (0.7mg), Niacin (4.5mg), Selenium (2.1mcg)",bio:"Hericenones (A-H), erinacines (A-I — NGF inducers), beta-glucans, polysaccharides, ergothioneine",benefits:"Multiple small RCTs: lion's mane supplementation improved cognitive function in mild cognitive impairment (MCI). Hericenones and erinacines induce Nerve Growth Factor (NGF) synthesis — unique among foods. 2023 Australian RCT: improved cognitive performance in young adults. Anti-depressant and anxiolytic effects in pilot RCTs.",use:"Cognitive function (MCI, brain health), NGF stimulation, neuroprotection, mood",limits:"Rare allergy reports. Evidence from small trials — larger RCTs needed. Available as supplement or culinary mushroom."},
{id:215,name:"Chaga mushroom",aka:"Inonotus obliquus",emoji:"🍄",cat:"fungi",catLabel:"Medicinal mushroom",african:false,top3:false,kcal:25,carbs:6.1,protein:2.1,fat:0.3,fiber:7.6,gi:"Low",evidence:"Low",micro:"Betulinic acid, Melanin (highest natural source), Beta-glucans (25–30%), Superoxide dismutase (SOD), Potassium",bio:"Inotodiol, triterpenoids, betulinic acid, melanin complex, beta-1,3-glucans, ergosterol peroxide",benefits:"Highest antioxidant ORAC value of any mushroom. SOD activity: reduces oxidative stress. Betulinic acid: anti-cancer and anti-viral properties (in vitro). Melanin: unique antioxidant. Traditional use across Siberia and N. Europe for immune support. Emerging evidence for anti-tumour properties.",use:"Antioxidant (highest of all mushrooms), immune support, anti-cancer adjunct (mechanistic), adaptogenic",limits:"Very high oxalate — nephrotoxicity risk with chronic heavy use (case reports of renal failure). Anticoagulant interaction. Hypoglycaemic effect — caution with diabetes medication. Evidence mostly in vitro."},
{id:216,name:"Turkey tail mushroom",aka:"Trametes versicolor — Coriolus",emoji:"🍄",cat:"fungi",catLabel:"Medicinal mushroom",african:false,top3:false,kcal:30,carbs:7.2,protein:2.3,fat:0.2,fiber:8.1,gi:"Low",evidence:"Moderate",micro:"PSK/PSP polysaccharides (20–40%), Beta-glucans, Ergothioneine, Selenium (4mcg), Potassium",bio:"PSK (Krestin — approved cancer adjunct in Japan), PSP (polysaccharopeptide), beta-1,3-glucans, flavonoids",benefits:"PSK is an approved adjunct cancer therapy in Japan and China — multiple RCTs show improved survival and immune function in cancer patients. PSP stimulates NK cells and T-cell activity. 2012 NCCAM study: turkey tail restored immune function in breast cancer patients on chemotherapy.",use:"Cancer adjunct therapy (immune support), NK cell activity, gut microbiome (prebiotic beta-glucans), immunomodulation",limits:"Rarely eaten as culinary mushroom — typically supplement/tea. Not a standalone cancer treatment. Variable PSK/PSP content between products."},
{id:217,name:"Cordyceps mushroom",aka:"Cordyceps militaris / sinensis",emoji:"🍄",cat:"fungi",catLabel:"Medicinal mushroom",african:false,top3:false,kcal:25,carbs:5.8,protein:2.8,fat:0.4,fiber:5.2,gi:"Low",evidence:"Moderate",micro:"Cordycepin (adenosine analogue), Beta-glucans, Selenium (3mcg), Polysaccharides, Ergosterol",bio:"Cordycepin (3-deoxyadenosine — anti-tumour, anti-viral), polysaccharides, D-mannitol, ergosterol",benefits:"Multiple RCTs: Cordyceps supplementation improves VO2 max and exercise capacity in older adults. Cordycepin inhibits adenosine receptor — anti-inflammatory and anti-tumour (in vitro). Reduces fatigue markers. Anti-ageing effects in animal models (increases NAD+ via AMPK). Traditional Tibetan and Chinese medicine.",use:"Exercise performance/VO2 max, energy, anti-fatigue, anti-ageing (AMPK/NAD+ pathway)",limits:"Natural Cordyceps sinensis extremely expensive — most supplements are C. militaris (farmed). Anticoagulant interaction. May reduce blood glucose — caution with diabetes meds."},
{id:218,name:"Enoki mushrooms",aka:"Flammulina velutipes",emoji:"🍄",cat:"fungi",catLabel:"Culinary mushroom",african:false,top3:false,kcal:37,carbs:7.8,protein:2.7,fat:0.3,fiber:2.7,gi:"Low",evidence:"Low",micro:"Niacin (6.6mg), Riboflavin (0.26mg), Potassium (358mg), Phosphorus (105mg), Selenium (2.2mcg)",bio:"Proflamin (anti-cancer glycoprotein), FVE (immunomodulatory protein), beta-glucans, ergothioneine",benefits:"Proflamin: unique anti-tumour glycoprotein — inhibits tumour growth in animal models. FVE modulates immune response. Epidemiological data (Japan): high mushroom consumption associated with lower cancer incidence. Ergothioneine: longevity-associated dietary antioxidant.",use:"Anti-cancer (mechanistic), immune modulation, gut microbiome, low-calorie culinary mushroom",limits:"Raw enoki associated with Listeria monocytogenes recalls — cook thoroughly. Evidence mostly mechanistic. Long shelf-life product — popular in Japanese and Korean cuisine."},
{id:219,name:"Porcini mushrooms",aka:"Boletus edulis — Cep",emoji:"🍄",cat:"fungi",catLabel:"Culinary mushroom",african:false,top3:false,kcal:28,carbs:3.7,protein:3.3,fat:0.5,fiber:2.7,gi:"Low",evidence:"Low",micro:"Niacin (7.6mg — very high), Selenium (9.8mcg), Copper (0.3mg), Zinc (0.9mg), B1/Thiamine (0.12mg)",bio:"Ergothioneine (0.5mg/g — among highest culinary mushrooms), beta-glucans, polyphenols, glutamate (umami)",benefits:"Highest ergothioneine among culinary mushrooms. Ergothioneine: unique dietary antioxidant with its own transporter (ETT) in human cells — suggested as longevity vitamin. Very high niacin — supports NAD+ synthesis. Rich glutamate profile — intensifies umami flavour.",use:"Ergothioneine (longevity antioxidant), NAD+ precursor (niacin), umami enhancement, selenium",limits:"Expensive fresh. Dried porcini widely available. Wild-harvested — contamination risk in polluted areas. Purine content moderate."},

// ══════════ MORE LEAN MEATS ══════════
{id:220,name:"Bison / Buffalo",aka:"Bison bison",emoji:"🥩",cat:"meat",catLabel:"Lean red meat",african:false,top3:false,kcal:109,carbs:0,protein:21.7,fat:1.8,fiber:0,gi:"Low",evidence:"Moderate",micro:"B12 (2.8mcg), Zinc (4.4mg), Iron (2.2mg haem), Selenium (15.4mcg), Niacin (3.4mg)",bio:"CLA (3× higher than grain-fed beef), haem iron, carnosine, creatine, taurine",benefits:"Leaner than beef with superior CLA content. Grass-fed bison: excellent omega-3:omega-6 ratio. Haem iron and zinc: important for athletic performance and immunity. Lower saturated fat than beef while maintaining red meat nutrition.",use:"Lean red meat alternative, CLA, haem iron, zinc, omega-3 (grass-fed)",limits:"Less widely available. Higher cost. Red meat limitations apply. Overcooking produces heterocyclic amines."},
{id:221,name:"Duck breast (skinless)",aka:"Anas platyrhynchos",emoji:"🦆",cat:"meat",catLabel:"Poultry",african:false,top3:false,kcal:140,carbs:0,protein:23.5,fat:4.8,fiber:0,gi:"Low",evidence:"Low",micro:"B12 (0.4mcg), Niacin (5.5mg), B6 (0.5mg), Zinc (2.7mg), Selenium (22mcg)",bio:"Oleic acid (MUFA — 30% of fat), carnosine, taurine, complete protein, iron",benefits:"Skinless duck breast is surprisingly lean — fat is primarily unsaturated (oleic acid). High protein with good zinc content. Carnosine and taurine content support muscle function. Culturally significant in Chinese and French cuisine.",use:"Lean poultry alternative, MUFA fat profile, protein, zinc",limits:"Duck with skin is very high fat. Liver (not breast) risk for Vitamin A toxicity. Less available than chicken."},
{id:222,name:"Rabbit meat",aka:"Oryctolagus cuniculus",emoji:"🐇",cat:"meat",catLabel:"Lean white meat",african:true,top3:false,kcal:136,carbs:0,protein:20.1,fat:5.6,fiber:0,gi:"Low",evidence:"Low",micro:"B12 (7.2mcg — very high), B3/Niacin (7.2mg), Phosphorus (263mg), Selenium (38.5mcg), Zinc (1.9mg)",bio:"Haem iron, carnosine, complete protein, selenium-binding proteins, low-SFA lipid profile",benefits:"One of the leanest red meats available. Extremely high B12 (7.2mcg/100g). Very high selenium. Traditional food across Africa, Mediterranean, and Europe. Low SFA vs other red meats. High protein:calorie ratio.",use:"Lean red meat, B12, selenium, protein, traditional African/Mediterranean protein",limits:"Cultural resistance in some regions (pet animal). Limited commercial availability. Rabbit starvation (protein-only diet) if no fat — must balance macros."},
{id:223,name:"Ostrich meat",aka:"Struthio camelus",emoji:"🥩",cat:"meat",catLabel:"Lean red meat",african:true,top3:false,kcal:117,carbs:0,protein:22.1,fat:2.7,fiber:0,gi:"Low",evidence:"Low",micro:"Iron (3.2mg haem), B12 (2.5mcg), Zinc (3.5mg), Selenium (28mcg), Niacin (6.2mg)",bio:"Haem iron, carnosine, CLA, taurine, complete protein",benefits:"Leanest red meat commercially available — less fat than chicken breast. High haem iron and zinc. Native to Africa — sustainable farming in South Africa. Tastes similar to beef with superior nutritional profile. Important traditional food and growing commercial export.",use:"Lean protein, haem iron (anaemia), zinc, B12, sustainable African red meat",limits:"Limited availability outside South Africa and specialist markets. More expensive than chicken. Evidence limited — no large clinical trials specific to ostrich."},

// ══════════ MORE FUNCTIONAL FOODS ══════════
{id:224,name:"Matcha green tea",aka:"Camellia sinensis (shade-grown)",emoji:"🍵",cat:"other",catLabel:"Functional beverage",african:false,top3:false,kcal:2,carbs:0,protein:0.5,fat:0,fiber:0,gi:"Low",evidence:"Moderate",micro:"EGCG (137mg/g — 137× regular green tea), L-theanine (46mg/g), Caffeine (68mg/g), Vitamin C (60mg/g), Chlorophyll (very high)",bio:"EGCG (epigallocatechin gallate — highest concentration of any food), L-theanine, caffeine synergy, chlorophyll",benefits:"137× more EGCG than regular brewed green tea (whole leaf consumed). EGCG: VEGF inhibition (anti-tumour), AMPK activation (metabolic), neuroprotection. L-theanine + caffeine: RCT evidence for sustained calm alertness superior to caffeine alone. Chlorophyll: potential heavy metal chelation.",use:"Antioxidant (highest EGCG density), cognitive focus, cancer risk reduction, anti-inflammatory",limits:"Very high EGCG — hepatotoxicity risk with concentrated supplements. Fluoride accumulates in older leaves. Green tea extract supplements (not matcha) carry hepatotoxicity risk. Heavy metal risk in poorly sourced matcha."},
{id:225,name:"Kombucha",aka:"Fermented sweetened tea",emoji:"🍶",cat:"fermented",catLabel:"Fermented beverage",african:false,top3:false,kcal:30,carbs:7,protein:0.1,fat:0,fiber:0,gi:"Low",evidence:"Low",micro:"B vitamins (from fermentation), Acetic acid (1–2%), Organic acids, Trace minerals, Probiotics (variable)",bio:"SCOBY-derived organisms (Bactobacillus, Gluconobacter, Saccharomyces), glucuronic acid, polyphenols (from tea), acetic acid",benefits:"Live probiotic yeasts and bacteria support gut microbiome diversity. Glucuronic acid: supports liver detoxification (phase II). Organic acids (acetic, malic, gluconic) may reduce glycaemic response. Traditional fermented beverage with growing evidence base.",use:"Gut microbiome, liver support, probiotic beverage, anti-oxidant (from tea base)",limits:"Very variable probiotic content — unregulated. Alcohol content (0.5–3%). Acidic — tooth enamel erosion. Case reports of severe adverse events from home-brewed kombucha. Not suitable in immunocompromised."},
{id:226,name:"Psyllium husk",aka:"Plantago ovata — Ispaghula",emoji:"🌿",cat:"other",catLabel:"Dietary fibre supplement",african:false,top3:false,kcal:20,carbs:16,protein:0.5,fat:0,fiber:15.5,gi:"Low",evidence:"High",micro:"Soluble fibre (70% psyllium mucilage), Insoluble fibre, Calcium (20mg), Potassium (120mg)",bio:"Psyllium mucilage (arabinoxylan — highest viscosity dietary fibre), prebiotic oligosaccharides",benefits:"FDA-approved cardiovascular health claim — same as oat beta-glucan. Meta-analyses: 5g/day reduces LDL by 6–24% (bile acid sequestration). Reduces postprandial glucose by 20–30% (viscous gel formation). First-line treatment for IBS-C and constipation in NICE guidelines. Feeds Akkermansia muciniphila.",use:"LDL reduction (first-line dietary), glycaemic control, IBS-C, constipation, gut microbiome",limits:"Must take with large amounts of water (risk of oesophageal obstruction if dry). Allergy to psyllium (occupational hazard in healthcare). Reduces absorption of some medications — take separately. One of Bisoye's 8 anchor foods."},
{id:227,name:"Bee pollen",aka:"Multi-floral pollen",emoji:"🌸",cat:"other",catLabel:"Functional food",african:false,top3:false,kcal:293,carbs:49,protein:22,fat:4.4,fiber:7.2,gi:"Low",evidence:"Low",micro:"All essential amino acids, Vitamins B1/B2/B3/B6/B12/C/D/E, Iron (2.6mg), Zinc (5.6mg), Rutin (flavonoid)",bio:"Rutin (bioflavonoid), quercetin, kaempferol, myricetin, polyphenols, flavonoids, enzymes",benefits:"One of the most complete foods nutritionally — contains nearly all essential nutrients. Rutin: anti-inflammatory, capillary wall strengthening. Small clinical trials: reduced menopausal symptoms, improved athletic performance, anti-inflammatory. Used in traditional medicine across Africa and worldwide.",use:"Nutritional completeness, anti-inflammatory, menopausal symptoms (adjunct), antioxidant",limits:"Anaphylaxis risk — severe allergic reactions reported, especially in pollen allergy/hayfever sufferers. Avoid in pregnancy (uterotonic potential). Limited large RCTs."},
{id:228,name:"Manuka honey",aka:"Leptospermum scoparium honey",emoji:"🍯",cat:"other",catLabel:"Functional food",african:false,top3:false,kcal:304,carbs:82.4,protein:0.5,fat:0,fiber:0,gi:"High",evidence:"Moderate",micro:"MGO (methylglyoxal — 100–800mg/kg depending on UMF rating), Hydrogen peroxide, Phenolic acids, Quercetin",bio:"Methylglyoxal (MGO — unique antibacterial compound), hydrogen peroxide, defensin-1, pinocembrin, phenols",benefits:"MGO: clinical evidence for wound healing, antibacterial (MRSA-active). RCTs: manuka honey improves wound healing comparable to standard dressings. Cochrane review: honey reduces cough duration in children. Prebiotic effect on Bifidobacterium and Lactobacillus. WHO-recognised wound management agent.",use:"Wound healing, antibacterial (topical and oral), cough reduction, gut microbiome (prebiotic)",limits:"High GI (82) — raises blood sugar significantly. Expensive. Infant botulism risk under 12 months. Adulteration common — buy UMF-rated only. Not a substitute for antibiotics in serious infection."},
{id:229,name:"Propolis",aka:"Bee glue — resin mixture",emoji:"🍯",cat:"other",catLabel:"Functional supplement",african:false,top3:false,kcal:285,carbs:55,protein:5,fat:8,fiber:0,gi:"Low",evidence:"Moderate",micro:"Flavonoids (pinocembrin, chrysin, galangin), Phenolic acids (caffeic acid CAPE), Terpenes, Vitamins B3/C",bio:"CAPE (caffeic acid phenethyl ester — anti-cancer), pinocembrin (antimicrobial), artepillin C (Brazilian), quercetin",benefits:"Multiple RCTs: propolis reduces duration of common cold, improves wound healing, and has antifungal activity. CAPE inhibits NF-κB (anti-inflammatory, anti-tumour). Antimicrobial against MRSA, Candida, HSV (in vitro). Brazilian green propolis (artepillin C) has the strongest evidence.",use:"Immune support, wound healing (topical), antifungal, anti-inflammatory (NF-κB), cold duration",limits:"Allergy to propolis common — patch test before topical use. Cross-reacts with poplar/pollen allergy. Anticoagulant interaction. Variable composition between sources."},
{id:230,name:"Spirulina (blue-green)",aka:"Arthrospira platensis — fresh",emoji:"🌿",cat:"other",catLabel:"Algae/Superfood",african:true,top3:false,kcal:26,carbs:2.4,protein:5.9,fat:0.4,fiber:0.3,gi:"Low",evidence:"Moderate",micro:"Phycocyanin (C-PC — 14% dry weight), Iron (2.8mg), B12 pseudovitamin (not bioavailable), GLA (omega-6), Zeaxanthin",bio:"C-phycocyanin (anti-inflammatory, anti-tumour), beta-carotene, GLA (gamma-linolenic acid), phytoene",benefits:"Phycocyanin: inhibits 5-lipoxygenase (anti-inflammatory — similar mechanism to anti-leukotriene drugs). RCTs confirm lipid improvement (LDL reduction, HDL increase), anti-inflammatory markers reduction at 1–8g/day. Cultivated traditionally in Lake Chad (Africa) — dihé algae consumed by Kanembu people for centuries.",use:"LDL/HDL improvement, anti-inflammatory, iron (plant-based), traditional African superfood (Lake Chad)",limits:"B12 is pseudovitamin — not bioavailable for vegans. Cyanotoxin contamination risk (buy from tested sources). Heavy metal accumulation (arsenic, lead) in contaminated water. Phenylketonuria: contains phenylalanine."},
{id:231,name:"Maca root",aka:"Lepidium meyenii — Peruvian ginseng",emoji:"🌿",cat:"other",catLabel:"Adaptogen",african:false,top3:false,kcal:325,carbs:71.3,protein:10.2,fat:2.2,fiber:7.1,gi:"Low",evidence:"Moderate",micro:"Vitamin C (285mg — dried), Iron (14.8mg), Copper (5.9mg), Potassium (2050mg), Calcium (450mg)",bio:"Glucosinolates (macamides, macaenes), alkaloids (macaridine), flavonoids, benzylamine derivatives",benefits:"Multiple RCTs: maca improves sexual function/libido in both sexes, reduces menopausal symptoms, and improves energy levels. Macamides and macaenes appear to modulate endocrine function without direct hormonal action. Anti-fatigue and adaptogenic effects confirmed in systematic review.",use:"Libido/sexual function, menopausal symptoms, energy and stamina, adaptogenic",limits:"Limited evidence on long-term safety. Goitrogenic (glucosinolates) — caution in thyroid disease. Drug interactions not well characterised. Available mainly as supplement/powder."},
{id:232,name:"Ashwagandha",aka:"Withania somnifera — Indian winter cherry",emoji:"🌿",cat:"other",catLabel:"Adaptogen",african:false,top3:false,kcal:245,carbs:49,protein:3.9,fat:0.3,fiber:32,gi:"Low",evidence:"Moderate",micro:"Iron (3.3mg), Withanolides (steroidal lactones — 5–12%), Withaferin A, Withanolide A, Alkaloids (somnine, somniferine)",bio:"Withanolides (unique steroidal lactones), withaferin A (anti-tumour), withanolide A (neuroprotective), GABA-mimetic alkaloids",benefits:"Multiple RCTs: ashwagandha reduces cortisol (8–27%), improves VO2 max, increases testosterone in men, reduces anxiety/stress, and improves sleep quality. Adaptogenic — modulates HPA axis. 2019 RCT: 600mg/day significantly improved muscle strength and recovery.",use:"Stress/cortisol reduction, testosterone support, exercise performance, sleep quality, anxiety",limits:"Thyrotoxicosis reported with high doses. Liver injury case reports (rare). Nightshade family. Avoid in pregnancy (uterotonic). Withanolide content varies between products."},
{id:233,name:"Cacao nibs",aka:"Theobroma cacao — fermented, dried seeds",emoji:"🍫",cat:"other",catLabel:"Functional food",african:true,top3:false,kcal:570,carbs:32,protein:15,fat:44,fiber:10.9,gi:"Low",evidence:"High",micro:"Magnesium (499mg), Iron (13.9mg), Zinc (6.3mg), Copper (3.8mg), Manganese (3.8mg)",bio:"Epicatechin (highest concentration), catechins, procyanidins, theobromine, PEA (phenylethylamine), anandamide",benefits:"Same evidence base as dark chocolate but without added sugar or dairy — purer flavanol delivery. Epicatechin: improves FMD, reduces LDL, and activates AMPK/SIRT1. Anandamide: endocannabinoid — mood elevation. Theobromine: vasodilator. Native to Africa (W. African production 60% global). Used in traditional Aztec medicine.",use:"Cardiovascular (FMD, LDL), magnesium, anti-inflammatory, mood, antioxidant",limits:"High caloric density. Stimulant (theobromine, caffeine). Heavy metal contamination (lead, cadmium) from some origins. Phytic acid."},
{id:234,name:"Lucuma",aka:"Pouteria lucuma — Inca gold",emoji:"🌰",cat:"fruit",catLabel:"Exotic fruit",african:false,top3:false,kcal:329,carbs:76,protein:4.2,fat:2.4,fiber:1.5,gi:"Low",evidence:"Low",micro:"Beta-carotene (high), Iron (3.3mg), B3/Niacin (3.5mg), Calcium (92mg), Zinc (1.4mg)",bio:"Xanthophylls (carotenoids), polyphenols, flavonoids, beta-carotene",benefits:"Low GI despite high carbohydrate — suitable as natural sweetener with lower glycaemic impact than sugar. Rich in beta-carotene and iron. Emerging evidence for wound-healing (skin application) and anti-inflammatory. Natural caramel flavour — popular as sugar substitute.",use:"Low-GI natural sweetener, beta-carotene, iron, anti-inflammatory (emerging)",limits:"Very limited clinical evidence. Mostly in vitro or animal studies. High calorie density. Not widely available."},
{id:235,name:"Sacha inchi",aka:"Plukenetia volubilis — Inca peanut",emoji:"🌱",cat:"nut",catLabel:"Seed",african:false,top3:false,kcal:567,carbs:17,protein:27,fat:47,fiber:11,gi:"Low",evidence:"Moderate",micro:"ALA (48.6g/100g — highest plant ALA source), Vitamin E (15mg), Tryptophan (high), Iodine (trace)",bio:"ALA (omega-3 — 48.6%), linoleic acid (omega-6 — 36%), complete protein, tocopherols, tryptophan",benefits:"Highest ALA plant source — significantly higher than flaxseed. Complete protein (all essential amino acids). RCT: sacha inchi oil improved lipid profile (LDL reduction, HDL increase). High tryptophan: serotonin and melatonin precursor.",use:"Highest plant omega-3 (ALA), complete protein, sleep (tryptophan/melatonin), lipid profile",limits:"ALA→EPA/DHA conversion only 5–10%. Very expensive and hard to source. Limited long-term safety data."},
{id:236,name:"Hemp hearts",aka:"Cannabis sativa L. — shelled seeds",emoji:"🌱",cat:"nut",catLabel:"Seed",african:false,top3:false,kcal:553,carbs:8.7,protein:31.6,fat:48.7,fiber:4,gi:"Low",evidence:"Moderate",micro:"Magnesium (700mg — extraordinary), Phosphorus (1,650mg), Iron (7.95mg), Zinc (9.9mg), GLA (omega-6)",bio:"GLA (gamma-linolenic acid — 2.5g/100g), edestin protein (most digestible plant protein), SDA (omega-3)",benefits:"Edestin is structurally similar to human blood plasma globulins — most bioavailable plant protein. GLA: anti-inflammatory via DGLA pathway. Optimal 3:1 omega-6:omega-3 ratio. Highest magnesium density of any seed.",use:"Complete plant protein (highest bioavailability), GLA anti-inflammatory, magnesium, omega-3",limits:"Trace THC may cause false positive drug test (minimal but possible). Expensive. Omega-6 still significant in total quantity."},
{id:237,name:"Pili nuts",aka:"Canarium ovatum",emoji:"🌰",cat:"nut",catLabel:"Tree nut",african:true,top3:false,kcal:719,carbs:3.5,protein:10.8,fat:79.6,fiber:3,gi:"Low",evidence:"Low",micro:"Magnesium (302mg), Phosphorus (474mg), Thiamine (0.8mg), Manganese (2.6mg), Calcium (98mg)",bio:"Oleic acid (MUFA — 42%), palmitic acid, palmitoleic acid (omega-7), tocopherols",benefits:"Highest calorie of all tree nuts. Palmitoleic acid (omega-7): emerging evidence for insulin sensitivity and cardiovascular benefit. Very high MUFA content. High magnesium and phosphorus for bone health. Native to Southeast Asia and Central Africa.",use:"MUFA density, magnesium, ketogenic diet, bone health, omega-7",limits:"Extremely high calorie density. Very expensive and rare outside Philippines/SE Asia. Most evidence on omega-7 is mechanistic."},

// ══════════ MORE AFRICAN FOODS ══════════
{id:238,name:"Shea nut (Karité)",aka:"Vitellaria paradoxa — fruit pulp",emoji:"🌰",cat:"fruit",catLabel:"African fruit",african:true,top3:false,kcal:98,carbs:22,protein:1.2,fat:0.5,fiber:5.1,gi:"Low",evidence:"Low",micro:"Vitamin C (18mg), Beta-carotene (85mcg RAE), Calcium (35mg), Iron (1.2mg), Potassium (310mg)",bio:"Triterpene alcohols (lupeol — anti-inflammatory), catechins, quercetin, kaempferol, gallic acid",benefits:"Shea fruit pulp (different from shea butter): good vitamin C and beta-carotene. Lupeol: anti-inflammatory and anti-tumour in vitro. Traditional food of Sahel and W. Africa — consumed fresh or dried. Important food security crop beyond just butter production.",use:"Vitamin C and beta-carotene (Sahel), anti-inflammatory (lupeol), food security, traditional fruit",limits:"Very limited clinical evidence. Seasonal availability. Pulp often discarded in favour of the nut (for butter)."},
{id:239,name:"African wild plum",aka:"Dacryodes edulis — African pear / Ube",emoji:"🍑",cat:"fruit",catLabel:"African fruit",african:true,top3:false,kcal:99,carbs:7.7,protein:5.2,fat:5.4,fiber:4.2,gi:"Low",evidence:"Low",micro:"Vitamin C (19mg), Calcium (45mg), Iron (2.7mg), Magnesium (62mg), Beta-carotene (98mcg RAE)",bio:"Fatty acids (palmitic, oleic, linolenic), beta-carotene, tocopherols, phenolic compounds",benefits:"Unusually high protein for a fruit (5.2g/100g). Good iron content — important in W. African diets. Anti-sickling properties reported (in vitro). Traditional food in Nigeria, Cameroon, and Central Africa — often eaten roasted with corn. Nutrient-rich traditional food with multiple potential health benefits.",use:"Protein (for a fruit), iron, vitamin C, traditional W./C. African food, anti-inflammatory",limits:"Very limited clinical evidence. Short shelf life — seasonal. Mostly mechanistic evidence. Regional availability."},
{id:240,name:"Locust bean fruit (Sweet pod)",aka:"Parkia biglobosa — fruit pulp",emoji:"🌳",cat:"fruit",catLabel:"African fruit/legume",african:true,top3:false,kcal:213,carbs:50,protein:6.8,fat:1.2,fiber:9.2,gi:"Medium",evidence:"Low",micro:"Vitamin C (22mg), Iron (5.3mg), Calcium (168mg), Potassium (430mg), Phosphorus (175mg)",bio:"Polyphenols, proanthocyanidins, tannins, mucilaginous fibre, alkaloids",benefits:"Sweet, floury pulp consumed across Sahel and W. Africa — distinct from the fermented seeds (dawadawa). Good iron and calcium for a fruit. Fibre supports gut health. High energy density — important in food security. Traditional remedy for respiratory conditions.",use:"Iron and calcium (Sahel), energy density, gut health, food security, traditional W. African fruit",limits:"Very limited clinical studies. Medium GI. High sugar content in pulp. Seeds (dawadawa) have different nutritional profile."},
{id:241,name:"Roselle fruit",aka:"Hibiscus sabdariffa — fresh calyx",emoji:"🌺",cat:"fruit",catLabel:"African functional fruit",african:true,top3:false,kcal:49,carbs:11.3,protein:0.96,fat:0.1,fiber:2.3,gi:"Low",evidence:"Moderate",micro:"Vitamin C (12mg), Calcium (215mg), Iron (1.5mg), Anthocyanins (1,000mg/100g — very high), Potassium (208mg)",bio:"Delphinidin-3-sambubioside, cyanidin-3-sambubioside, hibiscus acid, protocatechuic acid, quercetin",benefits:"Same cardiovascular evidence as hibiscus tea (6–10 mmHg BP reduction in RCTs). Fresh calyx has highest anthocyanin concentration. Calcium density extraordinary for a fruit. Vitamin C enhances iron absorption. Cultural food across W./N./E. Africa and Caribbean.",use:"Hypertension (BP reduction), antioxidant, calcium (African fruit), vitamin C, iron absorption",limits:"Uterotonic — avoid in pregnancy. Possible interaction with chloroquine. High in hibiscus acid — may irritate GI in sensitive individuals."},
{id:242,name:"Sorrel leaves (Jamaican/African)",aka:"Hibiscus sabdariffa — leaves",emoji:"🌿",cat:"leaf",catLabel:"African leafy green",african:true,top3:false,kcal:43,carbs:7.6,protein:1.9,fat:0.6,fiber:3.5,gi:"Low",evidence:"Low",micro:"Vitamin C (54mg — very high for a leaf), Iron (2.9mg), Calcium (213mg), Beta-carotene (285mcg RAE), Folate (71mcg)",bio:"Hibiscus acid, protocatechuic acid, quercetin, anthocyanins (lower than calyx), oxalic acid",benefits:"Very high vitamin C for a cooked leaf. Good iron and calcium. The same hibiscus plant — leaves have different nutrient profile vs calyx. Used in W. African cuisine (gongura / onugbu in some regions). Folic acid supports maternal health.",use:"Vitamin C, iron, calcium, folate, traditional W./E. African leafy green, maternal nutrition",limits:"High oxalate — reduce mineral bioavailability. Uterotonic at high doses — caution in pregnancy. Same hibiscus chloroquine interaction concern."},
{id:243,name:"Senegalia senegal (Gum arabic)",aka:"Acacia senegal — E414",emoji:"🌿",cat:"other",catLabel:"African functional food",african:true,top3:false,kcal:350,carbs:85,protein:3.5,fat:0.3,fiber:80,gi:"Low",evidence:"Moderate",micro:"Fibre (80g/100g — highest of any common food supplement), Calcium (120mg), Potassium (600mg), Magnesium (85mg)",bio:"Arabinogalactan (highly branched polysaccharide), galactose, arabinose, rhamnose, glucuronic acid",benefits:"Highest dietary fibre density of any food supplement (80g/100g). Arabinogalactan is a potent prebiotic — specifically feeds Bifidobacterium, Lactobacillus, and Akkermansia muciniphila. RCTs confirm gut microbiome improvement at 10g/day. Traditional food across Sahel and North Africa — used in beverages and cooking. Anti-obesity effect (satiety).",use:"Gut microbiome (prebiotic — most potent), satiety, cholesterol (bile acid sequestration), Akkermansia, Sahel traditional food",limits:"Very high dose needed for prebiotic effect (10g+). Allergy rare but reported. Digestive discomfort at high doses (gas). Limited palatability — requires mixing into beverages."},
{id:244,name:"Neem fruit",aka:"Azadirachta indica — fruit",emoji:"🌳",cat:"fruit",catLabel:"African medicinal fruit",african:true,top3:false,kcal:65,carbs:13.4,protein:1.3,fat:0.5,fiber:5.2,gi:"Low",evidence:"Low",micro:"Vitamin C (12mg), Beta-carotene (60mcg RAE), Calcium (88mg), Iron (1.8mg), Nimbosterol",bio:"Azadirachtin, nimbolide, gedunin, quercetin, kaempferol, limonoids, nimbidiol",benefits:"Nimbolide and gedunin: potent anti-cancer activity in vitro (inhibit multiple cancer pathways). Anti-malarial properties (gedunin effective against Plasmodium in vitro). Traditional across sub-Saharan Africa as multipurpose medicinal plant. Anti-fungal and antibacterial.",use:"Traditional antimalarial, anti-cancer (mechanistic), antibacterial, anti-fungal, African medicinal food",limits:"Very bitter. Fruit safe but high doses of neem oil/bark hepatotoxic and nephrotoxic. Not suitable for children or pregnancy. Most evidence in vitro."},
{id:245,name:"Dodowa (Dog plum)",aka:"Parinari curatellifolia",emoji:"🍑",cat:"fruit",catLabel:"African wild fruit",african:true,top3:false,kcal:87,carbs:18.4,protein:2.1,fat:1.3,fiber:6.2,gi:"Low",evidence:"Low",micro:"Vitamin C (15mg), Iron (2.3mg), Calcium (55mg), Potassium (320mg), Zinc (1.1mg)",bio:"Polyphenols, flavonoids, tannins, beta-carotene, fatty acids",benefits:"Wild fruit consumed across central and eastern sub-Saharan Africa. Good dietary fibre and iron. Traditional use for GI conditions and wound healing. Antimicrobial properties in vitro. Food security crop in drier regions.",use:"Iron, dietary fibre, food security (C./E. Africa), traditional GI medicine, antioxidant",limits:"Very limited clinical evidence. Regional availability only. Tannins reduce iron absorption."},
